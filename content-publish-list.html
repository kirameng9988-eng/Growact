    <main class="ml-[220px] mt-16 p-6">
        <!-- 页面标题栏 -->
        <div class="flex items-center justify-between mb-6">
            <div class="flex items-center gap-4">

                    <p class="text-gray-500 mt-1">查看所有发布历史记录，支持筛选和导出</p>
                </div>
            </div>
            <button onclick="exportRecords()" class="px-5 py-2.5 bg-card-bg border border-[#E2E8F0] text-gray-600 rounded-xl hover:text-white hover:border-accent-blue transition-colors flex items-center gap-2">
                <i class="fas fa-download"></i>
                导出
            </button>
        </div>

        <!-- 筛选区 -->
        <div class="bg-white rounded-xl border border-[#E2E8F0] p-4 mb-6">
            <div class="flex items-center gap-4">
                <div class="flex-1 relative">
                    <i class="fas fa-search absolute left-4 top-1/2 -translate-y-1/2 text-gray-500"></i>
                    <input type="text" id="searchInput" placeholder="搜索内容标题..." oninput="filterRecords()" class="w-full bg-primary-bg border border-[#E2E8F0] rounded-xl pl-12 pr-4 py-2.5 text-sm focus:border-accent-blue focus:outline-none">
                </div>
                <select id="typeFilter" onchange="filterRecords()" class="bg-primary-bg border border-[#E2E8F0] rounded-xl px-4 py-2.5 text-sm focus:border-accent-blue focus:outline-none">
                    <option value="">全部类型</option>
                    <option value="news">新闻资讯</option>
                    <option value="announce">公告通知</option>
                    <option value="policy">政策文件</option>
                    <option value="topic">专题活动</option>
                </select>
                <select id="statusFilter" onchange="filterRecords()" class="bg-primary-bg border border-[#E2E8F0] rounded-xl px-4 py-2.5 text-sm focus:border-accent-blue focus:outline-none">
                    <option value="">全部状态</option>
                    <option value="pending">待发布</option>
                    <option value="publishing">发布中</option>
                    <option value="published">已发布</option>
                    <option value="offline">已下线</option>
                    <option value="withdrawn">已撤回</option>
                </select>
                <select id="channelFilter" onchange="filterRecords()" class="bg-primary-bg border border-[#E2E8F0] rounded-xl px-4 py-2.5 text-sm focus:border-accent-blue focus:outline-none">
                    <option value="">全部频道</option>
                    <option value="pc">PC网站</option>
                    <option value="mobile">移动端</option>
                    <option value="app">小程序</option>
                </select>
                <div class="flex items-center gap-2">
                    <input type="date" id="startDate" onchange="filterRecords()" class="bg-primary-bg border border-[#E2E8F0] rounded-xl px-4 py-2.5 text-sm focus:border-accent-blue focus:outline-none">
                    <span class="text-gray-500">至</span>
                    <input type="date" id="endDate" onchange="filterRecords()" class="bg-primary-bg border border-[#E2E8F0] rounded-xl px-4 py-2.5 text-sm focus:border-accent-blue focus:outline-none">
                </div>
            </div>
        </div>

        <!-- 记录表格 -->
        <div class="bg-white rounded-xl border border-[#E2E8F0] overflow-hidden">
            <table class="w-full">
                <thead class="bg-primary-bg/50">
                    <tr class="text-left text-sm text-gray-500">
                        <th class="px-6 py-4 font-medium w-12">
                            <label class="flex items-center gap-2 cursor-pointer">
                                <input type="checkbox" id="selectAll" onchange="toggleSelectAll()" class="accent-accent-blue">
                            </label>
                        </th>
                        <th class="px-6 py-4 font-medium">内容标题</th>
                        <th class="px-6 py-4 font-medium">内容类型</th>
                        <th class="px-6 py-4 font-medium">发布频道</th>
                        <th class="px-6 py-4 font-medium">发布时间</th>
                        <th class="px-6 py-4 font-medium">发布人</th>
                        <th class="px-6 py-4 font-medium">状态</th>
                        <th class="px-6 py-4 font-medium text-right">操作</th>
                    </tr>
                </thead>
                <tbody id="recordTableBody">
                    <!-- 动态渲染 -->
                </tbody>
            </table>

            <!-- 批量操作栏 -->
            <div id="batchActionBar" class="hidden px-6 py-4 bg-accent-blue/10 border-t border-[#E2E8F0]">
                <div class="flex items-center justify-between">
                    <div class="flex items-center gap-2">
                        <span class="text-sm text-gray-600">已选中</span>
                        <span id="selectedCount" class="text-sm font-medium text-accent-blue">0</span>
                        <span class="text-sm text-gray-600">项</span>
                    </div>
                    <div class="flex items-center gap-2">
                        <button onclick="batchPublish()" class="px-4 py-2 bg-accent-green text-white text-sm rounded-lg hover:bg-green-600 transition-colors">
                            <i class="fas fa-rocket mr-1"></i>批量发布
                        </button>
                        <button onclick="batchOffline()" class="px-4 py-2 bg-text-muted text-white text-sm rounded-lg hover:bg-gray-600 transition-colors">
                            <i class="fas fa-arrow-circle-down mr-1"></i>批量下线
                        </button>
                        <button onclick="batchCancel()" class="px-4 py-2 border border-[#E2E8F0] text-gray-600 text-sm rounded-lg hover:text-accent-red hover:border-accent-red transition-colors">
                            <i class="fas fa-times mr-1"></i>批量取消
                        </button>
                    </div>
                </div>
            </div>

            <!-- 分页 -->
            <div class="flex items-center justify-between px-6 py-4 border-t border-[#E2E8F0] bg-primary-bg/30">
                <div class="text-sm text-gray-500">
                    共 <span id="totalCount" class="text-white">0</span> 条记录
                </div>
                <div class="flex items-center gap-2">
                    <button id="prevPage" onclick="prevPage()" class="px-3 py-1.5 border border-[#E2E8F0] rounded-lg text-gray-500 hover:text-white hover:border-accent-blue transition-colors disabled:opacity-50 disabled:cursor-not-allowed">
                        <i class="fas fa-chevron-left"></i>
                    </button>
                    <div id="paginationNumbers" class="flex items-center gap-1">
                        <!-- 动态渲染页码 -->
                    </div>
                    <button id="nextPage" onclick="nextPage()" class="px-3 py-1.5 border border-[#E2E8F0] rounded-lg text-gray-500 hover:text-white hover:border-accent-blue transition-colors disabled:opacity-50 disabled:cursor-not-allowed">
                        <i class="fas fa-chevron-right"></i>

    <!-- Toast容器 -->
    <div id="toastContainer" class="fixed bottom-6 right-6 z-50 flex flex-col gap-2"></div>

    <!-- 确认批量操作弹窗 -->
    <div id="confirmModal" class="fixed inset-0 bg-black/70 z-50 hidden items-center justify-center">
        <div class="bg-card-bg rounded-2xl w-[400px] border border-[#E2E8F0] shadow-2xl">
            <div class="flex items-center gap-4 p-6 border-b border-[#E2E8F0]">
                <div id="confirmIcon" class="w-12 h-12 rounded-full bg-accent-blue/20 flex items-center justify-center">
                    <i class="fas fa-rocket text-accent-blue text-xl"></i>
                </div>
                <div>
                    <h3 id="confirmTitle" class="text-lg font-medium">确认操作</h3>
                    <p id="confirmDesc" class="text-sm text-gray-500 mt-1">确定要执行此操作吗？</p>
                </div>
            </div>
            <div class="flex items-center justify-end gap-3 px-6 py-4 border-t border-[#E2E8F0]">
                <button onclick="closeModal('confirmModal')" class="px-5 py-2.5 border border-[#E2E8F0] rounded-xl text-gray-600 hover:text-white transition-colors">取消</button>
                <button id="confirmBtn" onclick="executeConfirmAction()" class="px-5 py-2.5 bg-accent-blue text-white rounded-xl hover:bg-blue-600 transition-colors">确认</button>
            </div>
        </div>
    </div>

    <script>
        // 发布记录数据
        let publishRecords = [
            { id: 1, title: '数字化转型工作进展报告', type: 'news', typeName: '新闻资讯', channels: ['pc', 'mobile'], status: 'pending', publishTime: '2024-01-15 10:00:00', author: '王建国' },
            { id: 2, title: '关于开展2024年度工作总结的通知', type: 'announce', typeName: '公告通知', channels: ['pc'], status: 'pending', publishTime: '2024-01-16 09:00:00', author: '李明' },
            { id: 3, title: '安全生产知识竞赛活动方案', type: 'news', typeName: '新闻资讯', channels: ['mobile'], status: 'pending', publishTime: '2024-01-18 14:00:00', author: '张伟' },
            { id: 4, title: '智慧城市建设成果展示', type: 'topic', typeName: '专题活动', channels: ['pc', 'mobile', 'app'], status: 'published', publishTime: '2024-01-10 17:30:00', author: '吴晓燕' },
            { id: 5, title: '两会专题报道：民生改善篇', type: 'news', typeName: '新闻资讯', channels: ['pc', 'mobile'], status: 'pending', publishTime: '2024-01-22 08:00:00', author: '赵强' },
            { id: 6, title: '第一季度工作规划部署会议纪要', type: 'news', typeName: '新闻资讯', channels: ['pc'], status: 'published', publishTime: '2024-01-08 16:20:00', author: '周明杰' },
            { id: 7, title: '数字化转型工作进展报告', type: 'news', typeName: '新闻资讯', channels: ['pc', 'mobile'], status: 'published', publishTime: '2024-01-05 11:00:00', author: '王建国' },
            { id: 8, title: '2024年春节放假通知', type: 'announce', typeName: '公告通知', channels: ['pc', 'mobile', 'app'], status: 'pending', publishTime: '2024-01-20 10:00:00', author: '行政部' },
            { id: 9, title: '科技创新成果展示', type: 'policy', typeName: '政策文件', channels: ['pc'], status: 'offline', publishTime: '2024-01-02 09:00:00', author: '科技处' },
            { id: 10, title: '年度表彰大会盛况', type: 'news', typeName: '新闻资讯', channels: ['pc', 'mobile'], status: 'pending', publishTime: '2024-01-25 15:00:00', author: '宣传部' },
            { id: 11, title: '2024年元旦放假安排', type: 'announce', typeName: '公告通知', channels: ['pc', 'mobile'], status: 'withdrawn', publishTime: '2023-12-28 10:00:00', author: '行政部' },
            { id: 12, title: '乡村振兴工作实施方案', type: 'policy', typeName: '政策文件', channels: ['pc', 'app'], status: 'published', publishTime: '2024-01-03 14:00:00', author: '农业局' },
            { id: 13, title: '冬季安全生产专项检查', type: 'news', typeName: '新闻资讯', channels: ['mobile'], status: 'publishing', publishTime: '2024-01-19 09:00:00', author: '安监部' },
            { id: 14, title: '2024年度预算编制说明', type: 'policy', typeName: '政策文件', channels: ['pc'], status: 'published', publishTime: '2024-01-12 11:00:00', author: '财务部' },
            { id: 15, title: '新年贺词', type: 'announce', typeName: '公告通知', channels: ['pc', 'mobile', 'app'], status: 'offline', publishTime: '2024-01-01 08:00:00', author: '办公室' },
            { id: 16, title: '智慧政务服务平台上线公告', type: 'announce', typeName: '公告通知', channels: ['pc', 'mobile'], status: 'published', publishTime: '2024-01-17 10:00:00', author: '信息科' }
        ];

        let filteredRecords = [...publishRecords];
        let selectedIds = [];
        let currentPage = 1;
        const pageSize = 10;
        let pendingConfirmAction = null;

        // 状态配置
        const statusConfig = {
            pending: { name: '待发布', color: 'accent-blue', bgColor: 'bg-accent-blue/20', icon: 'clock' },
            publishing: { name: '发布中', color: 'indigo-500', bgColor: 'bg-indigo-500/20', icon: 'spinner' },
            published: { name: '已发布', color: 'accent-green', bgColor: 'bg-accent-green/20', icon: 'check-circle' },
            offline: { name: '已下线', color: 'text-muted', bgColor: 'bg-text-muted/20', icon: 'arrow-circle-down' },
            withdrawn: { name: '已撤回', color: 'accent-amber', bgColor: 'bg-accent-amber/20', icon: 'undo' }
        };

        // 频道配置
        const channelConfig = {
            pc: { name: 'PC', color: 'accent-blue' },
            mobile: { name: '移动端', color: 'accent-cyan' },
            app: { name: '小程序', color: 'accent-green' }
        };

        // 初始化
        function init() {
            filterRecords();
        }

        // 筛选记录
        function filterRecords() {
            const searchText = document.getElementById('searchInput').value.toLowerCase();
            const typeFilter = document.getElementById('typeFilter').value;
            const statusFilter = document.getElementById('statusFilter').value;
            const channelFilter = document.getElementById('channelFilter').value;
            const startDate = document.getElementById('startDate').value;
            const endDate = document.getElementById('endDate').value;

            filteredRecords = publishRecords.filter(record => {
                const matchSearch = !searchText || record.title.toLowerCase().includes(searchText);
                const matchType = !typeFilter || record.type === typeFilter;
                const matchStatus = !statusFilter || record.status === statusFilter;
                const matchChannel = !channelFilter || record.channels.includes(channelFilter);
                const matchStartDate = !startDate || record.publishTime >= startDate;
                const matchEndDate = !endDate || record.publishTime <= endDate + ' 23:59:59';

                return matchSearch && matchType && matchStatus && matchChannel && matchStartDate && matchEndDate;
            });

            currentPage = 1;
            selectedIds = [];
            renderTable();
            renderPagination();
            updateBatchActionBar();
        }

        // 渲染表格
        function renderTable() {
            const startIndex = (currentPage - 1) * pageSize;
            const endIndex = startIndex + pageSize;
            const pageRecords = filteredRecords.slice(startIndex, endIndex);

            const tbody = document.getElementById('recordTableBody');

            if (pageRecords.length === 0) {
                tbody.innerHTML = `
                    <tr>
                        <td colspan="8" class="px-6 py-12 text-center text-gray-500">
                            <i class="fas fa-inbox text-4xl mb-3 opacity-50"></i>
                            <p>暂无发布记录</p>
                        </td>
                    </tr>
                `;
                return;
            }

            tbody.innerHTML = pageRecords.map(record => {
                const status = statusConfig[record.status];
                const channelsHtml = record.channels.map(ch => {
                    const chConfig = channelConfig[ch];
                    return `<span class="px-2 py-0.5 ${chConfig.color}/20 text-${chConfig.color} text-xs rounded">${chConfig.name}</span>`;
                }).join('');

                return `
                    <tr class="table-row border-t border-[#E2E8F0] transition-colors">
                        <td class="px-6 py-4">
                            <input type="checkbox" ${selectedIds.includes(record.id) ? 'checked' : ''} onchange="toggleSelect(${record.id})" class="accent-accent-blue">
                        </td>
                        <td class="px-6 py-4">
                            <span class="font-medium">${record.title}</span>
                        </td>
                        <td class="px-6 py-4">
                            <span class="text-sm text-gray-600">${record.typeName}</span>
                        </td>
                        <td class="px-6 py-4">
                            <div class="flex flex-wrap gap-1">${channelsHtml}</div>
                        </td>
                        <td class="px-6 py-4">
                            <span class="text-sm text-gray-500">${record.publishTime.substring(0, 16).replace(' ', '<br>')}</span>
                        </td>
                        <td class="px-6 py-4">
                            <span class="text-sm text-gray-600">${record.author}</span>
                        </td>
                        <td class="px-6 py-4">
                            <span class="px-2.5 py-1 ${status.bgColor} text-${status.color} text-xs rounded flex items-center gap-1 w-fit">
                                <i class="fas fa-${status.icon}"></i>
                                ${status.name}
                            </span>
                        </td>
                        <td class="px-6 py-4 text-right">
                            <div class="flex items-center justify-end gap-1">
                                ${record.status === 'pending' ? `
                                    <button onclick="immediatePublish(${record.id})" class="p-2 text-accent-green hover:bg-accent-green/10 rounded-lg transition-colors" title="立即发布">
                                        <i class="fas fa-rocket"></i>
                                    </button>
                                ` : ''}
                                ${record.status === 'published' ? `
                                    <button onclick="offlineContent(${record.id})" class="p-2 text-gray-500 hover:text-accent-red hover:bg-accent-red/10 rounded-lg transition-colors" title="下线">
                                        <i class="fas fa-arrow-circle-down"></i>
                                    </button>
                                ` : ''}
                                <button onclick="viewDetail(${record.id})" class="p-2 text-gray-500 hover:text-accent-blue hover:bg-accent-blue/10 rounded-lg transition-colors" title="详情">
                                    <i class="fas fa-eye"></i>
                                </button>
                                <button onclick="deleteRecord(${record.id})" class="p-2 text-gray-500 hover:text-accent-red hover:bg-accent-red/10 rounded-lg transition-colors" title="删除">
                                    <i class="fas fa-trash"></i>
                                </button>
                            </div>
                        </td>
                    </tr>
                `;
            }).join('');

            document.getElementById('totalCount').textContent = filteredRecords.length;
        }

        // 渲染分页
        function renderPagination() {
            const totalPages = Math.ceil(filteredRecords.length / pageSize);
            const paginationNumbers = document.getElementById('paginationNumbers');

            let pagesHtml = '';
            for (let i = 1; i <= totalPages; i++) {
                pagesHtml += `<button onclick="goToPage(${i})" class="w-8 h-8 rounded-lg text-sm transition-colors ${i === currentPage ? 'bg-accent-blue text-white' : 'text-gray-500 hover:text-white hover:bg-primary-bg'}">${i}</button>`;
            }
            paginationNumbers.innerHTML = pagesHtml;

            document.getElementById('prevPage').disabled = currentPage <= 1;
            document.getElementById('nextPage').disabled = currentPage >= totalPages;
        }

        function goToPage(page) {
            currentPage = page;
            renderTable();
            renderPagination();
        }

        function prevPage() {
            if (currentPage > 1) {
                currentPage--;
                renderTable();
                renderPagination();
            }
        }

        function nextPage() {
            const totalPages = Math.ceil(filteredRecords.length / pageSize);
            if (currentPage < totalPages) {
                currentPage++;
                renderTable();
                renderPagination();
            }
        }

        // 选择操作
        function toggleSelect(id) {
            const idx = selectedIds.indexOf(id);
            if (idx > -1) {
                selectedIds.splice(idx, 1);
            } else {
                selectedIds.push(id);
            }
            updateBatchActionBar();
            updateSelectAllCheckbox();
        }

        function toggleSelectAll() {
            const selectAll = document.getElementById('selectAll').checked;
            const startIndex = (currentPage - 1) * pageSize;
            const endIndex = startIndex + pageSize;
            const pageRecords = filteredRecords.slice(startIndex, endIndex);

            if (selectAll) {
                pageRecords.forEach(r => {
                    if (!selectedIds.includes(r.id)) selectedIds.push(r.id);
                });
            } else {
                pageRecords.forEach(r => {
                    const idx = selectedIds.indexOf(r.id);
                    if (idx > -1) selectedIds.splice(idx, 1);
                });
            }

            renderTable();
            updateBatchActionBar();
        }

        function updateSelectAllCheckbox() {
            const startIndex = (currentPage - 1) * pageSize;
            const endIndex = startIndex + pageSize;
            const pageRecords = filteredRecords.slice(startIndex, endIndex);
            const allSelected = pageRecords.every(r => selectedIds.includes(r.id));
            document.getElementById('selectAll').checked = allSelected && pageRecords.length > 0;
        }

        function updateBatchActionBar() {
            const bar = document.getElementById('batchActionBar');
            const countEl = document.getElementById('selectedCount');

            if (selectedIds.length > 0) {
                bar.classList.remove('hidden');
                countEl.textContent = selectedIds.length;
            } else {
                bar.classList.add('hidden');
            }
        }

        // 操作
        function immediatePublish(id) {
            const record = publishRecords.find(r => r.id === id);
            if (record) {
                record.status = 'published';
                filterRecords();
                showToast('内容已发布');
            }
        }

        function offlineContent(id) {
            const record = publishRecords.find(r => r.id === id);
            if (record) {
                record.status = 'offline';
                filterRecords();
                showToast('内容已下线');
            }
        }

        function viewDetail(id) {
            const record = publishRecords.find(r => r.id === id);
            if (record) {
                alert(`详情：\n标题：${record.title}\n类型：${record.typeName}\n频道：${record.channels.join(', ')}\n发布时间：${record.publishTime}\n发布人：${record.author}\n状态：${statusConfig[record.status].name}`);
            }
        }

        function deleteRecord(id) {
            if (confirm('确定要删除这条发布记录吗？')) {
                publishRecords = publishRecords.filter(r => r.id !== id);
                filterRecords();
                showToast('记录已删除');
            }
        }

        // 批量操作
        function batchPublish() {
            if (selectedIds.length === 0) return;
            showConfirmModal('publish', `${selectedIds.length} 条内容将立即发布`, 'bg-accent-green', 'fa-rocket');
        }

        function batchOffline() {
            if (selectedIds.length === 0) return;
            showConfirmModal('offline', `${selectedIds.length} 条内容将下线`, 'bg-text-muted', 'fa-arrow-circle-down');
        }

        function batchCancel() {
            if (selectedIds.length === 0) return;
            showConfirmModal('cancel', `${selectedIds.length} 条发布计划将取消`, 'bg-accent-red', 'fa-times');
        }

        function showConfirmModal(action, desc, iconBg, iconClass) {
            pendingConfirmAction = action;
            document.getElementById('confirmDesc').textContent = desc;
            document.getElementById('confirmIcon').className = `w-12 h-12 rounded-full ${iconBg} flex items-center justify-center`;
            document.getElementById('confirmIcon').innerHTML = `<i class="fas ${iconClass} text-white text-xl"></i>`;
            openModal('confirmModal');
        }

        function executeConfirmAction() {
            if (pendingConfirmAction === 'publish') {
                selectedIds.forEach(id => {
                    const record = publishRecords.find(r => r.id === id);
                    if (record) record.status = 'published';
                });
                showToast(`成功发布 ${selectedIds.length} 条内容`);
            } else if (pendingConfirmAction === 'offline') {
                selectedIds.forEach(id => {
                    const record = publishRecords.find(r => r.id === id);
                    if (record) record.status = 'offline';
                });
                showToast(`成功下线 ${selectedIds.length} 条内容`);
            } else if (pendingConfirmAction === 'cancel') {
                publishRecords = publishRecords.filter(r => !selectedIds.includes(r.id));
                showToast(`成功取消 ${selectedIds.length} 条记录`);
            }

            selectedIds = [];
            closeModal('confirmModal');
            filterRecords();
        }

        // 导出
        function exportRecords() {
            showToast('导出功能开发中', 'info');
        }

        // 弹窗控制
        function openModal(id) {
            document.getElementById(id).classList.remove('hidden');
            document.getElementById(id).classList.add('flex');
        }

        function closeModal(id) {
            document.getElementById(id).classList.add('hidden');
            document.getElementById(id).classList.remove('flex');
        }

        // Toast提示
        function showToast(message, type = 'success') {
            const container = document.getElementById('toastContainer');
            const toast = document.createElement('div');
            const bgColor = type === 'success' ? 'bg-accent-green' : type === 'error' ? 'bg-accent-red' : 'bg-accent-blue';
            toast.className = `toast ${bgColor} text-white px-6 py-3 rounded-xl shadow-lg flex items-center gap-2`;
            toast.innerHTML = `<i class="fas fa-${type === 'success' ? 'check-circle' : type === 'error' ? 'times-circle' : 'info-circle'}"></i><span>${message}</span>`;
            container.appendChild(toast);
            setTimeout(() => toast.remove(), 3000);
        }

        // 初始化
        init();
    </script>
</body>
</html>
