<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>活动分类 - 内容中台系统</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        'primary-bg': '#FFFFFF',
                        'secondary-bg': '#F8FAFC',
                        'card-bg': '#FFFFFF',
                        'border-dark': '#CBD5E1',
                        'accent-blue': '#0A61FF',
                        'accent-cyan': '#0891B2',
                        'accent-green': '#059669',
                        'accent-amber': '#D97706',
                        'accent-red': '#DC2626',
                        'text-primary': '#0F172A',
                        'text-secondary': '#475569',
                        'text-muted': '#94A3B8'
                    }
                }
            }
        }
    </script>
    <style>
        * { font-family: 'PingFang SC', 'Microsoft YaHei', sans-serif; }
        ::-webkit-scrollbar { width: 6px; height: 6px; }
        ::-webkit-scrollbar-track { background: #F1F5F9; }
        ::-webkit-scrollbar-thumb { background: #F8FAFC; border-radius: 3px; }
        .sidebar-menu-item:hover { background: rgba(10, 97, 255, 0.06); }
        .sidebar-menu-item.active { background: rgba(10, 97, 255, 0.1); border-left: 3px solid #0A61FF; }
        .sidebar-menu-item.active i { color: #0A61FF; }
        .table-row:hover { background: #F8FAFC; }
        .toast { animation: slideIn 0.3s ease; }
        @keyframes slideIn { from { transform: translateX(100%); opacity: 0; } to { transform: translateX(0); opacity: 1; } }
    </style>
</head>
<body class="bg-secondary-bg text-gray-900">

    <!-- 主内容区 -->
    <main class="p-6">
        <!-- 页面标题 -->
        <div class="flex items-center justify-between mb-6">
            <div>
                <h1 class="text-2xl font-semibold">活动分类</h1>
                <p class="text-gray-500 mt-1">管理活动分类，支持创建、编辑和删除</p>
            </div>
            <div class="flex items-center gap-3">
                <button onclick="openModal('createModal')" class="px-5 py-2.5 bg-accent-blue text-white rounded-xl hover:bg-blue-600 transition-colors flex items-center gap-2">
                    <i class="fas fa-plus"></i>
                    新增分类
                </button>
            </div>
        </div>

        <!-- 分类列表 -->
        <div class="bg-white rounded-xl border border-[#E2E8F0] overflow-hidden">
            <table class="w-full">
                <thead>
                    <tr class="text-left text-gray-500 text-sm border-b border-[#E2E8F0] bg-primary-bg/50">
                        <th class="px-4 py-3 font-medium w-12">序号</th>
                        <th class="px-4 py-3 font-medium">分类名称</th>
                        <th class="px-4 py-3 font-medium w-32">分类编码</th>
                        <th class="px-4 py-3 font-medium w-20">排序</th>
                        <th class="px-4 py-3 font-medium w-20">状态</th>
                        <th class="px-4 py-3 font-medium">描述</th>
                        <th class="px-4 py-3 font-medium w-32 text-right">操作</th>
                    </tr>
                </thead>
                <tbody id="categoryTableBody">
                </tbody>
            </table>
        </div>
    </main>

    <!-- Toast容器 -->
    <div id="toastContainer" class="fixed bottom-6 right-6 z-50 flex flex-col gap-2"></div>

    <!-- 新增分类弹窗 -->
    <div id="createModal" class="fixed inset-0 bg-black/70 z-[90] hidden items-center justify-center">
        <div class="bg-card-bg rounded-2xl w-[500px] overflow-hidden border border-[#E2E8F0] shadow-2xl">
            <div class="flex items-center justify-between px-6 py-4 border-b border-[#E2E8F0]">
                <h3 class="text-lg font-medium">新增分类</h3>
                <button onclick="closeModal('createModal')" class="text-gray-500 hover:text-gray-700">
                    <i class="fas fa-times text-xl"></i>
                </button>
            </div>
            <div class="p-6">
                <div class="space-y-4">
                    <div>
                        <label class="block text-sm text-gray-600 mb-2">分类名称 <span class="text-accent-red">*</span></label>
                        <input type="text" id="createName" placeholder="请输入分类名称" class="w-full bg-white border border-[#E2E8F0] rounded-xl px-4 py-3 text-sm text-gray-700 placeholder-gray-400 focus:border-accent-blue focus:outline-none">
                    </div>
                    <div>
                        <label class="block text-sm text-gray-600 mb-2">分类编码 <span class="text-accent-red">*</span></label>
                        <input type="text" id="createCode" placeholder="请输入分类编码" class="w-full bg-white border border-[#E2E8F0] rounded-xl px-4 py-3 text-sm text-gray-700 placeholder-gray-400 focus:border-accent-blue focus:outline-none">
                    </div>
                    <div>
                        <label class="block text-sm text-gray-600 mb-2">排序</label>
                        <input type="number" id="createSort" value="0" placeholder="数字越小越靠前" class="w-full bg-white border border-[#E2E8F0] rounded-xl px-4 py-3 text-sm text-gray-700 placeholder-gray-400 focus:border-accent-blue focus:outline-none">
                    </div>
                    <div>
                        <label class="block text-sm text-gray-600 mb-2">描述</label>
                        <textarea id="createDesc" rows="3" placeholder="请输入分类描述" class="w-full bg-white border border-[#E2E8F0] rounded-xl px-4 py-3 text-sm text-gray-700 placeholder-gray-400 focus:border-accent-blue focus:outline-none resize-none"></textarea>
                    </div>
                </div>
            </div>
            <div class="flex items-center justify-end gap-3 px-6 py-4 border-t border-[#E2E8F0] bg-gray-50">
                <button onclick="closeModal('createModal')" class="px-5 py-2.5 border border-[#E2E8F0] rounded-xl text-gray-600 hover:text-gray-900 transition-colors">取消</button>
                <button onclick="saveCategory('create')" class="px-5 py-2.5 bg-accent-blue text-white rounded-xl hover:bg-blue-600 transition-colors">保存</button>
            </div>
        </div>
    </div>

    <!-- 编辑分类弹窗 -->
    <div id="editModal" class="fixed inset-0 bg-black/70 z-[90] hidden items-center justify-center">
        <div class="bg-card-bg rounded-2xl w-[500px] overflow-hidden border border-[#E2E8F0] shadow-2xl">
            <div class="flex items-center justify-between px-6 py-4 border-b border-[#E2E8F0]">
                <h3 class="text-lg font-medium">编辑分类</h3>
                <button onclick="closeModal('editModal')" class="text-gray-500 hover:text-gray-700">
                    <i class="fas fa-times text-xl"></i>
                </button>
            </div>
            <div class="p-6">
                <input type="hidden" id="editId">
                <div class="space-y-4">
                    <div>
                        <label class="block text-sm text-gray-600 mb-2">分类名称 <span class="text-accent-red">*</span></label>
                        <input type="text" id="editName" placeholder="请输入分类名称" class="w-full bg-white border border-[#E2E8F0] rounded-xl px-4 py-3 text-sm text-gray-700 placeholder-gray-400 focus:border-accent-blue focus:outline-none">
                    </div>
                    <div>
                        <label class="block text-sm text-gray-600 mb-2">分类编码 <span class="text-accent-red">*</span></label>
                        <input type="text" id="editCode" placeholder="请输入分类编码" class="w-full bg-white border border-[#E2E8F0] rounded-xl px-4 py-3 text-sm text-gray-700 placeholder-gray-400 focus:border-accent-blue focus:outline-none" readonly>
                    </div>
                    <div>
                        <label class="block text-sm text-gray-600 mb-2">排序</label>
                        <input type="number" id="editSort" value="0" placeholder="数字越小越靠前" class="w-full bg-white border border-[#E2E8F0] rounded-xl px-4 py-3 text-sm text-gray-700 placeholder-gray-400 focus:border-accent-blue focus:outline-none">
                    </div>
                    <div>
                        <label class="block text-sm text-gray-600 mb-2">描述</label>
                        <textarea id="editDesc" rows="3" placeholder="请输入分类描述" class="w-full bg-white border border-[#E2E8F0] rounded-xl px-4 py-3 text-sm text-gray-700 placeholder-gray-400 focus:border-accent-blue focus:outline-none resize-none"></textarea>
                    </div>
                </div>
            </div>
            <div class="flex items-center justify-end gap-3 px-6 py-4 border-t border-[#E2E8F0] bg-gray-50">
                <button onclick="closeModal('editModal')" class="px-5 py-2.5 border border-[#E2E8F0] rounded-xl text-gray-600 hover:text-gray-900 transition-colors">取消</button>
                <button onclick="saveCategory('edit')" class="px-5 py-2.5 bg-accent-blue text-white rounded-xl hover:bg-blue-600 transition-colors">保存</button>
            </div>
        </div>
    </div>

    <!-- 删除确认弹窗 -->
    <div id="deleteModal" class="fixed inset-0 bg-black/70 z-[90] hidden items-center justify-center">
        <div class="bg-white rounded-2xl w-[450px] border border-[#E2E8F0] shadow-2xl">
            <div class="flex items-center gap-4 p-6 border-b border-[#E2E8F0]">
                <div class="w-12 h-12 rounded-full bg-accent-red/20 flex items-center justify-center">
                    <i class="fas fa-exclamation-triangle text-accent-red text-xl"></i>
                </div>
                <div>
                    <h3 class="text-lg font-medium">确认删除</h3>
                    <p class="text-sm text-gray-500 mt-1">删除后无法恢复，请谨慎操作</p>
                </div>
            </div>
            <div class="p-6">
                <p class="text-sm text-gray-600">确定要删除以下分类吗？</p>
                <p id="deleteName" class="text-sm font-medium mt-2 text-gray-900"></p>
            </div>
            <div class="flex items-center justify-end gap-3 px-6 py-4 border-t border-[#E2E8F0]">
                <button onclick="closeModal('deleteModal')" class="px-5 py-2.5 border border-[#E2E8F0] rounded-xl text-gray-600 hover:text-gray-900 transition-colors">取消</button>
                <button id="confirmDeleteBtn" class="px-5 py-2.5 bg-accent-red text-white rounded-xl hover:bg-red-600 transition-colors">确认删除</button>
            </div>
        </div>
    </div>

    <script>
        // Mock分类数据
        let categories = [
            { id: 1, name: '科技创新', code: 'tech', sort: 1, status: 'enabled', description: '科技、创新、数字化相关活动' },
            { id: 2, name: '文化活动', code: 'culture', sort: 2, status: 'enabled', description: '文化、艺术、娱乐相关活动' },
            { id: 3, name: '体育运动', code: 'sports', sort: 3, status: 'enabled', description: '体育、运动、健身相关活动' },
            { id: 4, name: '教育培训', code: 'education', sort: 4, status: 'enabled', description: '培训、教育、学习相关活动' },
            { id: 5, name: '公益活动', code: 'charity', sort: 5, status: 'enabled', description: '公益、志愿、爱心相关活动' },
            { id: 6, name: '行业峰会', code: 'summit', sort: 6, status: 'enabled', description: '行业会议、论坛、峰会' },
            { id: 7, name: '团建拓展', code: 'team', sort: 7, status: 'disabled', description: '团队建设、户外拓展活动' },
        ];

        let currentEditId = null;

        // 页面初始化
        document.addEventListener('DOMContentLoaded', function() {
            renderTable();
        });

        function renderTable() {
            const tbody = document.getElementById('categoryTableBody');
            const sorted = [...categories].sort((a, b) => a.sort - b.sort);

            tbody.innerHTML = sorted.map((cat, index) => `
                <tr class="table-row border-b border-[#E2E8F0]">
                    <td class="px-4 py-3 text-sm text-gray-500">${index + 1}</td>
                    <td class="px-4 py-3">
                        <div class="flex items-center gap-2">
                            <span class="font-medium text-gray-900">${cat.name}</span>
                        </div>
                    </td>
                    <td class="px-4 py-3 text-sm text-gray-600 font-mono">${cat.code}</td>
                    <td class="px-4 py-3 text-sm text-gray-600">${cat.sort}</td>
                    <td class="px-4 py-3">${cat.status === 'enabled' ? '<span class="px-2 py-1 text-xs rounded-full bg-green-100 text-green-700">启用</span>' : '<span class="px-2 py-1 text-xs rounded-full bg-gray-100 text-gray-500">禁用</span>'}</td>
                    <td class="px-4 py-3 text-sm text-gray-500">${cat.description}</td>
                    <td class="px-4 py-3 text-right">
                        <div class="flex items-center justify-end gap-2">
                            <button onclick="editCategory(${cat.id})" class="text-accent-cyan hover:text-cyan-700 text-sm">编辑</button>
                            <button onclick="toggleStatus(${cat.id})" class="text-sm hover:underline">${cat.status === 'enabled' ? '禁用' : '启用'}</button>
                            <button onclick="deleteCategory(${cat.id})" class="text-accent-red hover:text-red-700 text-sm">删除</button>
                        </div>
                    </td>
                </tr>
            `).join('');
        }

        function openModal(modalId) {
            document.getElementById(modalId).classList.remove('hidden');
            document.getElementById(modalId).classList.add('flex');
        }

        function closeModal(modalId) {
            document.getElementById(modalId).classList.add('hidden');
            document.getElementById(modalId).classList.remove('flex');
        }

        function saveCategory(mode) {
            if (mode === 'create') {
                const name = document.getElementById('createName').value.trim();
                const code = document.getElementById('createCode').value.trim();
                const sort = parseInt(document.getElementById('createSort').value) || 0;
                const desc = document.getElementById('createDesc').value.trim();

                if (!name) {
                    showToast('请输入分类名称', 'error');
                    return;
                }
                if (!code) {
                    showToast('请输入分类编码', 'error');
                    return;
                }
                if (categories.some(c => c.code === code)) {
                    showToast('分类编码已存在', 'error');
                    return;
                }

                const newId = Math.max(...categories.map(c => c.id)) + 1;
                categories.push({
                    id: newId,
                    name: name,
                    code: code,
                    sort: sort,
                    status: 'enabled',
                    description: desc
                });

                closeModal('createModal');
                document.getElementById('createName').value = '';
                document.getElementById('createCode').value = '';
                document.getElementById('createSort').value = '0';
                document.getElementById('createDesc').value = '';
                showToast('分类已创建', 'success');
            } else {
                const name = document.getElementById('editName').value.trim();
                const sort = parseInt(document.getElementById('editSort').value) || 0;
                const desc = document.getElementById('editDesc').value.trim();

                if (!name) {
                    showToast('请输入分类名称', 'error');
                    return;
                }

                const index = categories.findIndex(c => c.id === currentEditId);
                if (index !== -1) {
                    categories[index].name = name;
                    categories[index].sort = sort;
                    categories[index].description = desc;
                }

                closeModal('editModal');
                showToast('分类已更新', 'success');
            }

            renderTable();
        }

        function editCategory(id) {
            currentEditId = id;
            const cat = categories.find(c => c.id === id);
            if (!cat) return;

            document.getElementById('editId').value = cat.id;
            document.getElementById('editName').value = cat.name;
            document.getElementById('editCode').value = cat.code;
            document.getElementById('editSort').value = cat.sort;
            document.getElementById('editDesc').value = cat.description;

            openModal('editModal');
        }

        function toggleStatus(id) {
            const cat = categories.find(c => c.id === id);
            if (!cat) return;

            cat.status = cat.status === 'enabled' ? 'disabled' : 'enabled';
            showToast(`分类已${cat.status === 'enabled' ? '启用' : '禁用'}`, 'success');
            renderTable();
        }

        function deleteCategory(id) {
            const cat = categories.find(c => c.id === id);
            if (!cat) return;

            document.getElementById('deleteName').textContent = cat.name;
            document.getElementById('confirmDeleteBtn').onclick = function() {
                categories = categories.filter(c => c.id !== id);
                closeModal('deleteModal');
                showToast('分类已删除', 'success');
                renderTable();
            };
            openModal('deleteModal');
        }

        function showToast(message, type = 'success') {
            const container = document.getElementById('toastContainer');
            const toast = document.createElement('div');
            const bgColors = {
                success: 'bg-accent-green',
                error: 'bg-accent-red',
                warning: 'bg-accent-amber'
            };
            const icons = {
                success: 'fa-check-circle',
                error: 'fa-exclamation-circle',
                warning: 'fa-exclamation-triangle'
            };

            toast.className = `toast ${bgColors[type]} text-white px-4 py-3 rounded-xl shadow-lg flex items-center gap-3`;
            toast.innerHTML = `
                <i class="fas ${icons[type]}"></i>
                <span class="text-sm">${message}</span>
            `;
            container.appendChild(toast);

            setTimeout(() => {
                toast.style.opacity = '0';
                toast.style.transform = 'translateX(100%)';
                toast.style.transition = 'all 0.3s ease';
                setTimeout(() => toast.remove(), 300);
            }, 3000);
        }
    </script>
