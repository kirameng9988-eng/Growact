<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>创建活动 - 内容中台系统</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        'primary-bg': '#FFFFFF',
                        'secondary-bg': '#F8FAFC',
                        'card-bg': '#FFFFFF',
                        'border-dark': '#CBD5E1',
                        'accent-blue': '#0A61FF',
                        'accent-cyan': '#0891B2',
                        'accent-green': '#059669',
                        'accent-amber': '#D97706',
                        'accent-red': '#DC2626',
                        'text-primary': '#0F172A',
                        'text-secondary': '#475569',
                        'text-muted': '#94A3B8'
                    }
                }
            }
        }
    </script>
    <style>
        * { font-family: 'PingFang SC', 'Microsoft YaHei', sans-serif; }
        ::-webkit-scrollbar { width: 6px; height: 6px; }
        ::-webkit-scrollbar-track { background: #F1F5F9; }
        ::-webkit-scrollbar-thumb { background: #CBD5E1; border-radius: 3px; }
        .tab-btn.active { border-bottom: 2px solid #0A61FF; color: #0A61FF; }
        .toast { animation: slideIn 0.3s ease; }
        @keyframes slideIn { from { transform: translateX(100%); opacity: 0; } to { transform: translateX(0); opacity: 1; } }
        .breadcrumb-item + .breadcrumb-item::before { content: '/'; margin: 0 8px; color: #94A3B8; }
    </style>
</head>
<body class="bg-secondary-bg text-gray-900">

    <!-- 主内容区 -->
    <main class="p-6 w-full">
        <!-- 页面标题 -->
        <div class="flex items-center justify-between mb-6">
            <div>
                <h1 class="text-2xl font-semibold text-gray-900">创建活动</h1>
                <p class="text-gray-500 mt-1">填写活动基本信息与详情，提交后将进入审核流程</p>
            </div>
            <a href="activity-list.html" class="px-4 py-2.5 border border-[#E2E8F0] rounded-xl hover:border-accent-blue transition-colors flex items-center gap-2 text-gray-600 hover:text-gray-900">
                <i class="fas fa-arrow-left"></i>
                返回列表
            </a>
        </div>

        <!-- 表单卡片 -->
        <form id="activityForm" class="bg-white rounded-xl border border-[#E2E8F0] overflow-hidden">
            <!-- Tab导航 -->
            <div class="flex border-b border-[#E2E8F0] px-6 bg-gray-50">
                <button type="button" onclick="switchTab('basic')" id="tab-basic" class="tab-btn active px-6 py-3 text-sm font-medium border-b-2 border-[#0A61FF] text-[#0A61FF]">基础信息</button>
                <button type="button" onclick="switchTab('detail')" id="tab-detail" class="tab-btn px-6 py-3 text-sm font-medium border-b-2 border-transparent text-gray-600 hover:text-gray-900">活动详情</button>
                <button type="button" onclick="switchTab('resource')" id="tab-resource" class="tab-btn px-6 py-3 text-sm font-medium border-b-2 border-transparent text-gray-600 hover:text-gray-900">资源引用</button>
            </div>

            <div class="p-6">
                <input type="hidden" id="activityId">

                <!-- Tab1: 基础信息 -->
                <div id="panel-basic" class="tab-panel">
                    <div class="grid grid-cols-2 gap-6">
                        <div class="col-span-2">
                            <label class="block text-sm text-gray-600 mb-2">活动名称 <span class="text-accent-red">*</span></label>
                            <input type="text" id="activityName" placeholder="请输入活动名称" class="w-full bg-white border border-[#E2E8F0] rounded-xl px-4 py-3 text-sm text-gray-700 placeholder-gray-400 focus:border-accent-blue focus:outline-none">
                        </div>
                        <div>
                            <label class="block text-sm text-gray-600 mb-2">活动分类 <span class="text-accent-red">*</span></label>
                            <select id="activityCategory" class="w-full bg-white border border-[#E2E8F0] rounded-xl px-4 py-3 text-sm text-gray-700 focus:border-accent-blue focus:outline-none">
                                <option value="">请选择分类</option>
                                <option value="tech">科技创新</option>
                                <option value="culture">文化活动</option>
                                <option value="sports">体育运动</option>
                                <option value="education">教育培训</option>
                            </select>
                        </div>
                        <div>
                            <label class="block text-sm text-gray-600 mb-2">标签</label>
                            <input type="text" id="activityTags" placeholder="多个标签用逗号分隔" class="w-full bg-white border border-[#E2E8F0] rounded-xl px-4 py-3 text-sm text-gray-700 placeholder-gray-400 focus:border-accent-blue focus:outline-none">
                        </div>
                        <div class="col-span-2">
                            <label class="block text-sm text-gray-600 mb-2">活动封面</label>
                            <div id="coverArea" class="border-2 border-dashed border-[#E2E8F0] rounded-xl p-6">
                                <div id="coverEmpty" class="text-center">
                                    <div class="flex items-center justify-center gap-4 mb-4">
                                        <div onclick="openResourcePicker('cover', 'single')" class="flex-1 bg-white rounded-xl p-4 cursor-pointer hover:border-accent-blue border-2 border-transparent transition-all">
                                            <i class="fas fa-images text-2xl text-accent-blue mb-2"></i>
                                            <p class="text-sm font-medium">📌 从资源中心选择</p>
                                            <p class="text-xs text-gray-500 mt-1">已有封面图库</p>
                                        </div>
                                        <div class="text-gray-500 text-xl">/</div>
                                        <div onclick="triggerCoverUpload()" class="flex-1 bg-white rounded-xl p-4 cursor-pointer hover:border-accent-blue border-2 border-transparent transition-all">
                                            <i class="fas fa-cloud-upload-alt text-2xl text-gray-600 mb-2"></i>
                                            <p class="text-sm font-medium">⬆️ 上传新资源</p>
                                            <p class="text-xs text-gray-500 mt-1">直接本地上传</p>
                                        </div>
                                    </div>
                                </div>
                                <div id="coverPreview" class="hidden mt-3 flex items-center gap-3 p-3 bg-white rounded-xl">
                                    <img id="coverImg" src="" class="w-32 h-20 rounded object-cover">
                                    <div class="flex-1">
                                        <p id="coverName" class="text-sm font-medium"></p>
                                        <p id="coverSize" class="text-xs text-gray-500"></p>
                                    </div>
                                    <button type="button" onclick="removeCover()" class="text-accent-red hover:text-red-400 text-sm px-3 py-1 border border-accent-red/30 rounded-lg">移除</button>
                                    <button type="button" onclick="openResourcePicker('cover', 'single')" class="text-accent-blue hover:text-blue-400 text-sm px-3 py-1 border border-accent-blue/30 rounded-lg">更换</button>
                                </div>
                                <input type="file" id="coverFileInput" accept="image/*" class="hidden" onchange="handleCoverFileUpload(this)">
                            </div>
                        </div>
                        <div class="col-span-2">
                            <label class="block text-sm text-gray-600 mb-2">活动简介 <span class="text-accent-red">*</span></label>
                            <textarea id="activitySummary" rows="2" placeholder="请输入活动简介，简短描述活动要点" class="w-full bg-white border border-[#E2E8F0] rounded-xl px-4 py-3 text-sm text-gray-700 placeholder-gray-400 focus:border-accent-blue focus:outline-none resize-none"></textarea>
                        </div>
                        <div>
                            <label class="block text-sm text-gray-600 mb-2">活动地点 <span class="text-accent-red">*</span></label>
                            <input type="text" id="activityLocation" placeholder="请输入活动地点" class="w-full bg-white border border-[#E2E8F0] rounded-xl px-4 py-3 text-sm text-gray-700 placeholder-gray-400 focus:border-accent-blue focus:outline-none">
                        </div>
                        <div>
                            <label class="block text-sm text-gray-600 mb-2">主办单位 <span class="text-accent-red">*</span></label>
                            <input type="text" id="activityOrganizer" placeholder="请输入主办单位" class="w-full bg-white border border-[#E2E8F0] rounded-xl px-4 py-3 text-sm text-gray-700 placeholder-gray-400 focus:border-accent-blue focus:outline-none">
                        </div>
                        <div>
                            <label class="block text-sm text-gray-600 mb-2">最大报名人数</label>
                            <input type="number" id="maxParticipants" placeholder="0" class="w-full bg-white border border-[#E2E8F0] rounded-xl px-4 py-3 text-sm text-gray-700 placeholder-gray-400 focus:border-accent-blue focus:outline-none">
                        </div>
                        <div class="col-span-2">
                            <label class="block text-sm text-gray-600 mb-2">活动时间 <span class="text-accent-red">*</span></label>
                            <div class="flex items-center gap-4">
                                <input type="datetime-local" id="activityStartTime" class="flex-1 bg-white border border-[#E2E8F0] rounded-xl px-4 py-3 text-sm text-gray-700 focus:border-accent-blue focus:outline-none">
                                <span class="text-gray-500">至</span>
                                <input type="datetime-local" id="activityEndTime" class="flex-1 bg-white border border-[#E2E8F0] rounded-xl px-4 py-3 text-sm text-gray-700 focus:border-accent-blue focus:outline-none">
                            </div>
                        </div>
                        <div class="col-span-2">
                            <label class="block text-sm text-gray-600 mb-2">报名时间 <span class="text-accent-red">*</span></label>
                            <div class="flex items-center gap-4">
                                <input type="datetime-local" id="registrationStartTime" class="flex-1 bg-white border border-[#E2E8F0] rounded-xl px-4 py-3 text-sm text-gray-700 focus:border-accent-blue focus:outline-none">
                                <span class="text-gray-500">至</span>
                                <input type="datetime-local" id="registrationEndTime" class="flex-1 bg-white border border-[#E2E8F0] rounded-xl px-4 py-3 text-sm text-gray-700 focus:border-accent-blue focus:outline-none">
                            </div>
                        </div>
                    </div>
                </div>

                <!-- Tab2: 活动详情 -->
                <div id="panel-detail" class="tab-panel hidden">
                    <div>
                        <label class="block text-sm text-gray-600 mb-2">活动详情</label>
                        <div class="bg-white border border-[#E2E8F0] rounded-xl overflow-hidden">
                            <div class="flex items-center gap-1 px-4 py-2 border-b border-[#E2E8F0] bg-gray-50">
                                <button type="button" class="w-8 h-8 rounded hover:bg-gray-200 flex items-center justify-center text-gray-600" title="加粗"><i class="fas fa-bold"></i></button>
                                <button type="button" class="w-8 h-8 rounded hover:bg-gray-200 flex items-center justify-center text-gray-600" title="斜体"><i class="fas fa-italic"></i></button>
                                <button type="button" class="w-8 h-8 rounded hover:bg-gray-200 flex items-center justify-center text-gray-600" title="下划线"><i class="fas fa-underline"></i></button>
                                <span class="w-px h-6 bg-gray-300 mx-2"></span>
                                <button type="button" class="w-8 h-8 rounded hover:bg-gray-200 flex items-center justify-center text-gray-600" title="无序列表"><i class="fas fa-list-ul"></i></button>
                                <button type="button" class="w-8 h-8 rounded hover:bg-gray-200 flex items-center justify-center text-gray-600" title="有序列表"><i class="fas fa-list-ol"></i></button>
                                <button type="button" class="w-8 h-8 rounded hover:bg-gray-200 flex items-center justify-center text-gray-600" title="链接"><i class="fas fa-link"></i></button>
                                <button type="button" onclick="openResourcePicker('content', 'multiple')" class="w-8 h-8 rounded hover:bg-gray-200 flex items-center justify-center text-gray-600" title="插入图片"><i class="fas fa-image"></i></button>
                                <button type="button" onclick="openResourcePicker('content', 'multiple')" class="w-8 h-8 rounded hover:bg-gray-200 flex items-center justify-center text-accent-cyan" title="插入资源">
                                    <i class="fas fa-folder-open"></i>
                                </button>
                            </div>
                            <textarea id="activityContent" rows="12" placeholder="请输入活动详情...\n\n提示：点击工具栏📁资源按钮可插入图片/文件/视频" class="w-full p-4 text-sm text-gray-700 placeholder-gray-400 focus:outline-none resize-none"></textarea>
                        </div>
                    </div>
                </div>

                <!-- Tab3: 资源引用 -->
                <div id="panel-resource" class="tab-panel hidden">
                    <div class="flex border-b border-[#E2E8F0] mb-4">
                        <button type="button" onclick="switchResourceTab('image')" id="resTab-image" class="px-4 py-2 text-sm font-medium border-b-2 border-[#0A61FF] text-[#0A61FF]">
                            <i class="fas fa-images mr-1"></i>图片
                        </button>
                        <button type="button" onclick="switchResourceTab('file')" id="resTab-file" class="px-4 py-2 text-sm font-medium border-b-2 border-transparent text-gray-600 hover:text-gray-900">
                            <i class="fas fa-file-alt mr-1"></i>文件
                        </button>
                        <button type="button" onclick="switchResourceTab('video')" id="resTab-video" class="px-4 py-2 text-sm font-medium border-b-2 border-transparent text-gray-600 hover:text-gray-900">
                            <i class="fas fa-video mr-1"></i>视频
                        </button>
                    </div>

                    <div class="mb-4">
                        <div class="relative">
                            <i class="fas fa-search absolute left-3 top-1/2 -translate-y-1/2 text-gray-500"></i>
                            <input type="text" id="resourceSearchInput" placeholder="搜索资源名称..." class="w-full bg-white border border-[#E2E8F0] rounded-lg pl-10 pr-4 py-2 text-sm text-gray-700 placeholder-gray-400 focus:border-accent-blue focus:outline-none" oninput="filterActivityResources()">
                        </div>
                    </div>

                    <div id="activityResourceList" class="grid grid-cols-5 gap-3 max-h-[400px] overflow-y-auto mb-4">
                        <!-- 动态渲染 -->
                    </div>

                    <div class="border-t border-[#E2E8F0] pt-4">
                        <h4 class="text-sm font-medium text-gray-600 mb-3">已选资源</h4>
                        <div id="selectedActivityResources" class="flex flex-wrap gap-3 min-h-[80px] bg-gray-50 rounded-xl p-4">
                            <p class="text-sm text-gray-400">暂无选择资源</p>
                        </div>
                    </div>
                </div>
            </div>

            <!-- 底部按钮 -->
            <div class="flex items-center justify-end gap-3 px-6 py-4 border-t border-[#E2E8F0] bg-gray-50 sticky bottom-0">
                <button type="button" onclick="cancelForm()" class="px-5 py-2.5 border border-[#E2E8F0] rounded-xl text-gray-600 hover:text-gray-900 hover:border-gray-400 transition-colors">取消</button>
                <button type="button" onclick="saveActivity('draft')" class="px-5 py-2.5 border border-accent-blue text-accent-blue rounded-xl hover:bg-accent-blue/5 transition-colors">暂存</button>
                <button type="button" onclick="saveActivity('pending')" class="px-5 py-2.5 bg-accent-blue text-white rounded-xl hover:bg-blue-600 transition-colors">提交</button>
            </div>
        </form>
    </main>

    <!-- Toast容器 -->
    <div id="toastContainer" class="fixed bottom-6 right-6 z-50 flex flex-col gap-2"></div>

    <!-- 资源选择弹窗 -->
    <div id="resourcePickerModal" class="fixed inset-0 bg-black/70 z-[9999] hidden items-center justify-center">
        <div class="bg-white rounded-2xl w-[900px] max-h-[85vh] overflow-hidden shadow-2xl">
            <div class="flex items-center justify-between px-6 py-4 border-b border-[#E2E8F0]">
                <h3 class="text-lg font-medium text-gray-900">📌 选择资源</h3>
                <button onclick="closeResourcePicker()" class="text-gray-500 hover:text-gray-700">
                    <i class="fas fa-times text-xl"></i>
                </button>
            </div>
            <div class="flex border-b border-[#E2E8F0]">
                <button onclick="switchResourcePickerTab('image')" id="pickerTab-image" class="px-6 py-3 text-sm font-medium border-b-2 border-[#0A61FF] text-[#0A61FF]">
                    <i class="fas fa-images mr-2"></i>图片
                </button>
                <button onclick="switchResourcePickerTab('file')" id="pickerTab-file" class="px-6 py-3 text-sm font-medium border-b-2 border-transparent text-gray-600 hover:text-gray-900">
                    <i class="fas fa-file-alt mr-2"></i>文件
                </button>
                <button onclick="switchResourcePickerTab('video')" id="pickerTab-video" class="px-6 py-3 text-sm font-medium border-b-2 border-transparent text-gray-600 hover:text-gray-900">
                    <i class="fas fa-video mr-2"></i>视频
                </button>
            </div>
            <div class="px-6 py-3 border-b border-[#E2E8F0] bg-gray-50">
                <div class="relative">
                    <i class="fas fa-search absolute left-3 top-1/2 -translate-y-1/2 text-gray-500"></i>
                    <input type="text" id="pickerSearchInput" placeholder="搜索资源名称..."
                           class="w-full bg-white border border-[#E2E8F0] rounded-lg pl-10 pr-4 py-2 text-sm text-gray-700 placeholder-gray-400 focus:border-[#0A61FF] focus:outline-none"
                           oninput="filterPickerResources()">
                </div>
            </div>
            <div class="p-6 overflow-y-auto max-h-[400px]">
                <div id="pickerResourceList" class="grid grid-cols-5 gap-4">
                </div>
            </div>
            <div class="flex items-center justify-between px-6 py-3 border-t border-[#E2E8F0] bg-gray-50">
                <span id="pickerSelectedInfo" class="text-sm text-gray-500">请选择资源</span>
                <div class="flex items-center gap-3">
                    <button onclick="closeResourcePicker()" class="px-5 py-2.5 border border-[#E2E8F0] rounded-xl text-gray-600 hover:text-gray-900 hover:border-gray-400 transition-colors">取消</button>
                    <button onclick="confirmResourceSelection()" id="pickerConfirmBtn" class="px-5 py-2.5 bg-[#0A61FF] text-white rounded-xl hover:bg-blue-600 transition-colors" disabled>确认选择</button>
                </div>
            </div>
        </div>
    </div>

    <script>
        // 资源数据
        const mockResources = {
            image: [
                { id: 1, name: '会议现场.jpg', url: 'https://images.unsplash.com/photo-1504711434969-e33886168f5c?w=400&h=300&fit=crop', size: '2.3MB' },
                { id: 2, name: '活动现场.jpg', url: 'https://images.unsplash.com/photo-1454165804606-c3d57bc86b40?w=400&h=300&fit=crop', size: '3.1MB' },
                { id: 3, name: '团队建设.jpg', url: 'https://images.unsplash.com/photo-1522071820081-009f0129c71c?w=400&h=300&fit=crop', size: '3.5MB' },
                { id: 4, name: '培训现场.jpg', url: 'https://images.unsplash.com/photo-1540575467063-178a50c2df87?w=400&h=300&fit=crop', size: '2.8MB' },
            ],
            file: [
                { id: 101, name: '活动策划书.pdf', url: '#', size: '2.3MB', icon: 'fa-file-pdf' },
                { id: 102, name: '会议资料.docx', url: '#', size: '1.8MB', icon: 'fa-file-word' },
                { id: 103, name: '报名表.xlsx', url: '#', size: '890KB', icon: 'fa-file-excel' },
            ],
            video: [
                { id: 201, name: '活动回顾.mp4', url: '#', size: '25.3MB', duration: '5:30', poster: 'https://images.unsplash.com/photo-1574717024653-61fd2cf7d944?w=400&h=300&fit=crop' },
                { id: 202, name: '培训教程.mp4', url: '#', size: '128.5MB', duration: '45:20', poster: 'https://images.unsplash.com/photo-1516321318423-f06f85b5f7c1?w=400&h=300&fit=crop' },
            ]
        };

        let resourcePickerConfig = {
            mode: 'single',
            currentTab: 'image',
            selected: [],
            onSelect: null
        };

        let selectedActivityResources = [];
        let pageMode = 'create'; // 'create' | 'edit'
        let currentActivityId = null;

        // Tab切换
        function switchTab(tab) {
            ['basic', 'detail', 'resource'].forEach(t => {
                document.getElementById('tab-' + t).classList.remove('active');
                document.getElementById('tab-' + t).classList.add('border-transparent', 'text-gray-600');
                document.getElementById('tab-' + t).classList.remove('border-[#0A61FF]', 'text-[#0A61FF]');
                document.getElementById('panel-' + t).classList.add('hidden');
            });

            document.getElementById('tab-' + tab).classList.add('active');
            document.getElementById('tab-' + tab).classList.remove('border-transparent', 'text-gray-600');
            document.getElementById('tab-' + tab).classList.add('border-[#0A61FF]', 'text-[#0A61FF]');
            document.getElementById('panel-' + tab).classList.remove('hidden');

            if (tab === 'resource') {
                renderActivityResourceList('image');
            }
        }

        // 取消
        function cancelForm() {
            if (confirm('确定取消创建？未保存的内容将丢失')) {
                window.location.href = 'activity-list.html';
            }
        }

        // 保存活动
        function saveActivity(action) {
            const name = document.getElementById('activityName').value;
            const category = document.getElementById('activityCategory').value;
            const activityStartTime = document.getElementById('activityStartTime').value;
            const activityEndTime = document.getElementById('activityEndTime').value;
            const registrationStartTime = document.getElementById('registrationStartTime').value;
            const registrationEndTime = document.getElementById('registrationEndTime').value;
            const activityLocation = document.getElementById('activityLocation').value;
            const activityOrganizer = document.getElementById('activityOrganizer').value;
            const activitySummary = document.getElementById('activitySummary').value;

            if (!name) {
                showToast('请输入活动名称', 'error');
                return;
            }
            if (!category) {
                showToast('请选择活动分类', 'error');
                return;
            }
            if (!activityStartTime || !activityEndTime) {
                showToast('请填写完整的活动时间', 'error');
                return;
            }
            if (!registrationStartTime || !registrationEndTime) {
                showToast('请填写完整的报名时间', 'error');
                return;
            }
            if (!activityLocation) {
                showToast('请输入活动地点', 'error');
                return;
            }
            if (!activityOrganizer) {
                showToast('请输入主办单位', 'error');
                return;
            }
            if (!activitySummary) {
                showToast('请输入活动简介', 'error');
                return;
            }

            // action: 'draft' | 'pending'
            const status = action;
            const isEdit = pageMode === 'edit' && currentActivityId;

            // 从 sessionStorage 获取现有数据（如果是编辑模式）
            const STORAGE_KEY = 'activities_data';
            let activities = [];
            try {
                activities = JSON.parse(sessionStorage.getItem(STORAGE_KEY) || '[]');
            } catch (e) {
                activities = [];
            }

            // 如果 sessionStorage 没有数据，回退到默认 mock 数据
            if (activities.length === 0) {
                activities = getDefaultActivities();
            }

            const publishType = status;

            if (isEdit) {
                const index = activities.findIndex(a => a.id === currentActivityId);
                if (index !== -1) {
                    activities[index] = {
                        ...activities[index],
                        name: name,

        // 资源选择器
        function openResourcePicker(mode, type) {
            resourcePickerConfig.mode = type;
            resourcePickerConfig.currentTab = 'image';
            resourcePickerConfig.selected = [];
            document.getElementById('pickerSearchInput').value = '';
            updatePickerStatus();
            renderPickerResourceList();

            const modal = document.getElementById('resourcePickerModal');
            modal.classList.remove('hidden');
            modal.classList.add('flex');
        }

        function closeResourcePicker() {
            document.getElementById('resourcePickerModal').classList.add('hidden');
            document.getElementById('resourcePickerModal').classList.remove('flex');
        }

        function switchResourcePickerTab(tab) {
            resourcePickerConfig.currentTab = tab;
            resourcePickerConfig.selected = [];
            document.getElementById('pickerSearchInput').value = '';

            ['image', 'file', 'video'].forEach(t => {
                const btn = document.getElementById('pickerTab-' + t);
                if (t === tab) {
                    btn.className = 'px-6 py-3 text-sm font-medium border-b-2 border-[#0A61FF] text-[#0A61FF]';
                } else {
                    btn.className = 'px-6 py-3 text-sm font-medium border-b-2 border-transparent text-gray-600 hover:text-gray-900';
                }
            });

            updatePickerStatus();
            renderPickerResourceList();
        }

        function filterPickerResources() {
            renderPickerResourceList();
        }

        function renderPickerResourceList() {
            const list = document.getElementById('pickerResourceList');
            const tab = resourcePickerConfig.currentTab;
            const search = document.getElementById('pickerSearchInput').value.toLowerCase();
            let resources = mockResources[tab] || [];

            if (search) {
                resources = resources.filter(r => r.name.toLowerCase().includes(search));
            }

            list.innerHTML = resources.map((r, index) => `
                <div onclick="togglePickerResource(${tab === 'image' ? r.id : (r.id + '-' + index)}, '${tab}')"
                     class="resource-card cursor-pointer rounded-lg overflow-hidden border-2 border-transparent hover:border-accent-blue transition-all ${resourcePickerConfig.selected.includes(tab === 'image' ? r.id : r.id) ? 'selected' : ''}"
                     data-id="${r.id}">
                    ${tab === 'image' ? `<img src="${r.url}" class="w-full h-24 object-cover">` :
                      tab === 'video' ? `<div class="relative"><img src="${r.poster}" class="w-full h-24 object-cover"><div class="absolute inset-0 flex items-center justify-center bg-black/30"><i class="fas fa-play text-white text-xl"></i></div></div>` :
                      `<div class="h-24 bg-gray-100 flex items-center justify-center"><i class="fas ${r.icon || 'fa-file'} text-3xl text-gray-400"></i></div>`}
                    <div class="p-2 bg-white">
                        <p class="text-xs truncate">${r.name}</p>
                        <p class="text-xs text-gray-400">${r.size}</p>
                    </div>
                </div>
            `).join('');
        }

        function togglePickerResource(id, tab) {
            if (resourcePickerConfig.mode === 'single') {
                resourcePickerConfig.selected = [id];
            } else {
                const index = resourcePickerConfig.selected.indexOf(id);
                if (index === -1) {
                    resourcePickerConfig.selected.push(id);
                } else {
                    resourcePickerConfig.selected.splice(index, 1);
                }
            }
            updatePickerStatus();
            renderPickerResourceList();
        }

        function updatePickerStatus() {
            const count = resourcePickerConfig.selected.length;
            document.getElementById('pickerSelectedInfo').textContent = count === 0 ? '请选择资源' : `已选择 ${count} 个资源`;
            document.getElementById('pickerConfirmBtn').disabled = count === 0;
        }

        function confirmResourceSelection() {
            const tab = resourcePickerConfig.currentTab;
            const selected = resourcePickerConfig.selected;

            if (resourcePickerConfig.mode === 'single') {
                const resource = mockResources[tab].find(r => r.id === selected[0]);
                if (resource) {
                    document.getElementById('coverEmpty').classList.add('hidden');
                    document.getElementById('coverPreview').classList.remove('hidden');
                    document.getElementById('coverImg').src = resource.url;
                    document.getElementById('coverName').textContent = resource.name;
                    document.getElementById('coverSize').textContent = resource.size;
                }
            }

            closeResourcePicker();
            showToast('资源选择成功', 'success');
        }

        function triggerCoverUpload() {
            document.getElementById('coverFileInput').click();
        }

        function handleCoverFileUpload(input) {
            if (input.files && input.files[0]) {
                const file = input.files[0];
                document.getElementById('coverEmpty').classList.add('hidden');
                document.getElementById('coverPreview').classList.remove('hidden');
                document.getElementById('coverImg').src = URL.createObjectURL(file);
                document.getElementById('coverName').textContent = file.name;
                document.getElementById('coverSize').textContent = (file.size / 1024 / 1024).toFixed(2) + 'MB';
            }
        }

        function removeCover() {
            document.getElementById('coverEmpty').classList.remove('hidden');
            document.getElementById('coverPreview').classList.add('hidden');
        }

        // 活动资源引用
        function switchResourceTab(tab) {
            ['image', 'file', 'video'].forEach(t => {
                const btn = document.getElementById('resTab-' + t);
                if (t === tab) {
                    btn.className = 'px-4 py-2 text-sm font-medium border-b-2 border-[#0A61FF] text-[#0A61FF]';
                } else {
                    btn.className = 'px-4 py-2 text-sm font-medium border-b-2 border-transparent text-gray-600 hover:text-gray-900';
                }
            });
            renderActivityResourceList(tab);
        }

        function renderActivityResourceList(tab) {
            const list = document.getElementById('activityResourceList');
            const search = document.getElementById('resourceSearchInput').value.toLowerCase();
            let resources = mockResources[tab] || [];

            if (search) {
                resources = resources.filter(r => r.name.toLowerCase().includes(search));
            }

            list.innerHTML = resources.map(r => `
                <div onclick="toggleActivityResource(${r.id}, '${tab}')"
                     class="cursor-pointer rounded-lg overflow-hidden border-2 ${selectedActivityResources.includes(r.id) ? 'border-accent-cyan bg-cyan-50' : 'border-transparent hover:border-accent-blue'} transition-all">
                    ${tab === 'image' ? `<img src="${r.url}" class="w-full h-16 object-cover">` :
                      `<div class="h-16 bg-gray-100 flex items-center justify-center"><i class="fas ${r.icon || 'fa-file'} text-xl text-gray-400"></i></div>`}
                    <div class="p-1.5 bg-white">
                        <p class="text-xs truncate">${r.name}</p>
                    </div>
                </div>
            `).join('');
        }

        function toggleActivityResource(id, tab) {
            const index = selectedActivityResources.indexOf(id);
            if (index === -1) {
                selectedActivityResources.push(id);
            } else {
                selectedActivityResources.splice(index, 1);
            }
            renderActivityResourceList(tab);
            renderSelectedResources();
        }

        function renderSelectedResources() {
            const container = document.getElementById('selectedActivityResources');
            if (selectedActivityResources.length === 0) {
                container.innerHTML = '<p class="text-sm text-gray-400">暂无选择资源</p>';
                return;
            }

            container.innerHTML = selectedActivityResources.map(id => {
                let resource = null;
                for (const tab of ['image', 'file', 'video']) {
                    resource = mockResources[tab].find(r => r.id === id);
                    if (resource) break;
                }
                if (!resource) return '';

                return `
                    <div class="flex items-center gap-2 bg-white rounded-lg p-2 border border-[#E2E8F0]">
                        ${resource.url && resource.url !== '#' ? `<img src="${resource.url}" class="w-10 h-10 rounded object-cover">` :
                          `<div class="w-10 h-10 rounded bg-gray-100 flex items-center justify-center"><i class="fas ${resource.icon || 'fa-file'} text-gray-400"></i></div>`}
                        <div class="flex-1 min-w-0">
                            <p class="text-sm truncate">${resource.name}</p>
                        </div>
                        <button onclick="removeActivityResource(${id})" class="text-gray-400 hover:text-accent-red">
                            <i class="fas fa-times"></i>
                        </button>
                    </div>
                `;
            }).join('');
        }

        function removeActivityResource(id) {
            selectedActivityResources = selectedActivityResources.filter(r => r !== id);
            renderSelectedResources();
            const currentTab = document.querySelector('#resTab-image')?.classList.contains('border-[#0A61FF]') ? 'image' :
                              document.querySelector('#resTab-file')?.classList.contains('border-[#0A61FF]') ? 'file' : 'video';
            renderActivityResourceList(currentTab);
        }

        function filterActivityResources() {
            const currentTab = document.querySelector('#resTab-image')?.classList.contains('border-[#0A61FF]') ? 'image' :
                              document.querySelector('#resTab-file')?.classList.contains('border-[#0A61FF]') ? 'file' : 'video';
            renderActivityResourceList(currentTab);
        }

        // Toast提示
        function showToast(message, type = 'success') {
            const container = document.getElementById('toastContainer');
            const toast = document.createElement('div');
            const bgColors = {
                success: 'bg-accent-green',
                error: 'bg-accent-red',
                warning: 'bg-accent-amber'
            };
            const icons = {
                success: 'fa-check-circle',
                error: 'fa-exclamation-circle',
                warning: 'fa-exclamation-triangle'
            };

            toast.className = `toast ${bgColors[type]} text-white px-4 py-3 rounded-xl shadow-lg flex items-center gap-3`;
            toast.innerHTML = `
                <i class="fas ${icons[type]}"></i>
                <span class="text-sm">${message}</span>
            `;
            container.appendChild(toast);

            setTimeout(() => {
                toast.style.opacity = '0';
                toast.style.transform = 'translateX(100%)';
                toast.style.transition = 'all 0.3s ease';
                setTimeout(() => toast.remove(), 300);
            }, 3000);
        }
    </script>
