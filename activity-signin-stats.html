<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>签到统计 - 内容中台系统</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        'primary-bg': '#FFFFFF',
                        'card-bg': '#FFFFFF',
                        'border-dark': '#CBD5E1',
                        'accent-blue': '#0A61FF',
                        'accent-cyan': '#0891B2',
                        'accent-green': '#059669',
                        'accent-amber': '#D97706',
                        'accent-red': '#DC2626',
                        'text-primary': '#0F172A',
                        'text-secondary': '#475569',
                        'text-muted': '#94A3B8'
                    }
                }
            }
        }
    </script>
    <style>
        * { font-family: 'PingFang SC', 'Microsoft YaHei', sans-serif; }
        ::-webkit-scrollbar { width: 6px; height: 6px; }
        ::-webkit-scrollbar-track { background: #F1F5F9; }
        ::-webkit-scrollbar-thumb { background: #CBD5E1; border-radius: 3px; }
        .sidebar-menu-item:hover { background: rgba(10, 97, 255, 0.06); }
        .sidebar-menu-item.active { background: rgba(10, 97, 255, 0.1); border-left: 3px solid #0A61FF; }
        .chart-bar { transition: height 0.5s ease; }
    </style>
</head>
<body class="bg-gray-50 text-gray-900">

    <!-- 主内容区 -->
    <main class="p-6">
        <!-- 页面标题 -->
        <div class="flex items-center justify-between mb-6">
            <div class="flex items-center gap-4">
                <a href="activity-signin.html" class="w-10 h-10 flex items-center justify-center rounded-lg bg-white border border-gray-200 hover:bg-gray-50 transition-colors">
                    <i class="fas fa-arrow-left text-gray-600"></i>
                </a>
                <div>
                    <h1 class="text-2xl font-semibold text-gray-900">签到统计</h1>
                    <p id="activityTitle" class="text-gray-500 mt-1">AI公共数据开放培训会</p>
                </div>
            </div>
        </div>

        <!-- 统计卡片 -->
        <div class="grid grid-cols-4 gap-4 mb-6">
            <div class="bg-white rounded-xl p-5 shadow-sm border border-gray-100">
                <div class="flex items-center gap-3">
                    <div class="w-12 h-12 bg-accent-blue/10 rounded-xl flex items-center justify-center">
                        <i class="fas fa-users text-accent-blue text-xl"></i>
                    </div>
                    <div>
                        <p class="text-sm text-gray-500">报名人数</p>
                        <p id="totalCount" class="text-2xl font-bold text-gray-900">120</p>
                    </div>
                </div>
            </div>
            <div class="bg-white rounded-xl p-5 shadow-sm border border-gray-100">
                <div class="flex items-center gap-3">
                    <div class="w-12 h-12 bg-accent-green/10 rounded-xl flex items-center justify-center">
                        <i class="fas fa-user-check text-accent-green text-xl"></i>
                    </div>
                    <div>
                        <p class="text-sm text-gray-500">已签到人数</p>
                        <p id="signedCount" class="text-2xl font-bold text-accent-green">82</p>
                    </div>
                </div>
            </div>
            <div class="bg-white rounded-xl p-5 shadow-sm border border-gray-100">
                <div class="flex items-center gap-3">
                    <div class="w-12 h-12 bg-gray-100 rounded-xl flex items-center justify-center">
                        <i class="fas fa-user-times text-gray-400 text-xl"></i>
                    </div>
                    <div>
                        <p class="text-sm text-gray-500">未签到人数</p>
                        <p id="unsignedCount" class="text-2xl font-bold text-gray-600">38</p>
                    </div>
                </div>
            </div>
            <div class="bg-white rounded-xl p-5 shadow-sm border border-gray-100">
                <div class="flex items-center gap-3">
                    <div class="w-12 h-12 bg-accent-amber/10 rounded-xl flex items-center justify-center">
                        <i class="fas fa-percentage text-accent-amber text-xl"></i>
                    </div>
                    <div>
                        <p class="text-sm text-gray-500">签到率</p>
                        <p id="signinRate" class="text-2xl font-bold text-accent-amber">68%</p>
                    </div>
                </div>
            </div>
        </div>

        <!-- 签到时段分布图 -->
        <div class="bg-white rounded-xl p-6 shadow-sm border border-gray-100">
            <h3 class="text-lg font-semibold text-gray-900 mb-6">签到时段分布</h3>
            <div class="flex items-end justify-around h-64 gap-4">
                <div class="flex flex-col items-center gap-2">
                    <div class="w-16 bg-gray-100 rounded-t-lg chart-bar" style="height: 20px;"></div>
                    <span class="text-xs text-gray-500">08:00</span>
                </div>
                <div class="flex flex-col items-center gap-2">
                    <div class="w-16 bg-accent-blue rounded-t-lg chart-bar" style="height: 80px;"></div>
                    <span class="text-xs text-gray-500">08:30</span>
                </div>
                <div class="flex flex-col items-center gap-2">
                    <div class="w-16 bg-accent-blue rounded-t-lg chart-bar" style="height: 140px;"></div>
                    <span class="text-xs text-gray-500">09:00</span>
                </div>
                <div class="flex flex-col items-center gap-2">
                    <div class="w-16 bg-accent-blue rounded-t-lg chart-bar" style="height: 180px;"></div>
                    <span class="text-xs text-gray-500">09:30</span>
                </div>
                <div class="flex flex-col items-center gap-2">
                    <div class="w-16 bg-accent-blue rounded-t-lg chart-bar" style="height: 120px;"></div>
                    <span class="text-xs text-gray-500">10:00</span>
                </div>
                <div class="flex flex-col items-center gap-2">
                    <div class="w-16 bg-accent-blue rounded-t-lg chart-bar" style="height: 60px;"></div>
                    <span class="text-xs text-gray-500">10:30</span>
                </div>
                <div class="flex flex-col items-center gap-2">
                    <div class="w-16 bg-accent-blue rounded-t-lg chart-bar" style="height: 40px;"></div>
                    <span class="text-xs text-gray-500">11:00</span>
                </div>
                <div class="flex flex-col items-center gap-2">
                    <div class="w-16 bg-gray-100 rounded-t-lg chart-bar" style="height: 10px;"></div>
                    <span class="text-xs text-gray-500">11:30</span>
                </div>
            </div>
            <div class="mt-4 flex items-center justify-center gap-8">
                <div class="flex items-center gap-2">
                    <div class="w-3 h-3 bg-gray-100 rounded"></div>
                    <span class="text-sm text-gray-500">未签到</span>
                </div>
                <div class="flex items-center gap-2">
                    <div class="w-3 h-3 bg-accent-blue rounded"></div>
                    <span class="text-sm text-gray-500">已签到</span>
                </div>
            </div>
        </div>
    </main>

    <script>
        const activityData = {
            1: { name: 'AI公共数据开放培训会', total: 120, signed: 82, unsigned: 38 },
            2: { name: '数字政务创新发展论坛', total: 200, signed: 0, unsigned: 200 },
            3: { name: '智慧城市数据应用研讨会', total: 80, signed: 80, unsigned: 0 },
            4: { name: '数据安全与合规培训会', total: 150, signed: 45, unsigned: 105 },
            5: { name: '公共数据开放工作推进会', total: 100, signed: 0, unsigned: 100 },
            6: { name: '大数据分析与可视化培训', total: 60, signed: 60, unsigned: 0 },
            7: { name: '政务数据共享交换技术培训', total: 180, signed: 120, unsigned: 60 },
            8: { name: '数据要素市场建设专题讲座', total: 90, signed: 0, unsigned: 90 },
            9: { name: '云计算与大数据技术交流会', total: 75, signed: 72, unsigned: 3 },
            10: { name: '数据治理能力提升培训班', total: 130, signed: 88, unsigned: 42 }
        };

        function init() {
            const params = new URLSearchParams(window.location.search);
            const id = parseInt(params.get('id')) || 1;
            const activity = activityData[id] || activityData[1];

            document.getElementById('activityTitle').textContent = activity.name;
            document.getElementById('totalCount').textContent = activity.total;
            document.getElementById('signedCount').textContent = activity.signed;
            document.getElementById('unsignedCount').textContent = activity.unsigned;
            document.getElementById('signinRate').textContent = Math.round((activity.signed / activity.total) * 100) + '%';
        }

        init();
    </script>



<!-- 浮动演示链接组件 -->
<style>
#demo-links-overlay{position:fixed;inset:0;background:rgba(0,0,0,.4);backdrop-filter:blur(2px);-webkit-backdrop-filter:blur(2px);z-index:9998;opacity:0;pointer-events:none;transition:opacity .3s}
#demo-links-overlay.active{opacity:1;pointer-events:auto}
#demo-links-container{position:fixed;bottom:24px;right:24px;z-index:9999;display:flex;flex-direction:column;align-items:flex-end;gap:8px}
#demo-links-panel{display:flex;flex-direction:column;gap:6px;transform:translateY(16px) scale(.95);opacity:0;pointer-events:none;transition:all .3s cubic-bezier(.34,1.56,.64,1);transform-origin:bottom right}
#demo-links-panel.active{transform:translateY(0) scale(1);opacity:1;pointer-events:auto}
.demo-link-btn{display:flex;align-items:center;gap:10px;padding:12px 16px;background:#fff;border:1px solid #e2e8f0;border-radius:10px;color:#0f172a;font-size:14px;font-weight:450;text-decoration:none;white-space:nowrap;box-shadow:0 2px 12px rgba(0,0,0,.08);transition:all .2s;min-width:200px}
.demo-link-btn:hover{border-color:#3b82f6;box-shadow:0 4px 16px rgba(59,130,246,.18);transform:translateX(-4px);color:#3b82f6}
.demo-link-btn:active{transform:translateX(-2px) scale(.98)}
.demo-link-btn .link-icon{width:32px;height:32px;border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:14px;flex-shrink:0}
.demo-link-btn .link-icon.blue{background:#dbeafe;color:#2563eb}
.demo-link-btn .link-icon.purple{background:#ede9fe;color:#7c3aed}
.demo-link-btn .link-icon.green{background:#d1fae5;color:#059669}
.demo-link-btn .link-icon.orange{background:#ffedd5;color:#ea580c}
.demo-link-btn .link-icon.red{background:#fee2e2;color:#dc2626}
#demo-links-toggle{display:flex;align-items:center;gap:8px;padding:12px 20px;background:linear-gradient(135deg,#0a61ff 0%,#3b82f6 100%);color:#fff;border:none;border-radius:12px;font-size:14px;font-weight:500;cursor:pointer;box-shadow:0 4px 20px rgba(10,97,255,.35);transition:all .2s;white-space:nowrap}
#demo-links-toggle:hover{transform:translateY(-2px);box-shadow:0 6px 24px rgba(10,97,255,.45)}
#demo-links-toggle:active{transform:translateY(0)}
#demo-links-toggle .toggle-icon{transition:transform .3s}
#demo-links-toggle.expanded .toggle-icon{transform:rotate(180deg)}
#demo-links-toggle .toggle-label{opacity:1;transition:opacity .2s}
</style>
<div id="demo-links-overlay" onclick="toggleDemoLinks(false)"></div>
<div id="demo-links-container">
  <div id="demo-links-panel">
    <a href="portal.html" target="_blank" class="demo-link-btn"><span class="link-icon blue"><i class="fas fa-cogs"></i></span><span>运营侧活动运营中心</span></a>
    <a href="activity-zone/index.html" target="_blank" class="demo-link-btn"><span class="link-icon purple"><i class="fas fa-users"></i></span><span>用户侧活动专区</span></a>
    <a href="mobimobile-Activity-zone/index.html" target="_blank" class="demo-link-btn"><span class="link-icon green"><i class="fas fa-mobile-alt"></i></span><span>H5手机端用户侧</span></a>
    <a href="h5-operator-activity/index.html" target="_blank" class="demo-link-btn"><span class="link-icon red"><i class="fas fa-mobile-screen"></i></span><span>H5手机端运营侧</span></a>
    <a href="h5-checkin/index.html" target="_blank" class="demo-link-btn"><span class="link-icon orange"><i class="fas fa-calendar-check"></i></span><span>签到页面</span></a>
  </div>
  <button id="demo-links-toggle" onclick="toggleDemoLinks()"><i class="fas fa-link"></i><span class="toggle-label">演示链接</span><i class="fas fa-chevron-up toggle-icon"></i></button>
</div>
<script>function toggleDemoLinks(e){var t=document.getElementById("demo-links-overlay"),n=document.getElementById("demo-links-panel"),r=document.getElementById("demo-links-toggle");if(!t||!n||!r)return;var i=r.classList.contains("expanded"),a=void 0!==e?e:!i;a?(t.classList.add("active"),n.classList.add("active"),r.classList.add("expanded")):(t.classList.remove("active"),n.classList.remove("active"),r.classList.remove("expanded"))}</script>



</body>
</html>
