<body class="bg-gray-50 text-gray-900 min-h-screen">

            <div class="px-4 mt-6 mb-2 text-xs text-gray-500 uppercase tracking-wider">内容中心</div>
            <a href="content-list.html" class="sidebar-menu-item flex items-center gap-3 px-4 py-3 text-sm cursor-pointer text-gray-600">
                <i class="fas fa-file-alt w-5 text-gray-500"></i>
                <span>内容管理</span>
            </a>
            <a href="content-category.html" class="sidebar-menu-item flex items-center gap-3 px-4 py-3 text-sm cursor-pointer text-gray-600">

            <a href="content-tag.html" class="sidebar-menu-item flex items-center gap-3 px-4 py-3 text-sm cursor-pointer">

            <a href="content-review.html" class="sidebar-menu-item flex items-center gap-3 px-4 py-3 text-sm cursor-pointer">

                <span class="ml-auto bg-accent-red text-white text-xs px-2 py-0.5 rounded-full">12</span>

            <div class="px-4 mt-6 mb-2 text-xs text-gray-500 uppercase tracking-wider">活动运营</div>
            <a href="activity-list.html" class="sidebar-menu-item flex items-center gap-3 px-4 py-3 text-sm cursor-pointer text-gray-600">

            <a href="activity-category.html" class="sidebar-menu-item flex items-center gap-3 px-4 py-3 text-sm cursor-pointer text-gray-600">

                <span>报名管理</span>
            </a>
            <a href="activity-review.html" class="sidebar-menu-item flex items-center gap-3 px-4 py-3 text-sm cursor-pointer text-gray-600">
                <i class="fas fa-clipboard-check w-5 text-gray-500"></i>

                <span class="ml-auto bg-accent-red text-white text-xs px-2 py-0.5 rounded-full">5</span>

            <a href="activity-signin.html" class="sidebar-menu-item active flex items-center gap-3 px-4 py-3 text-sm cursor-pointer text-gray-900">

            <a href="activity-stats.html" class="sidebar-menu-item flex items-center gap-3 px-4 py-3 text-sm cursor-pointer text-gray-600">

            </a>

            <div class="px-4 mt-6 mb-2 text-xs text-gray-500 uppercase tracking-wider">专区配置</div>
            <a href="zone-config.html" class="sidebar-menu-item flex items-center gap-3 px-4 py-3 text-sm cursor-pointer text-gray-600">

            </a>

            <div class="px-4 mt-6 mb-2 text-xs text-gray-500 uppercase tracking-wider">资源中心</div>
            <a href="resource-image.html" class="sidebar-menu-item flex items-center gap-3 px-4 py-3 text-sm cursor-pointer">

            <div class="px-4 mt-6 mb-2 text-xs text-gray-500 uppercase tracking-wider">数据分析</div>
            <a href="data-overview.html" class="sidebar-menu-item flex items-center gap-3 px-4 py-3 text-sm cursor-pointer">

            <a href="data-content.html" class="sidebar-menu-item flex items-center gap-3 px-4 py-3 text-sm cursor-pointer">
                <i class="fas fa-chart-line w-5 text-gray-600"></i>
                <span>内容分析</span>
            </a>

            <div class="px-4 mt-6 mb-2 text-xs text-gray-500 uppercase tracking-wider">系统管理</div>
            <a href="system-user.html" class="sidebar-menu-item flex items-center gap-3 px-4 py-3 text-sm cursor-pointer">
                <i class="fas fa-users-cog w-5 text-gray-600"></i>
                <span>用户管理</span>
            </a>
            <a href="system-role.html" class="sidebar-menu-item flex items-center gap-3 px-4 py-3 text-sm cursor-pointer">
                <i class="fas fa-shield-alt w-5 text-gray-600"></i>

            </a>
            <a href="system-log.html" class="sidebar-menu-item flex items-center gap-3 px-4 py-3 text-sm cursor-pointer">

            </a>
            <a href="system-config.html" class="sidebar-menu-item flex items-center gap-3 px-4 py-3 text-sm cursor-pointer">

            </a>
        </nav>
    </aside>

    <!-- 主内容区 -->
    <main class="ml-[220px] mt-14 p-6">
        <!-- 页面标题 -->
        <div class="flex items-center justify-between mb-6">
            <div class="flex items-center gap-4">
                <a href="activity-signin.html" class="w-10 h-10 flex items-center justify-center rounded-lg bg-white border border-gray-200 hover:bg-gray-50 transition-colors">
                    <i class="fas fa-arrow-left text-gray-600"></i>
                </a>
                <div>
                    <h1 class="text-2xl font-semibold text-gray-900">签到统计</h1>
                    <p id="activityTitle" class="text-gray-500 mt-1">AI公共数据开放培训会</p>
                </div>
            </div>
        </div>

        <!-- 统计卡片 -->
        <div class="grid grid-cols-4 gap-4 mb-6">
            <div class="bg-white rounded-xl p-5 shadow-sm border border-gray-100">
                <div class="flex items-center gap-3">
                    <div class="w-12 h-12 bg-accent-blue/10 rounded-xl flex items-center justify-center">
                        <i class="fas fa-users text-accent-blue text-xl"></i>
                    </div>
                    <div>
                        <p class="text-sm text-gray-500">报名人数</p>
                        <p id="totalCount" class="text-2xl font-bold text-gray-900">120</p>
                    </div>
                </div>
            </div>
            <div class="bg-white rounded-xl p-5 shadow-sm border border-gray-100">
                <div class="flex items-center gap-3">
                    <div class="w-12 h-12 bg-accent-green/10 rounded-xl flex items-center justify-center">
                        <i class="fas fa-user-check text-accent-green text-xl"></i>
                    </div>
                    <div>
                        <p class="text-sm text-gray-500">已签到人数</p>
                        <p id="signedCount" class="text-2xl font-bold text-accent-green">82</p>
                    </div>
                </div>
            </div>
            <div class="bg-white rounded-xl p-5 shadow-sm border border-gray-100">
                <div class="flex items-center gap-3">
                    <div class="w-12 h-12 bg-gray-100 rounded-xl flex items-center justify-center">
                        <i class="fas fa-user-times text-gray-400 text-xl"></i>
                    </div>
                    <div>
                        <p class="text-sm text-gray-500">未签到人数</p>
                        <p id="unsignedCount" class="text-2xl font-bold text-gray-600">38</p>
                    </div>
                </div>
            </div>
            <div class="bg-white rounded-xl p-5 shadow-sm border border-gray-100">
                <div class="flex items-center gap-3">
                    <div class="w-12 h-12 bg-accent-amber/10 rounded-xl flex items-center justify-center">
                        <i class="fas fa-percentage text-accent-amber text-xl"></i>
                    </div>
                    <div>
                        <p class="text-sm text-gray-500">签到率</p>
                        <p id="signinRate" class="text-2xl font-bold text-accent-amber">68%</p>
                    </div>
                </div>
            </div>
        </div>

        <!-- 签到时段分布图 -->
        <div class="bg-white rounded-xl p-6 shadow-sm border border-gray-100">
            <h3 class="text-lg font-semibold text-gray-900 mb-6">签到时段分布</h3>
            <div class="flex items-end justify-around h-64 gap-4">
                <div class="flex flex-col items-center gap-2">
                    <div class="w-16 bg-gray-100 rounded-t-lg chart-bar" style="height: 20px;"></div>
                    <span class="text-xs text-gray-500">08:00</span>
                </div>
                <div class="flex flex-col items-center gap-2">
                    <div class="w-16 bg-accent-blue rounded-t-lg chart-bar" style="height: 80px;"></div>
                    <span class="text-xs text-gray-500">08:30</span>
                </div>
                <div class="flex flex-col items-center gap-2">
                    <div class="w-16 bg-accent-blue rounded-t-lg chart-bar" style="height: 140px;"></div>
                    <span class="text-xs text-gray-500">09:00</span>
                </div>
                <div class="flex flex-col items-center gap-2">
                    <div class="w-16 bg-accent-blue rounded-t-lg chart-bar" style="height: 180px;"></div>
                    <span class="text-xs text-gray-500">09:30</span>
                </div>
                <div class="flex flex-col items-center gap-2">
                    <div class="w-16 bg-accent-blue rounded-t-lg chart-bar" style="height: 120px;"></div>
                    <span class="text-xs text-gray-500">10:00</span>
                </div>
                <div class="flex flex-col items-center gap-2">
                    <div class="w-16 bg-accent-blue rounded-t-lg chart-bar" style="height: 60px;"></div>
                    <span class="text-xs text-gray-500">10:30</span>
                </div>
                <div class="flex flex-col items-center gap-2">
                    <div class="w-16 bg-accent-blue rounded-t-lg chart-bar" style="height: 40px;"></div>
                    <span class="text-xs text-gray-500">11:00</span>
                </div>
                <div class="flex flex-col items-center gap-2">
                    <div class="w-16 bg-gray-100 rounded-t-lg chart-bar" style="height: 10px;"></div>
                    <span class="text-xs text-gray-500">11:30</span>
                </div>
            </div>
            <div class="mt-4 flex items-center justify-center gap-8">
                <div class="flex items-center gap-2">
                    <div class="w-3 h-3 bg-gray-100 rounded"></div>
                    <span class="text-sm text-gray-500">未签到</span>
                </div>
                <div class="flex items-center gap-2">
                    <div class="w-3 h-3 bg-accent-blue rounded"></div>
                    <span class="text-sm text-gray-500">已签到</span>
                </div>
            </div>
        </div>
    </main>

    <script>
        const activityData = {
            1: { name: 'AI公共数据开放培训会', total: 120, signed: 82, unsigned: 38 },
            2: { name: '数字政务创新发展论坛', total: 200, signed: 0, unsigned: 200 },
            3: { name: '智慧城市数据应用研讨会', total: 80, signed: 80, unsigned: 0 },
            4: { name: '数据安全与合规培训会', total: 150, signed: 45, unsigned: 105 },
            5: { name: '公共数据开放工作推进会', total: 100, signed: 0, unsigned: 100 },
            6: { name: '大数据分析与可视化培训', total: 60, signed: 60, unsigned: 0 },
            7: { name: '政务数据共享交换技术培训', total: 180, signed: 120, unsigned: 60 },
            8: { name: '数据要素市场建设专题讲座', total: 90, signed: 0, unsigned: 90 },
            9: { name: '云计算与大数据技术交流会', total: 75, signed: 72, unsigned: 3 },
            10: { name: '数据治理能力提升培训班', total: 130, signed: 88, unsigned: 42 }
        };

        function init() {
            const params = new URLSearchParams(window.location.search);
            const id = parseInt(params.get('id')) || 1;
            const activity = activityData[id] || activityData[1];

            document.getElementById('activityTitle').textContent = activity.name;
            document.getElementById('totalCount').textContent = activity.total;
            document.getElementById('signedCount').textContent = activity.signed;
            document.getElementById('unsignedCount').textContent = activity.unsigned;
            document.getElementById('signinRate').textContent = Math.round((activity.signed / activity.total) * 100) + '%';
        }

        init();
    </script>
</body>
</html>
