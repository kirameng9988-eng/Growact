<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>发布管理 - 内容中台系统</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        'primary-bg': '#FFFFFF',
                        'card-bg': '#FFFFFF',
                        'border-dark': '#CBD5E1',
                        'accent-blue': '#0A61FF',
                        'accent-cyan': '#0891B2',
                        'accent-green': '#059669',
                        'accent-amber': '#D97706',
                        'accent-red': '#DC2626',
                        'text-primary': '#0F172A',
                        'text-secondary': '#475569',
                        'text-muted': '#94A3B8'
                    }
                }
            }
        }
    </script>
    <style>
        * { font-family: 'PingFang SC', 'Microsoft YaHei', sans-serif; }
        ::-webkit-scrollbar { width: 6px; height: 6px; }
        ::-webkit-scrollbar-track { background: #F1F5F9; }
        ::-webkit-scrollbar-thumb { background: #F8FAFC; border-radius: 3px; }
        .sidebar-menu-item:hover { background: rgba(10, 97, 255, 0.06); }
        .sidebar-menu-item.active { background: rgba(10, 97, 255, 0.1); border-left: 3px solid #0A61FF; }
        .toast { animation: slideIn 0.3s ease; }
        @keyframes slideIn { from { transform: translateX(100%); opacity: 0; } to { transform: translateX(0); opacity: 1; } }
        .calendar-day { transition: all 0.2s; }
        .calendar-day:hover { background: rgba(10, 97, 255, 0.06); }
        .calendar-day.has-content { cursor: pointer; }
        .calendar-day.has-content:hover { background: rgba(10, 97, 255, 0.1); }
        .calendar-day.selected { background: rgba(59, 130, 246, 0.2) !important; border-color: #3b82f6 !important; }
        .stat-card { transition: all 0.2s; }
        .stat-card:hover { transform: translateY(-2px); border-color: rgba(59, 130, 246, 0.5); }
        .queue-item { transition: all 0.2s; }
        .queue-item:hover { border-color: rgba(59, 130, 246, 0.5); }
    </style>
</head>
<body class="bg-secondary-bg text-gray-900">

    

    <main class="p-6">
        <!-- 页面标题栏 -->
        <div class="flex items-center justify-between mb-6">
            <div>
                <h1 class="text-2xl font-semibold">发布管理</h1>
                <p class="text-gray-500 mt-1">管理内容发布计划，支持定时发布和排期管理</p>
            </div>
            <div class="flex items-center gap-3">
                <button onclick="openModal('scheduleModal')" class="px-5 py-2.5 bg-accent-blue text-white rounded-xl hover:bg-blue-600 transition-colors flex items-center gap-2">
                    <i class="fas fa-plus"></i>
                    创建计划
                </button>
                <a href="content-publish-list.html" class="px-5 py-2.5 bg-card-bg border border-[#E2E8F0] text-gray-600 rounded-xl hover:text-white hover:border-accent-blue transition-colors flex items-center gap-2">
                    <i class="fas fa-list"></i>
                    发布记录
                    <i class="fas fa-arrow-right text-xs"></i>
                </a>
            </div>
        </div>

        <!-- 统计卡片 + 快捷操作 -->
        <div class="grid grid-cols-5 gap-6 mb-6">
            <!-- 统计卡片 -->
            <div class="col-span-4 grid grid-cols-4 gap-4">
                <div class="stat-card bg-white rounded-xl border border-[#E2E8F0] p-4 cursor-pointer" onclick="filterByStatus('published-today')">
                    <div class="flex items-center gap-3">
                        <div class="w-12 h-12 rounded-xl bg-accent-green/20 flex items-center justify-center">
                            <i class="fas fa-check-circle text-accent-green text-xl"></i>
                        </div>
                        <div>
                            <div class="text-2xl font-bold">5</div>
                            <div class="text-sm text-gray-500">今日发布</div>
                        </div>
                    </div>
                </div>
                <div class="stat-card bg-white rounded-xl border border-[#E2E8F0] p-4 cursor-pointer" onclick="filterByStatus('published-week')">
                    <div class="flex items-center gap-3">
                        <div class="w-12 h-12 rounded-xl bg-accent-blue/20 flex items-center justify-center">
                            <i class="fas fa-calendar-week text-accent-blue text-xl"></i>
                        </div>
                        <div>
                            <div class="text-2xl font-bold">32</div>
                            <div class="text-sm text-gray-500">本周发布</div>
                        </div>
                    </div>
                </div>
                <div class="stat-card bg-white rounded-xl border border-[#E2E8F0] p-4 cursor-pointer" onclick="filterByStatus('pending')">
                    <div class="flex items-center gap-3">
                        <div class="w-12 h-12 rounded-xl bg-accent-amber/20 flex items-center justify-center">
                            <i class="fas fa-clock text-accent-amber text-xl"></i>
                        </div>
                        <div>
                            <div class="text-2xl font-bold">18</div>
                            <div class="text-sm text-gray-500">待发布</div>
                        </div>
                    </div>
                </div>
                <div class="stat-card bg-white rounded-xl border border-[#E2E8F0] p-4 cursor-pointer" onclick="filterByStatus('offline')">
                    <div class="flex items-center gap-3">
                        <div class="w-12 h-12 rounded-xl bg-text-muted/20 flex items-center justify-center">
                            <i class="fas fa-arrow-circle-down text-gray-500 text-xl"></i>
                        </div>
                        <div>
                            <div class="text-2xl font-bold">3</div>
                            <div class="text-sm text-gray-500">已下线</div>
                        </div>
                    </div>
                </div>
            </div>

            <!-- 快捷操作区 -->
            <div class="bg-white rounded-xl border border-[#E2E8F0] p-4">
                <h3 class="text-sm font-medium text-gray-500 mb-3">快捷提醒</h3>
                <div class="space-y-2">
                    <div class="flex items-center justify-between text-sm">
                        <span class="text-gray-600">今日发布</span>
                        <span class="text-accent-green font-medium">5</span>
                    </div>
                    <div class="flex items-center justify-between text-sm">
                        <span class="text-gray-600">紧急待处理</span>
                        <span class="text-accent-red font-medium">2</span>
                    </div>
                    <div class="flex items-center justify-between text-sm">
                        <span class="text-gray-600">即将过期</span>
                        <span class="text-accent-amber font-medium">1</span>
                    </div>
                </div>
            </div>
        </div>

        <!-- 日历 + 待发布队列 -->
        <div class="grid grid-cols-5 gap-6">
            <!-- 日历视图 -->
            <div class="col-span-3 bg-white rounded-xl border border-[#E2E8F0] p-5">
                <div class="flex items-center justify-between mb-4">
                    <h3 class="text-lg font-medium">
                        <i class="fas fa-calendar-alt mr-2 text-accent-blue"></i>发布日历
                    </h3>
                    <div class="flex items-center gap-2">
                        <button onclick="changeMonth(-1)" class="p-2 hover:bg-primary-bg rounded-lg text-gray-500 hover:text-white transition-colors">
                            <i class="fas fa-chevron-left"></i>
                        </button>
                        <span id="currentMonth" class="text-lg font-medium mx-4">2024年1月</span>
                        <button onclick="changeMonth(1)" class="p-2 hover:bg-primary-bg rounded-lg text-gray-500 hover:text-white transition-colors">
                            <i class="fas fa-chevron-right"></i>
                        </button>
                    </div>
                </div>

                <!-- 星期标题 -->
                <div class="grid grid-cols-7 gap-2 mb-2">
                    <div class="text-center text-sm text-gray-500 py-2">日</div>
                    <div class="text-center text-sm text-gray-500 py-2">一</div>
                    <div class="text-center text-sm text-gray-500 py-2">二</div>
                    <div class="text-center text-sm text-gray-500 py-2">三</div>
                    <div class="text-center text-sm text-gray-500 py-2">四</div>
                    <div class="text-center text-sm text-gray-500 py-2">五</div>
                    <div class="text-center text-sm text-gray-500 py-2">六</div>
                </div>

                <!-- 日期网格 -->
                <div id="calendarGrid" class="grid grid-cols-7 gap-2">
                    <!-- 动态渲染 -->
                </div>

                <!-- 图例 -->
                <div class="flex items-center justify-center gap-6 mt-4 pt-4 border-t border-[#E2E8F0]">
                    <div class="flex items-center gap-2 text-xs text-gray-500">
                        <span class="w-2 h-2 rounded-full bg-accent-blue"></span>
                        <span>待发布</span>
                    </div>
                    <div class="flex items-center gap-2 text-xs text-gray-500">
                        <span class="w-2 h-2 rounded-full bg-indigo-500"></span>
                        <span>发布中</span>
                    </div>
                    <div class="flex items-center gap-2 text-xs text-gray-500">
                        <span class="w-2 h-2 rounded-full bg-accent-green"></span>
                        <span>已发布</span>
                    </div>
                    <div class="flex items-center gap-2 text-xs text-gray-500">
                        <span class="w-2 h-2 rounded-full bg-text-muted"></span>
                        <span>已下线</span>
                    </div>
                    <div class="flex items-center gap-2 text-xs text-gray-500">
                        <span class="w-2 h-2 rounded-full bg-accent-amber"></span>
                        <span>已撤回</span>
                    </div>
                </div>
            </div>

            <!-- 待发布队列 -->
            <div class="col-span-2 bg-white rounded-xl border border-[#E2E8F0] p-5">
                <div class="flex items-center justify-between mb-4">
                    <h3 class="text-lg font-medium">
                        <i class="fas fa-list-ol mr-2 text-accent-cyan"></i>待发布队列
                    </h3>
                    <span id="pendingCount" class="px-2.5 py-0.5 bg-accent-amber/20 text-accent-amber text-xs rounded-full">18 条</span>
                </div>

                <div id="pendingQueue" class="space-y-3 max-h-[450px] overflow-y-auto">
                    <!-- 动态渲染 -->
                </div>

                <div class="mt-4 pt-4 border-t border-[#E2E8F0]">
                    <div class="flex items-center justify-between mb-3">
                        <label class="flex items-center gap-2 cursor-pointer">
                            <input type="checkbox" id="selectAllPending" onchange="toggleSelectAllPending()" class="accent-accent-blue">
                            <span class="text-sm text-gray-500">全选</span>
                        </label>
                        <span id="selectedPendingCount" class="text-sm text-gray-500">已选 0 项</span>
                    </div>
                    <button onclick="batchPublish()" class="w-full py-2.5 bg-accent-blue text-white rounded-xl hover:bg-blue-600 transition-colors flex items-center justify-center gap-2">
                        <i class="fas fa-rocket"></i>
                        批量发布
                    </button>
                </div>
            </div>
        </div>
    </main>

    <!-- Toast容器 -->
    <div id="toastContainer" class="fixed bottom-6 right-6 z-50 flex flex-col gap-2"></div>

    <!-- 创建发布计划弹窗 -->
    <div id="scheduleModal" class="fixed inset-0 bg-black/70 z-50 hidden items-center justify-center">
        <div class="bg-card-bg rounded-2xl w-[500px] border border-[#E2E8F0] shadow-2xl">
            <div class="flex items-center justify-between px-6 py-4 border-b border-[#E2E8F0]">
                <h3 class="text-lg font-medium">创建发布计划</h3>
                <button onclick="closeModal('scheduleModal')" class="text-gray-500 hover:text-white">
                    <i class="fas fa-times text-xl"></i>
                </button>
            </div>
            <div class="p-6 space-y-4">
                <div>
                    <label class="block text-sm text-gray-600 mb-2">选择内容 <span class="text-accent-red">*</span></label>
                    <select id="scheduleContent" class="w-full bg-primary-bg border border-[#E2E8F0] rounded-xl px-4 py-3 text-sm focus:border-accent-blue focus:outline-none">
                        <option value="">请选择要发布的内容</option>
                        <option value="1">数字化转型工作进展报告</option>
                        <option value="2">关于开展2024年度工作总结的通知</option>
                        <option value="3">安全生产知识竞赛活动方案</option>
                        <option value="4">智慧城市建设成果展示</option>
                        <option value="5">两会专题报道：民生改善篇</option>
                    </select>
                </div>
                <div>
                    <label class="block text-sm text-gray-600 mb-2">发布时间 <span class="text-accent-red">*</span></label>
                    <input type="datetime-local" id="scheduleTime" class="w-full bg-primary-bg border border-[#E2E8F0] rounded-xl px-4 py-3 text-sm focus:border-accent-blue focus:outline-none">
                </div>
                <div>
                    <label class="block text-sm text-gray-600 mb-2">发布频道</label>
                    <div class="flex flex-wrap gap-2">
                        <label class="flex items-center gap-2 px-3 py-2 bg-primary-bg rounded-lg cursor-pointer border border-[#E2E8F0] hover:border-accent-blue/50 transition-colors">
                            <input type="checkbox" value="pc" class="accent-accent-blue channel-checkbox">
                            <span class="text-sm">PC网站</span>
                        </label>
                        <label class="flex items-center gap-2 px-3 py-2 bg-primary-bg rounded-lg cursor-pointer border border-[#E2E8F0] hover:border-accent-blue/50 transition-colors">
                            <input type="checkbox" value="mobile" class="accent-accent-blue channel-checkbox" checked>
                            <span class="text-sm">移动端</span>
                        </label>
                        <label class="flex items-center gap-2 px-3 py-2 bg-primary-bg rounded-lg cursor-pointer border border-[#E2E8F0] hover:border-accent-blue/50 transition-colors">
                            <input type="checkbox" value="app" class="accent-accent-blue channel-checkbox">
                            <span class="text-sm">小程序</span>
                        </label>
                    </div>
                </div>
                <div>
                    <label class="block text-sm text-gray-600 mb-2">备注</label>
                    <textarea id="scheduleRemark" rows="2" placeholder="可选填写备注信息" class="w-full bg-primary-bg border border-[#E2E8F0] rounded-xl px-4 py-3 text-sm focus:border-accent-blue focus:outline-none resize-none"></textarea>
                </div>
            </div>
            <div class="flex items-center justify-end gap-3 px-6 py-4 border-t border-[#E2E8F0]">
                <button onclick="closeModal('scheduleModal')" class="px-5 py-2.5 border border-[#E2E8F0] rounded-xl text-gray-600 hover:text-white transition-colors">取消</button>
                <button onclick="createSchedule()" class="px-5 py-2.5 bg-accent-blue text-white rounded-xl hover:bg-blue-600 transition-colors">确认创建</button>
            </div>
        </div>
    </div>

    <!-- 日期详情弹窗 -->
    <div id="dateDetailModal" class="fixed inset-0 bg-black/70 z-50 hidden items-center justify-center">
        <div class="bg-card-bg rounded-2xl w-[600px] max-h-[80vh] border border-[#E2E8F0] shadow-2xl flex flex-col">
            <div class="flex items-center justify-between px-6 py-4 border-b border-[#E2E8F0]">
                <h3 id="dateDetailTitle" class="text-lg font-medium">2024年1月15日 发布详情</h3>
                <button onclick="closeModal('dateDetailModal')" class="text-gray-500 hover:text-white">
                    <i class="fas fa-times text-xl"></i>
                </button>
            </div>
            <div class="flex-1 overflow-auto p-6">
                <div id="dateDetailContent" class="space-y-3">
                    <!-- 动态渲染 -->
                </div>
            </div>
            <div class="flex items-center justify-end gap-3 px-6 py-4 border-t border-[#E2E8F0]">
                <button onclick="closeModal('dateDetailModal')" class="px-5 py-2.5 border border-[#E2E8F0] rounded-xl text-gray-600 hover:text-white transition-colors">关闭</button>
            </div>
        </div>
    </div>

    <!-- 确认发布弹窗 -->
    <div id="confirmPublishModal" class="fixed inset-0 bg-black/70 z-50 hidden items-center justify-center">
        <div class="bg-card-bg rounded-2xl w-[400px] border border-[#E2E8F0] shadow-2xl">
            <div class="flex items-center gap-4 p-6 border-b border-[#E2E8F0]">
                <div class="w-12 h-12 rounded-full bg-accent-blue/20 flex items-center justify-center">
                    <i class="fas fa-rocket text-accent-blue text-xl"></i>
                </div>
                <div>
                    <h3 class="text-lg font-medium">确认发布</h3>
                    <p id="confirmPublishCount" class="text-sm text-gray-500 mt-1">确定要发布选中的内容吗？</p>
                </div>
            </div>
            <div class="p-6">
                <p id="confirmPublishDesc" class="text-sm text-gray-600">发布后内容将在选定频道立即上线</p>
            </div>
            <div class="flex items-center justify-end gap-3 px-6 py-4 border-t border-[#E2E8F0]">
                <button onclick="closeModal('confirmPublishModal')" class="px-5 py-2.5 border border-[#E2E8F0] rounded-xl text-gray-600 hover:text-white transition-colors">取消</button>
                <button onclick="confirmBatchPublish()" class="px-5 py-2.5 bg-accent-blue text-white rounded-xl hover:bg-blue-600 transition-colors">确认发布</button>
            </div>
        </div>
    </div>

    <script>
        // 发布数据
        let publishList = [
            { id: 1, title: '数字化转型工作进展报告', type: 'news', typeName: '新闻资讯', channels: ['pc', 'mobile'], status: 'pending', publishTime: '2024-01-15 10:00:00', author: '王建国' },
            { id: 2, title: '关于开展2024年度工作总结的通知', type: 'announce', typeName: '公告通知', channels: ['pc'], status: 'pending', publishTime: '2024-01-16 09:00:00', author: '李明' },
            { id: 3, title: '安全生产知识竞赛活动方案', type: 'news', typeName: '新闻资讯', channels: ['mobile'], status: 'pending', publishTime: '2024-01-18 14:00:00', author: '张伟' },
            { id: 4, title: '智慧城市建设成果展示', type: 'topic', typeName: '专题活动', channels: ['pc', 'mobile', 'app'], status: 'published', publishTime: '2024-01-10 17:30:00', author: '吴晓燕' },
            { id: 5, title: '两会专题报道：民生改善篇', type: 'news', typeName: '新闻资讯', channels: ['pc', 'mobile'], status: 'pending', publishTime: '2024-01-22 08:00:00', author: '赵强' },
            { id: 6, title: '第一季度工作规划部署会议纪要', type: 'news', typeName: '新闻资讯', channels: ['pc'], status: 'published', publishTime: '2024-01-08 16:20:00', author: '周明杰' },
            { id: 7, title: '数字化转型工作进展报告', type: 'news', typeName: '新闻资讯', channels: ['pc', 'mobile'], status: 'published', publishTime: '2024-01-05 11:00:00', author: '王建国' },
            { id: 8, title: '2024年春节放假通知', type: 'announce', typeName: '公告通知', channels: ['pc', 'mobile', 'app'], status: 'pending', publishTime: '2024-01-20 10:00:00', author: '行政部' },
            { id: 9, title: '科技创新成果展示', type: 'policy', typeName: '政策文件', channels: ['pc'], status: 'offline', publishTime: '2024-01-02 09:00:00', author: '科技处' },
            { id: 10, title: '年度表彰大会盛况', type: 'news', typeName: '新闻资讯', channels: ['pc', 'mobile'], status: 'pending', publishTime: '2024-01-25 15:00:00', author: '宣传部' }
        ];

        let selectedPendingItems = [];
        let currentYear = 2024;
        let currentMonth = 1;
        let selectedDate = null;

        // 状态配置
        const statusConfig = {
            pending: { name: '待发布', color: 'accent-blue', bgColor: 'bg-accent-blue/20', icon: 'clock' },
            publishing: { name: '发布中', color: 'indigo-500', bgColor: 'bg-indigo-500/20', icon: 'spinner' },
            published: { name: '已发布', color: 'accent-green', bgColor: 'bg-accent-green/20', icon: 'check-circle' },
            offline: { name: '已下线', color: 'text-muted', bgColor: 'bg-text-muted/20', icon: 'arrow-circle-down' },
            withdrawn: { name: '已撤回', color: 'accent-amber', bgColor: 'bg-accent-amber/20', icon: 'undo' }
        };

        // 频道配置
        const channelConfig = {
            pc: { name: 'PC', color: 'accent-blue' },
            mobile: { name: '移动端', color: 'accent-cyan' },
            app: { name: '小程序', color: 'accent-green' }
        };

        // 初始化日历
        function initCalendar() {
            renderCalendar();
            renderPendingQueue();
        }

        // 渲染日历
        function renderCalendar() {
            document.getElementById('currentMonth').textContent = `${currentYear}年${currentMonth}月`;

            const grid = document.getElementById('calendarGrid');
            const firstDay = new Date(currentYear, currentMonth - 1, 1).getDay();
            const daysInMonth = new Date(currentYear, currentMonth, 0).getDate();
            const today = new Date();

            let html = '';

            // 填充空白
            for (let i = 0; i < firstDay; i++) {
                const prevMonthDays = new Date(currentYear, currentMonth - 1, 0).getDate();
                const day = prevMonthDays - firstDay + i + 1;
                html += `<div class="calendar-day p-3 rounded-lg border border-transparent text-gray-500 text-sm">${day}</div>`;
            }

            // 填充当月日期
            for (let day = 1; day <= daysInMonth; day++) {
                const dateStr = `${currentYear}-${String(currentMonth).padStart(2, '0')}-${String(day).padStart(2, '0')}`;
                const dayPublishItems = publishList.filter(p => p.publishTime.startsWith(dateStr));
                const isToday = today.getFullYear() === currentYear && today.getMonth() + 1 === currentMonth && today.getDate() === day;
                const isSelected = selectedDate === dateStr;

                let dotsHtml = '';
                if (dayPublishItems.length > 0) {
                    const statusCounts = {};
                    dayPublishItems.forEach(item => {
                        if (!statusCounts[item.status]) statusCounts[item.status] = 0;
                        statusCounts[item.status]++;
                    });

                    Object.entries(statusCounts).slice(0, 4).forEach(([status, count]) => {
                        const config = statusConfig[status];
                        dotsHtml += `<span class="w-2 h-2 rounded-full bg-${config.color}"></span>`;
                    });
                }

                html += `
                    <div class="calendar-day p-3 rounded-lg ${dayPublishItems.length > 0 ? 'has-content' : ''} border border-transparent ${isToday ? 'bg-accent-blue/10 border-accent-blue/30' : ''} ${isSelected ? 'selected' : ''}"
                         onclick="selectDate('${dateStr}')">
                        <div class="text-sm font-medium ${isToday ? 'text-accent-blue' : ''}">${day}</div>
                        ${dotsHtml ? `<div class="flex items-center gap-1 mt-1">${dotsHtml}</div>` : ''}
                    </div>
                `;
            }

            // 填充月末空白
            const totalCells = firstDay + daysInMonth;
            const remainingCells = totalCells % 7 === 0 ? 0 : 7 - (totalCells % 7);
            for (let i = 1; i <= remainingCells; i++) {
                html += `<div class="calendar-day p-3 rounded-lg border border-transparent text-gray-500 text-sm">${i}</div>`;
            }

            grid.innerHTML = html;
        }

        // 切换月份
        function changeMonth(delta) {
            currentMonth += delta;
            if (currentMonth > 12) {
                currentMonth = 1;
                currentYear++;
            } else if (currentMonth < 1) {
                currentMonth = 12;
                currentYear--;
            }
            renderCalendar();
        }

        // 选择日期
        function selectDate(dateStr) {
            selectedDate = dateStr;
            renderCalendar();
            showDateDetail(dateStr);
        }

        // 显示日期详情弹窗
        function showDateDetail(dateStr) {
            const items = publishList.filter(p => p.publishTime.startsWith(dateStr));
            const date = new Date(dateStr);
            const dateTitle = `${date.getFullYear()}年${date.getMonth() + 1}月${date.getDate()}日 发布详情`;

            document.getElementById('dateDetailTitle').textContent = dateTitle;

            if (items.length === 0) {
                document.getElementById('dateDetailContent').innerHTML = `
                    <div class="text-center py-8 text-gray-500">
                        <i class="fas fa-calendar-times text-4xl mb-3 opacity-50"></i>
                        <p>当日暂无发布计划</p>
                    </div>
                `;
            } else {
                document.getElementById('dateDetailContent').innerHTML = `
                    <div class="text-sm text-gray-500 mb-4">共有 ${items.length} 条发布计划</div>
                    ${items.map(item => {
                        const status = statusConfig[item.status];
                        const channelsHtml = item.channels.map(ch => {
                            const chConfig = channelConfig[ch];
                            return `<span class="px-2 py-0.5 bg-${chConfig.color}/20 text-${chConfig.color} text-xs rounded">${chConfig.name}</span>`;
                        }).join('');
                        const time = item.publishTime.split(' ')[1].substring(0, 5);

                        return `
                            <div class="p-4 bg-white rounded-xl border border-[#E2E8F0]">
                                <div class="flex items-start justify-between mb-2">
                                    <div>
                                        <div class="flex items-center gap-2 mb-1">
                                            <span class="w-2 h-2 rounded-full bg-${status.color}"></span>
                                            <span class="font-medium">${item.title}</span>
                                        </div>
                                        <div class="text-sm text-gray-500">
                                            ${item.typeName} · ${channelsHtml} · ${time}
                                        </div>
                                    </div>
                                    <span class="px-2 py-0.5 ${status.bgColor} text-${status.color} text-xs rounded">${status.name}</span>
                                </div>
                                <div class="flex items-center gap-2 mt-3">
                                    ${item.status === 'pending' ? `
                                        <button onclick="immediatePublish(${item.id})" class="px-3 py-1.5 bg-accent-green text-white text-xs rounded-lg hover:bg-green-600 transition-colors">
                                            <i class="fas fa-rocket mr-1"></i>立即发布
                                        </button>
                                        <button onclick="editSchedule(${item.id})" class="px-3 py-1.5 border border-[#E2E8F0] text-gray-600 text-xs rounded-lg hover:text-white transition-colors">
                                            <i class="fas fa-edit mr-1"></i>编辑
                                        </button>
                                    ` : ''}
                                    ${item.status === 'published' ? `
                                        <button onclick="offlineContent(${item.id})" class="px-3 py-1.5 border border-[#E2E8F0] text-gray-600 text-xs rounded-lg hover:text-accent-red hover:border-accent-red transition-colors">
                                            <i class="fas fa-arrow-circle-down mr-1"></i>下线
                                        </button>
                                    ` : ''}
                                    <button onclick="cancelSchedule(${item.id})" class="px-3 py-1.5 border border-[#E2E8F0] text-gray-600 text-xs rounded-lg hover:text-accent-red hover:border-accent-red transition-colors">
                                        <i class="fas fa-times mr-1"></i>取消
                                    </button>
                                </div>
                            </div>
                        `;
                    }).join('')}
                `;
            }

            openModal('dateDetailModal');
        }

        // 渲染待发布队列
        function renderPendingQueue() {
            const pendingItems = publishList.filter(p => p.status === 'pending').sort((a, b) => a.publishTime.localeCompare(b.publishTime));
            document.getElementById('pendingCount').textContent = `${pendingItems.length} 条`;

            const container = document.getElementById('pendingQueue');
            if (pendingItems.length === 0) {
                container.innerHTML = `
                    <div class="text-center py-8 text-gray-500">
                        <i class="fas fa-check-circle text-4xl mb-3 opacity-50 text-accent-green"></i>
                        <p>暂无待发布内容</p>
                    </div>
                `;
                return;
            }

            container.innerHTML = pendingItems.map(item => {
                const dateParts = item.publishTime.split(' ');
                const dateStr = dateParts[0].substring(5);
                const timeStr = dateParts[1].substring(0, 5);
                const isSelected = selectedPendingItems.includes(item.id);

                return `
                    <div class="queue-item p-4 bg-white rounded-xl border border-[#E2E8F0] ${isSelected ? 'border-accent-blue bg-accent-blue/5' : ''}">
                        <div class="flex items-start gap-3">
                            <input type="checkbox" ${isSelected ? 'checked' : ''} onchange="togglePendingItem(${item.id})" class="mt-1 accent-accent-blue">
                            <div class="flex-1">
                                <div class="text-sm font-medium mb-1">${item.title}</div>
                                <div class="flex items-center gap-2 text-xs text-gray-500">
                                    <span class="px-2 py-0.5 bg-accent-blue/20 text-accent-blue rounded">${dateStr} ${timeStr}</span>
                                    <span>${item.typeName}</span>
                                </div>
                            </div>
                            <button onclick="immediatePublish(${item.id})" class="px-3 py-1.5 bg-accent-green text-white text-xs rounded-lg hover:bg-green-600 transition-colors">
                                发布
                            </button>
                        </div>
                    </div>
                `;
            }).join('');

            document.getElementById('selectedPendingCount').textContent = `已选 ${selectedPendingItems.length} 项`;
        }

        // 切换待发布项选中状态
        function togglePendingItem(id) {
            const idx = selectedPendingItems.indexOf(id);
            if (idx > -1) {
                selectedPendingItems.splice(idx, 1);
            } else {
                selectedPendingItems.push(id);
            }
            renderPendingQueue();
        }

        // 全选待发布项
        function toggleSelectAllPending() {
            const selectAll = document.getElementById('selectAllPending').checked;
            const pendingItems = publishList.filter(p => p.status === 'pending');

            if (selectAll) {
                selectedPendingItems = pendingItems.map(p => p.id);
            } else {
                selectedPendingItems = [];
            }
            renderPendingQueue();
        }

        // 批量发布
        function batchPublish() {
            if (selectedPendingItems.length === 0) {
                showToast('请先选择要发布的内容', 'error');
                return;
            }

            document.getElementById('confirmPublishCount').textContent = `确定要发布选中的 ${selectedPendingItems.length} 条内容吗？`;
            openModal('confirmPublishModal');
        }

        // 确认批量发布
        function confirmBatchPublish() {
            selectedPendingItems.forEach(id => {
                const item = publishList.find(p => p.id === id);
                if (item) item.status = 'published';
            });

            selectedPendingItems = [];
            closeModal('confirmPublishModal');
            renderCalendar();
            renderPendingQueue();
            showToast(`成功发布 ${arguments.callee.caller.arguments?.[0] || selectedPendingItems.length} 条内容`);
        }

        // 立即发布
        function immediatePublish(id) {
            const item = publishList.find(p => p.id === id);
            if (item) {
                item.status = 'published';
                renderCalendar();
                renderPendingQueue();
                showToast('内容已发布');
            }
        }

        // 下线内容
        function offlineContent(id) {
            const item = publishList.find(p => p.id === id);
            if (item) {
                item.status = 'offline';
                renderCalendar();
                showToast('内容已下线');
            }
        }

        // 取消发布计划
        function cancelSchedule(id) {
            if (confirm('确定要取消这个发布计划吗？')) {
                publishList = publishList.filter(p => p.id !== id);
                renderCalendar();
                renderPendingQueue();
                closeModal('dateDetailModal');
                showToast('发布计划已取消');
            }
        }

        // 编辑发布计划
        function editSchedule(id) {
            showToast('编辑功能开发中', 'info');
        }

        // 创建发布计划
        function createSchedule() {
            const contentId = document.getElementById('scheduleContent').value;
            const scheduleTime = document.getElementById('scheduleTime').value;

            if (!contentId || !scheduleTime) {
                showToast('请填写完整信息', 'error');
                return;
            }

            const content = document.querySelector(`#scheduleContent option[value="${contentId}"]`);
            const channels = [...document.querySelectorAll('.channel-checkbox:checked')].map(cb => cb.value);

            if (channels.length === 0) {
                showToast('请至少选择一个发布频道', 'error');
                return;
            }

            const newItem = {
                id: Date.now(),
                title: content.text,
                type: 'news',
                typeName: '新闻资讯',
                channels: channels,
                status: 'pending',
                publishTime: scheduleTime.replace('T', ' ') + ':00',
                author: '张明远'
            };

            publishList.push(newItem);
            closeModal('scheduleModal');
            renderCalendar();
            renderPendingQueue();
            showToast('发布计划已创建');

            // 清空表单
            document.getElementById('scheduleContent').value = '';
            document.getElementById('scheduleTime').value = '';
            document.querySelectorAll('.channel-checkbox').forEach(cb => cb.checked = false);
        }

        // 按状态筛选（统计卡片点击）
        function filterByStatus(status) {
            showToast(`筛选功能：${status}`, 'info');
        }

        // 弹窗控制
        function openModal(id) {
            document.getElementById(id).classList.remove('hidden');
            document.getElementById(id).classList.add('flex');
        }

        function closeModal(id) {
            document.getElementById(id).classList.add('hidden');
            document.getElementById(id).classList.remove('flex');
        }

        // Toast提示
        function showToast(message, type = 'success') {
            const container = document.getElementById('toastContainer');
            const toast = document.createElement('div');
            const bgColor = type === 'success' ? 'bg-accent-green' : type === 'error' ? 'bg-accent-red' : 'bg-accent-blue';
            toast.className = `toast ${bgColor} text-white px-6 py-3 rounded-xl shadow-lg flex items-center gap-2`;
            toast.innerHTML = `<i class="fas fa-${type === 'success' ? 'check-circle' : type === 'error' ? 'times-circle' : 'info-circle'}"></i><span>${message}</span>`;
            container.appendChild(toast);
            setTimeout(() => toast.remove(), 3000);
        }

        // 初始化
        initCalendar();
        initContentSelector();

        // ==================== 内容选择器联动 ====================
        // 从localStorage加载分类数据
        function loadCategories() {
            const stored = localStorage.getItem('content_categories');
            if (stored) {
                try {
                    return JSON.parse(stored);
                } catch (e) {}
            }
            return [
                { id: 1, name: '新闻资讯', children: [{ id: 11, name: '时政要闻' }, { id: 12, name: '社会民生' }, { id: 13, name: '经济建设' }] },
                { id: 2, name: '政策文件', children: [{ id: 21, name: '政策法规' }, { id: 22, name: '通知公告' }] },
                { id: 3, name: '专题活动', children: [{ id: 31, name: '两会专题' }, { id: 32, name: '安全生产月' }] }
            ];
        }

        // 初始化内容选择器
        function initContentSelector() {
            const select = document.getElementById('scheduleContent');
            if (!select) return;

            const categories = loadCategories();
            select.innerHTML = '<option value="">请选择要发布的内容</option>';

            categories.forEach(cat => {
                if (cat.children) {
                    cat.children.forEach(child => {
                        const opt = document.createElement('option');
                        opt.value = child.name;
                        opt.textContent = child.name;
                        select.appendChild(opt);
                    });
                }
            });

            // 监听分类更新事件
            window.addEventListener('storage', function(e) {
                if (e.key === 'content_categories') {
                    initContentSelector();
                }
            });
        }
    </script>
</body>
</html>
