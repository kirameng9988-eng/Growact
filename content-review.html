    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        'primary-bg': '#FFFFFF',
                        'card-bg': '#FFFFFF',
                        'border-dark': '#CBD5E1',
                        'accent-blue': '#0A61FF',
                        'accent-cyan': '#0891B2',
                        'accent-green': '#059669',
                        'accent-amber': '#D97706',
                        'accent-red': '#DC2626',
                        'text-primary': '#0F172A',
                        'text-secondary': '#475569',
                        'text-muted': '#94A3B8'
                    }
                }
            }
        }

    <style>
        * { font-family: 'PingFang SC', 'Microsoft YaHei', sans-serif; }
        .sidebar-menu-item:hover { background: rgba(10, 97, 255, 0.06); }
        .sidebar-menu-item.active { background: rgba(10, 97, 255, 0.1); border-left: 3px solid #0A61FF; }
        .table-row:hover { background: #F8FAFC; }

<body class="bg-secondary-bg text-gray-900">

    

    <main class="p-6">
        <div class="flex items-center justify-between mb-6">
            <div>
                <h1 class="text-2xl font-semibold">审核中心</h1>
                <p class="text-gray-500 mt-1">审核待发布内容，确保内容质量合规</p>
            </div>
            <div class="flex items-center gap-3">
                <button id="batchApproveBtn" class="px-4 py-2 bg-accent-blue/20 text-accent-blue rounded-xl hover:bg-accent-blue/30 transition-colors opacity-50 pointer-events-none">
                    <i class="fas fa-check-double mr-2"></i>批量通过 (<span id="batchApproveCount">0</span>)
                </button>
                <button id="batchRejectBtn" class="px-4 py-2 bg-accent-red/20 text-accent-red rounded-xl hover:bg-accent-red/30 transition-colors opacity-50 pointer-events-none">
                    <i class="fas fa-times-circle mr-2"></i>批量拒绝 (<span id="batchRejectCount">0</span>)
                </button>
            </div>
        </div>

        <!-- 统计卡片 -->
        <div class="grid grid-cols-4 gap-5 mb-6">
            <div class="bg-white rounded-xl p-4 border border-[#E2E8F0]">
                <div class="flex items-center gap-3">
                    <div class="w-12 h-12 rounded-xl bg-accent-blue/20 flex items-center justify-center">
                        <i class="fas fa-clock text-accent-blue text-xl"></i>
                    </div>
                    <div>
                        <div id="statPending" class="text-2xl font-bold">0</div>
                        <div class="text-sm text-gray-500">待审核</div>
                    </div>
                </div>
            </div>
            <div class="bg-white rounded-xl p-4 border border-[#E2E8F0]">
                <div class="flex items-center gap-3">
                    <div class="w-12 h-12 rounded-xl bg-accent-green/20 flex items-center justify-center">
                        <i class="fas fa-check-circle text-accent-green text-xl"></i>
                    </div>
                    <div>
                        <div id="statApproved" class="text-2xl font-bold">0</div>
                        <div class="text-sm text-gray-500">今日已审</div>
                    </div>
                </div>
            </div>
            <div class="bg-white rounded-xl p-4 border border-[#E2E8F0]">
                <div class="flex items-center gap-3">
                    <div class="w-12 h-12 rounded-xl bg-accent-amber/20 flex items-center justify-center">
                        <i class="fas fa-hourglass-half text-accent-amber text-xl"></i>
                    </div>
                    <div>
                        <div id="statReviewing" class="text-2xl font-bold">0</div>
                        <div class="text-sm text-gray-500">审核中</div>
                    </div>
                </div>
            </div>
            <div class="bg-white rounded-xl p-4 border border-[#E2E8F0]">
                <div class="flex items-center gap-3">
                    <div class="w-12 h-12 rounded-xl bg-accent-red/20 flex items-center justify-center">
                        <i class="fas fa-times text-accent-red text-xl"></i>
                    </div>
                    <div>
                        <div id="statRejected" class="text-2xl font-bold">0</div>
                        <div class="text-sm text-gray-500">已驳回</div>
                    </div>
                </div>
            </div>
        </div>

        <!-- 筛选栏 -->
        <div class="bg-white rounded-xl p-4 mb-6 border border-[#E2E8F0]">
            <div class="flex items-center gap-4 flex-wrap">
                <div id="tabButtons" class="flex items-center gap-2">
                    <button class="tab-btn px-4 py-2 bg-accent-blue text-white rounded-lg text-sm" data-status="pending">待审核 (<span class="tab-count">0</span>)</button>
                    <button class="tab-btn px-4 py-2 text-gray-600 hover:text-white text-sm" data-status="reviewing">审核中 (<span class="tab-count">0</span>)</button>
                    <button class="tab-btn px-4 py-2 text-gray-600 hover:text-white text-sm" data-status="approved">已通过 (<span class="tab-count">0</span>)</button>
                    <button class="tab-btn px-4 py-2 text-gray-600 hover:text-white text-sm" data-status="rejected">已驳回 (<span class="tab-count">0</span>)</button>
                </div>
                <div class="flex-1"></div>
                <select id="categoryFilter" class="bg-primary-bg border border-[#E2E8F0] rounded-lg px-3 py-2 text-sm">
                    <option value="">全部分类</option>
                    <option value="通知公告">通知公告</option>
                    <option value="新闻资讯">新闻资讯</option>
                    <option value="政策文件">政策文件</option>
                    <option value="专题活动">专题活动</option>
                    <option value="文件">文件</option>
                </select>
            </div>
        </div>

        <!-- 审核列表 -->
        <div id="reviewList" class="space-y-4">
            <!-- 动态渲染 -->
        </div>

        <!-- 分页 -->
        <div class="flex items-center justify-center mt-6">
            <div id="pagination" class="flex items-center gap-2">
                <!-- 动态渲染 -->
            </div>
        </div>
    </main>

    <!-- 驳回弹窗 -->
    <div id="rejectModal" class="fixed inset-0 bg-black/70 z-50 hidden items-center justify-center">
        <div class="bg-card-bg rounded-2xl w-[500px] border border-[#E2E8F0] shadow-2xl">
            <div class="flex items-center justify-between px-6 py-4 border-b border-[#E2E8F0]">
                <h3 class="text-lg font-medium">驳回内容</h3>
                <button onclick="closeModal('rejectModal')" class="text-gray-500 hover:text-white">
                    <i class="fas fa-times text-xl"></i>
                </button>
            </div>
            <div class="p-6 space-y-4">
                <div class="flex items-center gap-3 p-3 bg-primary-bg rounded-lg">
                    <img id="rejectItemCover" src="" class="w-16 h-12 rounded object-cover">
                    <div>
                        <div id="rejectItemTitle" class="font-medium"></div>
                        <div id="rejectItemAuthor" class="text-sm text-gray-500"></div>
                    </div>
                </div>
                <div>
                    <label class="block text-sm text-gray-600 mb-2">驳回原因 <span class="text-accent-red">*</span></label>
                    <select id="rejectReason" class="w-full bg-primary-bg border border-[#E2E8F0] rounded-xl px-4 py-3 text-sm focus:border-accent-blue focus:outline-none">
                        <option value="">请选择驳回原因</option>
                        <option>内容不符合规范</option>
                        <option>信息存在错误</option>
                        <option>需要补充材料</option>
                        <option>重复提交</option>
                        <option>其他原因</option>
                    </select>
                </div>
                <div>
                    <label class="block text-sm text-gray-600 mb-2">详细说明</label>
                    <textarea id="rejectDetail" rows="4" placeholder="请输入详细说明，帮助作者了解问题所在" class="w-full bg-primary-bg border border-[#E2E8F0] rounded-xl px-4 py-3 text-sm focus:border-accent-blue focus:outline-none resize-none"></textarea>
                </div>
            </div>
            <div class="flex items-center justify-end gap-3 px-6 py-4 border-t border-[#E2E8F0]">
                <button onclick="closeModal('rejectModal')" class="px-5 py-2.5 border border-[#E2E8F0] rounded-xl text-gray-600 hover:text-white transition-colors">取消</button>
                <button onclick="confirmReject()" class="px-5 py-2.5 bg-accent-red text-white rounded-xl hover:bg-red-600 transition-colors">确认驳回</button>
            </div>
        </div>
    </div>

    <!-- 批量驳回弹窗 -->
    <div id="batchRejectModal" class="fixed inset-0 bg-black/70 z-50 hidden items-center justify-center">
        <div class="bg-card-bg rounded-2xl w-[500px] border border-[#E2E8F0] shadow-2xl">
            <div class="flex items-center justify-between px-6 py-4 border-b border-[#E2E8F0]">
                <h3 class="text-lg font-medium">批量驳回 (<span id="batchRejectNum">0</span> 项)</h3>
                <button onclick="closeModal('batchRejectModal')" class="text-gray-500 hover:text-white">
                    <i class="fas fa-times text-xl"></i>
                </button>
            </div>
            <div class="p-6 space-y-4">
                <div class="flex items-center gap-3 p-3 bg-primary-bg rounded-lg">
                    <i class="fas fa-exclamation-triangle text-accent-amber"></i>
                    <span class="text-sm text-gray-600">将驳回选中的 <span id="batchRejectNum2">0</span> 项内容</span>

                <div>
                    <label class="block text-sm text-gray-600 mb-2">驳回原因 <span class="text-accent-red">*</span></label>

                        <option value="">请选择驳回原因</option>
                        <option>内容不符合规范</option>
                        <option>信息存在错误</option>
                        <option>需要补充材料</option>
                        <option>重复提交</option>
                        <option>其他原因</option>
                    </select>
                </div>
                <div>
                    <label class="block text-sm text-gray-600 mb-2">详细说明</label>
                    <textarea id="batchRejectDetail" rows="4" placeholder="请输入详细说明，帮助作者了解问题所在" class="w-full bg-primary-bg border border-[#E2E8F0] rounded-xl px-4 py-3 text-sm focus:border-accent-blue focus:outline-none resize-none"></textarea>
                </div>
            </div>
            <div class="flex items-center justify-end gap-3 px-6 py-4 border-t border-[#E2E8F0]">
                <button onclick="closeModal('batchRejectModal')" class="px-5 py-2.5 border border-[#E2E8F0] rounded-xl text-gray-600 hover:text-white transition-colors">取消</button>
                <button onclick="confirmBatchReject()" class="px-5 py-2.5 bg-accent-red text-white rounded-xl hover:bg-red-600 transition-colors">确认驳回</button>
            </div>
        </div>
    </div>

    <!-- 预览弹窗 -->
    <div id="previewModal" class="fixed inset-0 bg-black/70 z-50 hidden items-center justify-center">
        <div class="bg-card-bg rounded-2xl w-[900px] max-h-[90vh] border border-[#E2E8F0] shadow-2xl overflow-hidden flex flex-col">

                    <i class="fas fa-times text-xl"></i>
                </button>
            </div>
            <div class="flex-1 overflow-y-auto p-6">
                <div class="flex gap-6">
                    <img id="previewCover" src="" class="w-64 h-40 rounded-lg object-cover">
                    <div class="flex-1">
                        <h2 id="previewTitle" class="text-xl font-semibold mb-3"></h2>
                        <div class="flex items-center gap-4 text-sm text-gray-500 mb-4">
                            <span><i class="fas fa-user mr-1"></i><span id="previewAuthor"></span></span>
                            <span><i class="fas fa-folder mr-1"></i><span id="previewCategory"></span></span>
                            <span><i class="fas fa-clock mr-1"></i><span id="previewTime"></span></span>
                        </div>
                        <div id="previewTags" class="flex flex-wrap gap-2 mb-4">
                            <!-- 动态渲染 -->
                        </div>
                        <p id="previewSummary" class="text-gray-600"></p>
                    </div>
                </div>
                <div class="mt-6 pt-6 border-t border-[#E2E8F0]">
                    <h4 class="text-sm font-medium text-gray-500 mb-3">正文内容</h4>
                    <div id="previewContent" class="text-gray-600 leading-relaxed whitespace-pre-wrap"></div>
                </div>
            </div>
            <div class="flex items-center justify-end gap-3 px-6 py-4 border-t border-[#E2E8F0]">
                <button onclick="closeModal('previewModal')" class="px-5 py-2.5 border border-[#E2E8F0] rounded-xl text-gray-600 hover:text-white transition-colors">关闭</button>
            </div>
        </div>
    </div>

    <!-- Toast 提示 -->
    <div id="toast" class="fixed bottom-6 right-6 bg-accent-green text-white px-6 py-3 rounded-xl shadow-lg hidden z-50">
        <i class="fas fa-check-circle mr-2"></i>
        <span id="toastText">操作成功</span>
    </div>

                content: '一、总体要求\n二、重点任务\n1. 推进决策公开\n2. 推进执行公开\n3. 推进管理公开\n4. 推进服务公开\n5. 推进结果公开...',
                rejectReason: '内容格式不规范，需要补充具体实施措施'
            },
            {
                id: 10,
                title: '节能降耗倡议书',
                cover: 'https://images.unsplash.com/photo-1497435334941-8c899ee9e8e9?w=120&h=80&fit=crop',
                category: '通知公告',
                status: 'rejected',
                author: '王磊',
                submitTime: '2024-01-10 10:15',
                tags: ['环保', '通知'],
                summary: '为响应国家节能减排号召，建设节约型机关，现向全体干部职工发出如下倡议...',
                content: '全体干部职工：\n\n为响应国家节能减排号召，建设节约型机关，现向全体干部职工发出如下倡议：\n\n一、节约用电\n二、节约用水\n三、节约用纸\n四、绿色出行...',
                rejectReason: '重复提交'
            },
            {
                id: 11,
                title: '青年文明号创建工作计划',
                cover: 'https://images.unsplash.com/photo-1521737712587-375e968ff563?w=120&h=80&fit=crop',
                category: '专题活动',
                status: 'pending',
                author: '陈静',
                submitTime: '2024-01-15 11:30',
                tags: ['专题', '青年'],
                summary: '为深入推进青年文明号创建工作，提升青年职工综合素质...',
                content: '一、指导思想\n二、创建目标\n三、创建措施\n1. 加强组织领导\n2. 强化教育培训\n3. 开展实践活动\n4. 营造良好氛围...\n\n四、具体安排...\n\n五、预期成效...\n\n六、保障措施...',
                rejectReason: ''
            },
            {
                id: 12,
                title: '年度考核工作实施方案',
                cover: 'https://images.unsplash.com/photo-1551288049-bebda4e38f71?w=120&h=80&fit=crop',
                category: '文件',
                status: 'pending',
                author: '李明',
                submitTime: '2024-01-15 08:00',
                tags: ['文件', '考核'],
                summary: '为做好2024年度工作考核，客观评价工作绩效...',
                content: '一、考核目的\n客观评价工作绩效，激励先进、督促后进\n\n二、考核原则\n1. 客观公正\n2. 实绩导向\n3. 注重实效\n\n三、考核内容\n1. 思想政治表现\n2. 业务工作能力\n3. 工作实绩\n4. 廉洁自律...\n\n四、考核时间安排...\n\n五、结果运用...',
                rejectReason: ''
            }
        ];

        // ========== 状态管理 ==========
        let currentTab = 'pending';
        let currentCategory = '';
        let currentPage = 1;
        let pageSize = 5;
        let selectedIds = new Set();
        let currentRejectId = null;

        // ========== 工具函数 ==========
        function openModal(id) {
            document.getElementById(id).classList.remove('hidden');
            document.getElementById(id).classList.add('flex');
        }
        function closeModal(id) {
            document.getElementById(id).classList.add('hidden');
            document.getElementById(id).classList.remove('flex');
        }
        function showToast(message, type = 'success') {
            const toast = document.getElementById('toast');
            document.getElementById('toastText').textContent = message;
            toast.className = 'fixed bottom-6 right-6 text-white px-6 py-3 rounded-xl shadow-lg hidden z-50';
            if (type === 'success') {
                toast.classList.add('bg-accent-green');
            } else if (type === 'error') {
                toast.classList.add('bg-accent-red');
            } else {
                toast.classList.add('bg-accent-amber');
            }
            toast.classList.remove('hidden');
            setTimeout(() => {
                toast.classList.add('hidden');
            }, 2000);
        }

        // ========== 统计数据 ==========
        function getStats() {
            return {
                pending: reviewData.filter(item => item.status === 'pending').length,
                reviewing: reviewData.filter(item => item.status === 'reviewing').length,
                approved: reviewData.filter(item => item.status === 'approved').length,
                rejected: reviewData.filter(item => item.status === 'rejected').length
            };
        }

        function updateStats() {
            const stats = getStats();
            document.getElementById('statPending').textContent = stats.pending;
            document.getElementById('statApproved').textContent = stats.approved;
            document.getElementById('statReviewing').textContent = stats.reviewing;
            document.getElementById('statRejected').textContent = stats.rejected;

            // 更新Tab数量
            const tabBtns = document.querySelectorAll('.tab-btn');
            tabBtns.forEach(btn => {
                const status = btn.dataset.status;
                btn.querySelector('.tab-count').textContent = stats[status] || 0;
            });

            // 更新侧边栏Badge
            const badge = document.getElementById('sidebarReviewBadge');
            badge.textContent = stats.pending;
        }

        // ========== 筛选数据 ==========
        function getFilteredData() {
            return reviewData.filter(item => {
                if (currentTab && item.status !== currentTab) return false;
                if (currentCategory && item.category !== currentCategory) return false;
                return true;
            });
        }

        // ========== 渲染列表 ==========
        function renderReviewList() {
            const list = document.getElementById('reviewList');
            const filtered = getFilteredData();
            const start = (currentPage - 1) * pageSize;
            const end = start + pageSize;
            const pageData = filtered.slice(start, end);

            if (pageData.length === 0) {
                list.innerHTML = `
                    <div class="bg-white rounded-xl border border-[#E2E8F0] p-12 text-center">
                        <i class="fas fa-inbox text-4xl text-gray-500 mb-4"></i>
                        <p class="text-gray-500">暂无待审核内容</p>
                    </div>
                `;
                return;
            }

            list.innerHTML = pageData.map(item => {
                const statusMap = {
                    pending: { text: '待审核', class: 'bg-accent-amber/20 text-accent-amber' },
                    reviewing: { text: '审核中', class: 'bg-accent-blue/20 text-accent-blue' },
                    approved: { text: '已通过', class: 'bg-accent-green/20 text-accent-green' },
                    rejected: { text: '已驳回', class: 'bg-accent-red/20 text-accent-red' }
                };
                const status = statusMap[item.status];
                const isChecked = selectedIds.has(item.id);
                const categoryColorMap = {
                    '通知公告': 'accent-blue',
                    '新闻资讯': 'accent-cyan',
                    '政策文件': 'accent-green',
                    '专题活动': 'accent-amber',
                    '文件': 'text-gray-600'
                };
                const catColor = categoryColorMap[item.category] || 'text-gray-600';

                return `
                <div class="bg-white rounded-xl border border-[#E2E8F0] p-5 review-item" data-id="${item.id}">
                    <div class="flex items-start gap-5">
                        <div class="flex items-center pt-1">
                            <input type="checkbox" class="review-checkbox w-5 h-5 rounded border-[#E2E8F0] bg-primary-bg accent-accent-blue cursor-pointer" ${isChecked ? 'checked' : ''}>
                        </div>
                        <img src="${item.cover}" class="w-32 h-20 rounded-lg object-cover">
                        <div class="flex-1">
                            <div class="flex items-center gap-3 mb-2">
                                <h3 class="text-lg font-medium">${item.title}</h3>
                                <span class="px-2 py-1 bg-${catColor}/20 text-${catColor} text-xs rounded">${item.category}</span>
                                <span class="px-2 py-1 ${status.class} text-xs rounded">${status.text}</span>
                            </div>
                            <p class="text-sm text-gray-600 mb-3 line-clamp-2">${item.summary}</p>
                            <div class="flex items-center gap-4 text-sm text-gray-500">
                                <span><i class="fas fa-user mr-1"></i>${item.author}</span>
                                <span><i class="fas fa-clock mr-1"></i>提交于 ${item.submitTime}</span>
                                <span><i class="fas fa-tag mr-1"></i>${item.tags.join(', ')}</span>
                            </div>
                            ${item.status === 'rejected' && item.rejectReason ? `
                            <div class="mt-2 text-sm text-accent-red">
                                <i class="fas fa-exclamation-circle mr-1"></i>驳回原因：${item.rejectReason}
                            </div>
                            ` : ''}
                        </div>
                        <div class="flex flex-col items-end gap-3">
                            ${item.status === 'pending' || item.status === 'reviewing' ? `
                            <div class="flex items-center gap-2">
                                <button onclick="approveItem(${item.id})" class="px-4 py-2 bg-accent-green text-white rounded-lg hover:bg-green-600 transition-colors">
                                    <i class="fas fa-check mr-1"></i>通过
                                </button>
                                <button onclick="openRejectModal(${item.id})" class="px-4 py-2 border border-accent-red text-accent-red rounded-lg hover:bg-accent-red/10 transition-colors">
                                    <i class="fas fa-times mr-1"></i>驳回
                                </button>
                            </div>
                            ` : ''}
                            <button onclick="previewItem(${item.id})" class="text-gray-600 hover:text-white text-sm">
                                <i class="fas fa-eye mr-1"></i>预览
                            </button>
                        </div>
                    </div>
                </div>
                `;
            }).join('');

            // 绑定复选框事件
            document.querySelectorAll('.review-checkbox').forEach(cb => {
                cb.addEventListener('change', (e) => {
                    const id = parseInt(e.target.closest('.review-item').dataset.id);
                    if (e.target.checked) {
                        selectedIds.add(id);
                    } else {
                        selectedIds.delete(id);
                    }
                    updateBatchButtons();
                });
            });
        }

        // ========== 渲染分页 ==========
        function renderPagination() {
            const pagination = document.getElementById('pagination');
            const filtered = getFilteredData();
            const totalPages = Math.ceil(filtered.length / pageSize);

            if (totalPages <= 1) {
                pagination.innerHTML = '';
                return;
            }

            let html = '';
            html += `<button onclick="goToPage(${currentPage - 1})" class="px-3 py-1 rounded border border-[#E2E8F0] text-gray-500 text-sm ${currentPage === 1 ? 'opacity-50 pointer-events-none' : ''}">
                <i class="fas fa-chevron-left"></i>
            </button>`;

            for (let i = 1; i <= totalPages; i++) {
                html += `<button onclick="goToPage(${i})" class="px-3 py-1 rounded text-sm ${i === currentPage ? 'bg-accent-blue text-white' : 'border border-[#E2E8F0] text-gray-500 hover:text-white'}">${i}</button>`;
            }

            html += `<button onclick="goToPage(${currentPage + 1})" class="px-3 py-1 rounded border border-[#E2E8F0] text-gray-500 text-sm ${currentPage === totalPages ? 'opacity-50 pointer-events-none' : ''}">
                <i class="fas fa-chevron-right"></i>
            </button>`;

            pagination.innerHTML = html;
        }

        function goToPage(page) {
            const filtered = getFilteredData();
            const totalPages = Math.ceil(filtered.length / pageSize);
            if (page < 1 || page > totalPages) return;
            currentPage = page;
            renderReviewList();
            renderPagination();
        }

        // ========== Tab切换 ==========
        function switchTab(status) {
            currentTab = status;
            currentPage = 1;
            selectedIds.clear();

            const tabBtns = document.querySelectorAll('.tab-btn');
            tabBtns.forEach(btn => {
                if (btn.dataset.status === status) {
                    btn.classList.add('bg-accent-blue', 'text-white');
                    btn.classList.remove('text-gray-600', 'hover:text-white');
                } else {
                    btn.classList.remove('bg-accent-blue', 'text-white');
                    btn.classList.add('text-gray-600', 'hover:text-white');
                }
            });

            renderReviewList();
            renderPagination();
        }

        // ========== 分类筛选 ==========
        function initCategoryFilter() {
            const filter = document.getElementById('categoryFilter');
            filter.addEventListener('change', (e) => {
                currentCategory = e.target.value;
                currentPage = 1;
                selectedIds.clear();
                renderReviewList();
                renderPagination();
            });
        }

        // ========== 批量操作 ==========
        function updateBatchButtons() {
            const count = selectedIds.size;
            const approveBtn = document.getElementById('batchApproveBtn');
            const rejectBtn = document.getElementById('batchRejectBtn');
            const approveCount = document.getElementById('batchApproveCount');
            const rejectCount = document.getElementById('batchRejectCount');

            approveCount.textContent = count;
            rejectCount.textContent = count;

            if (count > 0) {
                approveBtn.classList.remove('opacity-50', 'pointer-events-none');
                rejectBtn.classList.remove('opacity-50', 'pointer-events-none');
            } else {
                approveBtn.classList.add('opacity-50', 'pointer-events-none');
                rejectBtn.classList.add('opacity-50', 'pointer-events-none');
            }
        }

        document.getElementById('batchApproveBtn').addEventListener('click', () => {
            if (selectedIds.size === 0) return;
            selectedIds.forEach(id => {
                const item = reviewData.find(d => d.id === id);
                if (item && (item.status === 'pending' || item.status === 'reviewing')) {
                    item.status = 'approved';
                }
            });
            selectedIds.clear();
            updateStats();
            updateBatchButtons();
            renderReviewList();
            renderPagination();
            showToast('批量通过成功');
        });

        document.getElementById('batchRejectBtn').addEventListener('click', () => {
            if (selectedIds.size === 0) return;
            document.getElementById('batchRejectNum').textContent = selectedIds.size;
            document.getElementById('batchRejectNum2').textContent = selectedIds.size;
            openModal('batchRejectModal');
        });

        function confirmBatchReject() {
            const reason = document.getElementById('batchRejectReason').value;
            if (!reason) {
                showToast('请选择驳回原因', 'error');
                return;
            }

            selectedIds.forEach(id => {
                const item = reviewData.find(d => d.id === id);
                if (item) {
                    item.status = 'rejected';
                    item.rejectReason = reason;
                }
            });
            selectedIds.clear();
            closeModal('batchRejectModal');
            document.getElementById('batchRejectReason').value = '';
            document.getElementById('batchRejectDetail').value = '';
            updateStats();
            updateBatchButtons();
            renderReviewList();
            renderPagination();
            showToast('批量驳回成功');
        }

        // ========== 单个审核操作 ==========
        function approveItem(id) {
            const item = reviewData.find(d => d.id === id);
            if (item) {
                item.status = 'approved';
                updateStats();
                renderReviewList();
                renderPagination();
                showToast('已通过：' + item.title);
            }
        }

        function openRejectModal(id) {
            currentRejectId = id;
            const item = reviewData.find(d => d.id === id);
            if (item) {
                document.getElementById('rejectItemCover').src = item.cover;
                document.getElementById('rejectItemTitle').textContent = item.title;
                document.getElementById('rejectItemAuthor').textContent = item.author;
            }
            openModal('rejectModal');
        }

        function confirmReject() {
            const reason = document.getElementById('rejectReason').value;
            if (!reason) {
                showToast('请选择驳回原因', 'error');
                return;
            }

            const item = reviewData.find(d => d.id === currentRejectId);
            if (item) {
                item.status = 'rejected';
                item.rejectReason = reason + (document.getElementById('rejectDetail').value ? ' - ' + document.getElementById('rejectDetail').value : '');
                updateStats();
                renderReviewList();
                renderPagination();
                showToast('已驳回：' + item.title);
            }
            closeModal('rejectModal');
            document.getElementById('rejectReason').value = '';
            document.getElementById('rejectDetail').value = '';
            currentRejectId = null;
        }

        // ========== 预览 ==========
        function previewItem(id) {
            const item = reviewData.find(d => d.id === id);
            if (!item) return;

            document.getElementById('previewCover').src = item.cover;
            document.getElementById('previewTitle').textContent = item.title;
            document.getElementById('previewAuthor').textContent = item.author;
            document.getElementById('previewCategory').textContent = item.category;
            document.getElementById('previewTime').textContent = item.submitTime;
            document.getElementById('previewSummary').textContent = item.summary;
            document.getElementById('previewContent').textContent = item.content;

            const tagsHtml = item.tags.map(tag =>
                `<span class="px-2 py-1 bg-accent-blue/20 text-accent-blue text-xs rounded">${tag}</span>`
            ).join('');
            document.getElementById('previewTags').innerHTML = tagsHtml;

            openModal('previewModal');
        }

        // ========== Tab按钮事件 ==========
        document.querySelectorAll('.tab-btn').forEach(btn => {
            btn.addEventListener('click', () => {
                switchTab(btn.dataset.status);
            });
        });

        // ========== 初始化 ==========
        function init() {
            updateStats();
            renderReviewList();
            renderPagination();
            initCategoryFilter();
        }

        init();
    </script>
</body>
</html>
