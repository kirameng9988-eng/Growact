<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>首页装修 - 内容中台系统</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        'primary-bg': '#FFFFFF',
                        'card-bg': '#FFFFFF',
                        'border-dark': '#CBD5E1',
                        'accent-blue': '#0A61FF',
                        'accent-cyan': '#0891B2',
                        'accent-green': '#059669',
                        'accent-amber': '#D97706',
                        'accent-red': '#DC2626',
                        'text-primary': '#0F172A',
                        'text-secondary': '#475569',
                        'text-muted': '#94A3B8'
                    }
                }
            }
        }
    </script>
    <style>
        * { font-family: 'PingFang SC', 'Microsoft YaHei', sans-serif; }
        ::-webkit-scrollbar { width: 6px; height: 6px; }
        ::-webkit-scrollbar-track { background: #F1F5F9; }
        ::-webkit-scrollbar-thumb { background: #F8FAFC; border-radius: 3px; }
        .sidebar-menu-item:hover { background: rgba(10, 97, 255, 0.06); }
        .sidebar-menu-item.active { background: rgba(10, 97, 255, 0.1); border-left: 3px solid #0A61FF; }
        .component-item { transition: all 0.2s; cursor: grab; }
        .component-item:active { cursor: grabbing; }
        .component-item[draggable="true"]:active { opacity: 0.6; }
        .canvas-module { transition: all 0.2s; }
        .canvas-module:hover { border-color: rgba(59, 130, 246, 0.5); }
        .canvas-module.selected { border: 2px solid #3b82f6 !important; box-shadow: 0 0 20px rgba(59, 130, 246, 0.3); }
        .drop-zone-active { border: 2px dashed #3b82f6 !important; background: rgba(59, 130, 246, 0.05); }
        .dragging { opacity: 0.5; transform: scale(0.95); }
        .toast { animation: slideIn 0.3s ease; }
        @keyframes slideIn { from { transform: translateX(100%); opacity: 0; } to { transform: translateX(0); opacity: 1; } }
        .preview-iframe { transition: width 0.3s ease; }
        #dropArea { position: relative; }
        #dropArea.drag-over { background: rgba(59, 130, 246, 0.05); }
    </style>
</head>
<body class="bg-secondary-bg text-gray-900">

    <!-- 主内容区 -->
    <main class="ml-[220px] p-6">
        <!-- 页面标题栏 -->
        <div class="flex items-center justify-between mb-6">
            <div class="flex items-center gap-4">
                <div>
                    <h1 class="text-2xl font-semibold">首页装修</h1>
                    <p class="text-gray-500 mt-1">可视化编辑首页布局，拖拽组件快速搭建</p>
                </div>
                <select id="pageSelector" class="bg-card-bg border border-[#E2E8F0] rounded-xl px-4 py-2 text-sm focus:border-accent-blue focus:outline-none">
                    <option value="home">首页</option>
                    <option value="list">列表页</option>
                    <option value="detail">详情页</option>
                </select>
            </div>
            <div class="flex items-center gap-3">
                <button onclick="undo()" id="undoBtn" class="px-4 py-2 border border-[#E2E8F0] rounded-xl hover:border-accent-blue transition-colors disabled:opacity-50" disabled>
                    <i class="fas fa-undo mr-2"></i>撤销
                </button>
                <button onclick="redo()" id="redoBtn" class="px-4 py-2 border border-[#E2E8F0] rounded-xl hover:border-accent-blue transition-colors disabled:opacity-50" disabled>
                    <i class="fas fa-redo mr-2"></i>重做
                </button>
                <button onclick="openPreview()" class="px-4 py-2 bg-primary-bg border border-[#E2E8F0] rounded-xl hover:border-accent-blue transition-colors">
                    <i class="fas fa-eye mr-2"></i>预览
                </button>
                <label class="px-4 py-2 bg-primary-bg border border-[#E2E8F0] rounded-xl hover:border-accent-blue transition-colors cursor-pointer">
                    <i class="fas fa-upload mr-2"></i>导入
                    <input type="file" id="importFileInput" accept=".json" class="hidden" onchange="importConfig(this.files[0])">
                </label>
                <button onclick="exportConfig()" class="px-4 py-2 bg-primary-bg border border-[#E2E8F0] rounded-xl hover:border-accent-blue transition-colors">
                    <i class="fas fa-download mr-2"></i>导出
                </button>
                <button onclick="clearCanvas()" class="px-4 py-2 bg-primary-bg border border-accent-red/50 text-accent-red rounded-xl hover:bg-accent-red/10 transition-colors">
                    <i class="fas fa-trash-alt mr-2"></i>清空
                </button>
                <button onclick="savePage()" class="px-5 py-2 bg-accent-blue text-white rounded-xl hover:bg-blue-600 transition-colors">
                    <i class="fas fa-save mr-2"></i>保存
                </button>
            </div>
        </div>

        <div class="grid grid-cols-4 gap-6">
            <!-- 组件面板 -->
            <div class="col-span-1 bg-white rounded-xl border border-[#E2E8F0] p-4">
                <h3 class="text-lg font-medium mb-4">组件库</h3>
                <div class="relative mb-4">
                    <i class="fas fa-search absolute left-3 top-1/2 -translate-y-1/2 text-gray-500"></i>
                    <input type="text" id="componentSearch" placeholder="搜索组件..." oninput="filterComponents(this.value)" class="w-full bg-primary-bg border border-[#E2E8F0] rounded-lg pl-10 pr-4 py-2 text-sm focus:border-accent-blue focus:outline-none">
                </div>
                <div id="componentPanel" class="space-y-3">
                    <div class="component-item p-3 bg-primary-bg rounded-lg border border-[#E2E8F0] cursor-pointer hover:border-accent-blue transition-colors" draggable="true" data-type="banner">
                        <div class="flex items-center gap-3">
                            <div class="w-10 h-10 rounded bg-accent-blue/20 flex items-center justify-center">
                                <i class="fas fa-image text-accent-blue"></i>
                            </div>
                            <div>
                                <div class="font-medium text-sm">Banner轮播</div>
                                <div class="text-xs text-gray-500">顶部轮播大图</div>
                            </div>
                        </div>
                    </div>
                    <div class="component-item p-3 bg-primary-bg rounded-lg border border-[#E2E8F0] cursor-pointer hover:border-accent-blue transition-colors" draggable="true" data-type="carousel">
                        <div class="flex items-center gap-3">
                            <div class="w-10 h-10 rounded bg-accent-cyan/20 flex items-center justify-center">
                                <i class="fas fa-images text-accent-cyan"></i>
                            </div>
                            <div>
                                <div class="font-medium text-sm">图片 carousel</div>
                                <div class="text-xs text-gray-500">多图轮播展示</div>
                            </div>
                        </div>
                    </div>
                    <div class="component-item p-3 bg-primary-bg rounded-lg border border-[#E2E8F0] cursor-pointer hover:border-accent-blue transition-colors" draggable="true" data-type="news">
                        <div class="flex items-center gap-3">
                            <div class="w-10 h-10 rounded bg-accent-green/20 flex items-center justify-center">
                                <i class="fas fa-newspaper text-accent-green"></i>
                            </div>
                            <div>
                                <div class="font-medium text-sm">新闻列表</div>
                                <div class="text-xs text-gray-500">资讯文章列表</div>
                            </div>
                        </div>
                    </div>
                    <div class="component-item p-3 bg-primary-bg rounded-lg border border-[#E2E8F0] cursor-pointer hover:border-accent-blue transition-colors" draggable="true" data-type="card">
                        <div class="flex items-center gap-3">
                            <div class="w-10 h-10 rounded bg-accent-green/20 flex items-center justify-center">
                                <i class="fas fa-square text-accent-green"></i>
                            </div>
                            <div>
                                <div class="font-medium text-sm">卡片模块</div>
                                <div class="text-xs text-gray-500">精选内容卡片</div>
                            </div>
                        </div>
                    </div>
                    <div class="component-item p-3 bg-primary-bg rounded-lg border border-[#E2E8F0] cursor-pointer hover:border-accent-blue transition-colors" draggable="true" data-type="notice">
                        <div class="flex items-center gap-3">
                            <div class="w-10 h-10 rounded bg-accent-amber/20 flex items-center justify-center">
                                <i class="fas fa-bullhorn text-accent-amber"></i>
                            </div>
                            <div>
                                <div class="font-medium text-sm">公告模块</div>
                                <div class="text-xs text-gray-500">滚动公告条</div>
                            </div>
                        </div>
                    </div>
                    <div class="component-item p-3 bg-primary-bg rounded-lg border border-[#E2E8F0] cursor-pointer hover:border-accent-blue transition-colors" draggable="true" data-type="title">
                        <div class="flex items-center gap-3">
                            <div class="w-10 h-10 rounded bg-accent-blue/10 flex items-center justify-center">
                                <i class="fas fa-heading text-accent-blue"></i>
                            </div>
                            <div>
                                <div class="font-medium text-sm">标题组件</div>
                                <div class="text-xs text-gray-500">大标题/副标题</div>
                            </div>
                        </div>
                    </div>
                    <div class="component-item p-3 bg-primary-bg rounded-lg border border-[#E2E8F0] cursor-pointer hover:border-accent-blue transition-colors" draggable="true" data-type="tabs">
                        <div class="flex items-center gap-3">
                            <div class="w-10 h-10 rounded bg-pink-500/20 flex items-center justify-center">
                                <i class="fas fa-th-large text-pink-400"></i>
                            </div>
                            <div>
                                <div class="font-medium text-sm">Tab标签</div>
                                <div class="text-xs text-gray-500">标签页切换</div>
                            </div>
                        </div>
                    </div>
                    <div class="component-item p-3 bg-primary-bg rounded-lg border border-[#E2E8F0] cursor-pointer hover:border-accent-blue transition-colors" draggable="true" data-type="divider">
                        <div class="flex items-center gap-3">
                            <div class="w-10 h-10 rounded bg-gray-500/20 flex items-center justify-center">
                                <i class="fas fa-minus text-gray-500"></i>
                            </div>
                            <div>
                                <div class="font-medium text-sm">分隔线</div>
                                <div class="text-xs text-gray-500">页面分隔/留白</div>
                            </div>
                        </div>
                    </div>
                    <div class="component-item p-3 bg-primary-bg rounded-lg border border-[#E2E8F0] cursor-pointer hover:border-accent-blue transition-colors" draggable="true" data-type="footer">
                        <div class="flex items-center gap-3">
                            <div class="w-10 h-10 rounded bg-indigo-500/20 flex items-center justify-center">
                                <i class="fas fa-th text-indigo-400"></i>
                            </div>
                            <div>
                                <div class="font-medium text-sm">快捷入口</div>
                                <div class="text-xs text-gray-500">图标导航链接</div>
                            </div>
                        </div>
                    </div>
                    <div class="component-item p-3 bg-primary-bg rounded-lg border border-[#E2E8F0] cursor-pointer hover:border-accent-blue transition-colors" draggable="true" data-type="video">
                        <div class="flex items-center gap-3">
                            <div class="w-10 h-10 rounded bg-red-500/20 flex items-center justify-center">
                                <i class="fas fa-play text-red-400"></i>
                            </div>
                            <div>
                                <div class="font-medium text-sm">视频模块</div>
                                <div class="text-xs text-gray-500">视频内容播放</div>
                            </div>
                        </div>
                    </div>
                    <div class="component-item p-3 bg-primary-bg rounded-lg border border-[#E2E8F0] cursor-pointer hover:border-accent-blue transition-colors" draggable="true" data-type="topic">
                        <div class="flex items-center gap-3">
                            <div class="w-10 h-10 rounded bg-orange-500/20 flex items-center justify-center">
                                <i class="fas fa-layer-group text-orange-400"></i>
                            </div>
                            <div>
                                <div class="font-medium text-sm">专题模块</div>
                                <div class="text-xs text-gray-500">专题内容展示</div>
                            </div>
                        </div>
                    </div>
                </div>
            </div>

            <!-- 编辑画布 -->
            <div class="col-span-2">
                <div class="bg-white rounded-xl border border-[#E2E8F0] overflow-hidden">
                    <!-- 设备切换 -->
                    <div class="flex items-center justify-between px-4 py-3 border-b border-[#E2E8F0] bg-primary-bg/50">
                        <div class="flex items-center gap-2">
                            <button onclick="setDevice('pc')" id="devicePc" class="p-2 bg-accent-blue/20 text-accent-blue rounded-lg">
                                <i class="fas fa-desktop"></i>
                            </button>
                            <button onclick="setDevice('tablet')" id="deviceTablet" class="p-2 text-gray-500 hover:text-white rounded-lg">
                                <i class="fas fa-tablet-alt"></i>
                            </button>
                            <button onclick="setDevice('mobile')" id="deviceMobile" class="p-2 text-gray-500 hover:text-white rounded-lg">
                                <i class="fas fa-mobile-alt"></i>
                            </button>
                        </div>
                        <div class="flex items-center gap-4">
                            <span id="deviceLabel" class="text-sm text-gray-500">PC端 - 1920 x 1080</span>
                            <label class="flex items-center gap-2 cursor-pointer">
                                <input type="checkbox" id="gridShow" checked class="accent-accent-blue">
                                <span class="text-sm text-gray-500">网格</span>
                            </label>
                        </div>
                    </div>
                    <!-- 画布内容 -->
                    <div id="canvasWrapper" class="p-4 overflow-auto" style="background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);">
                        <div id="canvas" class="bg-card-bg rounded-lg p-4 mx-auto transition-all duration-300" style="width: 1200px;">
                            <!-- 导航栏 -->
                            <div class="flex items-center justify-between mb-4 pb-4 border-b border-[#E2E8F0]">
                                <div class="flex items-center gap-6">
                                    <div class="w-32 h-8 bg-primary-bg rounded flex items-center justify-center">
                                        <span class="text-sm font-medium">Logo</span>
                                    </div>
                                    <div class="flex items-center gap-4 text-sm">
                                        <a href="#" class="text-white hover:text-accent-blue">首页</a>
                                        <a href="#" class="text-gray-600 hover:text-accent-blue">新闻</a>
                                        <a href="#" class="text-gray-600 hover:text-accent-blue">政策</a>
                                        <a href="#" class="text-gray-600 hover:text-accent-blue">专题</a>
                                        <a href="#" class="text-gray-600 hover:text-accent-blue">关于</a>
                                    </div>
                                </div>
                                <div class="flex items-center gap-3">
                                    <i class="fas fa-search text-gray-500 cursor-pointer"></i>
                                    <i class="fas fa-user text-gray-500 cursor-pointer"></i>
                                </div>
                            </div>
                            <!-- 拖放区域 -->
                            <div id="dropArea" class="min-h-[400px]" ondrop="handleDrop(event)" ondragover="handleDragOver(event)" ondragleave="handleDragLeave(event)">
                                <div id="emptyTip" class="h-[400px] flex flex-col items-center justify-center text-gray-500">
                                    <i class="fas fa-plus text-4xl mb-4 opacity-50"></i>
                                    <p>从左侧拖拽组件到这里</p>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            </div>

            <!-- 属性面板 -->
            <div class="col-span-1 bg-white rounded-xl border border-[#E2E8F0] p-4">
                <h3 class="text-lg font-medium mb-4">属性配置</h3>
                <div id="propertyPanel">
                    <div id="noSelection" class="text-center py-12 text-gray-500">
                        <i class="fas fa-mouse-pointer text-4xl mb-4 opacity-30"></i>
                        <p>选择组件以编辑属性</p>
                    </div>
                    <div id="propertyContent" class="hidden space-y-4">
                        <div>
                            <label class="block text-sm text-gray-600 mb-2">模块名称</label>
                            <input type="text" id="propName" class="w-full bg-primary-bg border border-[#E2E8F0] rounded-lg px-4 py-2.5 text-sm focus:border-accent-blue focus:outline-none">
                        </div>
                        <div id="propInterval" class="hidden">
                            <label class="block text-sm text-gray-600 mb-2">轮播间隔</label>
                            <div class="flex items-center gap-2">
                                <input type="number" id="propIntervalValue" value="3" min="1" max="10" class="w-full bg-primary-bg border border-[#E2E8F0] rounded-lg px-4 py-2.5 text-sm focus:border-accent-blue focus:outline-none">
                                <span class="text-sm text-gray-500">秒</span>
                            </div>
                        </div>
                        <div id="propAutoPlay" class="hidden">
                            <label class="block text-sm text-gray-600 mb-2">自动播放</label>
                            <div class="flex gap-4">
                                <label class="flex items-center gap-2 cursor-pointer">
                                    <input type="radio" name="propAutoPlay" value="true" checked class="accent-accent-blue">
                                    <span class="text-sm">是</span>
                                </label>
                                <label class="flex items-center gap-2 cursor-pointer">
                                    <input type="radio" name="propAutoPlay" value="false" class="accent-accent-blue">
                                    <span class="text-sm">否</span>
                                </label>
                            </div>
                        </div>
                        <div id="propIndicator" class="hidden">
                            <label class="block text-sm text-gray-600 mb-2">显示指示器</label>
                            <div class="flex gap-4">
                                <label class="flex items-center gap-2 cursor-pointer">
                                    <input type="radio" name="propIndicator" value="true" checked class="accent-accent-blue">
                                    <span class="text-sm">是</span>
                                </label>
                                <label class="flex items-center gap-2 cursor-pointer">
                                    <input type="radio" name="propIndicator" value="false" class="accent-accent-blue">
                                    <span class="text-sm">否</span>
                                </label>
                            </div>
                        </div>
                        <div id="propHeight" class="hidden">
                            <label class="block text-sm text-gray-600 mb-2">高度</label>
                            <input type="number" id="propHeightValue" value="400" min="100" max="800" class="w-full bg-primary-bg border border-[#E2E8F0] rounded-lg px-4 py-2.5 text-sm focus:border-accent-blue focus:outline-none">
                        </div>
                        <div id="propBgColor" class="hidden">
                            <label class="block text-sm text-gray-600 mb-2">背景颜色</label>
                            <div class="flex items-center gap-2">
                                <input type="color" id="propBgColorValue" value="#0a1628" class="w-10 h-10 rounded border border-[#E2E8F0] cursor-pointer">
                                <input type="text" id="propBgColorText" value="#0a1628" class="flex-1 bg-primary-bg border border-[#E2E8F0] rounded-lg px-4 py-2.5 text-sm focus:border-accent-blue focus:outline-none">
                            </div>
                        </div>
                        <div id="propPadding" class="hidden">
                            <label class="block text-sm text-gray-600 mb-2">内边距</label>
                            <input type="number" id="propPaddingValue" value="16" min="0" max="48" class="w-full bg-primary-bg border border-[#E2E8F0] rounded-lg px-4 py-2.5 text-sm focus:border-accent-blue focus:outline-none">
                        </div>
                        <div id="propContentType" class="hidden">
                            <label class="block text-sm text-gray-600 mb-2">关联内容</label>
                            <select id="propContentTypeValue" class="w-full bg-primary-bg border border-[#E2E8F0] rounded-lg px-4 py-2.5 text-sm focus:border-accent-blue focus:outline-none">
                                <option value="">自动选择</option>
                                <option>新闻资讯</option>
                                <option>政策文件</option>
                                <option>通知公告</option>
                                <option>专题活动</option>
                            </select>
                        </div>
                        <div id="propCount" class="hidden">
                            <label class="block text-sm text-gray-600 mb-2">显示数量</label>
                            <input type="number" id="propCountValue" value="6" min="1" max="20" class="w-full bg-primary-bg border border-[#E2E8F0] rounded-lg px-4 py-2.5 text-sm focus:border-accent-blue focus:outline-none">
                        </div>
                        <div id="propTitle" class="hidden">
                            <label class="block text-sm text-gray-600 mb-2">标题文字</label>
                            <input type="text" id="propTitleValue" placeholder="请输入标题" class="w-full bg-primary-bg border border-[#E2E8F0] rounded-lg px-4 py-2.5 text-sm focus:border-accent-blue focus:outline-none">
                        </div>
                        <div id="propSubtitle" class="hidden">
                            <label class="block text-sm text-gray-600 mb-2">副标题</label>
                            <input type="text" id="propSubtitleValue" placeholder="请输入副标题" class="w-full bg-primary-bg border border-[#E2E8F0] rounded-lg px-4 py-2.5 text-sm focus:border-accent-blue focus:outline-none">
                        </div>
                        <div id="propText" class="hidden">
                            <label class="block text-sm text-gray-600 mb-2">公告内容</label>
                            <textarea id="propTextValue" rows="3" placeholder="请输入公告内容" class="w-full bg-primary-bg border border-[#E2E8F0] rounded-lg px-4 py-3 text-sm focus:border-accent-blue focus:outline-none resize-none"></textarea>
                        </div>
                        <div id="propTopic" class="hidden">
                            <label class="block text-sm text-gray-600 mb-2">关联专题</label>
                            <select id="propTopicValue" class="w-full bg-primary-bg border border-[#E2E8F0] rounded-lg px-4 py-2.5 text-sm focus:border-accent-blue focus:outline-none">
                                <option value="">自动选择</option>
                            </select>
                        </div>
                        <div id="propDisplayMode" class="hidden">
                            <label class="block text-sm text-gray-600 mb-2">显示模式</label>
                            <select id="propDisplayModeValue" class="w-full bg-primary-bg border border-[#E2E8F0] rounded-lg px-4 py-2.5 text-sm focus:border-accent-blue focus:outline-none">
                                <option value="grid">网格模式</option>
                                <option value="carousel">轮播模式</option>
                                <option value="list">列表模式</option>
                            </select>
                        </div>
                        <!-- 操作按钮 -->
                        <div class="pt-4 border-t border-[#E2E8F0] flex gap-2">
                            <button onclick="copySelected()" class="flex-1 py-2 text-sm text-accent-blue hover:bg-accent-blue/10 rounded-lg transition-colors">
                                <i class="fas fa-copy mr-1"></i>复制
                            </button>
                            <button onclick="moveUpSelected()" class="flex-1 py-2 text-sm text-gray-600 hover:text-accent-blue rounded-lg transition-colors">
                                <i class="fas fa-arrow-up mr-1"></i>上移
                            </button>
                            <button onclick="moveDownSelected()" class="flex-1 py-2 text-sm text-gray-600 hover:text-accent-blue rounded-lg transition-colors">
                                <i class="fas fa-arrow-down mr-1"></i>下移
                            </button>

        // 渲染模块列表
        function renderModules() {
            const dropArea = document.getElementById('dropArea');

            if (modules.length === 0) {
                dropArea.innerHTML = `
                    <div id="emptyTip" class="h-[400px] flex flex-col items-center justify-center text-gray-500">
                        <i class="fas fa-plus text-4xl mb-4 opacity-50"></i>
                        <p>从左侧拖拽组件到这里</p>
                    </div>
                `;
                return;
            }

            dropArea.innerHTML = modules.map((mod, index) => `
                <div class="canvas-module mb-4 p-4 border-2 border-dashed border-accent-blue/50 rounded-lg ${selectedModuleId === mod.id ? 'selected' : ''} ${mod.locked ? 'opacity-60 cursor-not-allowed' : ''}" data-id="${mod.id}" draggable="${!mod.locked}" ondragstart="${mod.locked ? '' : `handleCanvasDragStart(event, '${mod.id}')`}" ondragover="${mod.locked ? '' : `handleCanvasDragOver(event, '${mod.id}')`}" ondrop="${mod.locked ? '' : `handleCanvasDrop(event, '${mod.id}')`}" ondragend="handleCanvasDragEnd(event)" onclick="${mod.locked ? '' : `selectModule('${mod.id}', event)`}">
                    <div class="absolute top-2 right-2 flex items-center gap-1">
                        <button class="p-1.5 bg-primary-bg rounded hover:bg-border-dark text-gray-500 hover:text-white text-xs" onclick="event.stopPropagation(); moveUp('${mod.id}')" title="上移" ${mod.locked ? 'disabled' : ''}>
                            <i class="fas fa-arrow-up"></i>
                        </button>
                        <button class="p-1.5 bg-primary-bg rounded hover:bg-border-dark text-gray-500 hover:text-white text-xs" onclick="event.stopPropagation(); moveDown('${mod.id}')" title="下移" ${mod.locked ? 'disabled' : ''}>
                            <i class="fas fa-arrow-down"></i>
                        </button>
                        <button class="p-1.5 bg-primary-bg rounded hover:bg-border-dark text-gray-500 hover:text-white text-xs" onclick="event.stopPropagation(); duplicateModule('${mod.id}')" title="复制" ${mod.locked ? 'disabled' : ''}>
                            <i class="fas fa-copy"></i>
                        </button>
                        <button class="p-1.5 bg-primary-bg rounded hover:bg-border-dark text-gray-500 hover:text-white text-xs" onclick="event.stopPropagation(); copyToClipboard('${mod.id}')" title="复制到剪贴板" ${mod.locked ? 'disabled' : ''}>
                            <i class="fas fa-clipboard"></i>
                        </button>
                        <button class="p-1.5 bg-primary-bg rounded hover:bg-accent-amber/50 text-gray-500 hover:text-accent-amber text-xs" onclick="event.stopPropagation(); toggleLock('${mod.id}')" title="${mod.locked ? '解锁' : '锁定'}">
                            <i class="fas fa-${mod.locked ? 'lock' : 'unlock'}"></i>
                        </button>
                        <button class="p-1.5 bg-primary-bg rounded hover:bg-accent-red/50 text-gray-500 hover:text-accent-red text-xs" onclick="event.stopPropagation(); openDeleteModal('${mod.id}')" title="删除" ${mod.locked ? 'disabled' : ''}>
                            <i class="fas fa-trash"></i>
                        </button>
                    </div>
                    ${renderModulePreview(mod)}
                </div>
            `).join('');
        }

        function renderModulePreview(mod) {
            switch(mod.type) {
                case 'banner':
                    return `
                        <div class="text-xs text-accent-blue mb-2"><i class="fas fa-image mr-1"></i>${mod.name}</div>
                        <div class="flex gap-2 overflow-hidden rounded">
                            ${mod.images.map(img => `<img src="${img}" class="h-32 object-cover rounded">`).join('')}
                        </div>
                    `;
                case 'carousel':
                    return `
                        <div class="text-xs text-accent-cyan mb-2"><i class="fas fa-images mr-1"></i>${mod.name}</div>
                        <div class="flex gap-2 overflow-hidden rounded">
                            ${mod.images.map(img => `<img src="${img}" class="h-24 object-cover rounded">`).join('')}
                        </div>
                    `;
                case 'news':
                    return `
                        <div class="text-xs text-accent-green mb-2"><i class="fas fa-newspaper mr-1"></i>${mod.name}</div>
                        <div class="grid grid-cols-3 gap-3">
                            ${[1,2,3].map(() => `
                                <div class="bg-primary-bg rounded p-2">
                                    <div class="h-16 bg-border-dark rounded mb-2"></div>
                                    <div class="h-3 bg-border-dark rounded w-3/4 mb-1"></div>
                                    <div class="h-2 bg-border-dark rounded w-1/2"></div>
                                </div>
                            `).join('')}
                        </div>
                    `;
                case 'card':
                    return `
                        <div class="text-xs text-accent-green mb-2"><i class="fas fa-square mr-1"></i>${mod.name}</div>
                        <div class="grid grid-cols-4 gap-3">
                            ${[1,2,3,4].map(() => `
                                <div class="bg-primary-bg rounded p-2">
                                    <div class="h-20 bg-border-dark rounded mb-2"></div>
                                    <div class="h-3 bg-border-dark rounded w-3/4"></div>
                                </div>
                            `).join('')}
                        </div>
                    `;
                case 'notice':
                    return `
                        <div class="text-xs text-accent-amber mb-2"><i class="fas fa-bullhorn mr-1"></i>${mod.name}</div>
                        <div class="bg-primary-bg rounded p-3 flex items-center gap-3">
                            <i class="fas fa-bullhorn text-accent-amber"></i>
                            <span class="text-sm truncate">${mod.text}</span>
                        </div>
                    `;
                case 'title':
                    return `
                        <div class="text-xs text-accent-blue mb-2"><i class="fas fa-heading mr-1"></i>${mod.name}</div>
                        <div class="text-center py-4">
                            <div class="text-xl font-bold">${mod.title}</div>
                            <div class="text-sm text-gray-500 mt-1">${mod.subtitle}</div>
                        </div>
                    `;
                case 'tabs':
                    return `
                        <div class="text-xs text-pink-400 mb-2"><i class="fas fa-th-large mr-1"></i>${mod.name}</div>
                        <div class="flex gap-2 mb-2">
                            ${mod.titles.map(t => `<span class="px-3 py-1 bg-primary-bg rounded text-xs">${t}</span>`).join('')}
                        </div>
                        <div class="bg-primary-bg rounded p-4 h-16"></div>
                    `;
                case 'divider':
                    return `
                        <div class="text-xs text-gray-500 mb-2"><i class="fas fa-minus mr-1"></i>${mod.name}</div>
                        <div class="border-t border-dashed border-[#E2E8F0] my-2"></div>
                    `;
                case 'footer':
                    return `
                        <div class="text-xs text-indigo-400 mb-2"><i class="fas fa-th mr-1"></i>${mod.name}</div>
                        <div class="flex justify-center gap-4">
                            ${mod.links.map(link => `<span class="px-3 py-1 bg-primary-bg rounded text-xs">${link}</span>`).join('')}
                        </div>
                    `;
                case 'video':
                    return `
                        <div class="text-xs text-red-400 mb-2"><i class="fas fa-play mr-1"></i>${mod.name}</div>
                        <div class="bg-primary-bg rounded aspect-video flex items-center justify-center">
                            <i class="fas fa-play-circle text-4xl text-gray-500"></i>
                        </div>
                    `;
                case 'topic':
                    return `
                        <div class="text-xs text-orange-400 mb-2"><i class="fas fa-layer-group mr-1"></i>${mod.name}</div>
                        <div class="bg-primary-bg rounded p-3">
                            <div class="flex items-center justify-between mb-2">
                                <span class="font-medium text-sm">${mod.title || '专题活动'}</span>
                                <span class="text-xs text-gray-500">${mod.displayMode === 'carousel' ? '轮播' : mod.displayMode === 'list' ? '列表' : '网格'}模式</span>
                            </div>
                            ${mod.topicId ? `<div class="text-xs text-gray-500 mb-2">关联专题: ${getTopicName(mod.topicId)}</div>` : '<div class="text-xs text-orange-400 mb-2">请在属性面板选择专题</div>'}
                            <div class="grid grid-cols-${Math.min(mod.count || 4, 4)} gap-2">
                                ${[...Array(Math.min(mod.count || 4, 4))].map(() => `
                                    <div class="bg-border-dark rounded p-2">
                                        <div class="h-12 bg-primary-bg rounded mb-1"></div>
                                        <div class="h-2 bg-primary-bg rounded w-3/4"></div>
                                    </div>
                                `).join('')}
                            </div>
                        </div>
                    `;
                default:
                    return `<div class="text-xs text-gray-500">${mod.name}</div>`;
            }
        }

        // 选择模块
        function selectModule(id, event) {
            event.stopPropagation();
            selectedModuleId = id;
            const mod = modules.find(m => m.id === id);
            if (!mod) return;

            renderModules();
            showPropertyPanel(mod);
        }

        // 显示属性面板
        function showPropertyPanel(mod) {
            document.getElementById('noSelection').classList.add('hidden');
            document.getElementById('propertyContent').classList.remove('hidden');

            document.getElementById('propName').value = mod.name;
            document.getElementById('propName').oninput = (e) => {
                mod.name = e.target.value;
                renderModules();
            };

            // 显示/隐藏属性字段
            document.getElementById('propInterval').classList.toggle('hidden', !['banner'].includes(mod.type));
            document.getElementById('propAutoPlay').classList.toggle('hidden', !['banner', 'carousel'].includes(mod.type));
            document.getElementById('propIndicator').classList.toggle('hidden', !['banner'].includes(mod.type));
            document.getElementById('propHeight').classList.toggle('hidden', !['banner', 'carousel', 'video'].includes(mod.type));
            document.getElementById('propBgColor').classList.toggle('hidden', mod.type === 'divider');
            document.getElementById('propPadding').classList.toggle('hidden', mod.type === 'divider');
            document.getElementById('propContentType').classList.toggle('hidden', !['news', 'card', 'tabs'].includes(mod.type));
            document.getElementById('propCount').classList.toggle('hidden', !['news', 'card'].includes(mod.type));
            document.getElementById('propTitle').classList.toggle('hidden', !['title', 'card', 'video'].includes(mod.type));
            document.getElementById('propSubtitle').classList.toggle('hidden', !['title'].includes(mod.type));
            document.getElementById('propText').classList.toggle('hidden', !['notice'].includes(mod.type));
            document.getElementById('propTopic').classList.toggle('hidden', !['topic'].includes(mod.type));
            document.getElementById('propDisplayMode').classList.toggle('hidden', !['topic'].includes(mod.type));
            if (mod.type === 'topic') {
                populateTopicSelect();
            }

            // 绑定属性值
            if (mod.interval !== undefined) {
                document.getElementById('propIntervalValue').value = mod.interval;
                document.getElementById('propIntervalValue').oninput = (e) => {
                    mod.interval = parseInt(e.target.value);
                    renderModules();
                };
            }
            if (mod.height !== undefined) {
                document.getElementById('propHeightValue').value = mod.height;
                document.getElementById('propHeightValue').oninput = (e) => {
                    mod.height = parseInt(e.target.value);
                    renderModules();
                };
            }
            if (mod.title !== undefined) {
                document.getElementById('propTitleValue').value = mod.title;
                document.getElementById('propTitleValue').oninput = (e) => {
                    mod.title = e.target.value;
                    renderModules();
                };
            }
            if (mod.subtitle !== undefined) {
                document.getElementById('propSubtitleValue').value = mod.subtitle;
                document.getElementById('propSubtitleValue').oninput = (e) => {
                    mod.subtitle = e.target.value;
                    renderModules();
                };
            }
            if (mod.text !== undefined) {
                document.getElementById('propTextValue').value = mod.text;
                document.getElementById('propTextValue').oninput = (e) => {
                    mod.text = e.target.value;
                    renderModules();
                };
            }
            if (mod.bgColor !== undefined) {
                document.getElementById('propBgColorValue').value = mod.bgColor;
                document.getElementById('propBgColorText').value = mod.bgColor;
                document.getElementById('propBgColorValue').oninput = (e) => {
                    mod.bgColor = e.target.value;
                    document.getElementById('propBgColorText').value = e.target.value;
                    renderModules();
                };
                document.getElementById('propBgColorText').oninput = (e) => {
                    mod.bgColor = e.target.value;
                    document.getElementById('propBgColorValue').value = e.target.value;
                    renderModules();
                };
            }
            if (mod.padding !== undefined) {
                document.getElementById('propPaddingValue').value = mod.padding;
                document.getElementById('propPaddingValue').oninput = (e) => {
                    mod.padding = parseInt(e.target.value);
                    renderModules();
                };
            }
            if (mod.count !== undefined) {
                document.getElementById('propCountValue').value = mod.count;
                document.getElementById('propCountValue').oninput = (e) => {
                    mod.count = parseInt(e.target.value);
                    renderModules();
                };
            }
            if (mod.topicId !== undefined) {
                const topicSelect = document.getElementById('propTopicValue');
                topicSelect.value = mod.topicId;
                topicSelect.onchange = (e) => {
                    mod.topicId = e.target.value;
                    renderModules();
                };
            }
            if (mod.displayMode !== undefined) {
                document.getElementById('propDisplayModeValue').value = mod.displayMode;
                document.getElementById('propDisplayModeValue').onchange = (e) => {
                    mod.displayMode = e.target.value;
                    renderModules();
                };
            }
        }

        // 专题数据管理
        function loadTopicsFromStorage() {
            try {
                const data = localStorage.getItem('topics_data');
                return data ? JSON.parse(data) : [];
            } catch {
                return [];
            }
        }

        function getTopicName(topicId) {
            const topics = loadTopicsFromStorage();
            const topic = topics.find(t => t.id === topicId);
            return topic ? topic.name : '未找到专题';
        }

        function populateTopicSelect() {
            const select = document.getElementById('propTopicValue');
            if (!select) return;
            const topics = loadTopicsFromStorage();
            const currentValue = select.value;
            select.innerHTML = '<option value="">自动选择</option>' +
                topics.map(t => `<option value="${t.id}">${t.name} (${StatusMap[t.status] || t.status})</option>`).join('');
            select.value = currentValue;
        }

        // 拖拽处理
        function handleDragOver(e) {
            e.preventDefault();
            e.dataTransfer.dropEffect = 'copy';
            e.currentTarget.classList.add('drop-zone-active');
        }

        function handleDragLeave(e) {
            e.currentTarget.classList.remove('drop-zone-active');
        }

        function handleDrop(e) {
            e.preventDefault();
            e.stopPropagation();
            e.currentTarget.classList.remove('drop-zone-active');
            const type = e.dataTransfer.getData('type') || e.dataTransfer.getData('text/plain');
            if (type && componentTemplates[type]) {
                addModule(type);
            }
        }

        // 双击组件添加到画布
        document.addEventListener('dblclick', function(e) {
            const item = e.target.closest('.component-item');
            if (item && item.dataset.type) {
                addModule(item.dataset.type);
            }
        });

        // 添加模块
        function addModule(type) {
            const template = componentTemplates[type];
            if (!template) return;

            const newModule = {
                ...template,
                id: 'mod_' + Date.now()
            };
            modules.push(newModule);

            saveHistory();
            renderModules();
            selectModule(newModule.id, { stopPropagation: () => {} });
            showToast('组件已添加', 'success');
        }

        // 复制模块
        function copySelected() {
            if (!selectedModuleId) return;
            duplicateModule(selectedModuleId);
        }

        function duplicateModule(id) {
            const mod = modules.find(m => m.id === id);
            if (!mod) return;

            const newModule = JSON.parse(JSON.stringify(mod));
            newModule.id = 'mod_' + Date.now();
            newModule.name = mod.name + ' (副本)';

            const index = modules.findIndex(m => m.id === id);
            modules.splice(index + 1, 0, newModule);

            saveHistory();
            renderModules();
            selectModule(newModule.id, { stopPropagation: () => {} });
            showToast('组件已复制', 'success');
        }

        // 移动模块
        function moveUpSelected() {
            if (!selectedModuleId) return;
            moveUp(selectedModuleId);
        }

        function moveDownSelected() {
            if (!selectedModuleId) return;
            moveDown(selectedModuleId);
        }

        function moveUp(id) {
            const index = modules.findIndex(m => m.id === id);
            if (index > 0) {
                [modules[index - 1], modules[index]] = [modules[index], modules[index - 1]];
                saveHistory();
                renderModules();
                selectModule(id, { stopPropagation: () => {} });
            }
        }

        function moveDown(id) {
            const index = modules.findIndex(m => m.id === id);
            if (index < modules.length - 1) {
                [modules[index], modules[index + 1]] = [modules[index + 1], modules[index]];
                saveHistory();
                renderModules();
                selectModule(id, { stopPropagation: () => {} });
            }
        }

        // 锁定/解锁模块
        function toggleLock(id) {
            const mod = modules.find(m => m.id === id);
            if (mod) {
                mod.locked = !mod.locked;
                if (mod.locked && selectedModuleId === id) {
                    selectedModuleId = null;
                    document.getElementById('noSelection')?.classList.remove('hidden');
                    document.getElementById('propertyContent')?.classList.add('hidden');
                }
                saveHistory();
                renderModules();
                showToast(mod.locked ? '组件已锁定' : '组件已解锁', 'success');
            }
        }

        // 删除模块
        function deleteSelected() {
            if (!selectedModuleId) return;
            openDeleteModal(selectedModuleId);
        }

        function openDeleteModal(id) {
            window.deleteTargetId = id;
            document.getElementById('deleteModal').classList.remove('hidden');
            document.getElementById('deleteModal').classList.add('flex');
        }

        function closeDeleteModal() {
            document.getElementById('deleteModal').classList.add('hidden');
            document.getElementById('deleteModal').classList.remove('flex');
            window.deleteTargetId = null;
        }

        function confirmDelete() {
            if (window.deleteTargetId) {
                modules = modules.filter(m => m.id !== window.deleteTargetId);
                if (selectedModuleId === window.deleteTargetId) {
                    selectedModuleId = null;
                    document.getElementById('noSelection').classList.remove('hidden');
                    document.getElementById('propertyContent').classList.add('hidden');
                }
                saveHistory();
                renderModules();
                showToast('组件已删除', 'success');
            }
            closeDeleteModal();
        }

        // 点击画布空白取消选择
        document.getElementById('dropArea').addEventListener('click', (e) => {
            if (e.target.id === 'dropArea' || e.target.id === 'emptyTip') {
                selectedModuleId = null;
                document.getElementById('noSelection').classList.remove('hidden');
                document.getElementById('propertyContent').classList.add('hidden');
                renderModules();
            }
        });

        // 历史管理
        function saveHistory() {
            history = history.slice(0, historyIndex + 1);
            history.push(JSON.stringify(modules));
            historyIndex++;
            updateHistoryButtons();
        }

        function undo() {
            if (historyIndex > 0) {
                historyIndex--;
                modules = JSON.parse(history[historyIndex]);
                selectedModuleId = null;
                document.getElementById('noSelection').classList.remove('hidden');
                document.getElementById('propertyContent').classList.add('hidden');
                renderModules();
                updateHistoryButtons();
                showToast('已撤销', 'success');
            }
        }

        function redo() {
            if (historyIndex < history.length - 1) {
                historyIndex++;
                modules = JSON.parse(history[historyIndex]);
                renderModules();
                updateHistoryButtons();
                showToast('已重做', 'success');
            }
        }

        function updateHistoryButtons() {
            document.getElementById('undoBtn').disabled = historyIndex <= 0;
            document.getElementById('redoBtn').disabled = historyIndex >= history.length - 1;
        }

        // 设备切换
        function setDevice(device) {
            currentDevice = device;
            const size = deviceSizes[device];
            const canvas = document.getElementById('canvas');
            canvas.style.width = size.width + 'px';

            document.getElementById('deviceLabel').textContent = size.label;
            document.getElementById('devicePc').className = device === 'pc' ? 'p-2 bg-accent-blue/20 text-accent-blue rounded-lg' : 'p-2 text-gray-500 hover:text-white rounded-lg';
            document.getElementById('deviceTablet').className = device === 'tablet' ? 'p-2 bg-accent-blue/20 text-accent-blue rounded-lg' : 'p-2 text-gray-500 hover:text-white rounded-lg';
            document.getElementById('deviceMobile').className = device === 'mobile' ? 'p-2 bg-accent-blue/20 text-accent-blue rounded-lg' : 'p-2 text-gray-500 hover:text-white rounded-lg';
        }

        // 预览
        function openPreview() {
            const modal = document.getElementById('previewModal');
            modal.classList.remove('hidden');
            modal.classList.add('flex');
            setPreviewDevice('pc');
        }

        function closePreview() {
            document.getElementById('previewModal').classList.add('hidden');
            document.getElementById('previewModal').classList.remove('flex');
        }

        function setPreviewDevice(device) {
            const size = deviceSizes[device];
            const frame = document.getElementById('previewFrame');
            frame.style.width = size.width + 'px';
            frame.style.height = device === 'mobile' ? '80vh' : '90vh';

            document.getElementById('previewDevicePc').className = device === 'pc' ? 'px-3 py-1.5 bg-accent-blue text-white rounded text-sm' : 'px-3 py-1.5 text-gray-500 hover:text-white rounded text-sm';
            document.getElementById('previewDeviceTablet').className = device === 'tablet' ? 'px-3 py-1.5 bg-accent-blue text-white rounded text-sm' : 'px-3 py-1.5 text-gray-500 hover:text-white rounded text-sm';
            document.getElementById('previewDeviceMobile').className = device === 'mobile' ? 'px-3 py-1.5 bg-accent-blue text-white rounded text-sm' : 'px-3 py-1.5 text-gray-500 hover:text-white rounded text-sm';
        }

        // 保存
        function savePage() {
            saveHistory();
            showToast('页面已保存', 'success');
        }

        // Toast提示
        function showToast(message, type = 'success') {
            const container = document.getElementById('toastContainer');
            const toast = document.createElement('div');
            const bgColor = type === 'success' ? 'bg-accent-green' : 'bg-accent-red';
            toast.className = `toast ${bgColor} text-white px-6 py-3 rounded-xl shadow-lg flex items-center gap-2`;
            toast.innerHTML = `<i class="fas fa-${type === 'success' ? 'check-circle' : 'times-circle'}"></i><span>${message}</span>`;
            container.appendChild(toast);
            setTimeout(() => toast.remove(), 3000);
        }

        // 初始化 - 加载样例数据
        saveHistory();
        renderModules();

        // 初始化拖拽
        document.querySelectorAll('.component-item').forEach(item => {
            item.addEventListener('dragstart', (e) => {
                const type = item.dataset.type;
                e.dataTransfer.setData('type', type);
                e.dataTransfer.setData('text/plain', type);
                e.dataTransfer.effectAllowed = 'copy';
            });
        });

        // 搜索过滤组件
        function filterComponents(keyword) {
            const items = document.querySelectorAll('.component-item');
            const kw = keyword.toLowerCase().trim();
            items.forEach(item => {
                const name = item.querySelector('.font-medium')?.textContent?.toLowerCase() || '';
                const desc = item.querySelector('.text-xs')?.textContent?.toLowerCase() || '';
                const type = item.dataset.type?.toLowerCase() || '';
                if (!kw || name.includes(kw) || desc.includes(kw) || type.includes(kw)) {
                    item.style.display = '';
                } else {
                    item.style.display = 'none';
                }
            });
        }

        // 导入配置
        function importConfig(file) {
            if (!file) return;
            const reader = new FileReader();
            reader.onload = function(e) {
                try {
                    const config = JSON.parse(e.target.result);
                    if (!config.modules || !Array.isArray(config.modules)) {
                        throw new Error('Invalid format');
                    }
                    if (confirm(`确定要导入 ${config.modules.length} 个组件吗？当前画布内容将被替换。`)) {
                        modules = config.modules.map(m => ({
                            ...m,
                            id: 'mod_' + Date.now() + '_' + Math.random().toString(36).substr(2, 9)
                        }));
                        selectedModuleId = null;
                        saveHistory();
                        renderModules();
                        showToast('配置已导入', 'success');
                    }
                } catch (err) {
                    showToast('导入失败：' + err.message, 'error');
                }
            };
            reader.readAsText(file);
        }

        // 导出配置
        function exportConfig() {
            const config = {
                version: '1.0',
                exportTime: new Date().toISOString(),
                pageId: document.getElementById('pageSelector')?.value || 'home',
                modules: modules
            };
            const jsonStr = JSON.stringify(config, null, 2);
            const blob = new Blob([jsonStr], { type: 'application/json' });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = `home-decoration-${Date.now()}.json`;
            a.click();
            URL.revokeObjectURL(url);
            showToast('配置已导出', 'success');
        }

        // 清空画布
        function clearCanvas() {
            if (modules.length === 0) {
                showToast('画布已是空的', 'error');
                return;
            }
            if (confirm('确定要清空画布吗？所有组件将被删除。')) {
                modules = [];
                selectedModuleId = null;
                document.getElementById('noSelection')?.classList.remove('hidden');
                document.getElementById('propertyContent')?.classList.add('hidden');
                saveHistory();
                renderModules();
                showToast('画布已清空', 'success');
            }
        }

        // 剪贴板
        let clipboardModule = null;

        function copyToClipboard(moduleId) {
            const mod = modules.find(m => m.id === moduleId);
            if (mod) {
                clipboardModule = JSON.parse(JSON.stringify(mod));
                showToast('已复制到剪贴板', 'success');
            }
        }

        function pasteFromClipboard() {
            if (!clipboardModule) {
                showToast('剪贴板为空', 'error');
                return;
            }
            const newModule = {
                ...clipboardModule,
                id: 'mod_' + Date.now(),
                name: clipboardModule.name + ' (粘贴)'
            };
            const insertIndex = selectedModuleId
                ? modules.findIndex(m => m.id === selectedModuleId) + 1
                : modules.length;
            modules.splice(insertIndex, 0, newModule);
            saveHistory();
            renderModules();
            selectModule(newModule.id, { stopPropagation: () => {} });
            showToast('组件已粘贴', 'success');
        }

        // 键盘快捷键
        document.addEventListener('keydown', function(e) {
            if (e.target.tagName === 'INPUT' || e.target.tagName === 'TEXTAREA') return;
            const ctrlKey = e.metaKey || e.ctrlKey;

            if ((e.key === 'Delete' || e.key === 'Backspace') && selectedModuleId) {
                e.preventDefault();
                openDeleteModal(selectedModuleId);
            }
            if (ctrlKey && e.key === 'z' && !e.shiftKey) {
                e.preventDefault();
                undo();
            }
            if (ctrlKey && (e.key === 'y' || (e.key === 'z' && e.shiftKey))) {
                e.preventDefault();
                redo();
            }
            if (ctrlKey && e.key === 'c' && selectedModuleId) {
                e.preventDefault();
                copyToClipboard(selectedModuleId);
            }
            if (ctrlKey && e.key === 'v') {
                e.preventDefault();
                pasteFromClipboard();
            }
            if (ctrlKey && e.key === 's') {
                e.preventDefault();
                savePage();
            }
            if (e.key === 'Escape') {
                selectedModuleId = null;
                document.getElementById('noSelection')?.classList.remove('hidden');
                document.getElementById('propertyContent')?.classList.add('hidden');
                renderModules();
            }
            if (e.key === 'ArrowUp' && selectedModuleId) {
                e.preventDefault();
                moveUp(selectedModuleId);
            }
            if (e.key === 'ArrowDown' && selectedModuleId) {
                e.preventDefault();
                moveDown(selectedModuleId);
            }
        });

        // 画布内组件拖拽排序
        let canvasDraggedId = null;

        function handleCanvasDragStart(e, moduleId) {
            canvasDraggedId = moduleId;
            e.dataTransfer.setData('canvas-module', moduleId);
            e.dataTransfer.effectAllowed = 'move';
            e.target.closest('.canvas-module')?.classList.add('dragging');
        }

        function handleCanvasDragOver(e, moduleId) {
            e.preventDefault();
            if (!canvasDraggedId || canvasDraggedId === moduleId) return;
            e.dataTransfer.dropEffect = 'move';
        }

        function handleCanvasDrop(e, targetModuleId) {
            e.preventDefault();
            if (!canvasDraggedId || canvasDraggedId === targetModuleId) return;

            const fromIndex = modules.findIndex(m => m.id === canvasDraggedId);
            const toIndex = modules.findIndex(m => m.id === targetModuleId);
            if (fromIndex === -1 || toIndex === -1) return;

            const [movedModule] = modules.splice(fromIndex, 1);
            const insertIndex = toIndex > fromIndex ? toIndex - 1 : toIndex;
            modules.splice(insertIndex, 0, movedModule);

            saveHistory();
            renderModules();
            canvasDraggedId = null;
        }

        function handleCanvasDragEnd(e) {
            canvasDraggedId = null;
            document.querySelectorAll('.canvas-module').forEach(el => el.classList.remove('dragging'));
        }
    </script>
</body>
</html>
