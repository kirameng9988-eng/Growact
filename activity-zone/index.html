    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        'primary-bg': '#F8FAFC',
                        'card-bg': '#FFFFFF',
                        'border-light': '#E2E8F0',
                        'accent-blue': '#0A61FF',
                        'accent-cyan': '#06B6D4',
                        'accent-indigo': '#6366F1',
                        'accent-green': '#10B981',
                        'accent-amber': '#F59E0B',
                        'accent-red': '#EF4444',
                        'text-primary': '#0F172A',
                        'text-secondary': '#64748B',
                        'text-muted': '#94A3B8',
                        'tech-gradient-start': '#F0F9FF',
                        'tech-gradient-end': '#E0F2FE',

    <style>
        * { font-family: 'Noto Sans SC', 'PingFang SC', 'Microsoft YaHei', sans-serif; }
        ::-webkit-scrollbar { width: 6px; height: 6px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: #CBD5E1; border-radius: 3px; }
        ::-webkit-scrollbar-thumb:hover { background: #94A3B8; }

        /* Page Transitions */
        .page-transition { animation: fadeSlideIn 0.4s ease-out; }
        @keyframes fadeSlideIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* Banner Carousel -修复高度塌陷问题 */
        .carousel-item { position: absolute; inset: 0; transition: opacity 0.6s ease-in-out; }
        .carousel-item:not(.active) { opacity: 0; z-index: 1; pointer-events: none; }
        .carousel-item.active { opacity: 1; z-index: 2; }

        /* Card Hover Effects */
        .activity-card { transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1); }
        .activity-card:hover { transform: translateY(-4px); box-shadow: 0 20px 40px rgba(10, 97, 255, 0.12); }

        /* Gradient Border */
        .gradient-border { position: relative; }
        .gradient-border::before { content: ''; position: absolute; inset: 0; padding: 1px; background: linear-gradient(135deg, #0A61FF, #06B6D4); -webkit-mask: linear-gradient(#fff 0 0) content-box, linear-gradient(#fff 0 0); -webkit-mask-composite: xor; mask-composite: exclude; border-radius: inherit; pointer-events: none; }

        /* Floating Badge */
        .floating-badge { animation: floatBadge 3s ease-in-out infinite; }
        @keyframes floatBadge {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-4px); }
        }

        /* Drawer Animation */
        .drawer-overlay { transition: opacity 0.3s ease; }
        .drawer-panel { transition: transform 0.4s cubic-bezier(0.4, 0, 0.2, 1); }
        .drawer-panel.hidden { transform: translateX(100%); }
        .drawer-panel.show { transform: translateX(0); }

        /* Toast Animation */
        .toast { animation: toastSlide 0.4s ease-out; }
        @keyframes toastSlide {
            from { transform: translateX(120%); opacity: 0; }
            to { transform: translateX(0); opacity: 1; }
        }

        /* Calendar Day Hover */
        .calendar-day:hover:not(.empty):not(.current-month) { background: rgba(10, 97, 255, 0.1); border-radius: 50%; }

        /* Stagger Animation for Cards */
        .stagger-item { opacity: 0; animation: staggerFadeIn 0.5s ease-out forwards; }
        @keyframes staggerFadeIn {
            from { opacity: 0; transform: translateY(16px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* Glow Effect */
        .glow-effect { box-shadow: 0 0 30px rgba(10, 97, 255, 0.15); }

        /* Status Badge Pulse */
        .status-pulse { animation: statusPulse 2s ease-in-out infinite; }
        @keyframes statusPulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.6; }
        }

        /* City Background Pattern */
        .city-pattern {
            background-image:
                radial-gradient(ellipse at 20% 80%, rgba(10, 97, 255, 0.08) 0%, transparent 50%),
                radial-gradient(ellipse at 80% 20%, rgba(6, 182, 212, 0.06) 0%, transparent 50%),
                radial-gradient(ellipse at 50% 50%, rgba(99, 102, 241, 0.04) 0%, transparent 70%);
        }
    </style>
</head>

    <!-- 签到码弹窗 -->

                            <i class="fas fa-exclamation-circle"></i>

                        </p>

                    <div>
                        <label class="block text-sm font-medium text-gray-700 mb-2">
                            <i class="fas fa-comment text-gray-400 mr-1"></i>备注

                            <i class="fas fa-paper-plane"></i>

                    <p class="text-xs text-gray-500 text-center">提交报名即表示同意<a href="#" class="text-accent-blue hover:underline">《活动协议》</a></p>
                </form>
            </div>
        </div>
    </div>

        /**
         * 统一活动状态按钮组件
         * @param {Object} params - 参数对象
         * @param {string} params.activityStatus - 活动状态: registration|registration_closed|upcoming|ongoing|ended|review
         * @param {string} params.userStatus - 用户状态: not_registered|pending|approved|pending_signin|signed|rejected|absent
         * @param {number} params.activityId - 活动ID
         * @param {string} params.signInTime - 签到时间(可选)
         * @param {boolean} params.hasMaterials - 是否有资料下载(可选)
         * @param {boolean} params.hasVideo - 是否有视频回放(可选)
         * @returns {string} HTML字符串
         */
        function ActivityStatusButton({ activityStatus, userStatus, activityId, signInTime, hasMaterials, hasVideo }) {
            const buttonBaseClass = 'flex items-center justify-center gap-1.5 px-3 py-2 text-xs font-medium rounded-lg transition-all';

            // ========== 场景1: 报名中 + 未报名 ==========
            if (activityStatus === 'registration' && userStatus === 'not_registered') {
                return `
                    <button onclick="openRegistration(${activityId})" class="${buttonBaseClass} bg-accent-blue hover:bg-blue-600 text-white shadow-sm hover:shadow-md">
                        <i class="fas fa-edit"></i>立即报名
                    </button>
                   <button onclick="navigateTo('detail', ${activityId})" class="${buttonBaseClass} text-accent-blue hover:bg-accent-blue/10">
                        <i class="fas fa-eye"></i>查看详情
                    </button>
                `;
            }

            // ========== 场景2: 报名中 + 审核中 ==========
            if (activityStatus === 'registration' && userStatus === 'pending') {
                return `
                    <div class="${buttonBaseClass} bg-amber-50 text-amber-600 cursor-default border border-amber-200">
                        <i class="fas fa-clock"></i>审核中
                    </div>
                    <button onclick="navigateTo('detail', ${activityId})" class="${buttonBaseClass} text-accent-blue hover:bg-accent-blue/10">
                        <i class="fas fa-eye"></i>查看详情
                    </button>
                `;
            }

            // ========== 场景3: 报名中 +审核通过 ==========
            if (activityStatus === 'registration' && userStatus === 'approved') {
                return `
                    <div class="${buttonBaseClass} bg-green-50 text-green-600 cursor-default border border-green-200">
                        <i class="fas fa-check-circle"></i>已报名
                    </div>
                    <button onclick="navigateTo('detail', ${activityId})" class="${buttonBaseClass} text-accent-blue hover:bg-accent-blue/10">
                        <i class="fas fa-eye"></i>查看详情
                    </button>
                `;
            }

            // ========== 场景4: 报名截止 + 未报名 ==========
            if (activityStatus === 'registration_closed' && userStatus === 'not_registered') {
                return `
                    <div class="${buttonBaseClass} bg-gray-100 text-gray-500 cursor-not-allowed border border-gray-200">
                        <i class="fas fa-ban"></i>报名截止

        // ==================== 获取配置的热门活动 ====================
        function getConfiguredHotActivities() {
            // 从LocalStorage读取热门活动配置
            const savedConfig = localStorage.getItem('hotActivitiesConfig');
            let hotConfig = savedConfig ? JSON.parse(savedConfig) : [];

            // 更新自动过期状态
            const now = new Date().toISOString().substring(0, 10);
            hotConfig.forEach(config => {
                if (config.endTime && config.endTime < now) {
                    config.status = 'expired';
                } else if (config.startTime && config.startTime > now) {
                    config.status = 'pending';
                } else {
                    config.status = 'active';
                }
            });

            // 按权重排序并返回
            return hotConfig.sort((a, b) => b.weight - a.weight);
        }

        // 渲染活动日历
        function renderCalendar() {
            const today = new Date();
            const currentMonth = today.getMonth() + 1;
            const currentYear = today.getFullYear();
            const daysInMonth = new Date(currentYear, currentMonth, 0).getDate();
            const firstDayOfMonth = new Date(currentYear, currentMonth - 1, 1).getDay();

            let calendarDays = '';
            for (let i = 0; i < firstDayOfMonth; i++) {
                calendarDays += '<div class="w-9 h-9"></div>';
            }
            for (let day = 1; day <= daysInMonth; day++) {
                const hasActivity = mockData.calendarData[day];
                const isToday = day === today.getDate();
                calendarDays += `
                    <div class="calendar-day w-9 h-9 flex items-center justify-center text-sm rounded-full cursor-pointer ${isToday ? 'bg-accent-blue text-white font-semibold' : 'text-gray-700 hover:bg-accent-blue/10'} transition-colors relative ${hasActivity ? 'has-activity' : ''}" onclick="showDayActivities(${day})">
                        ${day}
                        ${hasActivity ? '<span class="absolute -bottom-0.5 left-1/2 -translate-x-1/2 w-1 h-1 bg-accent-red rounded-full"></span>' : ''}
                    </div>
                `;

            return `

                    <div class="px-5 py-4 border-b border-[#E2E8F0] bg-gradient-to-r from-blue-50 to-cyan-50">

        // 关联问卷展示（PC 用户视角）
        function renderLinkedQuestionnaireSection(items) {
            if (!items || items.length === 0) return '';
            const extra = items.filter(i => i.mode === 'registration_extra');
            const stand = items.filter(i => i.mode === 'standalone');
            if (extra.length === 0 && stand.length === 0) return '';
            const allQ = (typeof QM !== 'undefined' && QM.findQuestionnaireById)
                ? items.map(i => ({ meta: i, q: QM.findQuestionnaireById(i.id) })).filter(x => x.q)
                : [];
            const safeQ = q => (q || '').replace(/[<>&"']/g, c => ({ '<':'&lt;','>':'&gt;','&':'&amp;','"':'&quot;',"'":'&#39;' }[c]));
            const extraHtml = extra.length ? `<div class=\"bg-white rounded-2xl shadow-sm border border-[#E2E8F0] p-5\">
                <h4 class=\"text-sm font-semibold text-gray-900 mb-3 flex items-center gap-2\">
                    <i class=\"fas fa-clipboard-list text-accent-amber\"></i> 报名时还会询问以下问题
                </h4>
                <ol class=\"list-decimal pl-5 space-y-1 text-sm text-gray-700\">
                    ${extra.map(i => { const x = allQ.find(x => x.meta.id === i.id); return x ? '<li>' + safeQ(x.q.title) + '<span class=\"text-xs text-gray-400 ml-1\">(' + (x.q.fields || []).length + ' 题)</span></li>' : '<li>' + safeQ(i.title) + '</li>'; }).join('')}
                </ol>
            </div>` : '';
            const standHtml = stand.length ? `<div class=\"bg-white rounded-2xl shadow-sm border border-[#E2E8F0] p-5\">
                <h4 class=\"text-sm font-semibold text-gray-900 mb-3 flex items-center gap-2\">
                    <i class=\"fas fa-poll text-accent-cyan\"></i> 调研问卷
                </h4>
                <div class=\"space-y-2\">
                    ${stand.map(i => { const x = allQ.find(x => x.meta.id === i.id); const title = x ? x.q.title : i.title; return '<a href=\"questionnaire-fill.html?id=' + i.id + '\" target=\"_blank\" class=\"flex items-center justify-between bg-gray-50 hover:bg-cyan-50 border border-[#E2E8F0] rounded-lg px-3 py-2.5 text-sm text-gray-700 hover:text-accent-blue transition-colors\">'
                        + '<span><i class=\"fas fa-external-link-alt mr-2 text-gray-400\"></i>' + safeQ(title) + '</span>'
                        + '<span class=\"text-xs text-cyan-600 font-medium\">立即填写 →</span></a>'; }).join('')}
                </div>
            </div>` : '';
            return extraHtml + standHtml;
        }

        // 在报名抽屉打开时注入附加题目 + 在 myActivities 卡片标记 post_event
        function renderRegistrationExtras(activity) {
            const wrap = document.getElementById('regExtraQuestions');
            if (!wrap) return;
            const extras = (activity && activity.linkedQuestionnaires || []).filter(i => i.mode === 'registration_extra');
            if (extras.length === 0) { wrap.innerHTML = ''; return; }
            const allQ = (typeof QM !== 'undefined' && QM.findQuestionnaireById)
                ? extras.map(i => ({ meta: i, q: QM.findQuestionnaireById(i.id) })).filter(x => x.q)
                : [];
            const safeQ = s => (s || '').replace(/[<>&"']/g, c => ({ '<':'&lt;','>':'&gt;','&':'&amp;','"':'&quot;',"'":'&#39;' }[c]));
            let html = '<div class=\"text-xs uppercase tracking-wide text-gray-500 mt-2 mb-1\">📋 附加问卷</div>';
            extras.forEach(item => {
                const qx = allQ.find(x => x.meta.id === item.id);
                if (!qx) return;
                html += '<div class=\"bg-accent-amber/5 border border-accent-amber/20 rounded-xl p-4\">'
                    + '<div class=\"text-sm font-medium text-gray-900 mb-1\">' + safeQ(qx.q.title) + '</div>'
                    + '<div class=\"space-y-3 mt-3\">';
                (qx.q.fields || []).forEach(f => {
                    const req = f.required ? '<span class=\"text-accent-red ml-0.5\">*</span>' : '';
                    let inp = '';
                    if (f.type === 'text') {
                        inp = '<input type=\"text\" data-qf=\"' + f.id + '\" maxlength=\"' + (f.maxLength || 100) + '\" placeholder=\"' + safeQ(f.placeholder || '') + '\" class=\"w-full bg-white border border-[#E2E8F0] rounded-lg px-3 py-2 text-sm focus:border-accent-blue focus:outline-none\">';
                    } else if (f.type === 'textarea') {
                        inp = '<textarea data-qf=\"' + f.id + '\" rows=\"3\" maxlength=\"' + (f.maxLength || 500) + '\" placeholder=\"' + safeQ(f.placeholder || '') + '\" class=\"w-full bg-white border border-[#E2E8F0] rounded-lg px-3 py-2 text-sm focus:border-accent-blue focus:outline-none\"></textarea>';
                    } else if (f.type === 'radio' || f.type === 'select') {
                        const opts = (f.options || []).map(o => '<option value=\"' + o.id + '\">' + safeQ(o.label) + '</option>').join('');
                        inp = '<select data-qf=\"' + f.id + '\" class=\"w-full bg-white border border-[#E2E8F0] rounded-lg px-3 py-2 text-sm focus:border-accent-blue focus:outline-none\"><option value=\"\">请选择</option>' + opts + '</select>';
                    } else if (f.type === 'checkbox') {
                        inp = '<div class=\"space-y-1\">' + (f.options || []).map(o =>
                            '<label class=\"flex items-center gap-2 text-sm\"><input type=\"checkbox\" data-qf=\"' + f.id + '\" value=\"' + o.id + '\" class=\"accent-accent-blue\"> ' + safeQ(o.label) + '</label>').join('') + '</div>';
                    } else if (f.type === 'file') {
                        inp = '<input type=\"file\" data-qf=\"' + f.id + '\" multiple class=\"text-xs text-gray-500\">';
                    }
                    html += '<div><div class=\"text-xs font-medium text-gray-700 mb-1\">' + safeQ(f.label) + req + '</div>' + inp + '</div>';
                });
                html += '</div></div>';
            });
            wrap.innerHTML = html;
        }

        // 让报名抽屉打开时根据当前 activity 注入
        function renderPostEventNotice(activity) {
            // 在 myActivities 卡片渲染入口附近调用：返回 post_event HTML 片段
            if (!activity || !activity.linkedQuestionnaires) return '';
            const pe = activity.linkedQuestionnaires.filter(i => i.mode === 'post_event');
            if (pe.length === 0 || activity.activityStatus !== 'ended') return '';
            return '<a href=\"questionnaire-fill.html?id=' + pe[0].id + '&from=activity&id=' + activity.id + '\" target=\"_blank\" class=\"block mt-2 text-xs px-3 py-2 bg-green-50 border border-green-200 text-green-700 rounded-lg hover:bg-green-100\">'
                + '<i class=\"fas fa-comment-dots mr-1\"></i>填写活动反馈</a>';
        }

        // ==================== 我的活动页 ====================
        function renderMyActivitiesPage() {
            const filteredActivities = myActivitiesFilter === 'all'
                ? mockData.myActivities
                : mockData.myActivities.filter(a => {
                    if (myActivitiesFilter === 'pending') return a.applyStatus === 'pending';
                    if (myActivitiesFilter === 'approved') {
                        return a.applyStatus === 'approved' && (a.signInStatus === 'signed' || a.signInStatus === 'pending');
                    }
                    if (myActivitiesFilter === 'signPending') return a.signInStatus === 'pending';
                    if (myActivitiesFilter === 'signed') return a.signInStatus === 'signed';
                    if (myActivitiesFilter === 'ended') return a.activityStatus === 'ended' || a.activityStatus === 'review';
                    return true;
                });

            return `
                <div class="page-transition">
                    <!-- 顶部工具栏 -->
                    <div class="sticky top-16 z-30 bg-white/95 backdrop-blur-md border-b border-[#E2E8F0] px-6 py-3">
                        <div class="max-w-7xl mx-auto">
                            <button onclick="navigateTo('home')" class="flex items-center gap-2 text-gray-600 hover:text-accent-blue transition-colors">
                                <i class="fas fa-arrow-left"></i>
                                <span class="text-sm">返回活动专区</span>
                            </button>
                        </div>
                    </div>

                    <!-- 页面内容 -->
                    <div class="max-w-7xl mx-auto px-6 py-8">
                        <!-- 页面标题 -->
                        <div class="mb-8">
                            <h1 class="text-2xl font-bold text-gray-900 flex items-center gap-3">
                                <i class="fas fa-star text-amber-500"></i>
                                我的活动
                            </h1>
                            <p class="text-gray-500 mt-2">查看已报名活动及签到状态</p>
                        </div>

                        <!-- 状态Tab -->
                        <div class="flex items-center gap-2 mb-8 p-1 bg-gray-100 rounded-xl w-fit">
                            ${['all', 'pending', 'approved', 'signPending', 'signed', 'ended'].map(filter => `
                                <button onclick="filterMyActivities('${filter}')" class="px-4 py-2.5 text-sm font-medium rounded-lg transition-all ${myActivitiesFilter === filter ? 'bg-white text-accent-blue shadow-sm' : 'text-gray-600 hover:text-gray-900'}">
                                    ${getFilterLabel(filter)}
                                    ${getFilterCount(filter) > 0 ? `<span class="ml-1.5 px-1.5 py-0.5 ${myActivitiesFilter === filter ? 'bg-accent-blue/10 text-accent-blue' : 'bg-gray-200 text-gray-600'} text-xs font-semibold rounded-full">${getFilterCount(filter)}</span>` : ''}
                                </button>
                            `).join('')}
                        </div>

                        <!-- 活动卡片列表 -->
                        <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6">
                            ${filteredActivities.length === 0 ? `
                                <div class="col-span-1 md:col-span-2 lg:col-span-3 py-16 text-center">
                                    <div class="w-20 h-20 mx-auto mb-4 rounded-full bg-gray-100 flex items-center justify-center">
                                        <i class="fas fa-calendar-times text-4xl text-gray-300"></i>
                                    </div>
                                    <p class="text-gray-500">暂无活动</p>
                                </div>
                            ` : filteredActivities.map((activity, index) => `
                                <div class="stagger-item bg-white rounded-2xl overflow-hidden shadow-sm border border-[#E2E8F0] hover:shadow-lg hover:border-accent-blue/30 transition-all cursor-pointer" style="animation-delay: ${index * 0.08}s" onclick="navigateTo('detail', ${activity.id})">
                                    <!-- 16:9封面 -->
                                    <div class="relative aspect-video overflow-hidden">
                                        <img src="${activity.cover}" class="w-full h-full object-cover transition-transform duration-500 hover:scale-105" alt="${activity.title}">
                                        <div class="absolute inset-0 bg-gradient-to-t from-black/60 via-transparent to-transparent"></div>
                                        <!-- 活动状态标签 -->
                                        <div class="absolute top-3 right-3 flex flex-col gap-2">
                                            <span class="px-2.5 py-1 ${getApplyStatusClass(activity.applyStatus)} text-xs font-medium rounded-full">${activity.applyStatusText}</span>
                                            <span class="px-2.5 py-1 ${getSignInStatusClass(activity.signInStatus)} text-xs font-medium rounded-full">${getSignInStatusText(activity.signInStatus)}</span>
                                        </div>
                                        <!-- 活动名称 -->
                                        <div class="absolute bottom-3 left-3 right-3">
                                            <h4 class="text-base font-semibold text-white line-clamp-2 leading-tight drop-shadow-lg">${activity.title}</h4>
                                        </div>
                                    </div>

                                    <!-- 卡片内容 -->
                                    <div class="p-4">
                                        <!-- 时间地点 -->
                                        <div class="space-y-2 mb-4">
                                            <div class="flex items-center gap-2 text-sm text-gray-600">
                                                <i class="far fa-calendar text-gray-400 w-4"></i>
                                                <span>${activity.time}</span>
                                            </div>
                                            <div class="flex items-center gap-2 text-sm text-gray-600">
                                                <i class="fas fa-map-marker-alt text-gray-400 w-4"></i>
                                                <span>${activity.location}</span>
                                            </div>
                                            ${activity.signInStatus === 'signed' && activity.signInTime ? `
                                                <div class="flex items-center gap-2 text-sm text-green-600">
                                                    <i class="fas fa-check-circle text-green-500 w-4"></i>
                                                    <span>签到时间：${activity.signInTime}</span>
                                                </div>
                                            ` : ''}
                                        </div>

                                        <!-- 按钮区域 -->
                                        <div class="flex items-center gap-2 pt-3 border-t border-[#E2E8F0]">
                                            ${getActivityButtons(activity)}
                                        </div>
                                    </div>
                                </div>
                            `).join('')}
                        </div>
                    </div>
                </div>
            `;
        }

        // 根据活动状态获取按钮
        function getActivityButtons(activity) {
            // 待审核状态
            if (activity.applyStatus === 'pending') {
                return `<button onclick="event.stopPropagation(); navigateTo('detail', ${activity.id})" class="flex-1 py-2.5 text-sm text-accent-blue hover:bg-accent-blue/10 rounded-lg transition-colors font-medium">
                    <i class="fas fa-eye mr-1.5"></i>查看详情
                </button>`;
            }

            // 已通过 + 待签到
            if (activity.applyStatus === 'approved' && activity.signInStatus === 'pending') {
                return `
                    <button onclick="event.stopPropagation(); navigateTo('detail', ${activity.id})" class="flex-1 py-2.5 text-sm text-accent-blue hover:bg-accent-blue/10 rounded-lg transition-colors font-medium">
                        <i class="fas fa-eye mr-1.5"></i>查看详情
                    </button>
                    <button onclick="event.stopPropagation(); openSignInModal(${activity.id})" class="flex-1 py-2.5 text-sm bg-accent-blue hover:bg-blue-600 text-white rounded-lg transition-colors font-medium">
                        <i class="fas fa-qrcode mr-1.5"></i>查看签到码
                    </button>
                `;
            }

            // 已结束状态（优先级高于"已签到"，结束活动不再显示签到按钮）
            if (activity.activityStatus === 'ended') {
                const pe = (activity.linkedQuestionnaires || []).filter(i => i.mode === 'post_event');
                return `
                    <button onclick="event.stopPropagation(); navigateTo('detail', ${activity.id})" class="flex-1 py-2.5 text-sm text-accent-blue hover:bg-accent-blue/10 rounded-lg transition-colors font-medium">
                        <i class="fas fa-play-circle mr-1.5"></i>查看回顾
                    </button>
                    ${activity.hasMaterials ? `
                        <button onclick="event.stopPropagation(); showToast('资料下载中...', 'success')" class="flex-1 py-2.5 text-sm text-gray-600 hover:bg-gray-100 rounded-lg transition-colors font-medium">
                            <i class="fas fa-download mr-1.5"></i>下载资料
                        </button>
                    ` : ''}
                    ${pe.length > 0 ? `
                        <a href="questionnaire-fill.html?id=${pe[0].id}&from=myactivity&id=${activity.id}" target="_blank"
                           onclick="event.stopPropagation()"
                           class="flex-1 py-2.5 text-sm bg-green-50 hover:bg-green-100 text-green-700 border border-green-200 rounded-lg transition-colors font-medium flex items-center justify-center">
                            <i class="fas fa-comment-dots mr-1.5"></i>填写反馈
                        </a>
                    ` : ''}
                `;
            }

            // 已签到状态（进行中的活动）
            if (activity.signInStatus === 'signed') {
                return `
                    <button onclick="event.stopPropagation(); navigateTo('detail', ${activity.id})" class="flex-1 py-2.5 text-sm text-accent-blue hover:bg-accent-blue/10 rounded-lg transition-colors font-medium">
                        <i class="fas fa-eye mr-1.5"></i>查看详情
                    </button>
                    <button class="flex-1 py-2.5 text-sm bg-green-500 text-white rounded-lg font-medium cursor-default opacity-80">
                        <i class="fas fa-check-circle mr-1.5"></i>签到成功
                    </button>
                `;
            }

            // 默认
            return `<button onclick="event.stopPropagation(); navigateTo('detail', ${activity.id})" class="flex-1 py-2.5 text-sm text-accent-blue hover:bg-accent-blue/10 rounded-lg transition-colors font-medium">
                <i class="fas fa-eye mr-1.5"></i>查看详情
            </button>`;
        }

        // 获取签到状态样式
        function getSignInStatusClass(status) {
            if (status === 'pending') return 'bg-amber-100 text-amber-700';
            if (status === 'signed') return 'bg-green-100 text-green-700';
            return 'bg-gray-100 text-gray-500';
        }

        // 获取签到状态文本
        function getSignInStatusText(status) {
            if (status === 'pending') return '待签到';
            if (status === 'signed') return '已签到';
            return '未报名';
        }

        // 获取各状态数量
        function getFilterCount(filter) {
            const activities = mockData.myActivities;
            switch(filter) {
                case 'all': return activities.length;
                case 'pending': return activities.filter(a => a.applyStatus === 'pending').length;
                case 'approved': return activities.filter(a => a.applyStatus === 'approved').length;
                case 'signPending': return activities.filter(a => a.signInStatus === 'pending').length;
                case 'signed': return activities.filter(a => a.signInStatus === 'signed').length;
                case 'ended': return activities.filter(a => a.activityStatus === 'ended').length;
                default: return 0;
            }
        }

        // ==================== 辅助函数 ====================

        function getStatusClass(status) {
            const classes = {
                'registration': 'bg-green-100 text-green-700',
                'upcoming': 'bg-blue-100 text-blue-700',
                'ongoing': 'bg-green-100 text-green-700',
                'ended': 'bg-gray-100 text-gray-600',
                'training': 'bg-purple-100 text-purple-700'
            };
            return classes[status] || 'bg-gray-100 text-gray-600';
        }

        function getStatusText(status) {
            const texts = {
                'registration': '报名中',
                'upcoming': '即将开始',
                'ongoing': '进行中',
                'ended': '已结束',
                'training': '培训中'
            };
            return texts[status] || status;
        }

        function getApplyStatusClass(status) {
            const classes = {
                'pending': 'bg-amber-100 text-amber-700',
                'approved': 'bg-green-100 text-green-700',
                'rejected': 'bg-red-100 text-red-700'
            };
            return classes[status] || 'bg-gray-100 text-gray-600';
        }

        function getActivityStatusClass(status) {
            const classes = {
                'upcoming': 'bg-blue-100 text-blue-700',
                'ongoing': 'bg-green-100 text-green-700',
                'ended': 'bg-gray-100 text-gray-600'
            };
            return classes[status] || 'bg-gray-100 text-gray-600';
        }

        function getFilterLabel(filter) {
            const labels = {
                'all': '全部',
                'pending': '待审核',
                'approved': '已通过',
                'signPending': '待签到',
                'signed': '已签到',
                'ended': '已结束'
            };
            return labels[filter] || filter;
        }

        // ==================== 导航函数 ====================

        function navigateTo(page, activityId = null) {
            currentPage = page;
            currentActivityId = activityId;
            renderContent();
            window.scrollTo({ top: 0, behavior: 'smooth' });
        }

        function renderContent() {
            const container = document.getElementById('zoneContent');
            switch(currentPage) {
                case 'home':
                    container.innerHTML = renderHomePage();
                    startCarousel();
                    break;
                case 'detail':
                    container.innerHTML = renderDetailPage(currentActivityId);
                    break;
                case 'myActivities':
                    container.innerHTML = renderMyActivitiesPage();
                    break;
            }
        }

        // ==================== 轮播函数 ====================

        function startCarousel() {
            setInterval(() => {
                nextSlide();
            }, 5000);
        }

        function nextSlide() {
            carouselIndex = (carouselIndex + 1) % mockData.banners.length;
            updateCarousel();
        }

        function prevSlide() {
            carouselIndex = (carouselIndex - 1 + mockData.banners.length) % mockData.banners.length;
            updateCarousel();
        }

        function goToSlide(index) {
            carouselIndex = index;
            updateCarousel();
        }

        function updateCarousel() {
            const items = document.querySelectorAll('.carousel-item');
            const dots = document.querySelectorAll('.carousel-dot');
            items.forEach((item, i) => {
                item.classList.toggle('active', i === carouselIndex);
            });
            dots.forEach((dot, i) => {
                if (i === carouselIndex) {
                    dot.classList.add('bg-white', 'w-8');
                    dot.classList.remove('bg-white/50');
                } else {
                    dot.classList.remove('bg-white', 'w-8');
                    dot.classList.add('bg-white/50');
                }
            });
        }

        // ==================== 日历函数 ====================

        function showDayActivities(day) {
            const activities = mockData.calendarData[day];
            const container = document.getElementById('dayActivities');
            const list = document.getElementById('dayActivitiesList');

            if (activities && activities.length > 0) {
                list.innerHTML = activities.map(a => `
                    <div class="p-2 bg-white rounded-lg border border-[#E2E8F0] cursor-pointer hover:border-accent-blue transition-colors" onclick="navigateTo('detail', ${a.id})">
                        <p class="text-xs font-medium text-gray-900">${a.title}</p>
                    </div>
                `).join('');
                container.classList.remove('hidden');
            } else {
                container.classList.add('hidden');
            }
        }

        // ==================== 报名相关函数 ====================

        function openRegistration(activityId) {
            const drawer = document.getElementById('registrationDrawer');
            const panel = drawer.querySelector('.drawer-panel');
            // 找当前活动：先内存 mockData，再回退 sessionStorage
            let act = null;
            try {
                const idNum = parseInt(activityId, 10);
                act = (mockData.allActivities || []).find(a => a.id === activityId || a.id === idNum) || null;
                if (!act) {
                    const all = JSON.parse(sessionStorage.getItem('activities_data') || '[]');
                    act = all.find(a => a.id === idNum) || null;
                }
            } catch (e) {}
            renderRegistrationExtras(act);
            drawer.classList.remove('hidden');
            setTimeout(() => {
                panel.classList.remove('hidden');
                panel.classList.add('show');
            }, 10);
        }

        function closeDrawer() {
            const drawer = document.getElementById('registrationDrawer');
            const panel = drawer.querySelector('.drawer-panel');
            panel.classList.remove('show');
            setTimeout(() => {
                drawer.classList.add('hidden');
                panel.classList.add('hidden');
            }, 300);
        }

        // ==================== 签到码弹窗函数 ====================
        function openSignInModal(activityId) {
            const activity = mockData.myActivities.find(a => a.id === activityId);
            if (activity) {
                document.getElementById('modalActivityName').textContent = activity.title;
                const statusEl = document.getElementById('modalSignInStatus');
                if (activity.signInStatus === 'signed') {
                    statusEl.textContent = '已签到';
                    statusEl.className = 'px-3 py-1 bg-green-100 text-green-700 text-xs font-semibold rounded-full';
                } else {
                    statusEl.textContent = '待签到';
                    statusEl.className = 'px-3 py-1 bg-amber-100 text-amber-700 text-xs font-semibold rounded-full';
                }
            }
            const modal = document.getElementById('signInModal');
            modal.classList.remove('hidden');
        }

        function closeSignInModal() {
            const modal = document.getElementById('signInModal');
            modal.classList.add('hidden');
        }

        function cancelRegistration(activityId) {
            if (confirm('确定要取消报名吗？')) {
                showToast('取消报名成功', 'success');
            }
        }

        // ==================== Tab切换 ====================

        function filterMyActivities(filter) {
            myActivitiesFilter = filter;
            document.getElementById('zoneContent').innerHTML = renderMyActivitiesPage();
        }

        // ==================== Toast提示 ====================

        function showToast(message, type = 'success') {
            const container = document.getElementById('toastContainer');
            const toast = document.createElement('div');
            const bgColor = type === 'success' ? 'bg-green-500' : type === 'error' ? 'bg-red-500' : 'bg-accent-blue';
            const icon = type === 'success' ? 'check-circle' : type === 'error' ? 'times-circle' : 'info-circle';
            toast.className = `toast ${bgColor} text-white px-5 py-3 rounded-xl shadow-lg flex items-center gap-3`;
            toast.innerHTML = `<i class="fas fa-${icon}"></i><span>${message}</span>`;
            container.appendChild(toast);
            setTimeout(() => toast.remove(), 3000);
        }

        // ==================== 表单验证 ====================

        // 校验规则
        const validationRules = {
            name: {
                required: true,
                pattern: /^[一-龥]{2,20}$/,
                message: '请输入正确的中文姓名（2-20字）'
            },
            company: {
                required: true,
                pattern: /^[一-龥a-zA-Z0-9\(\)（）]{2,50}$/,
                message: '请输入正确的企业名称（2-50字符）'
            },
            position: {
                required: true,
                pattern: /^[一-龥a-zA-Z0-9\-]{2,30}$/,
                message: '请输入正确的职位（2-30字符）'
            },
            phone: {
                required: true,
                pattern: /^1[3-9]\d{9}$/,
                message: '请输入正确的11位手机号'
            },
            email: {
                required: true,
                pattern: /^[^\s@]+@[^\s@]+\.[^\s@]+$/,
                message: '请输入正确的邮箱地址'
            }
        };

        // 验证单个字段
        function validateField(fieldName) {
            const input = document.getElementById('reg' + fieldName.charAt(0).toUpperCase() + fieldName.slice(1));
            const errorEl = document.getElementById('reg' + fieldName.charAt(0).toUpperCase() + fieldName.slice(1) + 'Error');
            const rule = validationRules[fieldName];

            if (!input || !rule) return true;

            const value = input.value.trim();

            // 必填校验
            if (rule.required && !value) {
                showFieldError(input, errorEl, '此字段为必填项');
                return false;
            }

            // 格式校验
            if (value && rule.pattern && !rule.pattern.test(value)) {
                showFieldError(input, errorEl, rule.message);
                return false;
            }

            // 清除错误
            clearFieldError(input, errorEl);
            return true;
        }

        // 显示字段错误
        function showFieldError(input, errorEl, message) {
            input.classList.remove('border-[#E2E8F0]');
            input.classList.add('border-red-500', 'focus:border-red-500');
            if (errorEl) {
                errorEl.classList.remove('hidden');
                errorEl.querySelector('span').textContent = message;
            }
        }

        // 清除字段错误
        function clearFieldError(input, errorEl) {
            input.classList.remove('border-red-500', 'focus:border-red-500');
            input.classList.add('border-[#E2E8F0]');
            if (errorEl) {
                errorEl.classList.add('hidden');
            }
        }

        // 验证全部字段
        function validateAllFields() {
            let isValid = true;
            let firstErrorField = null;

            for (const fieldName in validationRules) {
                const result = validateField(fieldName);
                if (!result && !firstErrorField) {
                    const input = document.getElementById('reg' + fieldName.charAt(0).toUpperCase() + fieldName.slice(1));
                    firstErrorField = input;
                }
                isValid = isValid && result;
            }

            if (firstErrorField) {
                firstErrorField.scrollIntoView({ behavior: 'smooth', block: 'center' });
                firstErrorField.focus();
            }

            return isValid;
        }

        // ==================== 表单提交 ====================

        document.getElementById('registrationForm').addEventListener('submit', function(e) {
            e.preventDefault();

            // 验证全部字段
            if (!validateAllFields()) {
                showToast('请完善报名信息', 'error');
                return;
            }

            // 验证通过
            closeDrawer();
            showToast('报名成功！您可以在"我的活动"中查看报名状态', 'success');
            setTimeout(() => {
                navigateTo('myActivities');
            }, 1500);
        });

        // ==================== 初始化 ====================

        document.addEventListener('DOMContentLoaded', function() {
            renderContent();
        });
    </script>
</body>
</html>
