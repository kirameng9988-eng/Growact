            { id: 116, title: '公共数据开放应用大赛总决赛', summary: '大赛总决赛精彩回顾，获奖团队路演', time: '2023-12-15', location: '上海世博中心', activityStatus: 'review', userStatus: 'signed', signInTime: '13:30', category: '专题活动', registrations: 1200, hasMaterials: true, hasVideo: true, cover: 'https://images.unsplash.com/photo-1559225120-d6e0a2a8e1a8?w=400&h=250&fit=crop' },
            { id: 117, title: '数据安全与隐私保护高峰论坛', summary: '数据安全与隐私保护前沿技术论坛', time: '2023-11-20', location: '线上直播', activityStatus: 'review', userStatus: 'absent', category: '技术交流', registrations: 3568, hasMaterials: true, cover: 'https://images.unsplash.com/photo-1591115765373-5207764f72e7?w=400&h=250&fit=crop' },
            { id: 118, title: '可信数据空间生态大会', summary: '可信数据空间生态系统构建大会', time: '2023-10-25', location: '深圳国际会展中心', activityStatus: 'review', userStatus: 'signed', signInTime: '10:00', category: '生态合作', registrations: 892, hasMaterials: true, hasVideo: true, cover: 'https://images.unsplash.com/photo-1505373877841-8d25f7d46678?w=400&h=250&fit=crop' },
        ];

        let currentCategory = 'all';
        let currentStatus = 'all';
        let currentTime = 'all';
        let currentSearch = '';
        let currentSort = 'default';
        let currentPage = 1;
        const pageSize = 9;

        // ==================== 统一动态按钮组件 ====================
        function ActivityStatusButton({ activityStatus, userStatus, activityId, signInTime, hasMaterials, hasVideo }) {
            const buttonBaseClass = 'flex items-center justify-center gap-1.5 px-3 py-2 text-xs font-medium rounded-lg transition-all';

            if (activityStatus === 'registration' && userStatus === 'not_registered') {
                return `<button onclick="openRegistration(${activityId})" class="${buttonBaseClass} bg-accent-blue hover:bg-blue-600 text-white shadow-sm"><i class="fas fa-edit"></i>立即报名</button>`;
            }
            if (activityStatus === 'registration' && userStatus === 'pending') {
                return `<div class="${buttonBaseClass} bg-amber-50 text-amber-600 cursor-default border border-amber-200"><i class="fas fa-clock"></i>审核中</div>`;
            }
            if (activityStatus === 'registration' && userStatus === 'approved') {
                return `<div class="${buttonBaseClass} bg-green-50 text-green-600 cursor-default border border-green-200"><i class="fas fa-check-circle"></i>已报名</div>`;
            }
            if (activityStatus === 'registration_closed' && userStatus === 'not_registered') {
                return `<div class="${buttonBaseClass} bg-gray-100 text-gray-500 cursor-not-allowed border border-gray-200"><i class="fas fa-ban"></i>报名截止</div>`;
            }
            if (activityStatus === 'upcoming' && userStatus === 'approved') {
                return `<button onclick="openSignInModal(${activityId})" class="${buttonBaseClass} bg-accent-blue hover:bg-blue-600 text-white shadow-sm"><i class="fas fa-qrcode"></i>查看签到码</button>`;
            }
            if (activityStatus === 'ongoing' && (userStatus === 'approved' || userStatus === 'pending_signin')) {
                return `<button onclick="openSignInModal(${activityId})" class="${buttonBaseClass} bg-gradient-to-r from-green-500 to-green-600 hover:from-green-600 hover:to-green-700 text-white shadow-sm animate-pulse"><i class="fas fa-sign-in-alt"></i>立即签到</button>`;
            }
            if (activityStatus === 'ongoing' && userStatus === 'signed') {
                return `<div class="${buttonBaseClass} bg-green-50 text-green-600 cursor-default border border-green-200"><i class="fas fa-check-circle"></i>已签到 ${signInTime || ''}</div>`;
            }
            if (activityStatus === 'ended') {
                return `<div class="${buttonBaseClass} bg-gray-100 text-gray-500 cursor-default border border-gray-200"><i class="fas fa-calendar-times"></i>活动结束</div>`;
            }
            if (activityStatus === 'review') {
                let html = `<button onclick="goToDetail(${activityId})" class="${buttonBaseClass} bg-gradient-to-r from-purple-500 to-indigo-500 hover:from-purple-600 hover:to-indigo-600 text-white shadow-sm"><i class="fas fa-play-circle"></i>查看回顾</button>`;
                if (hasVideo) html += `<button onclick="showToast('正在打开回放视频...', 'info')" class="${buttonBaseClass} bg-gradient-to-r from-pink-500 to-rose-500 hover:from-pink-600 hover:to-rose-600 text-white shadow-sm"><i class="fas fa-video"></i>观看回放</button>`;
                if (hasMaterials) html += `<button onclick="showToast('资料下载中...', 'success')" class="${buttonBaseClass} text-accent-blue hover:bg-accent-blue/10"><i class="fas fa-download"></i>下载资料</button>`;
                return html;
            }
            if (activityStatus === 'registration' && userStatus === 'rejected') {
                return `<button onclick="openRegistration(${activityId})" class="${buttonBaseClass} bg-accent-blue hover:bg-blue-600 text-white shadow-sm"><i class="fas fa-redo"></i>重新报名</button>`;
            }
            if (activityStatus === 'ended' && userStatus === 'absent') {
                return `<div class="${buttonBaseClass} bg-red-50 text-red-600 cursor-default border border-red-200"><i class="fas fa-user-slash"></i>未签到</div>`;
            }
            return `<button onclick="goToDetail(${activityId})" class="${buttonBaseClass} bg-accent-blue hover:bg-blue-600 text-white shadow-sm"><i class="fas fa-edit"></i>立即报名</button>`;
        }

        function getActivityStatusTag(activityStatus) {
            const statusMap = {
                'registration': { text: '报名中', class: 'bg-blue-100 text-blue-700 border-blue-200' },
                'registration_closed': { text: '报名截止', class: 'bg-gray-100 text-gray-600 border-gray-200' },
                'upcoming': { text: '即将开始', class: 'bg-amber-100 text-amber-700 border-amber-200' },
                'ongoing': { text: '进行中', class: 'bg-green-100 text-green-700 border-green-200' },
                'ended': { text: '已结束', class: 'bg-gray-100 text-gray-500 border-gray-200' },
                'review': { text: '精彩回顾', class: 'bg-gradient-to-r from-purple-100 to-indigo-100 text-purple-700 border-purple-200' }
            };
            const status = statusMap[activityStatus] || statusMap['ended'];
            return `<span class="px-2 py-0.5 ${status.class} text-xs font-medium rounded-full border">${status.text}</span>`;
        }

        function getCategoryTag(category) {
            const categoryColors = {
                '专题活动': 'bg-pink-50 text-pink-700 border-pink-200',
                '培训专区': 'bg-purple-50 text-purple-700 border-purple-200',
                '行业沙龙': 'bg-blue-50 text-blue-700 border-blue-200',
                '政策解读': 'bg-amber-50 text-amber-700 border-amber-200',
                '技术交流': 'bg-cyan-50 text-cyan-700 border-cyan-200',
                '生态合作': 'bg-green-50 text-green-700 border-green-200'
            };
            const colorClass = categoryColors[category] || 'bg-gray-50 text-gray-700 border-gray-200';
            return `<span class="px-2 py-0.5 ${colorClass} text-xs font-medium rounded-full border">${category}</span>`;
        }

        function filterActivities() {
            let filtered = [...allActivities];

            if (currentCategory !== 'all') {
                filtered = filtered.filter(a => a.category === currentCategory);
            }
            if (currentStatus !== 'all') {
                filtered = filtered.filter(a => a.activityStatus === currentStatus);
            }
            if (currentSearch) {
                filtered = filtered.filter(a => a.title.toLowerCase().includes(currentSearch.toLowerCase()));
            }
            if (currentSort === 'popular') {
                filtered.sort((a, b) => b.registrations - a.registrations);
            }

            return filtered;
        }

        function renderActivityList() {
            const filtered = filterActivities();
            const totalPages = Math.ceil(filtered.length / pageSize);
            const start = (currentPage - 1) * pageSize;
            const pageActivities = filtered.slice(start, start + pageSize);

            document.getElementById('activityCount').textContent = filtered.length;

            const container = document.getElementById('activityList');
            if (pageActivities.length === 0) {
                container.innerHTML = `
                    <div class="col-span-1 md:col-span-2 lg:col-span-3 py-16 text-center">
                        <div class="w-20 h-20 mx-auto mb-4 rounded-full bg-gray-100 flex items-center justify-center">
                            <i class="fas fa-search text-4xl text-gray-300"></i>
                        </div>
                        <p class="text-gray-500">未找到符合条件的活动</p>
                    </div>
                `;
            } else {
                container.innerHTML = pageActivities.map((activity, index) => `
                    <div class="activity-card stagger-item bg-white rounded-2xl overflow-hidden shadow-sm border border-[#E2E8F0] cursor-pointer" style="animation-delay: ${index * 0.05}s" onclick="goToDetail(${activity.id})">
                        <div class="relative aspect-video overflow-hidden">
                            <img src="${activity.cover}" class="card-cover w-full h-full object-cover transition-transform duration-500" alt="${activity.title}">
                            <div class="absolute inset-0 bg-gradient-to-t from-black/60 via-transparent to-transparent"></div>
                            <div class="absolute top-3 right-3 flex flex-col gap-2">
                                ${getActivityStatusTag(activity.activityStatus)}
                            </div>
                            <div class="absolute top-3 left-3">
                                ${getCategoryTag(activity.category)}
                            </div>
                        </div>
                        <div class="p-4">
                            <h4 class="text-sm font-semibold text-gray-900 mb-2 line-clamp-2 leading-snug">${activity.title}</h4>
                            <p class="text-xs text-gray-500 mb-3 line-clamp-2">${activity.summary}</p>
                            <div class="space-y-1.5 text-xs text-gray-500 mb-3">
                                <div class="flex items-center gap-1.5">
                                    <i class="far fa-calendar text-gray-400"></i>
                                    <span>${activity.time}</span>
                                </div>
                                <div class="flex items-center gap-1.5">
                                    <i class="fas fa-map-marker-alt text-gray-400"></i>
                                    <span>${activity.location}</span>
                                </div>
                                <div class="flex items-center gap-1.5">
                                    <i class="fas fa-users text-gray-400"></i>
                                    <span>已报名 ${activity.registrations} 人</span>
                                </div>
                            </div>
                            <div class="flex items-center gap-2 pt-3 border-t border-[#E2E8F0]">
                                ${ActivityStatusButton({
                                    activityStatus: activity.activityStatus,
                                    userStatus: activity.userStatus,
                                    activityId: activity.id,
                                    signInTime: activity.signInTime,
                                    hasMaterials: activity.hasMaterials,
                                    hasVideo: activity.hasVideo
                                })}
                            </div>
                        </div>
                    </div>
                `).join('');
            }

            renderPagination(totalPages);
        }

        function renderPagination(totalPages) {
            const container = document.getElementById('pagination');
            if (totalPages <= 1) {
                container.innerHTML = '';
                return;
            }

            let html = '';
            html += `<button onclick="goToPage(${currentPage - 1})" ${currentPage === 1 ? 'disabled' : ''} class="w-10 h-10 rounded-xl border border-[#E2E8F0] flex items-center justify-center hover:border-accent-blue transition-colors ${currentPage === 1 ? 'opacity-50 cursor-not-allowed' : ''}">
                <i class="fas fa-chevron-left text-gray-500"></i>
            </button>`;

            for (let i = 1; i <= totalPages; i++) {
                if (i === 1 || i === totalPages || (i >= currentPage - 1 && i <= currentPage + 1)) {
                    html += `<button onclick="goToPage(${i})" class="w-10 h-10 rounded-xl flex items-center justify-center transition-colors ${i === currentPage ? 'bg-accent-blue text-white' : 'border border-[#E2E8F0] hover:border-accent-blue text-gray-600'}">${i}</button>`;
                } else if (i === currentPage - 2 || i === currentPage + 2) {
                    html += `<span class="text-gray-400">...</span>`;
                }
            }

            html += `<button onclick="goToPage(${currentPage + 1})" ${currentPage === totalPages ? 'disabled' : ''} class="w-10 h-10 rounded-xl border border-[#E2E8F0] flex items-center justify-center hover:border-accent-blue transition-colors ${currentPage === totalPages ? 'opacity-50 cursor-not-allowed' : ''}">
                <i class="fas fa-chevron-right text-gray-500"></i>
            </button>`;

            container.innerHTML = html;
        }

        function goToPage(page) {
            const filtered = filterActivities();
            const totalPages = Math.ceil(filtered.length / pageSize);
            if (page < 1 || page > totalPages) return;
            currentPage = page;
            renderActivityList();
            window.scrollTo({ top: 0, behavior: 'smooth' });
        }

        function filterByCategory(category) {
            currentCategory = category;
            currentPage = 1;
            document.querySelectorAll('.filter-item').forEach(btn => btn.classList.remove('active'));
            event.target.classList.add('active');
            renderActivityList();
        }

        function filterByStatus(status) {
            currentStatus = status;
            currentPage = 1;
            document.querySelectorAll('.filter-btn').forEach(btn => btn.classList.remove('active'));
            event.target.classList.add('active');
            renderActivityList();
        }

        function filterByTime(time) {
            currentTime = time;
            currentPage = 1;
            renderActivityList();
        }

        function handleSearch() {
            currentSearch = document.getElementById('searchInput').value;
            currentPage = 1;
            renderActivityList();
        }

        function handleSort() {
            currentSort = document.getElementById('sortSelect').value;
            renderActivityList();
        }

        function goToDetail(id) {
            // 跳转到index.html并打开详情页
            window.location.href = `index.html?detail=${id}`;
        }

        function openRegistration(id) {
            showToast('请在活动详情页进行报名', 'info');
        }

        function openSignInModal(id) {
            showToast('签到码已生成，请在活动现场出示', 'info');
        }

        function showToast(message, type = 'success') {
            const container = document.getElementById('toastContainer');
            const toast = document.createElement('div');
            const bgColor = type === 'success' ? 'bg-green-500' : type === 'error' ? 'bg-red-500' : 'bg-accent-blue';
            const icon = type === 'success' ? 'check-circle' : type === 'error' ? 'times-circle' : 'info-circle';
            toast.className = `toast ${bgColor} text-white px-5 py-3 rounded-xl shadow-lg flex items-center gap-3`;
            toast.innerHTML = `<i class="fas fa-${icon}"></i><span>${message}</span>`;
            container.appendChild(toast);
            setTimeout(() => toast.remove(), 3000);
        }

        // 初始化
        document.addEventListener('DOMContentLoaded', function() {
            renderActivityList();
        });
    </script>
</body>
</html>
