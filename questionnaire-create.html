<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>新建问卷 - 内容中台系统</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        'primary-bg': '#FFFFFF',
                        'secondary-bg': '#F8FAFC',
                        'card-bg': '#FFFFFF',
                        'border-dark': '#CBD5E1',
                        'accent-blue': '#0A61FF',
                        'accent-cyan': '#0891B2',
                        'accent-green': '#059669',
                        'accent-amber': '#D97706',
                        'accent-red': '#DC2626',
                        'text-primary': '#0F172A',
                        'text-secondary': '#475569',
                        'text-muted': '#94A3B8'
                    }
                }
            }
        }
    </script>
    <style>
        * { font-family: 'PingFang SC', 'Microsoft YaHei', sans-serif; }
        ::-webkit-scrollbar { width: 6px; height: 6px; }
        ::-webkit-scrollbar-track { background: #F1F5F9; }
        ::-webkit-scrollbar-thumb { background: #CBD5E1; border-radius: 3px; }
        .tab-btn.active { border-bottom: 2px solid #0A61FF; color: #0A61FF; }
        .toast { animation: slideIn 0.3s ease; }
        @keyframes slideIn { from { transform: translateX(100%); opacity: 0; } to { transform: translateX(0); opacity: 1; } }

        /* 字段构建器 */
        .field-item { transition: all .15s; cursor: pointer; border-left: 3px solid transparent; }
        .field-item:hover { background: #F8FAFC; }
        .field-item.selected { background: rgba(10, 97, 255, 0.06); border-left-color: #0A61FF; }
        .field-item.selected .field-index { background: #0A61FF; color: white; }

        /* 题型选择磁贴 */
        .type-tile { transition: all .15s; cursor: pointer; }
        .type-tile:hover { border-color: #0A61FF; background: rgba(10, 97, 255, 0.04); transform: translateY(-2px); }

        /* 开关 (toggle) */
        .toggle { width: 40px; height: 22px; border-radius: 999px; background: #CBD5E1; position: relative; cursor: pointer; transition: background .2s; flex-shrink: 0; }
        .toggle::after { content: ''; position: absolute; top: 2px; left: 2px; width: 18px; height: 18px; border-radius: 50%; background: white; transition: transform .2s; box-shadow: 0 1px 3px rgba(0,0,0,.2); }
        .toggle.on { background: #0A61FF; }
        .toggle.on::after { transform: translateX(18px); }
        .toggle.disabled { opacity: 0.4; cursor: not-allowed; }

        /* 字段类型 pill */
        .type-pill { display: inline-flex; align-items: center; padding: 1px 8px; font-size: 10px; border-radius: 999px; font-weight: 500; }
        .type-pill.text       { background: #DBEAFE; color: #1D4ED8; }
        .type-pill.textarea   { background: #E0E7FF; color: #4338CA; }
        .type-pill.radio      { background: #D1FAE5; color: #047857; }
        .type-pill.checkbox   { background: #FEF3C7; color: #B45309; }
        .type-pill.select     { background: #EDE9FE; color: #6D28D9; }
        .type-pill.file       { background: #FFE4E6; color: #BE123C; }
    </style>
</head>
<body class="bg-secondary-bg text-gray-900">

    <main class="p-6 w-full">
        <!-- 页面标题 + 操作 -->
        <div class="flex items-center justify-between mb-6">
            <div>
                <h1 id="pageTitle" class="text-2xl font-semibold text-gray-900">新建问卷</h1>
                <p id="pageSubtitle" class="text-gray-500 mt-1">配置问卷基本信息、题目及收集设置</p>
            </div>
            <div class="flex items-center gap-3">
                <a href="questionnaire-list.html" class="px-4 py-2.5 border border-[#E2E8F0] rounded-xl hover:border-accent-blue transition-colors flex items-center gap-2 text-gray-600 hover:text-gray-900">
                    <i class="fas fa-arrow-left"></i>
                    返回列表
                </a>
                <button onclick="saveDraft()" class="px-5 py-2.5 border border-accent-blue text-accent-blue rounded-xl hover:bg-accent-blue hover:text-white transition-colors flex items-center gap-2">
                    <i class="fas fa-save"></i>
                    保存草稿
                </button>
                <button onclick="publish()" class="px-5 py-2.5 bg-accent-green text-white rounded-xl hover:bg-green-600 transition-colors flex items-center gap-2">
                    <i class="fas fa-paper-plane"></i>
                    发布
                </button>
            </div>
        </div>

        <!-- 表单卡片 -->
        <form id="qForm" class="bg-white rounded-xl border border-[#E2E8F0] overflow-hidden" onsubmit="return false;">
            <!-- Tab 导航 -->
            <div class="flex border-b border-[#E2E8F0] px-6 bg-gray-50">
                <button type="button" onclick="switchTab('basic')" id="tab-basic" class="tab-btn active px-6 py-3 text-sm font-medium border-b-2 border-[#0A61FF] text-[#0A61FF]">
                    基础信息
                </button>
                <button type="button" onclick="switchTab('design')" id="tab-design" class="tab-btn px-6 py-3 text-sm font-medium border-b-2 border-transparent text-gray-600 hover:text-gray-900">
                    设计题目 <span id="tabDesignCount" class="ml-1 px-1.5 py-0.5 rounded-full bg-gray-100 text-gray-500 text-xs">0</span>
                </button>
                <button type="button" onclick="switchTab('settings')" id="tab-settings" class="tab-btn px-6 py-3 text-sm font-medium border-b-2 border-transparent text-gray-600 hover:text-gray-900">
                    设置
                </button>
                <button type="button" onclick="switchTab('preview')" id="tab-preview" class="tab-btn px-6 py-3 text-sm font-medium border-b-2 border-transparent text-gray-600 hover:text-gray-900">
                    预览
                </button>
            </div>

            <div class="p-6">
                <!-- ========================== Tab1: 基础信息 ========================== -->
                <div id="panel-basic" class="tab-panel">
                    <div class="grid grid-cols-2 gap-6">
                        <div class="col-span-2">
                            <label class="block text-sm text-gray-600 mb-2">问卷标题 <span class="text-accent-red">*</span></label>
                            <input type="text" id="qTitle" placeholder="如：客户满意度调研" class="w-full bg-white border border-[#E2E8F0] rounded-xl px-4 py-3 text-sm focus:border-accent-blue focus:outline-none">
                        </div>
                        <div class="col-span-2">
                            <label class="block text-sm text-gray-600 mb-2">问卷描述</label>
                            <textarea id="qDescription" rows="3" placeholder="向填写者说明目的，预计花费时间等" class="w-full bg-white border border-[#E2E8F0] rounded-xl px-4 py-3 text-sm focus:border-accent-blue focus:outline-none"></textarea>
                        </div>
                        <div>
                            <label class="block text-sm text-gray-600 mb-2">分类 <span class="text-accent-red">*</span></label>
                            <select id="qCategory" class="w-full bg-white border border-[#E2E8F0] rounded-xl px-4 py-3 text-sm focus:border-accent-blue focus:outline-none">
                                <option value="tech">科技创新</option>
                                <option value="culture">文化活动</option>
                                <option value="sports">体育运动</option>
                                <option value="education">教育培训</option>
                                <option value="other">其他</option>
                            </select>
                        </div>
                        <div>
                            <label class="block text-sm text-gray-600 mb-2">封面图 URL（可选）</label>
                            <input type="text" id="qCover" placeholder="https://..." class="w-full bg-white border border-[#E2E8F0] rounded-xl px-4 py-3 text-sm focus:border-accent-blue focus:outline-none">
                        </div>
                        <div>
                            <label class="block text-sm text-gray-600 mb-2">有效开始时间</label>
                            <input type="datetime-local" id="qValidStart" class="w-full bg-white border border-[#E2E8F0] rounded-xl px-4 py-3 text-sm focus:border-accent-blue focus:outline-none">
                        </div>
                        <div>
                            <label class="block text-sm text-gray-600 mb-2">有效结束时间</label>
                            <input type="datetime-local" id="qValidEnd" class="w-full bg-white border border-[#E2E8F0] rounded-xl px-4 py-3 text-sm focus:border-accent-blue focus:outline-none">
                        </div>
                        <div class="col-span-2">
                            <div class="flex items-center justify-between p-4 border border-[#E2E8F0] rounded-xl">
                                <div>
                                    <div class="text-sm font-medium text-gray-900">匿名收集</div>
                                    <div class="text-xs text-gray-500 mt-0.5">开启后不记录填写人姓名、手机号等信息</div>
                                </div>
                                <div id="toggleAnonymous" class="toggle" onclick="toggleSwitch('anonymous')"></div>
                            </div>
                        </div>
                    </div>
                </div>

                <!-- ========================== Tab2: 设计题目 ========================== -->
                <div id="panel-design" class="tab-panel hidden">
                    <div class="bg-white border border-[#E2E8F0] rounded-xl overflow-hidden">
                        <!-- toolbar -->
                        <div id="fieldToolbar" class="flex items-center justify-between px-5 py-3 border-b border-[#E2E8F0] bg-gray-50">
                            <div class="text-sm">
                                <span class="font-medium text-gray-900">设计题目</span>
                                <span id="fieldSummary" class="ml-3 text-gray-500">全部 0 题 · 必填 0 题</span>
                            </div>
                            <button type="button" onclick="openAddFieldModal()" class="px-4 py-2 bg-accent-blue text-white rounded-lg hover:bg-blue-600 flex items-center gap-2 text-sm">
                                <i class="fas fa-plus"></i> 添加题目
                            </button>
                        </div>

                        <!-- 双栏布局 -->
                        <div class="grid grid-cols-5 min-h-[480px]">
                            <!-- 左：字段列表 -->
                            <div class="col-span-2 border-r border-[#E2E8F0] bg-gray-50/30 max-h-[600px] overflow-y-auto">
                                <div id="fieldList">
                                    <!-- empty state -->
                                    <div id="fieldEmpty" class="flex flex-col items-center justify-center py-20 px-6 text-center">
                                        <i class="fas fa-clipboard-list text-4xl text-gray-300 mb-3"></i>
                                        <p class="text-sm text-gray-500">尚未添加任何题目</p>
                                        <p class="text-xs text-gray-400 mt-1">点击右上角「添加题目」开始</p>
                                    </div>
                                </div>
                            </div>

                            <!-- 右：配置面板 -->
                            <div class="col-span-3 p-6 max-h-[600px] overflow-y-auto">
                                <div id="configPanel">
                                    <div id="configEmpty" class="flex flex-col items-center justify-center py-20 text-center">
                                        <i class="fas fa-hand-pointer text-3xl text-gray-300 mb-3"></i>
                                        <p class="text-sm text-gray-500">请在左侧选择一道题进行配置</p>
                                    </div>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>

                <!-- ========================== Tab3: 设置 ========================== -->
                <div id="panel-settings" class="tab-panel hidden">
                    <div class="grid grid-cols-2 gap-6">
                        <div class="col-span-2">
                            <label class="block text-sm text-gray-600 mb-2">提交后致谢文本</label>
                            <textarea id="qThankYou" rows="2" placeholder="如：感谢您的参与！" class="w-full bg-white border border-[#E2E8F0] rounded-xl px-4 py-3 text-sm focus:border-accent-blue focus:outline-none"></textarea>
                        </div>
                        <div class="col-span-2">
                            <div class="flex items-center justify-between p-4 border border-[#E2E8F0] rounded-xl">
                                <div>
                                    <div class="text-sm font-medium text-gray-900">允许重复提交</div>
                                    <div class="text-xs text-gray-500 mt-0.5">关闭后，同一填写者只能提交一次</div>
                                </div>
                                <div id="toggleAllowMultiple" class="toggle" onclick="toggleSwitch('allowMultiple')"></div>
                            </div>
                        </div>
                        <div class="col-span-2">
                            <div class="flex items-center justify-between p-4 border border-[#E2E8F0] rounded-xl">
                                <div>
                                    <div class="text-sm font-medium text-gray-900">收集填写人信息</div>
                                    <div class="text-xs text-gray-500 mt-0.5">开启后顶部内置姓名、手机号字段</div>
                                </div>
                                <div id="toggleCollectUserInfo" class="toggle" onclick="toggleSwitch('collectUserInfo')"></div>
                            </div>
                        </div>
                        <div class="col-span-2">
                            <label class="block text-sm text-gray-600 mb-2">提交截止时间</label>
                            <input type="datetime-local" id="qDeadline" class="w-full bg-white border border-[#E2E8F0] rounded-xl px-4 py-3 text-sm focus:border-accent-blue focus:outline-none">
                        </div>
                        <div class="col-span-2">
                            <label class="block text-sm text-gray-600 mb-2">其他说明（管理员可见，可选）</label>
                            <textarea id="qOtherNotes" rows="3" placeholder="仅后台可见，不会展示给填写者" class="w-full bg-white border border-[#E2E8F0] rounded-xl px-4 py-3 text-sm focus:border-accent-blue focus:outline-none"></textarea>
                        </div>
                    </div>
                </div>

                <!-- ========================== Tab4: 预览 ========================== -->
                <div id="panel-preview" class="tab-panel hidden">
                    <div id="previewContainer">
                        <div class="flex flex-col items-center justify-center py-20 text-center text-gray-400">
                            <i class="fas fa-eye text-4xl mb-3 text-gray-300"></i>
                            <p class="text-sm">添加题目后此处可预览</p>
                        </div>
                    </div>
                </div>
            </div>
        </form>
    </main>

    <!-- Toast容器 -->
    <div id="toastContainer" class="fixed bottom-6 right-6 z-50 flex flex-col gap-2"></div>

    <!-- ========================== 添加题目弹窗 ========================== -->
    <div id="addFieldModal" class="fixed inset-0 bg-black/70 z-[90] hidden items-center justify-center">
        <div class="bg-white rounded-2xl w-[640px] border border-[#E2E8F0] shadow-2xl">
            <div class="flex items-center justify-between px-6 py-4 border-b border-[#E2E8F0]">
                <h3 class="text-lg font-medium">选择题目类型</h3>
                <button onclick="closeAddFieldModal()" class="text-gray-500 hover:text-gray-700">
                    <i class="fas fa-times text-xl"></i>
                </button>
            </div>
            <div class="p-6">
                <div class="grid grid-cols-3 gap-4">
                    <div onclick="addField('text')" class="type-tile border-2 border-[#E2E8F0] rounded-xl p-4 flex flex-col items-center text-center">
                        <i class="fas fa-font text-2xl text-blue-500 mb-3"></i>
                        <div class="text-sm font-medium">单行文本</div>
                        <div class="text-xs text-gray-500 mt-1">短文本输入</div>
                    </div>
                    <div onclick="addField('textarea')" class="type-tile border-2 border-[#E2E8F0] rounded-xl p-4 flex flex-col items-center text-center">
                        <i class="fas fa-align-left text-2xl text-indigo-500 mb-3"></i>
                        <div class="text-sm font-medium">多行文本</div>
                        <div class="text-xs text-gray-500 mt-1">长文本输入</div>
                    </div>
                    <div onclick="addField('radio')" class="type-tile border-2 border-[#E2E8F0] rounded-xl p-4 flex flex-col items-center text-center">
                        <i class="fas fa-dot-circle text-2xl text-green-500 mb-3"></i>
                        <div class="text-sm font-medium">单选题</div>
                        <div class="text-xs text-gray-500 mt-1">单选一项</div>
                    </div>
                    <div onclick="addField('checkbox')" class="type-tile border-2 border-[#E2E8F0] rounded-xl p-4 flex flex-col items-center text-center">
                        <i class="fas fa-check-square text-2xl text-amber-500 mb-3"></i>
                        <div class="text-sm font-medium">多选题</div>
                        <div class="text-xs text-gray-500 mt-1">多选 N 项</div>
                    </div>
                    <div onclick="addField('select')" class="type-tile border-2 border-[#E2E8F0] rounded-xl p-4 flex flex-col items-center text-center">
                        <i class="fas fa-list text-2xl text-purple-500 mb-3"></i>
                        <div class="text-sm font-medium">下拉选择</div>
                        <div class="text-xs text-gray-500 mt-1">下拉单选</div>
                    </div>
                    <div onclick="addField('file')" class="type-tile border-2 border-[#E2E8F0] rounded-xl p-4 flex flex-col items-center text-center">
                        <i class="fas fa-paperclip text-2xl text-rose-500 mb-3"></i>
                        <div class="text-sm font-medium">文件上传</div>
                        <div class="text-xs text-gray-500 mt-1">附件提交</div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        /* =====================================================================
         * 默认值 / 工具
         * ===================================================================== */
        const STORAGE_KEY = 'questionnaires_data';
        const TYPE_LABELS = {
            text: '单行文本', textarea: '多行文本',
            radio: '单选题', checkbox: '多选题',
            select: '下拉选择', file: '文件上传'
        };

        function newQuestionnaire() {
            return {
                id: 'q_' + Date.now() + '_' + Math.random().toString(36).slice(2, 6),
                title: '', description: '', cover: '', category: 'tech',
                status: 'draft', fields: [],
                validStartTime: '', validEndTime: '',
                settings: {
                    anonymous: false,
                    allowMultiple: false,
                    collectUserInfo: false,
                    deadline: '',
                    thankYouMessage: '',
                    otherNotes: ''
                },
                createdBy: '张明远',
                createdAt: new Date().toISOString(),
                updatedAt: new Date().toISOString(),
                publishedAt: null,
                responseCount: 0
            };
        }

        function loadList() {
            try {
                const s = sessionStorage.getItem(STORAGE_KEY);
                if (s) return JSON.parse(s);
            } catch (e) {}
            return [];
        }

        function saveList(list) {
            try { sessionStorage.setItem(STORAGE_KEY, JSON.stringify(list)); } catch (e) {}
        }

        function escapeHtml(s) {
            return String(s == null ? '' : s)
                .replace(/&/g, '&amp;').replace(/</g, '&lt;')
                .replace(/>/g, '&gt;').replace(/"/g, '&quot;')
                .replace(/'/g, '&#39;');
        }

        function genFieldId() {
            return 'f_' + Date.now() + '_' + Math.random().toString(36).slice(2, 6);
        }

        function genOptId() {
            return 'o_' + Date.now() + '_' + Math.random().toString(36).slice(2, 5);
        }

        /* =====================================================================
         * 全局状态
         * ===================================================================== */
        let q = newQuestionnaire();
        let currentFieldId = null;
        let currentTab = 'basic';
        let isEdit = false;

        /* =====================================================================
         * 初始化
         * ===================================================================== */
        document.addEventListener('DOMContentLoaded', function () {
            const params = new URLSearchParams(location.search);
            const id = params.get('id');
            if (id) {
                const list = loadList();
                const found = list.find(x => x.id === id);
                if (found) {
                    q = JSON.parse(JSON.stringify(found));
                    isEdit = true;
                    document.getElementById('pageTitle').textContent = '编辑问卷';
                    document.getElementById('pageSubtitle').textContent = '编辑题目、设置与基础信息';
                }
            }
            // 老数据兼容：确保 settings 存在
            if (!q.settings) q.settings = { anonymous: false, allowMultiple: false, collectUserInfo: false, deadline: '', thankYouMessage: '', otherNotes: '' };

            hydrateBasicForm();
            hydrateSettingsForm();
            applyToggles();
            updateDesignCount();
        });

        function hydrateBasicForm() {
            document.getElementById('qTitle').value = q.title || '';
            document.getElementById('qDescription').value = q.description || '';
            document.getElementById('qCategory').value = q.category || 'tech';
            document.getElementById('qCover').value = q.cover || '';
            document.getElementById('qValidStart').value = q.validStartTime || '';
            document.getElementById('qValidEnd').value = q.validEndTime || '';
        }

        function hydrateSettingsForm() {
            const s = q.settings;
            document.getElementById('qThankYou').value = s.thankYouMessage || '';
            document.getElementById('qDeadline').value = s.deadline || '';
            document.getElementById('qOtherNotes').value = s.otherNotes || '';
        }

        function collectBasicForm() {
            q.title = document.getElementById('qTitle').value.trim();
            q.description = document.getElementById('qDescription').value.trim();
            q.category = document.getElementById('qCategory').value;
            q.cover = document.getElementById('qCover').value.trim();
            q.validStartTime = document.getElementById('qValidStart').value;
            q.validEndTime = document.getElementById('qValidEnd').value;
        }

        function collectSettingsForm() {
            const s = q.settings;
            s.thankYouMessage = document.getElementById('qThankYou').value.trim();
            s.deadline = document.getElementById('qDeadline').value;
            s.otherNotes = document.getElementById('qOtherNotes').value.trim();
        }

        /* =====================================================================
         * Tab 切换
         * ===================================================================== */
        function switchTab(tab) {
            if (currentTab === tab) return;
            // 离开时收集表单
            if (currentTab === 'basic') collectBasicForm();
            if (currentTab === 'settings') collectSettingsForm();

            currentTab = tab;
            const tabMap = { basic: '基础信息', design: '设计题目', settings: '设置', preview: '预览' };
            document.querySelectorAll('.tab-btn').forEach(b => b.classList.toggle('active', b.id === 'tab-' + tab));
            document.querySelectorAll('.tab-panel').forEach(p => p.classList.toggle('hidden', p.id !== 'panel-' + tab));

            if (tab === 'design') {
                renderFieldList();
                renderConfigPanel();
            }
            if (tab === 'preview') {
                // 进入预览时确保表单已收集
                collectBasicForm();
                collectSettingsForm();
                renderPreview();
            }
        }

        /* =====================================================================
         * Toggles
         * ===================================================================== */
        function applyToggles() {
            const s = q.settings;
            setToggle('toggleAnonymous', s.anonymous);
            setToggle('toggleAllowMultiple', s.allowMultiple);
            setToggle('toggleCollectUserInfo', s.collectUserInfo);
            syncCollectUserInfoAvailability();
        }

        function setToggle(id, on) {
            const el = document.getElementById(id);
            el.classList.toggle('on', !!on);
        }

        function toggleSwitch(name) {
            const s = q.settings;
            if (name === 'anonymous') {
                s.anonymous = !s.anonymous;
                setToggle('toggleAnonymous', s.anonymous);
                if (s.anonymous) {
                    // 强制关闭 collectUserInfo
                    s.collectUserInfo = false;
                    setToggle('toggleCollectUserInfo', false);
                }
                syncCollectUserInfoAvailability();
            } else if (name === 'allowMultiple') {
                s.allowMultiple = !s.allowMultiple;
                setToggle('toggleAllowMultiple', s.allowMultiple);
            } else if (name === 'collectUserInfo') {
                if (s.anonymous) return; // disabled
                s.collectUserInfo = !s.collectUserInfo;
                setToggle('toggleCollectUserInfo', s.collectUserInfo);
            }
        }

        function syncCollectUserInfoAvailability() {
            const el = document.getElementById('toggleCollectUserInfo');
            el.classList.toggle('disabled', !!q.settings.anonymous);
        }

        /* =====================================================================
         * 字段构建器 - 状态操作
         * ===================================================================== */
        function openAddFieldModal() {
            document.getElementById('addFieldModal').classList.remove('hidden');
            document.getElementById('addFieldModal').classList.add('flex');
        }
        function closeAddFieldModal() {
            document.getElementById('addFieldModal').classList.add('hidden');
            document.getElementById('addFieldModal').classList.remove('flex');
        }

        function addField(type) {
            const id = genFieldId();
            const field = { id, type, label: '未命名题目', required: false };
            if (type === 'text') {
                field.placeholder = '请输入';
                field.maxLength = 50;
            } else if (type === 'textarea') {
                field.placeholder = '请输入';
                field.maxLength = 500;
                field.rows = 4;
            } else if (type === 'radio' || type === 'select') {
                field.options = [
                    { id: genOptId(), label: '选项一' },
                    { id: genOptId(), label: '选项二' }
                ];
            } else if (type === 'checkbox') {
                field.options = [
                    { id: genOptId(), label: '选项一' },
                    { id: genOptId(), label: '选项二' }
                ];
                field.maxSelected = 2;
            } else if (type === 'file') {
                field.accept = '.pdf,.png,.jpg,.zip';
                field.maxSizeMB = 10;
                field.maxFiles = 1;
            }
            q.fields.push(field);
            currentFieldId = id;
            closeAddFieldModal();
            renderFieldList();
            renderConfigPanel();
            updateDesignCount();
        }

        function selectField(id) {
            currentFieldId = id;
            renderFieldList();
            renderConfigPanel();
        }

        function moveField(id, dir) {
            const idx = q.fields.findIndex(f => f.id === id);
            if (idx < 0) return;
            const newIdx = idx + dir;
            if (newIdx < 0 || newIdx >= q.fields.length) return;
            [q.fields[idx], q.fields[newIdx]] = [q.fields[newIdx], q.fields[idx]];
            renderFieldList();
            renderConfigPanel();
        }

        function deleteField(id) {
            const f = q.fields.find(x => x.id === id);
            if (!f) return;
            if (!confirm(`确认删除题：「${f.label}」？`)) return;
            q.fields = q.fields.filter(x => x.id !== id);
            if (currentFieldId === id) currentFieldId = q.fields[0]?.id || null;
            renderFieldList();
            renderConfigPanel();
            updateDesignCount();
        }

        function duplicateField(id) {
            const idx = q.fields.findIndex(f => f.id === id);
            if (idx < 0) return;
            const orig = q.fields[idx];
            const clone = JSON.parse(JSON.stringify(orig));
            clone.id = genFieldId();
            clone.label = (orig.label || '') + ' (副本)';
            if (Array.isArray(clone.options)) {
                clone.options = clone.options.map(o => ({ id: genOptId(), label: o.label }));
            }
            q.fields.splice(idx + 1, 0, clone);
            currentFieldId = clone.id;
            renderFieldList();
            renderConfigPanel();
            updateDesignCount();
        }

        function updateFieldProp(prop, value) {
            if (!currentFieldId) return;
            const f = q.fields.find(x => x.id === currentFieldId);
            if (!f) return;
            f[prop] = value;
            // 列表行需要刷新（label/required/type）
            renderFieldList();
        }

        /* =====================================================================
         * 选项操作（radio / checkbox / select）
         * ===================================================================== */
        function addOption() {
            if (!currentFieldId) return;
            const f = q.fields.find(x => x.id === currentFieldId);
            if (!f) return;
            if (!Array.isArray(f.options)) f.options = [];
            f.options.push({ id: genOptId(), label: `选项${String.fromCharCode(0x41 + f.options.length)}` });
            renderConfigPanel();
        }

        function updateOptionLabel(optId, label) {
            const f = q.fields.find(x => x.id === currentFieldId);
            if (!f || !f.options) return;
            const o = f.options.find(x => x.id === optId);
            if (o) { o.label = label; renderFieldList(); }
        }

        function deleteOption(optId) {
            const f = q.fields.find(x => x.id === currentFieldId);
            if (!f || !f.options) return;
            if (f.options.length <= 1) { showToast('至少保留一个选项', 'warning'); return; }
            f.options = f.options.filter(x => x.id !== optId);
            renderConfigPanel();
        }

        function moveOption(optId, dir) {
            const f = q.fields.find(x => x.id === currentFieldId);
            if (!f || !f.options) return;
            const idx = f.options.findIndex(o => o.id === optId);
            if (idx < 0) return;
            const newIdx = idx + dir;
            if (newIdx < 0 || newIdx >= f.options.length) return;
            [f.options[idx], f.options[newIdx]] = [f.options[newIdx], f.options[idx]];
            renderConfigPanel();
        }

        /* =====================================================================
         * 渲染：字段列表（左）
         * ===================================================================== */
        function renderFieldList() {
            const wrap = document.getElementById('fieldList');
            const empty = document.getElementById('fieldEmpty');
            if (!q.fields || q.fields.length === 0) {
                wrap.innerHTML = `
                    <div class="flex flex-col items-center justify-center py-20 px-6 text-center">
                        <i class="fas fa-clipboard-list text-4xl text-gray-300 mb-3"></i>
                        <p class="text-sm text-gray-500">尚未添加任何题目</p>
                        <p class="text-xs text-gray-400 mt-1">点击右上角「添加题目」开始</p>
                    </div>`;
                return;
            }
            wrap.innerHTML = q.fields.map((f, i) => `
                <div class="field-item ${f.id === currentFieldId ? 'selected' : ''} px-4 py-3 border-b border-[#E2E8F0]"
                     onclick="selectField('${f.id}')">
                    <div class="flex items-start gap-3">
                        <div class="field-index w-6 h-6 rounded-full bg-gray-200 text-gray-600 flex items-center justify-center text-xs font-medium flex-shrink-0">
                            ${i + 1}
                        </div>
                        <div class="flex-1 min-w-0">
                            <div class="flex items-center gap-1.5">
                                <span class="text-sm font-medium text-gray-900 truncate">${escapeHtml(f.label || '未命名题目')}</span>
                                ${f.required ? '<span class="text-accent-red text-xs">*</span>' : ''}
                            </div>
                            <div class="flex items-center gap-1.5 mt-1">
                                <span class="type-pill ${f.type}">${TYPE_LABELS[f.type] || f.type}</span>
                                ${f.options ? `<span class="text-xs text-gray-400">${f.options.length} 项</span>` : ''}
                            </div>
                        </div>
                    </div>
                </div>
            `).join('');
        }

        function updateDesignCount() {
            const c = q.fields.length;
            const req = q.fields.filter(f => f.required).length;
            document.getElementById('tabDesignCount').textContent = c;
            document.getElementById('fieldSummary').textContent = `全部 ${c} 题 · 必填 ${req} 题`;
        }

        /* =====================================================================
         * 渲染：配置面板（右）
         * ===================================================================== */
        function renderConfigPanel() {
            const wrap = document.getElementById('configPanel');
            const f = q.fields.find(x => x.id === currentFieldId);
            if (!f) {
                wrap.innerHTML = `
                    <div class="flex flex-col items-center justify-center py-20 text-center">
                        <i class="fas fa-hand-pointer text-3xl text-gray-300 mb-3"></i>
                        <p class="text-sm text-gray-500">请在左侧选择一道题进行配置</p>
                    </div>`;
                return;
            }

            let html = '';
            // 通用部分
            html += `
                <div class="space-y-4">
                    <div>
                        <label class="block text-sm text-gray-600 mb-2">题目类型</label>
                        <select onchange="updateFieldProp('type', this.value); renderConfigPanel();" class="w-full bg-white border border-[#E2E8F0] rounded-lg px-3 py-2 text-sm focus:border-accent-blue focus:outline-none">
                            ${Object.keys(TYPE_LABELS).map(t => `<option value="${t}" ${t === f.type ? 'selected' : ''}>${TYPE_LABELS[t]}</option>`).join('')}
                        </select>
                    </div>
                    <div>
                        <label class="block text-sm text-gray-600 mb-2">题目内容</label>
                        <input type="text" value="${escapeHtml(f.label)}" oninput="updateFieldProp('label', this.value)"
                               class="w-full bg-white border border-[#E2E8F0] rounded-lg px-3 py-2 text-sm focus:border-accent-blue focus:outline-none">
                    </div>
                    <div class="flex items-center justify-between p-3 border border-[#E2E8F0] rounded-lg">
                        <span class="text-sm text-gray-700">必填</span>
                        <div class="toggle ${f.required ? 'on' : ''}" onclick="f_requiredToggle('${f.id}')"></div>
                    </div>
            `;

            // 类型特定部分
            if (f.type === 'text') {
                html += `
                    <div>
                        <label class="block text-sm text-gray-600 mb-2">占位提示</label>
                        <input type="text" value="${escapeHtml(f.placeholder || '')}" oninput="updateFieldProp('placeholder', this.value)"
                               class="w-full bg-white border border-[#E2E8F0] rounded-lg px-3 py-2 text-sm focus:border-accent-blue focus:outline-none">
                    </div>
                    <div>
                        <label class="block text-sm text-gray-600 mb-2">最大长度</label>
                        <input type="number" min="1" max="500" value="${f.maxLength || 50}" oninput="updateFieldProp('maxLength', parseInt(this.value))"
                               class="w-full bg-white border border-[#E2E8F0] rounded-lg px-3 py-2 text-sm focus:border-accent-blue focus:outline-none">
                    </div>
                `;
            } else if (f.type === 'textarea') {
                html += `
                    <div>
                        <label class="block text-sm text-gray-600 mb-2">占位提示</label>
                        <input type="text" value="${escapeHtml(f.placeholder || '')}" oninput="updateFieldProp('placeholder', this.value)"
                               class="w-full bg-white border border-[#E2E8F0] rounded-lg px-3 py-2 text-sm focus:border-accent-blue focus:outline-none">
                    </div>
                    <div>
                        <label class="block text-sm text-gray-600 mb-2">最大字符数</label>
                        <input type="number" min="1" max="2000" value="${f.maxLength || 500}" oninput="updateFieldProp('maxLength', parseInt(this.value))"
                               class="w-full bg-white border border-[#E2E8F0] rounded-lg px-3 py-2 text-sm focus:border-accent-blue focus:outline-none">
                    </div>
                `;
            } else if (f.type === 'radio' || f.type === 'checkbox' || f.type === 'select') {
                html += renderOptionsPanel(f);
            } else if (f.type === 'file') {
                html += `
                    <div>
                        <label class="block text-sm text-gray-600 mb-2">允许的文件类型</label>
                        <input type="text" value="${escapeHtml(f.accept || '')}" oninput="updateFieldProp('accept', this.value)"
                               placeholder=".pdf,.png,.jpg,.zip"
                               class="w-full bg-white border border-[#E2E8F0] rounded-lg px-3 py-2 text-sm focus:border-accent-blue focus:outline-none">
                        <p class="text-xs text-gray-400 mt-1">用英文逗号分隔扩展名，如 .pdf,.png</p>
                    </div>
                    <div class="grid grid-cols-2 gap-3">
                        <div>
                            <label class="block text-sm text-gray-600 mb-2">单文件大小 (MB)</label>
                            <input type="number" min="1" max="100" value="${f.maxSizeMB || 10}" oninput="updateFieldProp('maxSizeMB', parseInt(this.value))"
                                   class="w-full bg-white border border-[#E2E8F0] rounded-lg px-3 py-2 text-sm focus:border-accent-blue focus:outline-none">
                        </div>
                        <div>
                            <label class="block text-sm text-gray-600 mb-2">最多文件数</label>
                            <input type="number" min="1" max="9" value="${f.maxFiles || 1}" oninput="updateFieldProp('maxFiles', parseInt(this.value))"
                                   class="w-full bg-white border border-[#E2E8F0] rounded-lg px-3 py-2 text-sm focus:border-accent-blue focus:outline-none">
                        </div>
                    </div>
                `;
            }

            // 底部操作
            const idx = q.fields.findIndex(x => x.id === f.id);
            const isFirst = idx === 0;
            const isLast = idx === q.fields.length - 1;
            html += `
                <div class="pt-4 border-t border-[#E2E8F0] flex items-center justify-between">
                    <button onclick="deleteField('${f.id}')" type="button" class="text-sm text-accent-red hover:text-red-700 flex items-center gap-1">
                        <i class="fas fa-trash-alt"></i> 删除题目
                    </button>
                    <div class="flex items-center gap-2">
                        <button onclick="moveField('${f.id}', -1)" type="button" ${isFirst ? 'disabled' : ''} class="text-sm text-gray-600 hover:text-gray-900 px-2 py-1 border border-[#E2E8F0] rounded-lg disabled:opacity-40 disabled:cursor-not-allowed">
                            <i class="fas fa-arrow-up"></i>
                        </button>
                        <button onclick="moveField('${f.id}', 1)" type="button" ${isLast ? 'disabled' : ''} class="text-sm text-gray-600 hover:text-gray-900 px-2 py-1 border border-[#E2E8F0] rounded-lg disabled:opacity-40 disabled:cursor-not-allowed">
                            <i class="fas fa-arrow-down"></i>
                        </button>
                        <button onclick="duplicateField('${f.id}')" type="button" class="text-sm text-gray-600 hover:text-gray-900 px-2 py-1 border border-[#E2E8F0] rounded-lg">
                            <i class="fas fa-copy"></i> 复制
                        </button>
                    </div>
                </div>
                </div>
            `;
            wrap.innerHTML = html;
        }

        function renderOptionsPanel(f) {
            return `
                <div>
                    <div class="flex items-center justify-between mb-2">
                        <label class="text-sm text-gray-600">选项</label>
                        <button onclick="addOption()" type="button" class="text-xs text-accent-blue hover:text-blue-700 flex items-center gap-1">
                            <i class="fas fa-plus"></i> 添加选项
                        </button>
                    </div>
                    <div class="space-y-2">
                        ${(f.options || []).map((o, i) => `
                            <div class="flex items-center gap-2 p-2 border border-[#E2E8F0] rounded-lg">
                                <span class="w-6 h-6 rounded-full bg-gray-100 text-gray-500 flex items-center justify-center text-xs">${i + 1}</span>
                                <input type="text" value="${escapeHtml(o.label)}"
                                       oninput="updateOptionLabel('${o.id}', this.value)"
                                       class="flex-1 bg-transparent text-sm focus:outline-none">
                                <button onclick="moveOption('${o.id}', -1)" type="button" ${i === 0 ? 'disabled' : ''} class="text-gray-400 hover:text-gray-700 px-1 disabled:opacity-30"><i class="fas fa-arrow-up text-xs"></i></button>
                                <button onclick="moveOption('${o.id}', 1)" type="button" ${i === f.options.length - 1 ? 'disabled' : ''} class="text-gray-400 hover:text-gray-700 px-1 disabled:opacity-30"><i class="fas fa-arrow-down text-xs"></i></button>
                                <button onclick="deleteOption('${o.id}')" type="button" class="text-gray-400 hover:text-accent-red px-1"><i class="fas fa-times text-xs"></i></button>
                            </div>
                        `).join('')}
                    </div>
                    ${f.type === 'checkbox' ? `
                        <div class="mt-3">
                            <label class="block text-sm text-gray-600 mb-2">最多可选</label>
                            <input type="number" min="1" max="${(f.options || []).length}" value="${f.maxSelected || 2}" oninput="updateFieldProp('maxSelected', parseInt(this.value))"
                                   class="w-full bg-white border border-[#E2E8F0] rounded-lg px-3 py-2 text-sm focus:border-accent-blue focus:outline-none">
                        </div>
                    ` : ''}
                </div>
            `;
        }

        // 全局助手（被 inline onclick 调用）
        function f_requiredToggle(id) {
            const f = q.fields.find(x => x.id === id);
            if (!f) return;
            f.required = !f.required;
            renderFieldList();
            renderConfigPanel();
            updateDesignCount();
        }

        /* =====================================================================
         * 渲染：预览（共用 fill 页的渲染逻辑，此处简化版）
         * ===================================================================== */
        function renderPreview() {
            const container = document.getElementById('previewContainer');
            if (!q.title) {
                container.innerHTML = `
                    <div class="flex flex-col items-center justify-center py-20 text-center text-gray-400">
                        <i class="fas fa-exclamation-circle text-4xl mb-3 text-gray-300"></i>
                        <p class="text-sm">请先在「基础信息」Tab 填写问卷标题</p>
                    </div>`;
                return;
            }
            if (!q.fields || q.fields.length === 0) {
                container.innerHTML = `
                    <div class="flex flex-col items-center justify-center py-20 text-center text-gray-400">
                        <i class="fas fa-eye text-4xl mb-3 text-gray-300"></i>
                        <p class="text-sm">尚未添加题目，请在「设计题目」Tab 添加</p>
                    </div>`;
                return;
            }
            container.innerHTML = `
                <div class="max-w-[720px] mx-auto bg-secondary-bg p-8 rounded-xl">
                    <h2 class="text-2xl font-semibold text-center">${escapeHtml(q.title)}</h2>
                    ${q.description ? `<p class="text-center text-gray-500 mt-3 text-sm">${escapeHtml(q.description)}</p>` : ''}
                    <div class="mt-6 bg-white rounded-xl p-6 border border-[#E2E8F0] space-y-5">
                        ${q.fields.map(f => renderPreviewField(f)).join('')}
                    </div>
                    <div class="mt-6 flex items-center justify-between">
                        <span class="text-xs text-gray-500">共 ${q.fields.length} 题 · 必填 ${q.fields.filter(x => x.required).length} 题</span>
                        <button disabled class="px-6 py-2.5 bg-accent-blue text-white rounded-xl opacity-60 cursor-not-allowed">提交（预览）</button>
                    </div>
                </div>
            `;
        }

        function renderPreviewField(f) {
            const req = f.required ? '<span class="text-accent-red ml-1">*</span>' : '';
            let inner = '';
            if (f.type === 'text') {
                inner = `<input type="text" disabled placeholder="${escapeHtml(f.placeholder || '')}" maxlength="${f.maxLength || 50}"
                              class="w-full bg-white border border-[#E2E8F0] rounded-lg px-3 py-2 text-sm">`;
            } else if (f.type === 'textarea') {
                inner = `<textarea disabled rows="${f.rows || 4}" placeholder="${escapeHtml(f.placeholder || '')}" maxlength="${f.maxLength || 500}"
                                  class="w-full bg-white border border-[#E2E8F0] rounded-lg px-3 py-2 text-sm"></textarea>`;
            } else if (f.type === 'radio') {
                inner = `<div class="space-y-2">${(f.options || []).map(o => `
                    <label class="flex items-center gap-2 text-sm"><input type="radio" disabled name="preview_${f.id}" class="accent-accent-blue"> ${escapeHtml(o.label)}</label>
                `).join('')}</div>`;
            } else if (f.type === 'checkbox') {
                inner = `<div class="space-y-2">${(f.options || []).map(o => `
                    <label class="flex items-center gap-2 text-sm"><input type="checkbox" disabled class="accent-accent-blue"> ${escapeHtml(o.label)}</label>
                `).join('')}${f.maxSelected ? `<p class="text-xs text-gray-400 mt-2">最多可选 ${f.maxSelected} 项</p>` : ''}</div>`;
            } else if (f.type === 'select') {
                inner = `<select disabled class="w-full bg-white border border-[#E2E8F0] rounded-lg px-3 py-2 text-sm">
                    <option>请选择</option>
                    ${(f.options || []).map(o => `<option>${escapeHtml(o.label)}</option>`).join('')}
                </select>`;
            } else if (f.type === 'file') {
                inner = `<div class="border-2 border-dashed border-[#E2E8F0] rounded-lg p-4 text-center text-sm text-gray-400">
                    <i class="fas fa-cloud-upload-alt text-xl mb-1 block text-gray-300"></i>
                    ${f.accept ? `支持 ${escapeHtml(f.accept)}` : '未配置允许类型'} · 单文件 ≤ ${f.maxSizeMB || 10}MB · 最多 ${f.maxFiles || 1} 个
                </div>`;
            }
            return `
                <div>
                    <label class="block text-sm font-medium text-gray-900 mb-1">${escapeHtml(f.label || '未命名题目')}${req}</label>
                    ${inner}
                </div>
            `;
        }

        /* =====================================================================
         * 保存 / 发布
         * ===================================================================== */
        function validateBeforeSave() {
            collectBasicForm();
            collectSettingsForm();
            if (!q.title) {
                showToast('请填写问卷标题', 'warning');
                switchTab('basic');
                setTimeout(() => document.getElementById('qTitle').focus(), 100);
                return false;
            }
            // validStartTime / validEndTime 校验
            if (q.validStartTime && q.validEndTime && q.validStartTime > q.validEndTime) {
                showToast('有效开始时间不能晚于结束时间', 'warning');
                switchTab('basic');
                return false;
            }
            return true;
        }

        function persist(status) {
            q.updatedAt = new Date().toISOString();
            q.status = status;
            if (status === 'collecting' && !q.publishedAt) {
                q.publishedAt = new Date().toISOString();
            }
            const list = loadList();
            const idx = list.findIndex(x => x.id === q.id);
            if (idx >= 0) list[idx] = q; else list.push(q);
            saveList(list);
        }

        function saveDraft() {
            if (!validateBeforeSave()) return;
            persist('draft');
            showToast('草稿已保存', 'success');
            setTimeout(() => location.href = 'questionnaire-list.html', 600);
        }

        function publish() {
            if (!validateBeforeSave()) return;
            if (!q.fields || q.fields.length === 0) {
                showToast('请至少添加一题', 'warning');
                switchTab('design');
                return;
            }
            // 简单规则：所有 radio/checkbox/select 必须有至少 2 个选项
            for (const f of q.fields) {
                if ((f.type === 'radio' || f.type === 'checkbox' || f.type === 'select') && (!f.options || f.options.length < 2)) {
                    showToast(`题目「${f.label}」至少需要 2 个选项`, 'warning');
                    switchTab('design');
                    selectField(f.id);
                    return;
                }
            }
            persist('collecting');
            showToast('问卷已发布', 'success');
            setTimeout(() => location.href = 'questionnaire-list.html', 600);
        }

        /* =====================================================================
         * Toast
         * ===================================================================== */
        function showToast(message, type = 'success') {
            const container = document.getElementById('toastContainer');
            const toast = document.createElement('div');
            const bgColors = { success: 'bg-accent-green', error: 'bg-accent-red', warning: 'bg-accent-amber' };
            const icons   = { success: 'fa-check-circle', error: 'fa-exclamation-circle', warning: 'fa-exclamation-triangle' };
            toast.className = `toast ${bgColors[type]} text-white px-4 py-3 rounded-xl shadow-lg flex items-center gap-3`;
            toast.innerHTML = `<i class="fas ${icons[type]}"></i><span class="text-sm">${escapeHtml(message)}</span>`;
            container.appendChild(toast);
            setTimeout(() => {
                toast.style.opacity = '0';
                toast.style.transform = 'translateX(100%)';
                toast.style.transition = 'all 0.3s ease';
                setTimeout(() => toast.remove(), 300);
            }, 3000);
        }
    </script>
