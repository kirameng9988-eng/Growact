                extend: {
                    colors: {

                        'card-bg': '#0a1628',
                        'border-dark': '#1a2744',
                        'accent-blue': '#3b82f6',
                        'accent-cyan': '#06b6d4',
                        'accent-green': '#10b981',
                        'accent-amber': '#f59e0b',
                        'accent-red': '#ef4444',
                        'text-primary': '#f1f5f9',
                        'text-secondary': '#94a3b8',
                        'text-muted': '#475569'
                    }
                }
            }
        }
    </script>
    <style>
        * { font-family: 'PingFang SC', 'Microsoft YaHei', sans-serif; }
        .sidebar-menu-item:hover { background: rgba(59, 130, 246, 0.1); }

<body class="bg-primary-bg text-text-primary min-h-screen">

            <div class="px-4 mt-6 mb-2 text-xs text-text-muted uppercase tracking-wider">资源中心</div>
            <a href="resource-image.html" class="sidebar-menu-item flex items-center gap-3 px-4 py-3 text-sm cursor-pointer">

            <a href="resource-file.html" class="sidebar-menu-item flex items-center gap-3 px-4 py-3 text-sm cursor-pointer">

            <div class="px-4 mt-6 mb-2 text-xs text-text-muted uppercase tracking-wider">系统管理</div>
            <a href="system-user.html" class="sidebar-menu-item flex items-center gap-3 px-4 py-3 text-sm cursor-pointer">
                <i class="fas fa-users-cog w-5 text-text-secondary"></i>

            <a href="system-role.html" class="sidebar-menu-item flex items-center gap-3 px-4 py-3 text-sm cursor-pointer">

            <a href="system-config.html" class="sidebar-menu-item flex items-center gap-3 px-4 py-3 text-sm cursor-pointer">

    <main class="ml-[220px] mt-16 p-6">
        <div class="flex items-center justify-between mb-6">
            <div>
                <h1 class="text-2xl font-semibold">栏目管理</h1>
                <p class="text-text-muted mt-1">管理门户栏目结构，支持多级栏目配置</p>
            </div>
            <button onclick="openModal('addModal')" class="px-5 py-2.5 bg-accent-blue text-white rounded-xl hover:bg-blue-600 transition-colors flex items-center gap-2">
                <i class="fas fa-plus"></i>
                新增栏目
            </button>
        </div>

        <div class="grid grid-cols-3 gap-6">
            <!-- 栏目列表 -->
            <div class="col-span-2 bg-card-bg rounded-xl border border-border-dark p-5">
                <h3 class="text-lg font-medium mb-4">栏目结构</h3>
                <div class="border border-border-dark rounded-xl overflow-hidden">
                    <!-- 顶级栏目 -->
                    <div class="flex items-center justify-between p-4 bg-primary-bg/30 border-b border-border-dark cursor-pointer hover:bg-primary-bg/50 transition-colors">
                        <div class="flex items-center gap-3">
                            <i class="fas fa-chevron-down text-text-muted text-xs"></i>
                            <span class="font-medium">新闻中心</span>
                            <span class="px-2 py-0.5 bg-accent-blue/20 text-accent-blue text-xs rounded">启用</span>
                        </div>
                        <div class="flex items-center gap-2">
                            <button class="p-1.5 text-text-muted hover:text-accent-blue rounded"><i class="fas fa-plus"></i></button>
                            <button class="p-1.5 text-text-muted hover:text-accent-blue rounded"><i class="fas fa-edit"></i></button>
                            <button class="p-1.5 text-text-muted hover:text-accent-red rounded"><i class="fas fa-trash"></i></button>
                        </div>
                    </div>
                    <!-- 子栏目 -->
                    <div class="pl-12 border-b border-border-dark bg-card-bg/50">
                        <div class="flex items-center justify-between p-3 cursor-pointer hover:bg-primary-bg transition-colors">
                            <div class="flex items-center gap-3">
                                <i class="fas fa-folder-open text-text-secondary text-sm"></i>
                                <span class="text-sm">时政要闻</span>
                            </div>
                            <div class="flex items-center gap-2">
                                <button class="p-1 text-text-muted hover:text-accent-blue rounded text-xs"><i class="fas fa-edit"></i></button>
                                <button class="p-1 text-text-muted hover:text-accent-red rounded text-xs"><i class="fas fa-trash"></i></button>
                            </div>
                        </div>
                        <div class="flex items-center justify-between p-3 cursor-pointer hover:bg-primary-bg transition-colors">
                            <div class="flex items-center gap-3">
                                <i class="fas fa-folder-open text-text-secondary text-sm"></i>
                                <span class="text-sm">社会民生</span>
                            </div>
                            <div class="flex items-center gap-2">
                                <button class="p-1 text-text-muted hover:text-accent-blue rounded text-xs"><i class="fas fa-edit"></i></button>
                                <button class="p-1 text-text-muted hover:text-accent-red rounded text-xs"><i class="fas fa-trash"></i></button>
                            </div>
                        </div>
                    </div>
                    <!-- 顶级栏目 -->
                    <div class="flex items-center justify-between p-4 border-b border-border-dark cursor-pointer hover:bg-primary-bg/50 transition-colors">
                        <div class="flex items-center gap-3">
                            <i class="fas fa-chevron-right text-text-muted text-xs"></i>
                            <span class="font-medium">政策文件</span>
                            <span class="px-2 py-0.5 bg-accent-blue/20 text-accent-blue text-xs rounded">启用</span>
                        </div>
                        <div class="flex items-center gap-2">
                            <button class="p-1.5 text-text-muted hover:text-accent-blue rounded"><i class="fas fa-plus"></i></button>
                            <button class="p-1.5 text-text-muted hover:text-accent-blue rounded"><i class="fas fa-edit"></i></button>
                            <button class="p-1.5 text-text-muted hover:text-accent-red rounded"><i class="fas fa-trash"></i></button>
                        </div>
                    </div>
                    <div class="pl-12 border-b border-border-dark bg-card-bg/50">
                        <div class="flex items-center justify-between p-3 cursor-pointer hover:bg-primary-bg transition-colors">
                            <div class="flex items-center gap-3">
                                <i class="fas fa-folder text-text-secondary text-sm"></i>
                                <span class="text-sm">法规政策</span>
                            </div>
                            <div class="flex items-center gap-2">
                                <button class="p-1 text-text-muted hover:text-accent-blue rounded text-xs"><i class="fas fa-edit"></i></button>
                                <button class="p-1 text-text-muted hover:text-accent-red rounded text-xs"><i class="fas fa-trash"></i></button>
                            </div>
                        </div>
                        <div class="flex items-center justify-between p-3 cursor-pointer hover:bg-primary-bg transition-colors">
                            <div class="flex items-center gap-3">
                                <i class="fas fa-folder text-text-secondary text-sm"></i>
                                <span class="text-sm">通知公告</span>
                            </div>
                            <div class="flex items-center gap-2">
                                <button class="p-1 text-text-muted hover:text-accent-blue rounded text-xs"><i class="fas fa-edit"></i></button>
                                <button class="p-1 text-text-muted hover:text-accent-red rounded text-xs"><i class="fas fa-trash"></i></button>
                            </div>
                        </div>
                    </div>
                    <!-- 顶级栏目 -->
                    <div class="flex items-center justify-between p-4 border-b border-border-dark cursor-pointer hover:bg-primary-bg/50 transition-colors">
                        <div class="flex items-center gap-3">
                            <i class="fas fa-chevron-right text-text-muted text-xs"></i>
                            <span class="font-medium">专题活动</span>
                            <span class="px-2 py-0.5 bg-accent-amber/20 text-accent-amber text-xs rounded">禁用</span>
                        </div>
                        <div class="flex items-center gap-2">
                            <button class="p-1.5 text-text-muted hover:text-accent-blue rounded"><i class="fas fa-plus"></i></button>
                            <button class="p-1.5 text-text-muted hover:text-accent-blue rounded"><i class="fas fa-edit"></i></button>
                            <button class="p-1.5 text-text-muted hover:text-accent-red rounded"><i class="fas fa-trash"></i></button>
                        </div>
                    </div>
                    <!-- 顶级栏目 -->
                    <div class="flex items-center justify-between p-4 cursor-pointer hover:bg-primary-bg/50 transition-colors">
                        <div class="flex items-center gap-3">
                            <i class="fas fa-chevron-right text-text-muted text-xs"></i>
                            <span class="font-medium">互动交流</span>
                            <span class="px-2 py-0.5 bg-accent-blue/20 text-accent-blue text-xs rounded">启用</span>
                        </div>
                        <div class="flex items-center gap-2">
                            <button class="p-1.5 text-text-muted hover:text-accent-blue rounded"><i class="fas fa-plus"></i></button>
                            <button class="p-1.5 text-text-muted hover:text-accent-blue rounded"><i class="fas fa-edit"></i></button>
                            <button class="p-1.5 text-text-muted hover:text-accent-red rounded"><i class="fas fa-trash"></i></button>
                        </div>
                    </div>
                </div>
            </div>

            <!-- 栏目配置 -->
            <div class="bg-card-bg rounded-xl border border-border-dark p-5">
                <h3 class="text-lg font-medium mb-4">栏目配置</h3>
                <div class="space-y-4">
                    <div>
                        <label class="block text-sm text-text-muted mb-2">栏目名称</label>
                        <input type="text" value="时政要闻" class="w-full bg-primary-bg border border-border-dark rounded-lg px-4 py-2.5 text-sm focus:border-accent-blue focus:outline-none">
                    </div>
                    <div>
                        <label class="block text-sm text-text-muted mb-2">上级栏目</label>
                        <select class="w-full bg-primary-bg border border-border-dark rounded-lg px-4 py-2.5 text-sm focus:border-accent-blue focus:outline-none">
                            <option>新闻中心</option>
                            <option>政策文件</option>
                            <option>专题活动</option>
                            <option>互动交流</option>
                        </select>
                    </div>
                    <div>
                        <label class="block text-sm text-text-muted mb-2">栏目路径</label>
                        <input type="text" value="/news/politics" class="w-full bg-primary-bg border border-border-dark rounded-lg px-4 py-2.5 text-sm focus:border-accent-blue focus:outline-none">
                    </div>
                    <div>
                        <label class="block text-sm text-text-muted mb-2">关联模板</label>
                        <select class="w-full bg-primary-bg border border-border-dark rounded-lg px-4 py-2.5 text-sm focus:border-accent-blue focus:outline-none">
                            <option>新闻列表模板</option>
                            <option>图片列表模板</option>
                            <option>详情模板</option>
                        </select>
                    </div>
                    <div>
                        <label class="block text-sm text-text-muted mb-2">排列顺序</label>
                        <input type="number" value="1" class="w-full bg-primary-bg border border-border-dark rounded-lg px-4 py-2.5 text-sm focus:border-accent-blue focus:outline-none">
                    </div>
                    <div>
                        <label class="block text-sm text-text-muted mb-2">状态</label>
                        <div class="flex gap-4">
                            <label class="flex items-center gap-2 cursor-pointer">
                                <input type="radio" name="status" checked class="accent-accent-blue">
                                <span class="text-sm">启用</span>
                            </label>
                            <label class="flex items-center gap-2 cursor-pointer">
                                <input type="radio" name="status" class="accent-accent-blue">
                                <span class="text-sm">禁用</span>
                            </label>
                        </div>
                    </div>
                    <div class="pt-4 border-t border-border-dark flex gap-3">
                        <button class="flex-1 py-2.5 bg-accent-blue text-white rounded-lg hover:bg-blue-600 transition-colors">保存</button>
                        <button class="flex-1 py-2.5 border border-border-dark rounded-lg hover:border-text-muted transition-colors">取消</button>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <!-- 添加栏目弹窗 -->
    <div id="addModal" class="fixed inset-0 bg-black/70 z-50 hidden items-center justify-center">
        <div class="bg-card-bg rounded-2xl w-[500px] border border-border-dark shadow-2xl">
            <div class="flex items-center justify-between px-6 py-4 border-b border-border-dark">
                <h3 class="text-lg font-medium">新增栏目</h3>
                <button onclick="closeModal('addModal')" class="text-text-muted hover:text-text-primary">
                    <i class="fas fa-times text-xl"></i>
                </button>
            </div>
            <div class="p-6 space-y-4">
                <div>
                    <label class="block text-sm text-text-secondary mb-2">栏目名称 <span class="text-accent-red">*</span></label>
                    <input type="text" placeholder="请输入栏目名称" class="w-full bg-primary-bg border border-border-dark rounded-xl px-4 py-3 text-sm focus:border-accent-blue focus:outline-none">
                </div>
                <div>
                    <label class="block text-sm text-text-secondary mb-2">上级栏目</label>
                    <select class="w-full bg-primary-bg border border-border-dark rounded-xl px-4 py-3 text-sm focus:border-accent-blue focus:outline-none">
                        <option>无（顶级栏目）</option>
                        <option>新闻中心</option>
                        <option>时政要闻</option>
                        <option>政策文件</option>
                    </select>
                </div>
                <div>
                    <label class="block text-sm text-text-secondary mb-2">栏目路径</label>
                    <input type="text" placeholder="/category/path" class="w-full bg-primary-bg border border-border-dark rounded-xl px-4 py-3 text-sm focus:border-accent-blue focus:outline-none">
                </div>
                <div>
                    <label class="block text-sm text-text-secondary mb-2">排序</label>
                    <input type="number" value="1" class="w-full bg-primary-bg border border-border-dark rounded-xl px-4 py-3 text-sm focus:border-accent-blue focus:outline-none">
                </div>
            </div>
            <div class="flex items-center justify-end gap-3 px-6 py-4 border-t border-border-dark">
                <button onclick="closeModal('addModal')" class="px-5 py-2.5 border border-border-dark rounded-xl text-text-secondary hover:text-text-primary transition-colors">取消</button>
                <button onclick="closeModal('addModal'); showToast('栏目已添加')" class="px-5 py-2.5 bg-accent-blue text-white rounded-xl hover:bg-blue-600 transition-colors">确认添加</button>
            </div>
        </div>
    </div>

    <!-- Toast -->
    <div id="toast" class="fixed bottom-6 right-6 bg-accent-green text-white px-6 py-3 rounded-xl shadow-lg hidden z-50">
        <i class="fas fa-check-circle mr-2"></i>
        <span id="toastText">操作成功</span>
    </div>

    <script>
        function openModal(id) {
            document.getElementById(id).classList.remove('hidden');
            document.getElementById(id).classList.add('flex');
        }
        function closeModal(id) {
            document.getElementById(id).classList.add('hidden');
            document.getElementById(id).classList.remove('flex');
        }
        function showToast(message) {
            const toast = document.getElementById('toast');
            document.getElementById('toastText').textContent = message;
            toast.classList.remove('hidden');
            setTimeout(() => { toast.classList.add('hidden'); }, 2000);
        }
    </script>
</body>
</html>
