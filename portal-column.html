<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>栏目管理 - 内容中台系统</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        'primary-bg': '#FFFFFF',
                        'card-bg': '#FFFFFF',
                        'border-dark': '#CBD5E1',
                        'accent-blue': '#0A61FF',
                        'accent-cyan': '#0891B2',
                        'accent-green': '#059669',
                        'accent-amber': '#D97706',
                        'accent-red': '#DC2626',
                        'text-primary': '#0F172A',
                        'text-secondary': '#475569',
                        'text-muted': '#94A3B8'
                    }
                }
            }
        }

    <style>
        * { font-family: 'PingFang SC', 'Microsoft YaHei', sans-serif; }
        .sidebar-menu-item:hover { background: rgba(10, 97, 255, 0.06); }
        .sidebar-menu-item.active { background: rgba(10, 97, 255, 0.1); border-left: 3px solid #0A61FF; }
    </style>
</head>
<body class="bg-secondary-bg text-gray-900">
    

    

    <main class="p-6">
        <div class="flex items-center justify-between mb-6">
            <div>
                <h1 class="text-2xl font-semibold">栏目管理</h1>
                <p class="text-gray-500 mt-1">管理门户栏目结构，支持多级栏目配置</p>
            </div>
            <button onclick="openModal('addModal')" class="px-5 py-2.5 bg-accent-blue text-white rounded-xl hover:bg-blue-600 transition-colors flex items-center gap-2">
                <i class="fas fa-plus"></i>
                新增栏目
            </button>
        </div>

        <div class="grid grid-cols-3 gap-6">
            <!-- 栏目列表 -->
            <div class="col-span-2 bg-white rounded-xl border border-[#E2E8F0] p-5">
                <h3 class="text-lg font-medium mb-4">栏目结构</h3>
                <div class="border border-[#E2E8F0] rounded-xl overflow-hidden">
                    <!-- 顶级栏目 -->
                    <div class="flex items-center justify-between p-4 bg-primary-bg/30 border-b border-[#E2E8F0] cursor-pointer hover:bg-primary-bg/50 transition-colors">
                        <div class="flex items-center gap-3">
                            <i class="fas fa-chevron-down text-gray-500 text-xs"></i>
                            <span class="font-medium">新闻中心</span>
                            <span class="px-2 py-0.5 bg-accent-blue/20 text-accent-blue text-xs rounded">启用</span>
                        </div>
                        <div class="flex items-center gap-2">
                            <button class="p-1.5 text-gray-500 hover:text-accent-blue rounded"><i class="fas fa-plus"></i></button>
                            <button class="p-1.5 text-gray-500 hover:text-accent-blue rounded"><i class="fas fa-edit"></i></button>
                            <button class="p-1.5 text-gray-500 hover:text-accent-red rounded"><i class="fas fa-trash"></i></button>
                        </div>
                    </div>
                    <!-- 子栏目 -->
                    <div class="pl-12 border-b border-[#E2E8F0] bg-card-bg/50">
                        <div class="flex items-center justify-between p-3 cursor-pointer hover:bg-primary-bg transition-colors">
                            <div class="flex items-center gap-3">
                                <i class="fas fa-folder-open text-gray-600 text-sm"></i>
                                <span class="text-sm">时政要闻</span>
                            </div>
                            <div class="flex items-center gap-2">
                                <button class="p-1 text-gray-500 hover:text-accent-blue rounded text-xs"><i class="fas fa-edit"></i></button>
                                <button class="p-1 text-gray-500 hover:text-accent-red rounded text-xs"><i class="fas fa-trash"></i></button>
                            </div>
                        </div>
                        <div class="flex items-center justify-between p-3 cursor-pointer hover:bg-primary-bg transition-colors">
                            <div class="flex items-center gap-3">
                                <i class="fas fa-folder-open text-gray-600 text-sm"></i>
                                <span class="text-sm">社会民生</span>
                            </div>
                            <div class="flex items-center gap-2">
                                <button class="p-1 text-gray-500 hover:text-accent-blue rounded text-xs"><i class="fas fa-edit"></i></button>
                                <button class="p-1 text-gray-500 hover:text-accent-red rounded text-xs"><i class="fas fa-trash"></i></button>
                            </div>
                        </div>
                    </div>
                    <!-- 顶级栏目 -->
                    <div class="flex items-center justify-between p-4 border-b border-[#E2E8F0] cursor-pointer hover:bg-primary-bg/50 transition-colors">
                        <div class="flex items-center gap-3">
                            <i class="fas fa-chevron-right text-gray-500 text-xs"></i>
                            <span class="font-medium">政策文件</span>
                            <span class="px-2 py-0.5 bg-accent-blue/20 text-accent-blue text-xs rounded">启用</span>
                        </div>
                        <div class="flex items-center gap-2">
                            <button class="p-1.5 text-gray-500 hover:text-accent-blue rounded"><i class="fas fa-plus"></i></button>
                            <button class="p-1.5 text-gray-500 hover:text-accent-blue rounded"><i class="fas fa-edit"></i></button>
                            <button class="p-1.5 text-gray-500 hover:text-accent-red rounded"><i class="fas fa-trash"></i></button>
                        </div>
                    </div>
                    <div class="pl-12 border-b border-[#E2E8F0] bg-card-bg/50">
                        <div class="flex items-center justify-between p-3 cursor-pointer hover:bg-primary-bg transition-colors">
                            <div class="flex items-center gap-3">
                                <i class="fas fa-folder text-gray-600 text-sm"></i>
                                <span class="text-sm">法规政策</span>
                            </div>
                            <div class="flex items-center gap-2">
                                <button class="p-1 text-gray-500 hover:text-accent-blue rounded text-xs"><i class="fas fa-edit"></i></button>
                                <button class="p-1 text-gray-500 hover:text-accent-red rounded text-xs"><i class="fas fa-trash"></i></button>
                            </div>
                        </div>
                        <div class="flex items-center justify-between p-3 cursor-pointer hover:bg-primary-bg transition-colors">
                            <div class="flex items-center gap-3">
                                <i class="fas fa-folder text-gray-600 text-sm"></i>
                                <span class="text-sm">通知公告</span>
                            </div>
                            <div class="flex items-center gap-2">
                                <button class="p-1 text-gray-500 hover:text-accent-blue rounded text-xs"><i class="fas fa-edit"></i></button>
                                <button class="p-1 text-gray-500 hover:text-accent-red rounded text-xs"><i class="fas fa-trash"></i></button>
                            </div>
                        </div>
                    </div>
                    <!-- 顶级栏目 -->
                    <div class="flex items-center justify-between p-4 border-b border-[#E2E8F0] cursor-pointer hover:bg-primary-bg/50 transition-colors">
                        <div class="flex items-center gap-3">
                            <i class="fas fa-chevron-right text-gray-500 text-xs"></i>
                            <span class="font-medium">专题活动</span>
                            <span class="px-2 py-0.5 bg-accent-amber/20 text-accent-amber text-xs rounded">禁用</span>
                        </div>
                        <div class="flex items-center gap-2">
                            <button class="p-1.5 text-gray-500 hover:text-accent-blue rounded"><i class="fas fa-plus"></i></button>
                            <button class="p-1.5 text-gray-500 hover:text-accent-blue rounded"><i class="fas fa-edit"></i></button>
                            <button class="p-1.5 text-gray-500 hover:text-accent-red rounded"><i class="fas fa-trash"></i></button>
                        </div>
                    </div>
                    <!-- 顶级栏目 -->
                    <div class="flex items-center justify-between p-4 cursor-pointer hover:bg-primary-bg/50 transition-colors">
                        <div class="flex items-center gap-3">
                            <i class="fas fa-chevron-right text-gray-500 text-xs"></i>
                            <span class="font-medium">互动交流</span>
                            <span class="px-2 py-0.5 bg-accent-blue/20 text-accent-blue text-xs rounded">启用</span>
                        </div>
                        <div class="flex items-center gap-2">
                            <button class="p-1.5 text-gray-500 hover:text-accent-blue rounded"><i class="fas fa-plus"></i></button>
                            <button class="p-1.5 text-gray-500 hover:text-accent-blue rounded"><i class="fas fa-edit"></i></button>
                            <button class="p-1.5 text-gray-500 hover:text-accent-red rounded"><i class="fas fa-trash"></i></button>
                        </div>
                    </div>
                </div>
            </div>

            <!-- 栏目配置 -->
            <div class="bg-white rounded-xl border border-[#E2E8F0] p-5">
                <h3 class="text-lg font-medium mb-4">栏目配置</h3>
                <div class="space-y-4">
                    <div>
                        <label class="block text-sm text-gray-500 mb-2">栏目名称</label>
                        <input type="text" value="时政要闻" class="w-full bg-primary-bg border border-[#E2E8F0] rounded-lg px-4 py-2.5 text-sm focus:border-accent-blue focus:outline-none">
                    </div>
                    <div>
                        <label class="block text-sm text-gray-500 mb-2">上级栏目</label>
                        <select class="w-full bg-primary-bg border border-[#E2E8F0] rounded-lg px-4 py-2.5 text-sm focus:border-accent-blue focus:outline-none">
                            <option>新闻中心</option>
                            <option>政策文件</option>
                            <option>专题活动</option>
                            <option>互动交流</option>
                        </select>
                    </div>
                    <div>
                        <label class="block text-sm text-gray-500 mb-2">栏目路径</label>
                        <input type="text" value="/news/politics" class="w-full bg-primary-bg border border-[#E2E8F0] rounded-lg px-4 py-2.5 text-sm focus:border-accent-blue focus:outline-none">
                    </div>
                    <div>
                        <label class="block text-sm text-gray-500 mb-2">关联模板</label>
                        <select class="w-full bg-primary-bg border border-[#E2E8F0] rounded-lg px-4 py-2.5 text-sm focus:border-accent-blue focus:outline-none">
                            <option>新闻列表模板</option>
                            <option>图片列表模板</option>
                            <option>详情模板</option>
                        </select>
                    </div>
                    <div>
                        <label class="block text-sm text-gray-500 mb-2">排列顺序</label>
                        <input type="number" value="1" class="w-full bg-primary-bg border border-[#E2E8F0] rounded-lg px-4 py-2.5 text-sm focus:border-accent-blue focus:outline-none">
                    </div>
                    <div>
                        <label class="block text-sm text-gray-500 mb-2">状态</label>
                        <div class="flex gap-4">
                            <label class="flex items-center gap-2 cursor-pointer">
                                <input type="radio" name="status" checked class="accent-accent-blue">
                                <span class="text-sm">启用</span>
                            </label>
                            <label class="flex items-center gap-2 cursor-pointer">
                                <input type="radio" name="status" class="accent-accent-blue">
                                <span class="text-sm">禁用</span>
                            </label>
                        </div>
                    </div>
                    <div class="pt-4 border-t border-[#E2E8F0] flex gap-3">
                        <button class="flex-1 py-2.5 bg-accent-blue text-white rounded-lg hover:bg-blue-600 transition-colors">保存</button>
                        <button class="flex-1 py-2.5 border border-[#E2E8F0] rounded-lg hover:border-text-muted transition-colors">取消</button>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <!-- 添加栏目弹窗 -->
    <div id="addModal" class="fixed inset-0 bg-black/70 z-50 hidden items-center justify-center">
        <div class="bg-card-bg rounded-2xl w-[500px] border border-[#E2E8F0] shadow-2xl">
            <div class="flex items-center justify-between px-6 py-4 border-b border-[#E2E8F0]">
                <h3 class="text-lg font-medium">新增栏目</h3>
                <button onclick="closeModal('addModal')" class="text-gray-500 hover:text-white">
                    <i class="fas fa-times text-xl"></i>
                </button>
            </div>
            <div class="p-6 space-y-4">
                <div>
                    <label class="block text-sm text-gray-600 mb-2">栏目名称 <span class="text-accent-red">*</span></label>
                    <input type="text" placeholder="请输入栏目名称" class="w-full bg-primary-bg border border-[#E2E8F0] rounded-xl px-4 py-3 text-sm focus:border-accent-blue focus:outline-none">
                </div>
                <div>
                    <label class="block text-sm text-gray-600 mb-2">上级栏目</label>
                    <select class="w-full bg-primary-bg border border-[#E2E8F0] rounded-xl px-4 py-3 text-sm focus:border-accent-blue focus:outline-none">
                        <option>无（顶级栏目）</option>
                        <option>新闻中心</option>
                        <option>时政要闻</option>
                        <option>政策文件</option>
                    </select>
                </div>
                <div>
                    <label class="block text-sm text-gray-600 mb-2">栏目路径</label>
                    <input type="text" placeholder="/category/path" class="w-full bg-primary-bg border border-[#E2E8F0] rounded-xl px-4 py-3 text-sm focus:border-accent-blue focus:outline-none">
                </div>
                <div>
                    <label class="block text-sm text-gray-600 mb-2">排序</label>
                    <input type="number" value="1" class="w-full bg-primary-bg border border-[#E2E8F0] rounded-xl px-4 py-3 text-sm focus:border-accent-blue focus:outline-none">
                </div>
            </div>
            <div class="flex items-center justify-end gap-3 px-6 py-4 border-t border-[#E2E8F0]">
                <button onclick="closeModal('addModal')" class="px-5 py-2.5 border border-[#E2E8F0] rounded-xl text-gray-600 hover:text-white transition-colors">取消</button>
                <button onclick="closeModal('addModal'); showToast('栏目已添加')" class="px-5 py-2.5 bg-accent-blue text-white rounded-xl hover:bg-blue-600 transition-colors">确认添加</button>
            </div>
        </div>
    </div>

    <!-- Toast -->
    <div id="toast" class="fixed bottom-6 right-6 bg-accent-green text-white px-6 py-3 rounded-xl shadow-lg hidden z-50">
        <i class="fas fa-check-circle mr-2"></i>
        <span id="toastText">操作成功</span>
    </div>

    <script>
        function openModal(id) {
            document.getElementById(id).classList.remove('hidden');
            document.getElementById(id).classList.add('flex');
        }
        function closeModal(id) {
            document.getElementById(id).classList.add('hidden');
            document.getElementById(id).classList.remove('flex');
        }
        function showToast(message) {
            const toast = document.getElementById('toast');
            document.getElementById('toastText').textContent = message;
            toast.classList.remove('hidden');
            setTimeout(() => { toast.classList.add('hidden'); }, 2000);
        }
    </script>



<!-- 浮动演示链接组件 -->
<style>
#demo-links-overlay{position:fixed;inset:0;background:rgba(0,0,0,.4);backdrop-filter:blur(2px);-webkit-backdrop-filter:blur(2px);z-index:9998;opacity:0;pointer-events:none;transition:opacity .3s}
#demo-links-overlay.active{opacity:1;pointer-events:auto}

.demo-link-btn{display:flex;align-items:center;gap:10px;padding:12px 16px;background:#fff;border:1px solid #e2e8f0;border-radius:10px;color:#0f172a;font-size:14px;font-weight:450;text-decoration:none;white-space:nowrap;box-shadow:0 2px 12px rgba(0,0,0,.08);transition:all .2s;min-width:200px}

.demo-link-btn .link-icon.purple{background:#ede9fe;color:#7c3aed}

.demo-link-btn .link-icon.orange{background:#ffedd5;color:#ea580c}

#demo-links-toggle{display:flex;align-items:center;gap:8px;padding:12px 20px;background:linear-gradient(135deg,#0a61ff 0%,#3b82f6 100%);color:#fff;border:none;border-radius:12px;font-size:14px;font-weight:500;cursor:pointer;box-shadow:0 4px 20px rgba(10,97,255,.35);transition:all .2s;white-space:nowrap}
#demo-links-toggle:hover{transform:translateY(-2px);box-shadow:0 6px 24px rgba(10,97,255,.45)}
#demo-links-toggle:active{transform:translateY(0)}
#demo-links-toggle .toggle-icon{transition:transform .3s}
#demo-links-toggle.expanded .toggle-icon{transform:rotate(180deg)}
#demo-links-toggle .toggle-label{opacity:1;transition:opacity .2s}
</style>

<script>function toggleDemoLinks(e){var t=document.getElementById("demo-links-overlay"),n=document.getElementById("demo-links-panel"),r=document.getElementById("demo-links-toggle");if(!t||!n||!r)return;var i=r.classList.contains("expanded"),a=void 0!==e?e:!i;a?(t.classList.add("active"),n.classList.add("active"),r.classList.add("expanded")):(t.classList.remove("active"),n.classList.remove("active"),r.classList.remove("expanded"))}</script>
