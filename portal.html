<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>天机∙智信</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <!-- Lucide Icons (一级菜单使用) -->
    <script src="https://unpkg.com/lucide@latest/dist/umd/lucide.min.js"></script>
    <!-- React 18 (UMD) + Babel Standalone - 用于在浏览器中直接运行 JSX -->
    <script crossorigin src="https://unpkg.com/react@18.3.1/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone@7.24.7/babel.min.js"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        'primary-bg': '#FFFFFF',
                        'secondary-bg': '#F8FAFC',
                        'sidebar-bg': '#FFFFFF',
                        'card-bg': '#FFFFFF',
                        'border-light': '#E2E8F0',
                        'border-dark': '#CBD5E1',
                        'accent-blue': '#0A61FF',
                        'accent-cyan': '#0891B2',
                        'accent-green': '#059669',
                        'accent-amber': '#D97706',
                        'accent-red': '#DC2626',
                        'text-primary': '#0F172A',
                        'text-secondary': '#475569',
                        'text-muted': '#94A3B8'
                    }
                }
            }
        }
    </script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap');
        * { font-family: 'PingFang SC', 'Microsoft YaHei', 'Inter', sans-serif; }
        ::-webkit-scrollbar { width: 6px; height: 6px; }
        ::-webkit-scrollbar-track { background: #F1F5F9; }
        ::-webkit-scrollbar-thumb { background: #CBD5E1; border-radius: 3px; }
        ::-webkit-scrollbar-thumb:hover { background: #94A3B8; }

        /* === 一级菜单（带 Lucide 图标） === */
        .sidebar-group-trigger { user-select: none; cursor: pointer; transition: background-color 0.15s, color 0.15s; }
        .sidebar-group-trigger:hover { background: rgba(10, 97, 255, 0.04); }
        .sidebar-group-trigger:hover .lucide { color: #0A61FF; }
        .sidebar-group-trigger.active { background: rgba(10, 97, 255, 0.10); color: #0A61FF; font-weight: 500; }
        .sidebar-group-trigger.active .lucide { color: #0A61FF; }
        .sidebar-group-trigger .group-arrow { transition: transform 0.25s ease; }
        .sidebar-group-trigger.collapsed .group-arrow { transform: rotate(-90deg); }

        /* === 二级菜单（无图标，仅文字） === */
        .sidebar-child-item {
            position: relative;
            display: flex;
            align-items: center;
            padding: 8px 16px 8px 44px;
            font-size: 13px;
            color: #475569;
            cursor: pointer;
            transition: background-color 0.15s, color 0.15s;
            border-right: 3px solid transparent;
        }
        .sidebar-child-item:hover { background: rgba(10, 97, 255, 0.04); color: #0A61FF; }
        .sidebar-child-item.active {
            color: #0A61FF;
            background: rgba(10, 97, 255, 0.08);
            border-right-color: #0A61FF;
            font-weight: 500;
        }

        /* 子菜单容器展开收起动画 */
        .menu-children { transition: max-height 0.3s ease-in-out, opacity 0.2s ease; overflow: hidden; }
        .menu-children.collapsed { max-height: 0; opacity: 0; }
        .menu-children.expanded { max-height: 1000px; opacity: 1; }

        /* === 模块标识头部 === */
        .sidebar-module-header {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 14px 16px;
            background: linear-gradient(135deg, #EFF6FF 0%, #FFFFFF 100%);
            border-bottom: 1px solid #E2E8F0;
        }
        .sidebar-module-logo {
            width: 32px; height: 32px;
            border-radius: 8px;
            background: linear-gradient(135deg, #0A61FF 0%, #3B82F6 100%);
            display: flex; align-items: center; justify-content: center;
            color: #fff;
            box-shadow: 0 2px 6px rgba(10, 97, 255, 0.25);
            flex-shrink: 0;
        }
        .sidebar-module-meta { line-height: 1.2; min-width: 0; }
        .sidebar-module-title { font-size: 14px; font-weight: 600; color: #0F172A; }
        .sidebar-module-subtitle { font-size: 11px; color: #94A3B8; margin-top: 2px; }

        /* Lucide 图标尺寸继承 */
        .lucide { stroke-width: 1.8; }

        .content-frame { width: 100%; height: 100%; border: 0; display: block; background: #F8FAFC; }
        .breadcrumb-item + .breadcrumb-item::before { content: '/'; margin: 0 8px; color: #94A3B8; }
    </style>
</head>
<body class="bg-secondary-bg text-gray-900 min-h-screen">
    <!-- 顶部导航 -->
    <header class="fixed top-0 left-0 right-0 h-14 bg-[#030714] border-b border-[#1a2744] z-50 flex items-center px-6">
        <!-- 产品切换器汉堡按钮 (React 挂载点) -->
        <div id="hamburger-root" class="flex items-center mr-3"></div>
        <div class="flex items-center gap-3">
            <img src="images/logo.png" alt="logo" class="h-9">
            <span class="text-lg font-semibold text-white">天机∙智信</span>
        </div>
        <div class="flex-1"></div>
        <div class="flex items-center gap-4">
            <button class="relative text-gray-600 hover:text-white transition-colors">
                <i class="fas fa-bell text-xl"></i>
                <span class="absolute -top-1 -right-1 w-4 h-4 bg-accent-red rounded-full text-xs flex items-center justify-center">3</span>
            </button>
            <div class="flex items-center gap-3 pl-4 border-l border-[#1a2744]">
                <img src="https://images.unsplash.com/photo-1472099645785-5658abf4ff4e?w=40&h=40&fit=crop&crop=face" alt="用户头像" class="w-9 h-9 rounded-full object-cover ring-2 ring-accent-blue/30">
                <div class="flex flex-col">
                    <span class="text-sm font-medium text-white">张明远</span>
                    <span class="text-xs text-gray-500">超级管理员</span>
                </div>
                <i class="fas fa-chevron-down text-gray-500 text-xs ml-2"></i>
            </div>
        </div>
    </header>

    <!-- 左侧菜单 -->
    <aside class="fixed top-14 left-0 bottom-0 w-[220px] bg-white border-r border-[#E2E8F0] overflow-y-auto z-40 flex flex-col">
        <!-- 模块标识 -->
        <div class="sidebar-module-header">
            <div class="sidebar-module-logo">
                <i data-lucide="calendar-range" class="w-5 h-5"></i>
            </div>
            <div class="sidebar-module-meta">
                <div class="sidebar-module-title">活动运营中心</div>
                <div class="sidebar-module-subtitle">天机智信 · TianJi</div>
            </div>
        </div>
        <nav class="py-2 flex-1" id="sidebar-nav">
            <!-- 菜单由 JS 动态生成 -->
        </nav>
    </aside>

    <!-- 面包屑（首页隐藏，按 docs/面包屑优化提示词.md 规则渲染：仅显示 一级菜单 / 当前页） -->
    <div id="breadcrumb-bar" class="fixed top-14 left-[220px] right-0 h-10 bg-white border-b border-[#E2E8F0] z-30 flex items-center px-6 text-sm">
        <nav class="flex items-center text-gray-500" id="breadcrumb">
            <span class="breadcrumb-item text-gray-700">首页</span>
        </nav>
    </div>

    <!-- 主内容区 -->
    <main class="ml-[220px] mt-24" style="height: calc(100vh - 96px);">
        <iframe id="content-frame" class="content-frame" src="about:blank"></iframe>
    </main>

    <script>
    /* =========================================================================
     * 统一页面映射表
     *  - key: 路由 key
     *  - url: 实际页面文件（保持原页面不变）
     *  - title: 页面标题（用于面包屑）
     *  - section: 所属一级菜单
     * ========================================================================= */
    const pageMap = {
        // 首页（原工作台）
        dashboard:           { url: 'dashboard.html',                title: '首页',           section: '首页' },

        // 活动运营（5 项核心菜单）
        activityManage:      { url: 'activity-list.html',            title: '活动管理',       section: '活动运营' },
        activityCreate:      { url: 'activity-create.html',          title: '创建活动',       section: '活动运营',    parentTitle: '活动管理' },
        activityEdit:        { url: 'activity-edit.html',            title: '编辑活动',       section: '活动运营',    parentTitle: '活动管理' },
        activityDetail:      { url: 'activity-detail.html',          title: '活动详情',       section: '活动运营',    parentTitle: '活动管理' },
        activityReview:      { url: 'content-review.html',           title: '活动审核',       section: '活动运营' },
        activityPublish:     { url: 'activity-publish.html',         title: '活动发布',       section: '活动运营' },
        activityPublishList: { url: 'activity-publish-list.html',    title: '发布记录',       section: '活动运营',    parentTitle: '活动发布' },
        activityRegister:    { url: 'activity-registration.html',    title: '报名管理',       section: '活动运营' },
        activitySign:        { url: 'activity-signin.html',          title: '活动签到',       section: '活动运营' },
        // 活动运营下保留的辅助入口（菜单不展示，但 hash 可直达）
        activitySignList:    { url: 'activity-signin-list.html',     title: '签到列表',       section: '活动运营' },
        activitySignStats:   { url: 'activity-signin-stats.html',    title: '签到统计',       section: '活动运营' },
        activitySignFullscreen: { url: 'activity-signin-fullscreen.html', title: '签到大屏',  section: '活动运营' },
        activityStats:       { url: 'activity-stats.html',           title: '活动统计',       section: '活动运营' },

        // 活动运营 — 问卷管理
        questionnaireManage:    { url: 'questionnaire-list.html',       title: '问卷管理',     section: '活动运营' },
        questionnaireCreate:    { url: 'questionnaire-create.html',     title: '新建问卷',     section: '活动运营', parentTitle: '问卷管理' },
        questionnaireEdit:      { url: 'questionnaire-create.html',     title: '编辑问卷',     section: '活动运营', parentTitle: '问卷管理' },
        questionnaireDetail:    { url: 'questionnaire-detail.html',     title: '问卷详情',     section: '活动运营', parentTitle: '问卷管理' },
        questionnaireFill:      { url: 'questionnaire-fill.html',       title: '填写问卷',     section: '活动运营', parentTitle: '问卷管理' },
        questionnaireResponses: { url: 'questionnaire-detail.html',     title: '答卷管理',     section: '活动运营', parentTitle: '问卷管理' },

        // 运营配置
        activityCategory:    { url: 'activity-category.html',        title: '活动分类',       section: '运营配置' },
        activityTag:         { url: 'content-tag.html',              title: '活动标签',       section: '运营配置' },
        activityPortalConfig:{ url: 'zone-config.html',              title: '专区配置',       section: '运营配置' },
        activityHotConfig:   { url: 'hot-activity-config.html',      title: '热门活动配置',   section: '运营配置' },

        // 资源中心
        imageManage:         { url: 'resource-image.html',           title: '图片管理',       section: '资源中心' },
        fileManage:          { url: 'resource-file.html',            title: '文件管理',       section: '资源中心' },
        videoManage:         { url: 'resource-video.html',           title: '视频管理',       section: '资源中心' },
        resourcePicker:      { url: 'resource-picker.html',          title: '资源选择器',     section: '资源中心' },

        // 数据分析（已下线，hash 仍可直达，菜单不再展示）
        dataOverview:        { url: 'data-overview.html',            title: '数据概览',       section: '数据分析' },
        activityAnalysis:    { url: 'data-content.html',             title: '活动分析',       section: '数据分析' },

        // 系统管理
        userManage:          { url: 'system-user.html',              title: '用户管理',       section: '系统管理' },
        rolePermission:      { url: 'system-role.html',              title: '角色权限',       section: '系统管理' },
        rolePermissionDetail:{ url: 'system-role-permission.html',   title: '角色权限详情',   section: '系统管理' },
        systemSetting:       { url: 'system-config.html',            title: '系统设置',       section: '系统管理' },
        loginLog:            { url: 'system-log.html',               title: '日志管理',       section: '系统管理' },
        operationLog:        { url: 'system-log.html',               title: '日志管理',       section: '系统管理' },
        auditLog:            { url: 'system-log.html',               title: '日志管理',       section: '系统管理' },
        exceptionLog:        { url: 'system-log.html',               title: '日志管理',       section: '系统管理' },

        // 兼容旧内容中心（页面保留，菜单不再显示；兼容直接 URL 访问）
        contentList:         { url: 'content-list.html',             title: '内容管理',       section: '内容中心' },
        contentCategory:     { url: 'content-category.html',         title: '分类管理',       section: '内容中心' },
        contentTag:          { url: 'content-tag.html',              title: '标签管理',       section: '内容中心' },
        contentReview:       { url: 'content-review.html',           title: '审核中心',       section: '内容中心' },
        contentPublish:      { url: 'content-publish.html',          title: '发布管理',       section: '内容中心' },
        contentPublishList:  { url: 'content-publish-list.html',     title: '发布列表',       section: '内容中心' },

        // 资讯相关
        newsList:            { url: 'news-list.html',                title: '资讯列表',       section: '资讯' },
        newsAnnounce:        { url: 'news-announce.html',            title: '公告管理',       section: '资讯' },
        newsPolicy:          { url: 'news-policy.html',              title: '政策管理',       section: '资讯' },

        // 门户相关
        portalHome:          { url: 'portal-home.html',              title: '门户首页',       section: '门户' },
        portalBanner:        { url: 'portal-banner.html',            title: '轮播图',         section: '门户' },
        portalColumn:        { url: 'portal-column.html',            title: '栏目',           section: '门户' },
        portalTopic:         { url: 'portal-topic.html',             title: '专题',           section: '门户' },

        // 帮助中心
        helpFaq:             { url: 'help-faq.html',                 title: '常见问题',       section: '帮助' },
        helpDocs:            { url: 'help-docs.html',                title: '帮助文档',       section: '帮助' }
    };

    /* =========================================================================
     * 菜单配置（v0.5 优化版）
     *  - 工作台 → 首页（仅菜单名变更）
     *  - 活动运营：精简为 5 项核心菜单（管理/审核/发布/报名/签到）
     *  - 新增 运营配置 一级菜单（活动分类/活动标签/专区配置）
     *  - 删除整个 数据分析 模块
     * ========================================================================= */
    const menuConfig = [
        {
            key: 'dashboard',
            section: '首页',
            icon: 'home',
            label: '首页',
            children: null
        },
        {
            key: 'activity',
            section: '活动运营',
            icon: 'calendar-range',
            label: '活动运营',
            children: [
                { key: 'activityManage',   label: '活动管理' },
                { key: 'activityReview',   label: '活动审核', badge: 5 },
                { key: 'activityPublish',  label: '活动发布' },
                { key: 'activityRegister', label: '报名管理' },
                { key: 'activitySign',     label: '活动签到' },
                { key: 'questionnaireManage', label: '问卷管理' }
            ]
        },
        {
            key: 'operation',
            section: '运营配置',
            icon: 'settings-2',
            label: '运营配置',
            children: [
                { key: 'activityCategory',     label: '活动分类' },
                { key: 'activityTag',          label: '活动标签' },
                { key: 'activityPortalConfig', label: '专区配置' }
            ]
        },
        {
            key: 'resource',
            section: '资源中心',
            icon: 'folder-open',
            label: '资源中心',
            children: [
                { key: 'imageManage', label: '图片管理' },
                { key: 'fileManage',  label: '文件管理' },
                { key: 'videoManage', label: '视频管理' }
            ]
        },
        {
            key: 'system',
            section: '系统管理',
            icon: 'shield-check',
            label: '系统管理',
            children: [
                { key: 'userManage',     label: '用户管理' },
                { key: 'rolePermission', label: '角色权限' },
                { key: 'systemSetting',  label: '系统设置' },
                { key: 'loginLog',       label: '日志管理' }
            ]
        }
    ];

    /* =========================================================================
     * LocalStorage 状态管理
     * ========================================================================= */
    const STORAGE_KEY = 'portal_state_v1';
    const defaultState = {
        currentPage: 'dashboard',
        expandedGroups: ['activity', 'operation', 'resource', 'system']  // 默认展开所有分组
    };

    function loadState() {
        try {
            const raw = localStorage.getItem(STORAGE_KEY);
            if (!raw) return { ...defaultState };
            const parsed = JSON.parse(raw);
            return { ...defaultState, ...parsed };
        } catch (e) {
            return { ...defaultState };
        }
    }

    function saveState(state) {
        try {
            localStorage.setItem(STORAGE_KEY, JSON.stringify(state));
        } catch (e) {}
    }

    let state = loadState();

    /* =========================================================================
     * 渲染侧边栏
     *  - 一级菜单：[Lucide 图标] 文字  [chevron]，可点击展开/收起
     *  - 二级菜单：缩进的纯文字项，active 时显示蓝色左边框
     * ========================================================================= */
    function renderSidebar() {
        const nav = document.getElementById('sidebar-nav');
        nav.innerHTML = '';

        menuConfig.forEach(group => {
            const groupEl = document.createElement('div');
            groupEl.className = 'mb-1';

            if (!group.children) {
                // 单项一级菜单（如首页）
                const isActive = state.currentPage === group.key;
                const link = document.createElement('a');
                link.href = '#/' + group.key;
                link.className = 'sidebar-group-trigger flex items-center gap-3 px-4 py-3 text-sm ' +
                    (isActive ? 'active text-accent-blue' : 'text-gray-700');
                link.innerHTML = `
                    <i data-lucide="${group.icon}" class="lucide w-5 h-5 ${isActive ? 'text-accent-blue' : 'text-gray-500'}"></i>
                    <span>${group.label}</span>
                `;
                link.addEventListener('click', (e) => {
                    e.preventDefault();
                    loadPage(group.key);
                });
                groupEl.appendChild(link);
            } else {
                // 分组一级菜单
                const isExpanded = state.expandedGroups.includes(group.key);
                const isGroupActive = isGroupActiveByPage(group.key);
                const trigger = document.createElement('a');
                trigger.href = 'javascript:void(0)';
                trigger.className = 'sidebar-group-trigger flex items-center gap-3 px-4 py-3 text-sm ' +
                    (isExpanded ? '' : 'collapsed ') +
                    (isGroupActive ? 'active text-accent-blue' : 'text-gray-700');
                trigger.innerHTML = `
                    <i data-lucide="${group.icon}" class="lucide w-5 h-5 ${isGroupActive ? 'text-accent-blue' : 'text-gray-500'}"></i>
                    <span>${group.label}</span>
                    <i data-lucide="chevron-down" class="lucide group-arrow w-4 h-4 ml-auto text-gray-400"></i>
                `;
                trigger.addEventListener('click', (e) => {
                    e.preventDefault();
                    toggleGroup(group.key);
                });
                groupEl.appendChild(trigger);

                // 子菜单容器
                const children = document.createElement('div');
                children.className = 'menu-children ' + (isExpanded ? 'expanded' : 'collapsed');
                children.dataset.group = group.key;

                group.children.forEach(item => {
                    const isActive = state.currentPage === item.key;
                    const link = document.createElement('a');
                    link.href = '#/' + item.key;
                    link.className = 'sidebar-child-item ' + (isActive ? 'active' : '');
                    link.dataset.key = item.key;
                    link.innerHTML = `
                        <span>${item.label}</span>
                        ${item.badge ? `<span class="ml-auto bg-accent-red text-white text-[11px] px-1.5 py-[1px] rounded-full">${item.badge}</span>` : ''}
                    `;
                    link.addEventListener('click', (e) => {
                        e.preventDefault();
                        loadPage(item.key);
                    });
                    children.appendChild(link);
                });

                groupEl.appendChild(children);
            }

            nav.appendChild(groupEl);
        });

        // 渲染完 HTML 后，让 Lucide 把 <i data-lucide="..."> 替换为 SVG
        if (window.lucide && typeof window.lucide.createIcons === 'function') {
            window.lucide.createIcons({ attrs: { class: 'lucide' }, nameAttr: 'data-lucide' });
        }
    }

    /* 判断一级分组下是否有当前激活的子项（用于一级菜单高亮） */
    function isGroupActiveByPage(groupKey) {
        const group = menuConfig.find(g => g.key === groupKey);
        if (!group || !group.children) return state.currentPage === groupKey;
        return group.children.some(c => c.key === state.currentPage);
    }

    /* =========================================================================
     * 切换分组展开/收起
     * ========================================================================= */
    function toggleGroup(groupKey) {
        const idx = state.expandedGroups.indexOf(groupKey);
        if (idx >= 0) {
            state.expandedGroups.splice(idx, 1);
        } else {
            state.expandedGroups.push(groupKey);
        }
        saveState(state);
        renderSidebar();
    }

    /* =========================================================================
     * 加载页面
     * ========================================================================= */
    function loadPage(pageKey) {
        const page = pageMap[pageKey];
        if (!page) {
            console.warn('Unknown page key:', pageKey);
            return;
        }

        // 状态更新
        state.currentPage = pageKey;

        // 如果点击的是分组内的页面，自动展开该分组
        const parentGroup = findGroupByPageKey(pageKey);
        if (parentGroup && !state.expandedGroups.includes(parentGroup.key)) {
            state.expandedGroups.push(parentGroup.key);
        }

        saveState(state);

        // 更新 hash（不触发刷新）
        if (window.location.hash !== '#/' + pageKey) {
            history.replaceState(null, '', '#/' + pageKey);
        }

        // 重新渲染侧边栏（高亮 + 展开）
        renderSidebar();

        // 更新面包屑
        renderBreadcrumb(page);

        // 加载 iframe
        const frame = document.getElementById('content-frame');
        if (frame.src.indexOf(page.url) === -1) {
            frame.src = page.url;
        } else {
            // 同 URL 强制刷新
            frame.src = page.url + '?t=' + Date.now();
        }
    }

    function findGroupByPageKey(pageKey) {
        for (const group of menuConfig) {
            if (group.children && group.children.some(c => c.key === pageKey)) {
                return group;
            }
        }
        return null;
    }

    /* =========================================================================
     * 面包屑
     *  - 规则见 docs/面包屑优化提示词.md
     *  - 首页（dashboard）→ 隐藏整条面包屑区
     *  - 其他页面 → 仅显示 "一级菜单 / 当前页"，不再显示"首页"
     *  - 支持三级面包屑：当 page.parentTitle 存在时，渲染 一级菜单 / 父页 / 当前页
     *    （用于创建活动 / 编辑活动 / 活动详情 等子页面）
     * ========================================================================= */
    function renderBreadcrumb(page) {
        const bar = document.getElementById('breadcrumb-bar');
        const bc = document.getElementById('breadcrumb');
        bc.innerHTML = '';

        // 首页：直接隐藏面包屑区
        if (page.key === 'dashboard' || page.section === '首页') {
            bar.classList.add('hidden');
            return;
        }
        bar.classList.remove('hidden');

        // 一级菜单
        const section = document.createElement('span');
        section.className = 'breadcrumb-item text-gray-500';
        section.textContent = page.section;
        bc.appendChild(section);

        // 二级父页（可选，用于创建/编辑/查看活动等场景）
        if (page.parentTitle && page.parentTitle !== page.title) {
            const parent = document.createElement('span');
            parent.className = 'breadcrumb-item text-gray-500';
            parent.textContent = page.parentTitle;
            bc.appendChild(parent);
        }

        // 当前页
        const current = document.createElement('span');
        current.className = 'breadcrumb-item text-gray-700 font-medium';
        current.textContent = page.title;
        bc.appendChild(current);
    }

    /* =========================================================================
     * Hash 路由解析
     * ========================================================================= */
    function parseHash() {
        const hash = window.location.hash || '#/dashboard';
        const key = hash.replace('#/', '').trim() || 'dashboard';
        return pageMap[key] ? key : 'dashboard';
    }

    function handleHashChange() {
        const key = parseHash();
        if (key !== state.currentPage) {
            loadPage(key);
        }
    }

    /* =========================================================================
     * iframe 内部跳转监听
     * 当内部页面修改 location 时，同步到 portal 的 hash
     * ========================================================================= */
    function attachFrameInterceptor() {
        const frame = document.getElementById('content-frame');
        // 拦截内部页面点击链接（a 标签 target=_self 且为本地页面的情况）
        frame.addEventListener('load', () => {
            try {
                const innerDoc = frame.contentDocument || frame.contentWindow.document;
                if (!innerDoc) return;

                // 注入 CSS：隐藏原页面的 header 和 sidebar，避免重复显示
                injectFrameStyles(innerDoc);

                // 拦截内部 a 标签点击
                innerDoc.addEventListener('click', (e) => {
                    const a = e.target.closest('a');
                    if (!a) return;
                    const href = a.getAttribute('href');
                    if (!href) return;
                    // 忽略外部链接、锚点、javascript:、mailto:
                    if (/^(https?:|mailto:|javascript:|#|tel:)/i.test(href)) return;
                    // 拦截本地页面跳转，改为更新 hash
                    if (/\.html?(\?.*)?$/i.test(href)) {
                        e.preventDefault();
                        const key = reverseLookup(href.split('?')[0]);
                        if (key) {
                            loadPage(key);
                        } else {
                            // 找不到对应 key 时直接修改 iframe src
                            frame.src = href;
                            // 同时更新 hash 以便刷新恢复
                            const adHocKey = 'page_' + href.replace(/[^a-z0-9]/gi, '_');
                            history.replaceState(null, '', '#/' + adHocKey);
                        }
                    }
                }, true);
            } catch (e) {
                // 跨域等情况，忽略
            }
        });
    }

    /* =========================================================================
     * 注入样式到 iframe：隐藏原页面顶栏和侧边栏
     * 保持业务页面完全不变（不重写），仅通过 CSS 让出顶部和左侧空间
     * ========================================================================= */
    function injectFrameStyles(doc) {
        if (!doc || !doc.head) return;
        // 防重复注入
        if (doc.getElementById('__portal_inject__')) return;

        const style = doc.createElement('style');
        style.id = '__portal_inject__';
        style.textContent = `
            /* 隐藏顶部导航 - portal 已有统一 header */
            body > header {
                display: none !important;
            }
            /* 隐藏左侧菜单 - portal 已有统一 sidebar */
            body > aside {
                display: none !important;
            }
            /* 调整主内容区：移除 portal 壳层对应的 left/top 偏移 */
            body > main {
                margin-left: 0 !important;
                margin-top: 0 !important;
                position: relative !important;
                top: 0 !important;
                left: 0 !important;
                width: 100% !important;
                height: auto !important;
                padding: 24px !important;
            }
            /* 一些页面使用了 .ml-[220px] 等 Tailwind 任意值类，强制重置 */
            main[class*="ml-"], main[class*="mt-"] {
                margin-left: 0 !important;
                margin-top: 0 !important;
            }
            /* 让 body 没有外边距 */
            body {
                margin: 0 !important;
                padding: 0 !important;
                background: #F8FAFC !important;
            }
            /* 让滚动条由 portal 主体控制（避免双滚动） */
            html, body {
                overflow-x: hidden;
            }
        `;
        doc.head.appendChild(style);
    }

    function reverseLookup(url) {
        for (const key in pageMap) {
            if (pageMap[key].url === url) return key;
        }
        return null;
    }

    /* =========================================================================
     * 启动
     * ========================================================================= */
    window.addEventListener('hashchange', handleHashChange);

    document.addEventListener('DOMContentLoaded', () => {
        renderSidebar();
        attachFrameInterceptor();

        // 初始加载：根据 hash 或 localStorage 决定
        const initialKey = parseHash();
        loadPage(initialKey);
    });
    </script>
