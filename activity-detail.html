<body class="bg-secondary-bg text-gray-900">

            <div class="flex items-center gap-3">

            </div>

            <div class="p-6 border-b border-[#E2E8F0]">
                <h2 id="viewTitle" class="text-2xl font-semibold text-gray-900 mb-3"></h2>
                <div class="flex items-center gap-4 text-sm text-gray-600 flex-wrap mb-3">
                    <span><i class="fas fa-folder mr-1 text-gray-400"></i><span id="viewCategory">-</span></span>
                    <span><i class="fas fa-user mr-1 text-gray-400"></i><span id="viewOrganizer">-</span></span>
                    <span><i class="fas fa-map-marker-alt mr-1 text-gray-400"></i><span id="viewLocation">-</span></span>

            </div>

            <div class="p-6">
                <!-- Tab1: 基础信息 -->

        // 状态徽章
        function getStatusBadge(status) {
            const statusMap = {
                draft: '<span class="px-2 py-1 text-xs rounded-full bg-gray-100 text-gray-600">草稿</span>',
                pending: '<span class="px-2 py-1 text-xs rounded-full bg-amber-100 text-amber-700">待审核</span>',
                published: '<span class="px-2 py-1 text-xs rounded-full bg-green-100 text-green-700">已发布</span>',
                ended: '<span class="px-2 py-1 text-xs rounded-full bg-blue-100 text-blue-700">已结束</span>',
                offline: '<span class="px-2 py-1 text-xs rounded-full bg-gray-100 text-gray-500">已下线</span>'
            };
            return statusMap[status] || status;
        }

        // 加载并渲染详情
        function loadActivityDetail(id) {
            const activities = getAllActivities();
            const activity = activities.find(a => a.id === id);
            if (!activity) {
                showToast('未找到对应活动', 'error');
                setTimeout(() => {
                    window.location.href = 'activity-list.html';
                }, 1000);
                return;
            }

            currentActivity = activity;
            currentActivityId = id;

            // 顶部区域
            if (activity.coverUrl) {
                document.getElementById('viewCover').src = activity.coverUrl;
            }
            document.getElementById('viewStatus').outerHTML = getStatusBadge(activity.status).replace('<span ', '<span id="viewStatus" ');
            document.getElementById('viewTitle').textContent = activity.name || '-';
            document.getElementById('viewCategory').textContent = activity.categoryName || '-';
            document.getElementById('viewOrganizer').textContent = activity.organizer || '-';
            document.getElementById('viewLocation').textContent = activity.location || '-';
            document.getElementById('viewParticipants').textContent = `${activity.participants || 0}/${activity.maxParticipants || 0}`;
            document.getElementById('viewTags').textContent = activity.tags ? `#${activity.tags.replace(/,/g, ' #')}` : '无标签';

            // 基础信息 Tab
            document.getElementById('detailName').textContent = activity.name || '-';
            document.getElementById('detailCategory').textContent = activity.categoryName || '-';
            document.getElementById('detailLocation').textContent = activity.location || '-';
            document.getElementById('detailOrganizer').textContent = activity.organizer || '-';
            document.getElementById('detailMaxParticipants').textContent = activity.maxParticipants || '不限';
            document.getElementById('detailParticipants').textContent = `${activity.participants || 0} 人`;
            document.getElementById('detailTimeRange').textContent = activity.startTime && activity.endTime ? `${activity.startTime} 至 ${activity.endTime}` : '-';
            document.getElementById('detailRegTimeRange').textContent = activity.regStartTime && activity.regEndTime ? `${activity.regStartTime} 至 ${activity.regEndTime}` : '-';
            document.getElementById('detailTags').textContent = activity.tags ? activity.tags.split(',').map(t => `#${t.trim()}`).join(' ') : '无标签';
            document.getElementById('detailSummary').textContent = activity.summary || '暂无简介';
            document.getElementById('detailCreator').textContent = activity.creator || '-';
            document.getElementById('detailPublishTime').textContent = activity.publishTime || '尚未发布';

            // 活动详情 Tab
            document.getElementById('detailContent').textContent = activity.content || '暂无详情';

            // 资源引用 Tab
            renderDetailResources(activity.selectedResources || []);

            // 编辑链接
            document.getElementById('editLink').href = `activity-edit.html?id=${id}`;
            document.getElementById('editLinkBottom').href = `activity-edit.html?id=${id}`;
        }

        function renderDetailResources(selectedIds) {
            const container = document.getElementById('detailResources');
            if (!selectedIds || selectedIds.length === 0) {
                container.innerHTML = '<p class="text-sm text-gray-400 col-span-5">暂无引用资源</p>';
                return;
            }

            container.innerHTML = selectedIds.map(id => {
                let resource = null;
                for (const tab of ['image', 'file', 'video']) {
                    resource = mockResources[tab].find(r => r.id === id);
                    if (resource) break;
                }
                if (!resource) return '';

                return `
                    <div class="rounded-lg overflow-hidden border border-[#E2E8F0] bg-white">
                        ${resource.url && resource.url !== '#' ? `<img src="${resource.url}" class="w-full h-20 object-cover">` :
                          `<div class="h-20 bg-gray-100 flex items-center justify-center"><i class="fas ${resource.icon || 'fa-file'} text-2xl text-gray-400"></i></div>`}
                        <div class="p-2">
                            <p class="text-xs truncate">${resource.name}</p>
                            <p class="text-xs text-gray-400">${resource.size}</p>
                        </div>
                    </div>
                `;
            }).join('');
        }

        // Tab切换
        function switchTab(tab) {
            ['basic', 'detail', 'resource'].forEach(t => {
                document.getElementById('tab-' + t).classList.remove('active');
                document.getElementById('tab-' + t).classList.add('border-transparent', 'text-gray-600');
                document.getElementById('tab-' + t).classList.remove('border-[#0A61FF]', 'text-[#0A61FF]');
                document.getElementById('panel-' + t).classList.add('hidden');
            });

            document.getElementById('tab-' + tab).classList.add('active');
            document.getElementById('tab-' + tab).classList.remove('border-transparent', 'text-gray-600');
            document.getElementById('tab-' + tab).classList.add('border-[#0A61FF]', 'text-[#0A61FF]');
            document.getElementById('panel-' + tab).classList.remove('hidden');
        }

        // Toast提示
        function showToast(message, type = 'success') {
            const container = document.getElementById('toastContainer');
            const toast = document.createElement('div');
            const bgColors = {
                success: 'bg-accent-green',
                error: 'bg-accent-red',
                warning: 'bg-accent-amber'
            };
            const icons = {
                success: 'fa-check-circle',
                error: 'fa-exclamation-circle',
                warning: 'fa-exclamation-triangle'
            };

            toast.className = `toast ${bgColors[type]} text-white px-4 py-3 rounded-xl shadow-lg flex items-center gap-3`;
            toast.innerHTML = `
                <i class="fas ${icons[type]}"></i>
                <span class="text-sm">${message}</span>
            `;
            container.appendChild(toast);

            setTimeout(() => {
                toast.style.opacity = '0';
                toast.style.transform = 'translateX(100%)';
                toast.style.transition = 'all 0.3s ease';
                setTimeout(() => toast.remove(), 300);
            }, 3000);
        }

        // 页面初始化
        document.addEventListener('DOMContentLoaded', function() {
            const id = getActivityIdFromUrl();
            if (!id) {
                showToast('缺少活动ID', 'error');
                setTimeout(() => {
                    window.location.href = 'activity-list.html';
                }, 1000);
                return;
            }
            loadActivityDetail(id);
        });
    </script>
