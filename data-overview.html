    <script>
        // ========== Mock数据 ==========
        const mockData = {

                    likes: 456,

                    contentTrend: 0,
                    viewsTrend: 0,

            },
            month: {
                stats: {
                    content: 347,
                    views: 486200,
                    likes: 12847,
                    users: 142500,
                    contentTrend: 18.2,
                    viewsTrend: 12.5,
                    likesTrend: 22.3,
                    usersTrend: 9.6
                },
                trend: [
                    { label: '第1周', publish: 86, views: 98650, likes: 3256 },
                    { label: '第2周', publish: 92, views: 112000, likes: 3680 },
                    { label: '第3周', publish: 78, views: 89500, likes: 2890 },
                    { label: '第4周', publish: 91, views: 186050, likes: 3021 }
                ]
            },
            year: {
                stats: {
                    content: 2847,
                    views: 1586000,
                    likes: 12847,
                    users: 485000,
                    contentTrend: 15.8,
                    viewsTrend: 8.3,
                    likesTrend: 15.2,
                    usersTrend: 6.8
                },
                trend: [
                    { label: '1月', publish: 186, views: 125600, likes: 4280 },
                    { label: '2月', publish: 245, views: 156800, likes: 5120 },
                    { label: '3月', publish: 312, views: 198500, likes: 6850 },
                    { label: '4月', publish: 278, views: 165200, likes: 5690 },
                    { label: '5月', publish: 325, views: 215600, likes: 7240 },
                    { label: '6月', publish: 356, views: 248900, likes: 8120 },
                    { label: '7月', publish: 412, views: 285600, likes: 9680 },
                    { label: '8月', publish: 289, views: 198200, likes: 5890 },
                    { label: '9月', publish: 334, views: 225800, likes: 7120 },
                    { label: '10月', publish: 378, views: 265400, likes: 8920 },
                    { label: '11月', publish: 356, views: 248900, likes: 8120 },
                    { label: '12月', publish: 386, views: 272000, likes: 9240 }
                ]
            }
        };

        // 分类分布数据
        const categoryData = [
            { name: '新闻资讯', count: 1282, percent: 45, color: 'accent-blue' },
            { name: '政策文件', count: 712, percent: 25, color: 'accent-cyan' },
            { name: '通知公告', count: 427, percent: 15, color: 'accent-green' },
            { name: '专题活动', count: 426, percent: 15, color: 'accent-amber' }
        ];

        // 热门内容数据
        const hotContentData = [
            { id: 1, title: '关于开展2024年度工作总结的通知', views: 12800, likes: 456 },
            { id: 2, title: '数字化转型工作进展报告', views: 8900, likes: 312 },
            { id: 3, title: '智慧城市建设成果展示', views: 6500, likes: 278 },
            { id: 4, title: '两会专题报道：民生改善篇', views: 5600, likes: 245 },
            { id: 5, title: '安全生产知识竞赛活动方案', views: 4200, likes: 189 }
        ];

        // ========== 状态管理 ==========
        let currentPeriod = 'week';

        // ========== 工具函数 ==========
        function formatNumber(num) {
            if (num >= 10000) {
                return (num / 10000).toFixed(1) + '万';
            }
            return num.toLocaleString();
        }

        function showToast(message) {
            const toast = document.getElementById('toast');
            document.getElementById('toastText').textContent = message;
            toast.classList.remove('hidden');
            setTimeout(() => {
                toast.classList.add('hidden');
            }, 2000);
        }

        // ========== 渲染统计卡片 ==========
        function renderStats() {
            const data = mockData[currentPeriod].stats;
            const periodText = currentPeriod === 'today' ? '较昨日' : '较上期';

            document.getElementById('statContent').textContent = formatNumber(data.content);
            document.getElementById('statViews').textContent = formatNumber(data.views);
            document.getElementById('statLikes').textContent = formatNumber(data.likes);
            document.getElementById('statUsers').textContent = formatNumber(data.users);

            // 趋势
            updateTrend('Content', data.contentTrend, periodText);
            updateTrend('Views', data.viewsTrend, periodText);
            updateTrend('Likes', data.likesTrend, periodText);
            updateTrend('Users', data.usersTrend, periodText);
        }

        function updateTrend(type, trend, periodText) {
            const el = document.getElementById('stat' + type + 'Trend');
            if (trend > 0) {
                el.className = 'mt-3 text-sm text-accent-green flex items-center gap-1';
                el.innerHTML = `<i class="fas fa-arrow-up text-xs"></i>${periodText} +${trend}%`;
            } else if (trend < 0) {
                el.className = 'mt-3 text-sm text-accent-red flex items-center gap-1';
                el.innerHTML = `<i class="fas fa-arrow-down text-xs"></i>${periodText} ${trend}%`;
            } else {
                el.className = 'mt-3 text-sm text-text-muted flex items-center gap-1';
                el.innerHTML = `${periodText} 持平`;
            }
        }

        // ========== 渲染趋势图 ==========
        function renderTrendChart() {
            const chart = document.getElementById('trendChart');
            const data = mockData[currentPeriod].trend;

            // 计算最大值用于比例
            const maxPublish = Math.max(...data.map(d => d.publish));
            const maxViews = Math.max(...data.map(d => d.views));
            const maxLikes = Math.max(...data.map(d => d.likes));
            const maxVal = Math.max(maxPublish, maxViews / 100, maxLikes * 10);

            chart.innerHTML = data.map(d => {
                const publishHeight = (d.publish / maxVal * 100).toFixed(1);
                const viewsHeight = (d.views / maxVal / 100 * 100).toFixed(1);
                const likesHeight = (d.likes * 10 / maxVal * 100).toFixed(1);

                return `
                <div class="flex-1 flex flex-col items-center gap-2">
                    <div class="w-full flex items-end justify-center gap-1 h-56">
                        <div class="w-4 bg-accent-blue rounded-t-lg transition-all" style="height: ${publishHeight}%" title="发布: ${d.publish}"></div>
                        <div class="w-4 bg-accent-cyan rounded-t-lg transition-all" style="height: ${viewsHeight}%" title="阅读: ${d.views}"></div>
                        <div class="w-4 bg-accent-amber rounded-t-lg transition-all" style="height: ${likesHeight}%" title="点赞: ${d.likes}"></div>
                    </div>
                    <span class="text-text-muted text-xs">${d.label}</span>
                </div>
                `;
            }).join('');
        }

        // ========== 渲染分类分布 ==========
        function renderCategoryDist() {
            const container = document.getElementById('categoryDist');
            container.innerHTML = categoryData.map(cat => {
                const bgColor = `bg-${cat.color}`;
                const textColor = `text-${cat.color}`;
                return `
                <div class="category-item cursor-pointer hover:bg-primary-bg/50 rounded-lg p-2 -m-2 transition-colors" data-category="${cat.name}">
                    <div class="flex items-center justify-between mb-2">
                        <span class="text-sm">${cat.name}</span>
                        <span class="text-sm text-text-muted">${cat.count}篇 (${cat.percent}%)</span>
                    </div>
                    <div class="h-2 bg-primary-bg rounded-full overflow-hidden">
                        <div class="h-full ${bgColor} rounded-full transition-all" style="width: ${cat.percent}%"></div>
                    </div>
                </div>
                `;
            }).join('');

            // 绑定点击事件
            document.querySelectorAll('.category-item').forEach(item => {
                item.addEventListener('click', () => {
                    const category = item.dataset.category;
                    showToast(`查看 ${category} 分类内容`);
                    // 可扩展为跳转到内容列表并筛选该分类
                });
            });
        }

        // ========== 渲染热门内容 ==========
        function renderHotContent() {
            const container = document.getElementById('hotContentList');
            const colors = ['accent-amber', 'text-muted', 'orange-700', 'primary-bg', 'primary-bg'];
            const borderColors = ['', '', '', 'border-border-dark', 'border-border-dark'];

            container.innerHTML = hotContentData.map((content, index) => {
                const rankColor = index === 0 ? 'accent-amber' : (index === 1 ? 'text-muted' : (index === 2 ? 'orange-400' : 'text-muted'));
                const border = index >= 3 ? 'border border-border-dark' : '';
                const bg = index >= 3 ? 'bg-primary-bg' : '';

                return `
                <div class="bg-card-bg rounded-xl p-4 border border-border-dark hover:border-accent-blue transition-colors cursor-pointer content-item" data-id="${content.id}">
                    <div class="w-8 h-8 rounded-full ${index === 0 ? 'bg-accent-amber/20' : (index === 1 ? 'bg-text-muted/20' : (index === 2 ? 'bg-orange-700/20' : 'bg-primary-bg'))} flex items-center justify-center mb-3">
                        <span class="${index === 0 ? 'text-accent-amber' : (index === 1 ? 'text-text-muted' : (index === 2 ? 'text-orange-400' : 'text-text-muted'))} font-bold">${index + 1}</span>
                    </div>
                    <h4 class="text-sm font-medium mb-2 line-clamp-2">${content.title}</h4>
                    <div class="flex items-center gap-3 text-xs text-text-muted">
                        <span><i class="fas fa-eye"></i> ${formatNumber(content.views)}</span>
                        <span><i class="fas fa-heart"></i> ${content.likes}</span>
                    </div>
                </div>
                `;
            }).join('');

            // 绑定点击事件
            document.querySelectorAll('.content-item').forEach(item => {
                item.addEventListener('click', () => {
                    const id = item.dataset.id;
                    showToast(`查看内容详情 #${id}`);
                    // 可扩展为跳转到内容详情页
                });
            });
        }

        // ========== 时间筛选 ==========
        function initTimeFilter() {
            const btns = document.querySelectorAll('.time-btn');
            btns.forEach(btn => {
                btn.addEventListener('click', () => {
                    currentPeriod = btn.dataset.period;
                    btns.forEach(b => {
                        b.classList.remove('bg-accent-blue/20', 'text-accent-blue');
                        b.classList.add('text-text-muted', 'hover:text-text-primary');
                    });
                    btn.classList.add('bg-accent-blue/20', 'text-accent-blue');
                    btn.classList.remove('text-text-muted', 'hover:text-text-primary');
                    renderStats();
                });
            });
        }

        // ========== 图表周期筛选 ==========
        function initChartPeriodFilter() {
            const btns = document.querySelectorAll('.chart-period-btn');
            btns.forEach(btn => {
                btn.addEventListener('click', () => {
                    const period = btn.dataset.period;
                    btns.forEach(b => {
                        b.classList.remove('bg-accent-blue/20', 'text-accent-blue');
                        b.classList.add('text-text-muted', 'hover:text-text-primary');
                    });
                    btn.classList.add('bg-accent-blue/20', 'text-accent-blue');
                    btn.classList.remove('text-text-muted', 'hover:text-text-primary');
                    renderTrendChart();
                });
            });
        }

        // ========== 导出功能 ==========
        document.getElementById('exportBtn').addEventListener('click', () => {
            showToast('报表正在生成，请稍候...');
            setTimeout(() => {
                showToast('报表导出成功');
            }, 1500);
        });

        // ========== 初始化 ==========
        function init() {
            currentPeriod = 'week';
            renderStats();
            renderTrendChart();
            renderCategoryDist();
            renderHotContent();
            initTimeFilter();
            initChartPeriodFilter();
        }

        init();
    </script>
</body>
</html>
