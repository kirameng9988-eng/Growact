                                    </div>
                                </div>
                                <div class="flex items-center gap-2">
                                    <button onclick="viewActivity(${activity.id})" class="px-4 py-2 text-sm border border-[#E2E8F0] rounded-lg hover:border-accent-blue hover:text-accent-blue transition-colors">
                                        <i class="fas fa-eye mr-1"></i>查看
                                    </button>
                                    <button onclick="approveActivity(${activity.id})" class="px-4 py-2 text-sm bg-accent-green text-white rounded-lg hover:bg-green-600 transition-colors">
                                        <i class="fas fa-check mr-1"></i>通过
                                    </button>
                                    <button onclick="rejectActivity(${activity.id})" class="px-4 py-2 text-sm border border-accent-red text-accent-red rounded-lg hover:bg-accent-red hover:text-white transition-colors">
                                        <i class="fas fa-times mr-1"></i>驳回
                                    </button>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            `).join('');
        }

        function getFilteredActivities() {
            const search = document.getElementById('searchInput').value.toLowerCase();
            const status = document.getElementById('filterStatus').value;

            return activities.filter(a => {
                if (search && !a.name.toLowerCase().includes(search)) return false;
                if (status && a.status !== status) return false;
                return true;
            });
        }

        function filterList() {
            renderReviewList();
        }

        function getStatusBadgeClass(status) {
            const map = {
                pending: 'bg-amber-100 text-amber-700',
                approved: 'bg-green-100 text-green-700',
                rejected: 'bg-red-100 text-red-700'
            };
            return map[status] || '';
        }

        function getStatusText(status) {
            const map = {
                pending: '待审核',
                approved: '已通过',
                rejected: '已驳回'
            };
            return map[status] || status;
        }

        function refreshList() {
            showToast('列表已刷新', 'success');
            renderReviewList();
        }

        function viewActivity(id) {
            const activity = activities.find(a => a.id === id);
            if (!activity) return;

            document.getElementById('viewCover').src = 'https://images.unsplash.com/photo-1540575467063-178a50c2df87?w=800&h=400&fit=crop';
            document.getElementById('viewTitle').textContent = activity.name;
            document.getElementById('viewCategory').textContent = activity.categoryName;
            document.getElementById('viewCreator').textContent = activity.creator;
            document.getElementById('viewTime').textContent = activity.submitTime;
            document.getElementById('viewLocation').textContent = activity.location;
            document.getElementById('viewOrganizer').textContent = activity.organizer;
            document.getElementById('viewParticipants').textContent = `${activity.participants}/${activity.maxParticipants}`;
            document.getElementById('viewActivityTime').textContent = `${activity.startTime} 至 ${activity.endTime}`;
            document.getElementById('viewSummary').textContent = activity.summary || '暂无简介';
            document.getElementById('viewContent').textContent = activity.content || '暂无详情';

            openModal('viewModal');
        }

        function approveActivity(id) {
            currentReviewId = id;
            reviewAction = 'approve';
            const activity = activities.find(a => a.id === id);
            if (!activity) return;

            document.getElementById('reviewIcon').className = 'w-12 h-12 rounded-full bg-accent-green/20 flex items-center justify-center';
            document.getElementById('reviewIcon').innerHTML = '<i class="fas fa-check text-accent-green text-xl"></i>';
            document.getElementById('reviewTitle').textContent = '审核通过';
            document.getElementById('reviewSubtitle').textContent = '确认活动信息无误，可对外发布';
            document.getElementById('reviewMessage').textContent = '确定要通过以下活动审核？';
            document.getElementById('reviewName').textContent = activity.name;
            document.getElementById('rejectReasonGroup').classList.add('hidden');
            document.getElementById('confirmReviewBtn').className = 'px-5 py-2.5 bg-accent-green text-white rounded-xl hover:bg-green-600 transition-colors';
            document.getElementById('confirmReviewBtn').textContent = '确认通过';

            openModal('reviewModal');
        }

        function rejectActivity(id) {
            currentReviewId = id;
            reviewAction = 'reject';
            const activity = activities.find(a => a.id === id);
            if (!activity) return;

            document.getElementById('reviewIcon').className = 'w-12 h-12 rounded-full bg-accent-red/20 flex items-center justify-center';
            document.getElementById('reviewIcon').innerHTML = '<i class="fas fa-times text-accent-red text-xl"></i>';
            document.getElementById('reviewTitle').textContent = '驳回活动';
            document.getElementById('reviewSubtitle').textContent = '请填写驳回原因，活动将退回给创建人';
            document.getElementById('reviewMessage').textContent = '确定要驳回以下活动？';
            document.getElementById('reviewName').textContent = activity.name;
            document.getElementById('rejectReasonGroup').classList.remove('hidden');
            document.getElementById('confirmReviewBtn').className = 'px-5 py-2.5 bg-accent-red text-white rounded-xl hover:bg-red-600 transition-colors';
            document.getElementById('confirmReviewBtn').textContent = '确认驳回';

            openModal('reviewModal');
        }

        function openModal(modalId) {
            document.getElementById(modalId).classList.remove('hidden');
            document.getElementById(modalId).classList.add('flex');
        }

        function closeModal(modalId) {
            document.getElementById(modalId).classList.add('hidden');
            document.getElementById(modalId).classList.remove('flex');
            if (modalId === 'reviewModal') {
                document.getElementById('rejectReason').value = '';
            }
        }

        document.getElementById('confirmReviewBtn').onclick = function() {
            if (!currentReviewId) return;

            const activity = activities.find(a => a.id === currentReviewId);
            if (!activity) return;

            if (reviewAction === 'approve') {
                activity.status = 'approved';
                showToast('活动已审核通过', 'success');
            } else {
                const reason = document.getElementById('rejectReason').value.trim();
                if (!reason) {
                    showToast('请填写驳回原因', 'warning');
                    return;
                }
                activity.status = 'rejected';
                showToast('活动已驳回', 'success');
            }

            closeModal('reviewModal');
            renderReviewList();
        };

        function showToast(message, type = 'success') {
            const container = document.getElementById('toastContainer');
            const toast = document.createElement('div');
            const bgColors = {
                success: 'bg-accent-green',
                error: 'bg-accent-red',
                warning: 'bg-accent-amber'
            };
            const icons = {
                success: 'fa-check-circle',
                error: 'fa-exclamation-circle',
                warning: 'fa-exclamation-triangle'
            };

            toast.className = `toast ${bgColors[type]} text-white px-4 py-3 rounded-xl shadow-lg flex items-center gap-3`;
            toast.innerHTML = `
                <i class="fas ${icons[type]}"></i>
                <span class="text-sm">${message}</span>
            `;
            container.appendChild(toast);

            setTimeout(() => {
                toast.style.opacity = '0';
                toast.style.transform = 'translateX(100%)';
                toast.style.transition = 'all 0.3s ease';
                setTimeout(() => toast.remove(), 300);
            }, 3000);
        }
    </script>
</body>
</html>
