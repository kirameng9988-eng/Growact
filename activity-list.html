<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>活动管理 - 内容中台系统</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        'primary-bg': '#FFFFFF',
                        'secondary-bg': '#F8FAFC',
                        'card-bg': '#FFFFFF',
                        'border-dark': '#CBD5E1',
                        'accent-blue': '#0A61FF',
                        'accent-cyan': '#0891B2',
                        'accent-green': '#059669',
                        'accent-amber': '#D97706',
                        'accent-red': '#DC2626',
                        'text-primary': '#0F172A',
                        'text-secondary': '#475569',
                        'text-muted': '#94A3B8'
                    }
                }
            }
        }
    </script>
    <style>
        * { font-family: 'PingFang SC', 'Microsoft YaHei', sans-serif; }
        ::-webkit-scrollbar { width: 6px; height: 6px; }
        ::-webkit-scrollbar-track { background: #F1F5F9; }
        ::-webkit-scrollbar-thumb { background: #CBD5E1; border-radius: 3px; }
        .sidebar-menu-item:hover { background: rgba(10, 97, 255, 0.06); }
        .sidebar-menu-item.active { background: rgba(10, 97, 255, 0.1); border-left: 3px solid #0A61FF; }
        .table-row:hover { background: #F8FAFC; }
        .toast { animation: slideIn 0.3s ease; }
        @keyframes slideIn { from { transform: translateX(100%); opacity: 0; } to { transform: translateX(0); opacity: 1; } }
    </style>
</head>
<body class="bg-secondary-bg text-gray-900">

    <!-- 主内容区 -->
    <main class="p-6">
        <!-- 页面标题 -->
        <div class="flex items-center justify-between mb-6">
            <div>
                <h1 class="text-2xl font-semibold">活动管理</h1>
                <p class="text-gray-500 mt-1">管理所有活动，支持创建、编辑、审核和发布</p>
            </div>
            <div class="flex items-center gap-3">
                <button onclick="refreshList()" class="px-4 py-2.5 border border-[#E2E8F0] rounded-xl hover:border-accent-blue transition-colors flex items-center gap-2">
                    <i class="fas fa-sync-alt"></i>
                    刷新
                </button>
                <a href="activity-create.html" class="px-5 py-2.5 bg-accent-blue text-white rounded-xl hover:bg-blue-600 transition-colors flex items-center gap-2">
                    <i class="fas fa-plus"></i>
                    创建活动
                </a>
            </div>
        </div>

        <!-- 筛选栏 -->
        <div class="bg-white rounded-xl p-4 mb-6 border border-[#E2E8F0]">
            <div class="flex items-center gap-4 flex-wrap">
                <div class="flex items-center gap-2">
                    <select id="filterCategory" onchange="filterList()" class="bg-white border border-[#E2E8F0] rounded-lg px-3 py-2 text-sm text-gray-700 focus:border-accent-blue focus:outline-none">
                        <option value="">全部分类</option>
                        <option value="tech">科技创新</option>
                        <option value="culture">文化活动</option>
                        <option value="sports">体育运动</option>
                        <option value="education">教育培训</option>
                    </select>
                    <select id="filterStatus" onchange="filterList()" class="bg-white border border-[#E2E8F0] rounded-lg px-3 py-2 text-sm text-gray-700 focus:border-accent-blue focus:outline-none">
                        <option value="">全部状态</option>
                        <option value="published">已发布</option>
                        <option value="pending">待审核</option>
                        <option value="draft">草稿</option>
                        <option value="ended">已结束</option>
                        <option value="offline">已下线</option>
                    </select>
                   <select id="filterCreator" onchange="filterList()" class="bg-white border border-[#E2E8F0] rounded-lg px-3 py-2 text-sm text-gray-700 focus:border-accent-blue focus:outline-none">
                        <option value="">全部创建人</option>
                        <option>张明远</option>
                        <option>李晓华</option>
                        <option>王建国</option>
                        <option>陈思远</option>
                    </select>
                </div>
                <div class="flex-1"></div>
                <div class="relative">
                    <i class="fas fa-search absolute left-3 top-1/2 -translate-y-1/2 text-gray-500"></i>
                    <input type="text" id="searchInput" oninput="filterList()" placeholder="搜索活动名称..." class="bg-white border border-[#E2E8F0] rounded-lg pl-10 pr-4 py-2 text-sm text-gray-700 placeholder-gray-400 focus:border-accent-blue focus:outline-none w-64">
                </div>
            </div>
        </div>

        <!-- 批量操作栏 -->
        <div class="flex items-center justify-between mb-4">
            <div class="flex items-center gap-2">
                <input type="checkbox" id="selectAll" onchange="toggleSelectAll()" class="w-4 h-4 rounded border-[#E2E8F0] bg-primary-bg accent-accent-blue">
                <label for="selectAll" class="text-sm text-gray-600">全选</label>
                <span id="selectedCount" class="text-sm text-gray-500 ml-4">已选择 0 项</span>
            </div>
            <div class="flex items-center gap-3">
                <button onclick="batchSubmit()" class="px-4 py-2 text-sm text-accent-blue hover:bg-accent-blue/10 rounded-lg transition-colors">批量提交审核</button>
                <button onclick="batchPublish()" class="px-4 py-2 text-sm text-accent-green hover:bg-accent-green/10 rounded-lg transition-colors">批量发布</button>
                <button onclick="batchOffline()" class="px-4 py-2 text-sm text-accent-amber hover:bg-accent-amber/10 rounded-lg transition-colors">批量下线</button>
                <button onclick="batchDelete()" class="px-4 py-2 text-sm text-accent-red hover:bg-accent-red/10 rounded-lg transition-colors">批量删除</button>
            </div>
        </div>

        <!-- 活动列表 -->
        <div class="bg-white rounded-xl border border-[#E2E8F0] overflow-hidden">
            <table class="w-full">
                <thead>
                    <tr class="text-left text-gray-500 text-sm border-b border-[#E2E8F0] bg-primary-bg/50">
                        <th class="px-4 py-3 font-medium w-10"></th>
                        <th class="px-4 py-3 font-medium">活动名称</th>
                        <th class="px-4 py-3 font-medium w-24">分类</th>
                        <th class="px-4 py-3 font-medium w-20">状态</th>
                        <th class="px-4 py-3 font-medium w-20">报名人数</th>
                        <th class="px-4 py-3 font-medium w-36">活动时间</th>
                        <th class="px-4 py-3 font-medium w-28">创建人</th>
                        <th class="px-4 py-3 font-medium w-52 text-right">操作</th>
                    </tr>
                </thead>
                <tbody id="activityTableBody">
                    <!-- 通过JS渲染 -->
                </tbody>
            </table>
            <!-- 分页 -->
            <div class="flex items-center justify-between px-4 py-3 border-t border-[#E2E8F0]">
                <span id="paginationInfo" class="text-sm text-gray-500">显示 1-10 条，共 10 条</span>
                <div class="flex items-center gap-2">
                    <button onclick="goToPage(currentPage - 1)" id="prevPage" class="px-3 py-1 rounded border border-[#E2E8F0] text-gray-500 hover:text-white hover:border-accent-blue transition-colors text-sm disabled:opacity-50">上一页</button>
                    <button onclick="goToPage(1)" class="px-3 py-1 rounded bg-accent-blue text-white text-sm">1</button>
                    <button onclick="goToPage(2)" class="px-3 py-1 rounded border border-[#E2E8F0] text-gray-500 hover:text-white hover:border-accent-blue transition-colors text-sm">2</button>
                    <button id="nextPage" onclick="goToPage(currentPage + 1)" class="px-3 py-1 rounded border border-[#E2E8F0] text-gray-500 hover:text-white hover:border-accent-blue transition-colors text-sm">下一页</button>
                </div>
            </div>
        </div>
    </main>

    <!-- Toast容器 -->
    <div id="toastContainer" class="fixed bottom-6 right-6 z-50 flex flex-col gap-2"></div>

    <!-- 确认删除弹窗 -->
    <div id="deleteModal" class="fixed inset-0 bg-black/70 z-[90] hidden items-center justify-center">
        <div class="bg-white rounded-2xl w-[450px] border border-[#E2E8F0] shadow-2xl">
            <div class="flex items-center gap-4 p-6 border-b border-[#E2E8F0]">
                <div class="w-12 h-12 rounded-full bg-accent-red/20 flex items-center justify-center">
                    <i class="fas fa-exclamation-triangle text-accent-red text-xl"></i>
                </div>
                <div>
                    <h3 class="text-lg font-medium">确认删除</h3>
                    <p class="text-sm text-gray-500 mt-1">删除后无法恢复，请谨慎操作</p>
                </div>
            </div>
            <div class="p-6">
                <p class="text-sm text-gray-600">确定要删除以下活动吗？</p>
                <p id="deleteTitle" class="text-sm font-medium mt-2 text-gray-900"></p>
            </div>
            <div class="flex items-center justify-end gap-3 px-6 py-4 border-t border-[#E2E8F0]">
                <button onclick="closeModal('deleteModal')" class="px-5 py-2.5 border border-[#E2E8F0] rounded-xl text-gray-600 hover:text-gray-900 transition-colors">取消</button>
                <button id="confirmDeleteBtn" class="px-5 py-2.5 bg-accent-red text-white rounded-xl hover:bg-red-600 transition-colors">确认删除</button>
            </div>
        </div>
    </div>

            { id: 2, name: '企业文化创意大赛', category: 'culture', categoryName: '文化活动', status: 'pending', participants: 156, maxParticipants: 200, startTime: '2024-04-20 14:00', endTime: '2024-04-20 18:00', regStartTime: '2024-03-01 00:00', regEndTime: '2024-04-15 23:59', publishTime: '', creator: '李晓华', organizer: '企业文化部', location: '集团总部报告厅', summary: '激发创意，展示企业文化魅力', tags: '创意,文化,大赛', content: '大赛分为初赛和决赛两个阶段...' },

            { id: 7, name: '周末登山活动', category: 'sports', categoryName: '体育运动', status: 'offline', participants: 42, maxParticipants: 50, startTime: '2024-02-25 08:00', endTime: '2024-02-25 16:00', regStartTime: '2024-02-10 00:00', regEndTime: '2024-02-20 23:59', publishTime: '2024-02-10 10:00', creator: '王建国', organizer: '工会体育部', location: '香山公园', summary: '亲近自然，锻炼身体', tags: '登山,户外,周末', content: '路线全程约8公里...' },
            { id: 8, name: '数据分析技能培训', category: 'education', categoryName: '教育培训', status: 'published', participants: 65, maxParticipants: 80, startTime: '2024-04-08 09:00', endTime: '2024-04-08 17:00', regStartTime: '2024-03-15 00:00', regEndTime: '2024-04-01 23:59', publishTime: '2024-03-15 10:00', creator: '陈思远', organizer: '数据学院', location: '数据中心会议室', summary: '提升数据分析能力', tags: '数据,培训,技能', content: '培训内容包括Python数据分析基础、Pandas库使用...' },
            { id: 9, name: '科技创新成果展', category: 'tech', categoryName: '科技创新', status: 'pending', participants: 0, maxParticipants: 200, startTime: '2024-05-20 09:00', endTime: '2024-05-25 17:00', regStartTime: '2024-04-15 00:00', regEndTime: '2024-05-15 23:59', publishTime: '', creator: '张明远', organizer: '科技创新部', location: '展览中心', summary: '展示年度科技创新成果', tags: '科技,创新,成果展', content: '展览将分为多个展区...' },
            { id: 10, name: '心理健康讲座', category: 'education', categoryName: '教育培训', status: 'draft', participants: 0, maxParticipants: 100, startTime: '2024-04-15 15:00', endTime: '2024-04-15 17:00', regStartTime: '2024-03-20 00:00', regEndTime: '2024-04-10 23:59', publishTime: '', creator: '李晓华', organizer: '人力资源部', location: '集团总部多功能厅', summary: '关注员工心理健康', tags: '心理,健康,讲座', content: '讲座特邀心理专家主讲...' },
            { id: 11, name: '端午龙舟赛', category: 'sports', categoryName: '体育运动', status: 'published', participants: 120, maxParticipants: 150, startTime: '2024-06-10 08:00', endTime: '2024-06-10 14:00', regStartTime: '2024-05-15 00:00', regEndTime: '2024-06-05 23:59', publishTime: '2024-05-15 10:00', creator: '王建国', organizer: '工会体育部', location: '郊外湖面', summary: '传承传统文化，强身健体', tags: '龙舟,端午,团队', content: '比赛分为预赛和决赛两个阶段...' },
            { id: 12, name: '中秋联欢晚会', category: 'culture', categoryName: '文化活动', status: 'draft', participants: 0, maxParticipants: 300, startTime: '2024-09-17 19:00', endTime: '2024-09-17 22:00', regStartTime: '2024-08-20 00:00', regEndTime: '2024-09-10 23:59', publishTime: '', creator: '李晓华', organizer: '工会', location: '集团大礼堂', summary: '共庆中秋佳节', tags: '中秋,晚会,联欢', content: '晚会节目丰富多彩...' }
        ];

        const STORAGE_KEY = 'activities_data';

        // 数据源：优先从 sessionStorage 读取（与新增/编辑页共享），否则使用默认 Mock
        function loadActivities() {
            try {
                const stored = sessionStorage.getItem(STORAGE_KEY);
                if (stored) {
                    return JSON.parse(stored);
                }
            } catch (e) {}
            // 首次访问时初始化 sessionStorage
            try {
                sessionStorage.setItem(STORAGE_KEY, JSON.stringify(defaultActivities));
            } catch (e) {}
            return [...defaultActivities];
        }

        function saveActivities(list) {
            try {
                sessionStorage.setItem(STORAGE_KEY, JSON.stringify(list));
            } catch (e) {}
        }

        let activities = loadActivities();
        let currentPage = 1;
        let currentActivityId = null;
        let selectedIds = [];

        // 页面初始化
        document.addEventListener('DOMContentLoaded', function() {
            renderActivityTable();
        });

        // 渲染活动表格
        function renderActivityTable() {
            activities = loadActivities();
            const tbody = document.getElementById('activityTableBody');
            const filtered = getFilteredActivities();
            const start = (currentPage - 1) * 10;
            const end = Math.min(start + 10, filtered.length);
            const pageActivities = filtered.slice(start, end);

            tbody.innerHTML = pageActivities.map(activity => `
                <tr class="table-row border-b border-[#E2E8F0]">
                    <td class="px-4 py-3">
                        <input type="checkbox" class="w-4 h-4 rounded border-[#E2E8F0] activity-checkbox" data-id="${activity.id}" onchange="updateSelectedCount()">
                    </td>
                    <td class="px-4 py-3">
                        <div class="font-medium text-gray-900">${activity.name}</div>
                    </td>
                    <td class="px-4 py-3 text-sm text-gray-600">${activity.categoryName}</td>
                    <td class="px-4 py-3">${getStatusBadge(activity.status)}</td>
                    <td class="px-4 py-3 text-sm text-gray-600">${activity.participants}/${activity.maxParticipants}</td>
                    <td class="px-4 py-3 text-sm text-gray-500">${formatDate(activity.startTime)}</td>
                    <td class="px-4 py-3 text-sm text-gray-600">${activity.creator}</td>
                    <td class="px-4 py-3 text-right">
                        <div class="flex items-center justify-end gap-2">
                            <a href="activity-detail.html?id=${activity.id}" class="text-accent-blue hover:text-blue-700 text-sm" title="查看">查看</a>
                            <a href="activity-edit.html?id=${activity.id}" class="text-accent-cyan hover:text-cyan-700 text-sm" title="编辑">编辑</a>
                            ${activity.status === 'draft' ? `<button onclick="submitForReview(${activity.id})" class="text-accent-amber hover:text-amber-700 text-sm" title="提交审核">提交</button>` : ''}
                            ${activity.status === 'pending' ? `<button onclick="publishActivity(${activity.id})" class="text-accent-green hover:text-green-700 text-sm" title="发布">发布</button>` : ''}
                            ${activity.status === 'published' ? `<button onclick="offlineActivity(${activity.id})" class="text-accent-amber hover:text-amber-700 text-sm" title="下线">下线</button>` : ''}
                            <button onclick="deleteActivity(${activity.id})" class="text-accent-red hover:text-red-700 text-sm" title="删除">删除</button>
                        </div>
                    </td>
                </tr>
            `).join('');

            document.getElementById('paginationInfo').textContent = `显示 ${start + 1}-${end} 条，共 ${filtered.length} 条`;
        }

        function getFilteredActivities() {
            const search = document.getElementById('searchInput').value.toLowerCase();
            const category = document.getElementById('filterCategory').value;
            const status = document.getElementById('filterStatus').value;
            const creator = document.getElementById('filterCreator').value;

            return activities.filter(a => {
                if (search && !a.name.toLowerCase().includes(search)) return false;
                if (category && a.category !== category) return false;
                if (status && a.status !== status) return false;
                if (creator && a.creator !== creator) return false;
                return true;
            });
        }

        function filterList() {
            currentPage = 1;
            renderActivityTable();
        }

        function getStatusBadge(status) {
            const statusMap = {
                draft: '<span class="px-2 py-1 text-xs rounded-full bg-gray-100 text-gray-600">草稿</span>',
                pending: '<span class="px-2 py-1 text-xs rounded-full bg-amber-100 text-amber-700">待审核</span>',
                published: '<span class="px-2 py-1 text-xs rounded-full bg-green-100 text-green-700">已发布</span>',
                ended: '<span class="px-2 py-1 text-xs rounded-full bg-blue-100 text-blue-700">已结束</span>',
                offline: '<span class="px-2 py-1 text-xs rounded-full bg-gray-100 text-gray-500">已下线</span>'
            };
            return statusMap[status] || status;
        }

        function formatDate(dateStr) {
            if (!dateStr) return '-';
            return dateStr.substring(0, 10);
        }

        function goToPage(page) {
            if (page < 1 || page > 2) return;
            currentPage = page;
            renderActivityTable();
        }

        function refreshList() {
            showToast('列表已刷新', 'success');
            renderActivityTable();
        }

        // 删除活动
        function deleteActivity(id) {
            const activity = activities.find(a => a.id === id);
            if (!activity) return;

            document.getElementById('deleteTitle').textContent = activity.name;
            document.getElementById('confirmDeleteBtn').onclick = function() {
                activities = activities.filter(a => a.id !== id);
                saveActivities(activities);
                closeModal('deleteModal');
                showToast('活动已删除', 'success');
                renderActivityTable();
            };
            openModal('deleteModal');
        }

        // 提交审核
        function submitForReview(id) {
            const activity = activities.find(a => a.id === id);
            if (!activity) return;

            activity.status = 'pending';
            saveActivities(activities);
            showToast('活动已提交审核', 'success');
            renderActivityTable();
        }

        // 发布活动
        function publishActivity(id) {
            const activity = activities.find(a => a.id === id);
            if (!activity) return;

            activity.status = 'published';
            activity.publishTime = new Date().toISOString().substring(0, 16);
            saveActivities(activities);
            showToast('活动已发布', 'success');
            renderActivityTable();
        }

        // 下线活动
        function offlineActivity(id) {
            const activity = activities.find(a => a.id === id);
            if (!activity) return;

            activity.status = 'offline';
            saveActivities(activities);
            showToast('活动已下线', 'success');
            renderActivityTable();
        }

        // 批量操作
        function toggleSelectAll() {
            const checked = document.getElementById('selectAll').checked;
            document.querySelectorAll('.activity-checkbox').forEach(cb => {
                cb.checked = checked;
            });
            updateSelectedCount();
        }

        function updateSelectedCount() {
            selectedIds = Array.from(document.querySelectorAll('.activity-checkbox:checked')).map(cb => parseInt(cb.dataset.id));
            document.getElementById('selectedCount').textContent = `已选择 ${selectedIds.length} 项`;
        }

        function batchSubmit() {
            if (selectedIds.length === 0) {
                showToast('请先选择活动', 'warning');
                return;
            }
            selectedIds.forEach(id => {
                const activity = activities.find(a => a.id === id);
                if (activity && activity.status === 'draft') activity.status = 'pending';
            });
            saveActivities(activities);
            showToast(`已提交 ${selectedIds.length} 个活动审核`, 'success');
            renderActivityTable();
        }

        function batchPublish() {
            if (selectedIds.length === 0) {
                showToast('请先选择活动', 'warning');
                return;
            }
            selectedIds.forEach(id => {
                const activity = activities.find(a => a.id === id);
                if (activity && activity.status === 'pending') {
                    activity.status = 'published';
                    activity.publishTime = new Date().toISOString().substring(0, 16);
                }
            });
            saveActivities(activities);
            showToast(`已发布 ${selectedIds.length} 个活动`, 'success');
            renderActivityTable();
        }

        function batchOffline() {
            if (selectedIds.length === 0) {
                showToast('请先选择活动', 'warning');
                return;
            }
            selectedIds.forEach(id => {
                const activity = activities.find(a => a.id === id);
                if (activity && activity.status === 'published') activity.status = 'offline';
            });
            saveActivities(activities);
            showToast(`已下线 ${selectedIds.length} 个活动`, 'success');
            renderActivityTable();
        }

        function batchDelete() {
            if (selectedIds.length === 0) {
                showToast('请先选择活动', 'warning');
                return;
            }
            document.getElementById('deleteTitle').textContent = `已选择 ${selectedIds.length} 个活动`;
            document.getElementById('confirmDeleteBtn').onclick = function() {
                activities = activities.filter(a => !selectedIds.includes(a.id));
                saveActivities(activities);
                closeModal('deleteModal');
                showToast(`已删除 ${selectedIds.length} 个活动`, 'success');
                selectedIds = [];
                updateSelectedCount();
                renderActivityTable();
            };
            openModal('deleteModal');
        }

        // 弹窗操作
        function openModal(modalId) {
            document.getElementById(modalId).classList.remove('hidden');
            document.getElementById(modalId).classList.add('flex');
        }

        function closeModal(modalId) {
            document.getElementById(modalId).classList.add('hidden');
            document.getElementById(modalId).classList.remove('flex');
        }

        // Toast提示
        function showToast(message, type = 'success') {
            const container = document.getElementById('toastContainer');
            const toast = document.createElement('div');
            const bgColors = {
                success: 'bg-accent-green',
                error: 'bg-accent-red',
                warning: 'bg-accent-amber'
            };
            const icons = {
                success: 'fa-check-circle',
                error: 'fa-exclamation-circle',
                warning: 'fa-exclamation-triangle'
            };

            toast.className = `toast ${bgColors[type]} text-white px-4 py-3 rounded-xl shadow-lg flex items-center gap-3`;
            toast.innerHTML = `
                <i class="fas ${icons[type]}"></i>
                <span class="text-sm">${message}</span>
            `;
            container.appendChild(toast);

            setTimeout(() => {
                toast.style.opacity = '0';
                toast.style.transform = 'translateX(100%)';
                toast.style.transition = 'all 0.3s ease';
                setTimeout(() => toast.remove(), 300);
            }, 3000);
        }
    </script>
</body>
</html>
