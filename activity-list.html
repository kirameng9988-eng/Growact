<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>活动管理 - 内容中台系统</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        'primary-bg': '#FFFFFF',
                        'card-bg': '#FFFFFF',
                        'border-dark': '#CBD5E1',
                        'accent-blue': '#0A61FF',
                        'accent-cyan': '#0891B2',
                        'accent-green': '#059669',
                        'accent-amber': '#D97706',
                        'accent-red': '#DC2626',
                        'text-primary': '#0F172A',
                        'text-secondary': '#475569',
                        'text-muted': '#94A3B8'
                    }
                }
            }
        }
    </script>
    <style>
        * { font-family: 'PingFang SC', 'Microsoft YaHei', sans-serif; }
        ::-webkit-scrollbar { width: 6px; height: 6px; }
        ::-webkit-scrollbar-track { background: #F1F5F9; }
        ::-webkit-scrollbar-thumb { background: #F8FAFC; border-radius: 3px; }
        .sidebar-menu-item:hover { background: rgba(10, 97, 255, 0.06); }
        .sidebar-menu-item.active { background: rgba(10, 97, 255, 0.1); border-left: 3px solid #0A61FF; }
        .table-row:hover { background: #F8FAFC; }
        .toast { animation: slideIn 0.3s ease; }
        @keyframes slideIn { from { transform: translateX(100%); opacity: 0; } to { transform: translateX(0); opacity: 1; } }
        .drawer { transition: transform0.3s ease; }
        .drawer.hidden { transform: translateX(100%); }
        .drawer-panel { max-height: calc(100vh - 64px); overflow-y: auto; }
        .tab-btn.active { border-bottom: 2px solid #0A61FF; color: #0A61FF; }
    </style>
</head>
<body class="bg-secondary-bg text-gray-900">

    <!-- 主内容区 -->
    <main class="p-6">
        <!-- 页面标题 -->
        <div class="flex items-center justify-between mb-6">
            <div>
                <h1 class="text-2xl font-semibold">活动管理</h1>
                <p class="text-gray-500 mt-1">管理所有活动，支持创建、编辑、审核和发布</p>
            </div>
            <div class="flex items-center gap-3">
                <button onclick="refreshList()" class="px-4 py-2.5 border border-[#E2E8F0] rounded-xl hover:border-accent-blue transition-colors flex items-center gap-2">
                    <i class="fas fa-sync-alt"></i>
                    刷新
                </button>
                <button onclick="openDrawer('create')" class="px-5 py-2.5 bg-accent-blue text-white rounded-xl hover:bg-blue-600 transition-colors flex items-center gap-2">
                    <i class="fas fa-plus"></i>
                    创建活动
                </button>
            </div>
        </div>

        <!-- 筛选栏 -->
        <div class="bg-white rounded-xl p-4 mb-6 border border-[#E2E8F0]">
            <div class="flex items-center gap-4 flex-wrap">
                <div class="flex items-center gap-2">
                    <select id="filterCategory" onchange="filterList()" class="bg-white border border-[#E2E8F0] rounded-lg px-3 py-2 text-sm text-gray-700 focus:border-accent-blue focus:outline-none">
                        <option value="">全部分类</option>
                        <option value="tech">科技创新</option>
                        <option value="culture">文化活动</option>
                        <option value="sports">体育运动</option>
                        <option value="education">教育培训</option>
                    </select>
                    <select id="filterStatus" onchange="filterList()" class="bg-white border border-[#E2E8F0] rounded-lg px-3 py-2 text-sm text-gray-700 focus:border-accent-blue focus:outline-none">
                        <option value="">全部状态</option>
                        <option value="published">已发布</option>
                        <option value="pending">待审核</option>
                        <option value="draft">草稿</option>
                        <option value="ended">已结束</option>
                        <option value="offline">已下线</option>
                    </select>
                   <select id="filterCreator" onchange="filterList()" class="bg-white border border-[#E2E8F0] rounded-lg px-3 py-2 text-sm text-gray-700 focus:border-accent-blue focus:outline-none">
                        <option value="">全部创建人</option>
                        <option>张明远</option>
                        <option>李晓华</option>
                        <option>王建国</option>
                        <option>陈思远</option>
                    </select>
                </div>
                <div class="flex-1"></div>
                <div class="relative">
                    <i class="fas fa-search absolute left-3 top-1/2 -translate-y-1/2 text-gray-500"></i>
                    <input type="text" id="searchInput" oninput="filterList()" placeholder="搜索活动名称..." class="bg-white border border-[#E2E8F0] rounded-lg pl-10 pr-4 py-2 text-sm text-gray-700 placeholder-gray-400 focus:border-accent-blue focus:outline-none w-64">
                </div>
            </div>
        </div>

        <!-- 批量操作栏 -->
        <div class="flex items-center justify-between mb-4">
            <div class="flex items-center gap-2">
                <input type="checkbox" id="selectAll" onchange="toggleSelectAll()" class="w-4 h-4 rounded border-[#E2E8F0] bg-primary-bg accent-accent-blue">
                <label for="selectAll" class="text-sm text-gray-600">全选</label>
                <span id="selectedCount" class="text-sm text-gray-500 ml-4">已选择 0 项</span>
            </div>
            <div class="flex items-center gap-3">
                <button onclick="batchSubmit()" class="px-4 py-2 text-sm text-accent-blue hover:bg-accent-blue/10 rounded-lg transition-colors">批量提交审核</button>
                <button onclick="batchPublish()" class="px-4 py-2 text-sm text-accent-green hover:bg-accent-green/10 rounded-lg transition-colors">批量发布</button>
                <button onclick="batchOffline()" class="px-4 py-2 text-sm text-accent-amber hover:bg-accent-amber/10 rounded-lg transition-colors">批量下线</button>
                <button onclick="batchDelete()" class="px-4 py-2 text-sm text-accent-red hover:bg-accent-red/10 rounded-lg transition-colors">批量删除</button>
            </div>
        </div>

        <!-- 活动列表 -->
        <div class="bg-white rounded-xl border border-[#E2E8F0] overflow-hidden">
            <table class="w-full">
                <thead>
                    <tr class="text-left text-gray-500 text-sm border-b border-[#E2E8F0] bg-primary-bg/50">
                        <th class="px-4 py-3 font-medium w-10"></th>
                        <th class="px-4 py-3 font-medium">活动名称</th>
                        <th class="px-4 py-3 font-medium w-24">分类</th>
                        <th class="px-4 py-3 font-medium w-20">状态</th>
                        <th class="px-4 py-3 font-medium w-20">报名人数</th>
                        <th class="px-4 py-3 font-medium w-36">活动时间</th>
                        <th class="px-4 py-3 font-medium w-28">创建人</th>
                        <th class="px-4 py-3 font-medium w-52 text-right">操作</th>
                    </tr>
                </thead>
                <tbody id="activityTableBody">
                    <!-- 通过JS渲染 -->
                </tbody>
            </table>
            <!-- 分页 -->
            <div class="flex items-center justify-between px-4 py-3 border-t border-[#E2E8F0]">
                <span id="paginationInfo" class="text-sm text-gray-500">显示 1-10 条，共 10 条</span>
                <div class="flex items-center gap-2">
                    <button onclick="goToPage(currentPage - 1)" id="prevPage" class="px-3 py-1 rounded border border-[#E2E8F0] text-gray-500 hover:text-white hover:border-accent-blue transition-colors text-sm disabled:opacity-50">上一页</button>
                    <button onclick="goToPage(1)" class="px-3 py-1 rounded bg-accent-blue text-white text-sm">1</button>
                    <button onclick="goToPage(2)" class="px-3 py-1 rounded border border-[#E2E8F0] text-gray-500 hover:text-white hover:border-accent-blue transition-colors text-sm">2</button>
                    <button id="nextPage" onclick="goToPage(currentPage + 1)" class="px-3 py-1 rounded border border-[#E2E8F0] text-gray-500 hover:text-white hover:border-accent-blue transition-colors text-sm">下一页</button>
                </div>
            </div>
        </div>
    </main>

    <!-- Toast容器 -->
    <div id="toastContainer" class="fixed bottom-6 right-6 z-50 flex flex-col gap-2"></div>

    <!-- 活动抽屉 -->
    <div id="activityDrawer" class="fixed top-14 right-0 bottom-0 w-[700px] bg-white shadow-2xl drawer hidden z-[100]">
        <div class="flex items-center justify-between px-6 py-4 border-b border-[#E2E8F0] bg-gray-50">
            <h3 id="drawerTitle" class="text-lg font-medium">创建活动</h3>
            <button onclick="closeDrawer()" class="text-gray-500 hover:text-gray-700">
                <i class="fas fa-times text-xl"></i>
            </button>
        </div>

        <!-- Tab导航 -->
        <div class="flex border-b border-[#E2E8F0]">
            <button onclick="switchTab('basic')" id="tab-basic" class="tab-btn active px-6 py-3 text-sm font-medium border-b-2 border-[#0A61FF] text-[#0A61FF]">基础信息</button>
            <button onclick="switchTab('detail')" id="tab-detail" class="tab-btn px-6 py-3 text-sm font-medium border-b-2 border-transparent text-gray-600 hover:text-gray-900">活动详情</button>
            <button onclick="switchTab('resource')" id="tab-resource" class="tab-btn px-6 py-3 text-sm font-medium border-b-2 border-transparent text-gray-600 hover:text-gray-900">资源引用</button>
        </div>

        <div class="drawer-panel p-6 overflow-y-auto" style="max-height: calc(100vh - 140px);">
            <input type="hidden" id="activityId">

            <!-- Tab1: 基础信息 -->
            <div id="panel-basic" class="tab-panel">
                <div class="grid grid-cols-2 gap-6">
                    <div class="col-span-2">
                        <label class="block text-sm text-gray-600 mb-2">活动名称 <span class="text-accent-red">*</span></label>
                        <input type="text" id="activityName" placeholder="请输入活动名称" class="w-full bg-white border border-[#E2E8F0] rounded-xl px-4 py-3 text-sm text-gray-700 placeholder-gray-400 focus:border-accent-blue focus:outline-none">
                    </div>
                    <div>
                        <label class="block text-sm text-gray-600 mb-2">活动分类 <span class="text-accent-red">*</span></label>
                        <select id="activityCategory" class="w-full bg-white border border-[#E2E8F0] rounded-xl px-4 py-3 text-sm text-gray-700 focus:border-accent-blue focus:outline-none">
                            <option value="">请选择分类</option>
                            <option value="tech">科技创新</option>
                            <option value="culture">文化活动</option>
                            <option value="sports">体育运动</option>
                            <option value="education">教育培训</option>
                        </select>
                    </div>
                    <div>
                        <label class="block text-sm text-gray-600 mb-2">标签</label>
                        <input type="text" id="activityTags" placeholder="多个标签用逗号分隔" class="w-full bg-white border border-[#E2E8F0] rounded-xl px-4 py-3 text-sm text-gray-700 placeholder-gray-400 focus:border-accent-blue focus:outline-none">
                    </div>
                    <div class="col-span-2">
                        <label class="block text-sm text-gray-600 mb-2">活动封面</label>
                        <div id="coverArea" class="border-2 border-dashed border-[#E2E8F0] rounded-xl p-6">
                            <div id="coverEmpty" class="text-center">
                                <div class="flex items-center justify-center gap-4 mb-4">
                                    <div onclick="openResourcePicker('cover', 'single')" class="flex-1 bg-white rounded-xl p-4 cursor-pointer hover:border-accent-blue border-2 border-transparent transition-all">
                                        <i class="fas fa-images text-2xl text-accent-blue mb-2"></i>
                                        <p class="text-smfont-medium">📌 从资源中心选择</p>
                                        <p class="text-xs text-gray-500 mt-1">已有封面图库</p>
                                    </div>
                                    <div class="text-gray-500 text-xl">/</div>
                                    <div onclick="triggerCoverUpload()" class="flex-1 bg-white rounded-xl p-4 cursor-pointer hover:border-accent-blue border-2 border-transparent transition-all">
                                        <i class="fas fa-cloud-upload-alt text-2xl text-gray-600 mb-2"></i>
                                        <p class="text-sm font-medium">⬆️ 上传新资源</p>
                                        <p class="text-xs text-gray-500 mt-1">直接本地上传</p>
                                    </div>
                                </div>
                            </div>
                            <div id="coverPreview" class="hidden mt-3 flex items-center gap-3 p-3 bg-white rounded-xl">
                                <img id="coverImg" src="" class="w-32 h-20 rounded object-cover">
                                <div class="flex-1">
                                    <p id="coverName" class="text-sm font-medium"></p>
                                    <p id="coverSize" class="text-xs text-gray-500"></p>
                                </div>
                                <button onclick="removeCover()" class="text-accent-red hover:text-red-400 text-sm px-3 py-1 border border-accent-red/30 rounded-lg">移除</button>
                                <button onclick="openResourcePicker('cover', 'single')" class="text-accent-blue hover:text-blue-400 text-sm px-3 py-1 border border-accent-blue/30 rounded-lg">更换</button>
                            </div>
                            <input type="file" id="coverFileInput" accept="image/*" class="hidden" onchange="handleCoverFileUpload(this)">
                        </div>
                    </div>
                    <div class="col-span-2">
                        <label class="block text-sm text-gray-600 mb-2">活动简介</label>
                        <textarea id="activitySummary" rows="2" placeholder="请输入活动简介，简短描述活动要点" class="w-full bg-white border border-[#E2E8F0] rounded-xl px-4 py-3 text-sm text-gray-700 placeholder-gray-400 focus:border-accent-blue focus:outline-none resize-none"></textarea>
                    </div>
                    <div>
                        <label class="block text-sm text-gray-600 mb-2">活动地点</label>
                        <input type="text" id="activityLocation" placeholder="请输入活动地点" class="w-full bg-white border border-[#E2E8F0] rounded-xl px-4 py-3 text-sm text-gray-700 placeholder-gray-400 focus:border-accent-blue focus:outline-none">
                    </div>
                    <div>
                        <label class="block text-sm text-gray-600 mb-2">主办单位</label>
                        <input type="text" id="activityOrganizer" placeholder="请输入主办单位" class="w-full bg-white border border-[#E2E8F0] rounded-xl px-4 py-3 text-sm text-gray-700 placeholder-gray-400 focus:border-accent-blue focus:outline-none">
                    </div>
                    <div>
                        <label class="block text-sm text-gray-600 mb-2">最大报名人数</label>
                        <input type="number" id="maxParticipants" placeholder="0" class="w-full bg-white border border-[#E2E8F0] rounded-xl px-4 py-3 text-sm text-gray-700 placeholder-gray-400 focus:border-accent-blue focus:outline-none">
                    </div>
                    <div class="col-span-2">
                        <label class="block text-sm text-gray-600 mb-2">活动时间</label>
                        <div class="flex items-center gap-4">
                            <input type="datetime-local" id="activityStartTime" class="flex-1 bg-white border border-[#E2E8F0] rounded-xl px-4 py-3 text-sm text-gray-700 focus:border-accent-blue focus:outline-none">
                            <span class="text-gray-500">至</span>
                            <input type="datetime-local" id="activityEndTime" class="flex-1 bg-white border border-[#E2E8F0] rounded-xl px-4 py-3 text-sm text-gray-700 focus:border-accent-blue focus:outline-none">
                        </div>
                    </div>
                    <div class="col-span-2">
                        <label class="block text-sm text-gray-600 mb-2">报名时间</label>
                        <div class="flex items-center gap-4">
                            <input type="datetime-local" id="registrationStartTime" class="flex-1 bg-white border border-[#E2E8F0] rounded-xl px-4 py-3 text-sm text-gray-700 focus:border-accent-blue focus:outline-none">
                            <span class="text-gray-500">至</span>
                            <input type="datetime-local" id="registrationEndTime" class="flex-1 bg-white border border-[#E2E8F0] rounded-xl px-4 py-3 text-sm text-gray-700 focus:border-accent-blue focus:outline-none">
                        </div>
                    </div>
                    <div class="col-span-2">
                        <label class="block text-sm text-gray-600 mb-2">发布形式</label>
                        <div class="flex gap-6">
                            <label class="flex items-center gap-2 cursor-pointer">
                                <input type="radio" name="publishType" value="draft" checked class="accent-accent-blue">
                                <span class="text-sm">存为草稿</span>
                            </label>
                            <label class="flex items-center gap-2 cursor-pointer">
                                <input type="radio" name="publishType" value="pending" class="accent-accent-blue">
                                <span class="text-sm">提交审核</span>
                            </label>
                            <label class="flex items-center gap-2 cursor-pointer">
                                <input type="radio" name="publishType" value="published" class="accent-accent-blue">
                                <span class="text-sm">直接发布</span>
                            </label>
                        </div>
                    </div>
                </div>
            </div>

            <!-- Tab2: 活动详情 -->
            <div id="panel-detail" class="tab-panel hidden">
                <div>
                    <label class="block text-sm text-gray-600 mb-2">活动详情</label>
                    <div class="bg-white border border-[#E2E8F0] rounded-xl overflow-hidden">
                        <div class="flex items-center gap-1 px-4 py-2 border-b border-[#E2E8F0] bg-gray-50">
                            <button class="w-8 h-8 rounded hover:bg-gray-200 flex items-center justify-center text-gray-600" title="加粗"><i class="fas fa-bold"></i></button>
                            <button class="w-8 h-8 rounded hover:bg-gray-200 flex items-center justify-center text-gray-600" title="斜体"><i class="fas fa-italic"></i></button>
                            <button class="w-8 h-8 rounded hover:bg-gray-200 flex items-center justify-center text-gray-600" title="下划线"><i class="fas fa-underline"></i></button>
                            <span class="w-px h-6 bg-gray-300 mx-2"></span>
                            <button class="w-8 h-8 rounded hover:bg-gray-200 flex items-center justify-center text-gray-600" title="无序列表"><i class="fas fa-list-ul"></i></button>
                            <button class="w-8 h-8 rounded hover:bg-gray-200 flex items-center justify-center text-gray-600" title="有序列表"><i class="fas fa-list-ol"></i></button>
                            <button class="w-8 h-8 rounded hover:bg-gray-200 flex items-center justify-center text-gray-600" title="链接"><i class="fas fa-link"></i></button>
                            <button onclick="openResourcePicker('content', 'multiple')" class="w-8 h-8 rounded hover:bg-gray-200 flex items-center justify-center text-gray-600" title="插入图片"><i class="fas fa-image"></i></button>
                            <button onclick="openResourcePicker('content', 'multiple')" class="w-8 h-8 rounded hover:bg-gray-200 flex items-center justify-center text-accent-cyan" title="插入资源">
                                <i class="fas fa-folder-open"></i>
                            </button>
                        </div>
                        <textarea id="activityContent" rows="12" placeholder="请输入活动详情...\n\n提示：点击工具栏📁资源按钮可插入图片/文件/视频" class="w-full p-4 text-sm text-gray-700 placeholder-gray-400 focus:outline-none resize-none"></textarea>
                    </div>
                </div>
            </div>

            <!-- Tab3: 资源引用 -->
            <div id="panel-resource" class="tab-panel hidden">
                <div class="flex border-b border-[#E2E8F0] mb-4">
                    <button onclick="switchResourceTab('image')" id="resTab-image" class="px-4 py-2 text-sm font-medium border-b-2 border-[#0A61FF] text-[#0A61FF]">
                        <i class="fas fa-images mr-1"></i>图片
                    </button>
                    <button onclick="switchResourceTab('file')" id="resTab-file" class="px-4 py-2 text-sm font-medium border-b-2 border-transparent text-gray-600 hover:text-gray-900">
                        <i class="fas fa-file-alt mr-1"></i>文件
                    </button>
                    <button onclick="switchResourceTab('video')" id="resTab-video" class="px-4 py-2 text-sm font-medium border-b-2 border-transparent text-gray-600 hover:text-gray-900">
                        <i class="fas fa-video mr-1"></i>视频
                    </button>
                </div>

                <div class="mb-4">
                    <div class="relative">
                        <i class="fas fa-search absolute left-3 top-1/2 -translate-y-1/2 text-gray-500"></i>
                        <input type="text" id="resourceSearchInput" placeholder="搜索资源名称..." class="w-full bg-white border border-[#E2E8F0] rounded-lg pl-10 pr-4 py-2 text-sm text-gray-700 placeholder-gray-400 focus:border-accent-blue focus:outline-none" oninput="filterActivityResources()">
                    </div>
                </div>

                <div id="activityResourceList" class="grid grid-cols-4 gap-3 max-h-[300px] overflow-y-auto mb-4">
                    <!-- 动态渲染 -->
                </div>

                <div class="border-t border-[#E2E8F0] pt-4">
                    <h4 class="text-sm font-medium text-gray-600 mb-3">已选资源</h4>
                    <div id="selectedActivityResources" class="flex flex-wrap gap-3 min-h-[80px] bg-gray-50 rounded-xl p-4">
                        <p class="text-sm text-gray-400">暂无选择资源</p>
                    </div>
                </div>
            </div>
        </div>

        <div class="flex items-center justify-end gap-3 px-6 py-4 border-t border-[#E2E8F0] bg-gray-50">
            <button onclick="closeDrawer()" class="px-5 py-2.5 border border-[#E2E8F0] rounded-xl text-gray-600 hover:text-gray-900 hover:border-gray-400 transition-colors">取消</button>
            <button onclick="saveActivity()" class="px-5 py-2.5 bg-accent-blue text-white rounded-xl hover:bg-blue-600 transition-colors">保存</button>
        </div>
    </div>

    <!-- 查看详情弹窗 -->
    <div id="viewModal" class="fixed inset-0 bg-black/70 z-[90] hidden items-center justify-center">
        <div class="bg-white rounded-2xl w-[800px] max-h-[90vh] overflow-hidden border border-[#E2E8F0] shadow-2xl">
            <div class="flex items-center justify-between px-6 py-4 border-b border-[#E2E8F0]">
                <h3 class="text-lg font-medium">活动详情</h3>
                <button onclick="closeModal('viewModal')" class="text-gray-500 hover:text-gray-700">
                    <i class="fas fa-times text-xl"></i>
                </button>
            </div>
            <div class="p-6 overflow-y-auto max-h-[calc(90vh-140px)]">
                <img id="viewCover" src="" class="w-full h-48 rounded-xl object-cover mb-4">
                <h2 id="viewTitle" class="text-xl font-semibold mb-4"></h2>
                <div class="flex items-center gap-4 mb-6 text-sm text-gray-500 flex-wrap">
                    <span><i class="fas fa-folder mr-1"></i><span id="viewCategory"></span></span>
                    <span><i class="fas fa-user mr-1"></i><span id="viewOrganizer"></span></span>
                    <span><i class="fas fa-map-marker-alt mr-1"></i><span id="viewLocation"></span></span>
                    <span><i class="fas fa-users mr-1"></i><span id="viewParticipants"></span></span>
                </div>
                <div class="flex items-center gap-3 mb-6">
                    <span id="viewStatus" class="px-3 py-1 text-xs rounded-full"></span>
                    <span id="viewTags" class="text-xs text-gray-500"></span>
                </div>
                <div class="border-t border-[#E2E8F0] pt-4">

        function getFilteredActivities() {
            const search = document.getElementById('searchInput').value.toLowerCase();
            const category = document.getElementById('filterCategory').value;
            const status = document.getElementById('filterStatus').value;
            const creator = document.getElementById('filterCreator').value;

            return activities.filter(a => {
                if (search && !a.name.toLowerCase().includes(search)) return false;
                if (category && a.category !== category) return false;
                if (status && a.status !== status) return false;
                if (creator && a.creator !== creator) return false;
                return true;
            });
        }

            renderActivityTable();

                draft: '<span class="px-2 py-1 text-xs rounded-full bg-gray-100 text-gray-600">草稿</span>',

                published: '<span class="px-2 py-1 text-xs rounded-full bg-green-100 text-green-700">已发布</span>',
                ended: '<span class="px-2 py-1 text-xs rounded-full bg-blue-100 text-blue-700">已结束</span>',
                offline: '<span class="px-2 py-1 text-xs rounded-full bg-gray-100 text-gray-500">已下线</span>'
            };
            return statusMap[status] || status;

            document.getElementById('activityCategory').value = activity.category;
            document.getElementById('activityTags').value = activity.tags;

                        location: document.getElementById('activityLocation').value,
                        organizer: document.getElementById('activityOrganizer').value,
                        maxParticipants: parseInt(document.getElementById('maxParticipants').value) || 0,
                        startTime: document.getElementById('activityStartTime').value,
                        endTime: document.getElementById('activityEndTime').value,
                        regStartTime: document.getElementById('registrationStartTime').value,
                        regEndTime: document.getElementById('registrationEndTime').value,
                        content: document.getElementById('activityContent').value,
                        status: status
                    };
                }
                showToast('活动已更新', 'success');
            } else {
                const newId = Math.max(...activities.map(a => a.id)) + 1;
                activities.unshift({
                    id: newId,
                    name: name,
                    category: category,
                    categoryName: document.querySelector(`#activityCategory option[value="${category}"]`).textContent,
                    status: status,
                    participants: 0,
                    maxParticipants: parseInt(document.getElementById('maxParticipants').value) || 0,
                    startTime: document.getElementById('activityStartTime').value,
                    endTime: document.getElementById('activityEndTime').value,
                    regStartTime: document.getElementById('registrationStartTime').value,
                    regEndTime: document.getElementById('registrationEndTime').value,
                    publishTime: status === 'published' ? new Date().toISOString().substring(0, 16) : '',
                    creator: '张明远',
                    organizer: document.getElementById('activityOrganizer').value,
                    location: document.getElementById('activityLocation').value,
                    summary: document.getElementById('activitySummary').value,
                    tags: document.getElementById('activityTags').value,
                    content: document.getElementById('activityContent').value
                });
                showToast('活动已创建', 'success');
            }

            closeDrawer();
            renderActivityTable();
        }

        // 查看活动
        function viewActivity(id) {
            currentActivityId = id;
            const activity = activities.find(a => a.id === id);
            if (!activity) return;

            document.getElementById('viewCover').src = activity.coverUrl || 'https://images.unsplash.com/photo-1540575467063-178a50c2df87?w=800&h=400&fit=crop';
            document.getElementById('viewTitle').textContent = activity.name;
            document.getElementById('viewCategory').textContent = activity.categoryName;
            document.getElementById('viewOrganizer').textContent = activity.organizer;
            document.getElementById('viewLocation').textContent = activity.location;
            document.getElementById('viewParticipants').textContent = `${activity.participants}/${activity.maxParticipants}`;
            document.getElementById('viewStatus').outerHTML = getStatusBadge(activity.status);
            document.getElementById('viewTags').textContent = activity.tags ? `#${activity.tags.replace(/,/g, ' #')}` : '';
            document.getElementById('viewTimeRange').textContent = `${activity.startTime} 至 ${activity.endTime}`;
            document.getElementById('viewRegTimeRange').textContent = `${activity.regStartTime} 至 ${activity.regEndTime}`;
            document.getElementById('viewSummary').textContent = activity.summary || '暂无简介';
            document.getElementById('viewContent').textContent = activity.content || '暂无详情';

            openModal('viewModal');
        }

        // 编辑活动
        function editActivity(id) {
            openDrawer('edit', id);
        }

        // 删除活动
        function deleteActivity(id) {
            const activity = activities.find(a => a.id === id);
            if (!activity) return;

            document.getElementById('deleteTitle').textContent = activity.name;
            document.getElementById('confirmDeleteBtn').onclick = function() {
                activities = activities.filter(a => a.id !== id);
                closeModal('deleteModal');
                showToast('活动已删除', 'success');
                renderActivityTable();
            };
            openModal('deleteModal');
        }

        // 提交审核
        function submitForReview(id) {
            const activity = activities.find(a => a.id === id);
            if (!activity) return;

            activity.status = 'pending';
            showToast('活动已提交审核', 'success');
            renderActivityTable();
        }

        // 发布活动
        function publishActivity(id) {
            const activity = activities.find(a => a.id === id);
            if (!activity) return;

            activity.status = 'published';
            activity.publishTime = new Date().toISOString().substring(0, 16);
            showToast('活动已发布', 'success');
            renderActivityTable();
        }

        // 下线活动
        function offlineActivity(id) {
            const activity = activities.find(a => a.id === id);
            if (!activity) return;

            activity.status = 'offline';
            showToast('活动已下线', 'success');
            renderActivityTable();
        }

        // 批量操作
        function toggleSelectAll() {
            const checked = document.getElementById('selectAll').checked;
            document.querySelectorAll('.activity-checkbox').forEach(cb => {
                cb.checked = checked;
            });
            updateSelectedCount();
        }

        function updateSelectedCount() {
            selectedIds = Array.from(document.querySelectorAll('.activity-checkbox:checked')).map(cb => parseInt(cb.dataset.id));
            document.getElementById('selectedCount').textContent = `已选择 ${selectedIds.length} 项`;
        }

        function batchSubmit() {
            if (selectedIds.length === 0) {
                showToast('请先选择活动', 'warning');
                return;
            }
            selectedIds.forEach(id => {
                const activity = activities.find(a => a.id === id);
                if (activity && activity.status === 'draft') activity.status = 'pending';
            });
            showToast(`已提交 ${selectedIds.length} 个活动审核`, 'success');
            renderActivityTable();
        }

        function batchPublish() {
            if (selectedIds.length === 0) {
                showToast('请先选择活动', 'warning');
                return;
            }
            selectedIds.forEach(id => {
                const activity = activities.find(a => a.id === id);
                if (activity && activity.status === 'pending') {
                    activity.status = 'published';
                    activity.publishTime = new Date().toISOString().substring(0, 16);
                }
            });
            showToast(`已发布 ${selectedIds.length} 个活动`, 'success');
            renderActivityTable();
        }

        function batchOffline() {
            if (selectedIds.length === 0) {
                showToast('请先选择活动', 'warning');
                return;
            }
            selectedIds.forEach(id => {
                const activity = activities.find(a => a.id === id);
                if (activity && activity.status === 'published') activity.status = 'offline';
            });
            showToast(`已下线 ${selectedIds.length} 个活动`, 'success');
            renderActivityTable();
        }

        function batchDelete() {
            if (selectedIds.length === 0) {
                showToast('请先选择活动', 'warning');
                return;
            }
            document.getElementById('deleteTitle').textContent = `已选择 ${selectedIds.length} 个活动`;
            document.getElementById('confirmDeleteBtn').onclick = function() {
                activities = activities.filter(a => !selectedIds.includes(a.id));
                closeModal('deleteModal');
                showToast(`已删除 ${selectedIds.length} 个活动`, 'success');
                selectedIds = [];
                updateSelectedCount();
                renderActivityTable();
            };
            openModal('deleteModal');
        }

        // 资源选择器
        function openResourcePicker(mode, type) {
            resourcePickerConfig.mode = type;
            resourcePickerConfig.currentTab = 'image';
            resourcePickerConfig.selected = [];
            document.getElementById('pickerSearchInput').value = '';
            updatePickerStatus();
            renderPickerResourceList();

            const modal = document.getElementById('resourcePickerModal');
            modal.classList.remove('hidden');
            modal.classList.add('flex');
        }

        function closeResourcePicker() {
            document.getElementById('resourcePickerModal').classList.add('hidden');
            document.getElementById('resourcePickerModal').classList.remove('flex');
        }

        function switchResourcePickerTab(tab) {
            resourcePickerConfig.currentTab = tab;
            resourcePickerConfig.selected = [];
            document.getElementById('pickerSearchInput').value = '';

            ['image', 'file', 'video'].forEach(t => {
                const btn = document.getElementById('pickerTab-' + t);
                if (t === tab) {
                    btn.className = 'px-6 py-3 text-sm font-medium border-b-2 border-[#0A61FF] text-[#0A61FF]';
                } else {
                    btn.className = 'px-6 py-3 text-sm font-medium border-b-2 border-transparent text-gray-600 hover:text-gray-900';
                }
            });

            updatePickerStatus();
            renderPickerResourceList();
        }

        function filterPickerResources() {
            renderPickerResourceList();
        }

        function renderPickerResourceList() {
            const list = document.getElementById('pickerResourceList');
            const tab = resourcePickerConfig.currentTab;
            const search = document.getElementById('pickerSearchInput').value.toLowerCase();
            let resources = mockResources[tab] || [];

            if (search) {
                resources = resources.filter(r => r.name.toLowerCase().includes(search));
            }

            list.innerHTML = resources.map((r, index) => `
                <div onclick="togglePickerResource(${tab === 'image' ? r.id : (r.id + '-' + index)}, '${tab}')"
                     class="resource-card cursor-pointer rounded-lg overflow-hidden border-2 border-transparent hover:border-accent-blue transition-all ${resourcePickerConfig.selected.includes(tab === 'image' ? r.id : r.id) ? 'selected' : ''}"
                     data-id="${r.id}">
                    ${tab === 'image' ? `<img src="${r.url}" class="w-full h-24 object-cover">` :
                      tab === 'video' ? `<div class="relative"><img src="${r.poster}" class="w-full h-24 object-cover"><div class="absolute inset-0 flex items-center justify-center bg-black/30"><i class="fas fa-play text-white text-xl"></i></div></div>` :
                      `<div class="h-24 bg-gray-100 flex items-center justify-center"><i class="fas ${r.icon || 'fa-file'} text-3xl text-gray-400"></i></div>`}
                    <div class="p-2 bg-white">
                        <p class="text-xs truncate">${r.name}</p>
                        <p class="text-xs text-gray-400">${r.size}</p>
                    </div>
                </div>
            `).join('');
        }

        function togglePickerResource(id, tab) {
            if (resourcePickerConfig.mode === 'single') {
                resourcePickerConfig.selected = [id];
            } else {
                const index = resourcePickerConfig.selected.indexOf(id);
                if (index === -1) {
                    resourcePickerConfig.selected.push(id);
                } else {
                    resourcePickerConfig.selected.splice(index, 1);
                }
            }
            updatePickerStatus();
            renderPickerResourceList();
        }

        function updatePickerStatus() {
            const count = resourcePickerConfig.selected.length;
            document.getElementById('pickerSelectedInfo').textContent = count === 0 ? '请选择资源' : `已选择 ${count} 个资源`;
            document.getElementById('pickerConfirmBtn').disabled = count === 0;
        }

        function confirmResourceSelection() {
            const tab = resourcePickerConfig.currentTab;
            const selected = resourcePickerConfig.selected;

            if (resourcePickerConfig.mode === 'single') {
                const resource = mockResources[tab].find(r => r.id === selected[0]);
                if (resource) {
                    document.getElementById('coverEmpty').classList.add('hidden');
                    document.getElementById('coverPreview').classList.remove('hidden');
                    document.getElementById('coverImg').src = resource.url;
                    document.getElementById('coverName').textContent = resource.name;
                    document.getElementById('coverSize').textContent = resource.size;
                }
            }

            closeResourcePicker();
            showToast('资源选择成功', 'success');
        }

        function triggerCoverUpload() {
            document.getElementById('coverFileInput').click();
        }

        function handleCoverFileUpload(input) {
            if (input.files && input.files[0]) {
                const file = input.files[0];
                document.getElementById('coverEmpty').classList.add('hidden');
                document.getElementById('coverPreview').classList.remove('hidden');
                document.getElementById('coverImg').src = URL.createObjectURL(file);
                document.getElementById('coverName').textContent = file.name;
                document.getElementById('coverSize').textContent = (file.size / 1024 / 1024).toFixed(2) + 'MB';
            }
        }

        function removeCover() {
            document.getElementById('coverEmpty').classList.remove('hidden');
            document.getElementById('coverPreview').classList.add('hidden');
        }

        // 活动资源引用
        function switchResourceTab(tab) {
            ['image', 'file', 'video'].forEach(t => {
                const btn = document.getElementById('resTab-' + t);
                if (t === tab) {
                    btn.className = 'px-4 py-2 text-sm font-medium border-b-2 border-[#0A61FF] text-[#0A61FF]';
                } else {
                    btn.className = 'px-4 py-2 text-sm font-medium border-b-2 border-transparent text-gray-600 hover:text-gray-900';
                }
            });
            renderActivityResourceList(tab);
        }

        function renderActivityResourceList(tab) {
            const list = document.getElementById('activityResourceList');
            const search = document.getElementById('resourceSearchInput').value.toLowerCase();
            let resources = mockResources[tab] || [];

            if (search) {
                resources = resources.filter(r => r.name.toLowerCase().includes(search));
            }

            list.innerHTML = resources.map(r => `
                <div onclick="toggleActivityResource(${r.id}, '${tab}')"
                     class="cursor-pointer rounded-lg overflow-hidden border-2 ${selectedActivityResources.includes(r.id) ? 'border-accent-cyan bg-cyan-50' : 'border-transparent hover:border-accent-blue'} transition-all">
                    ${tab === 'image' ? `<img src="${r.url}" class="w-full h-16 object-cover">` :
                      `<div class="h-16 bg-gray-100 flex items-center justify-center"><i class="fas ${r.icon || 'fa-file'} text-xl text-gray-400"></i></div>`}
                    <div class="p-1.5 bg-white">
                        <p class="text-xs truncate">${r.name}</p>
                    </div>
                </div>
            `).join('');
        }

        function toggleActivityResource(id, tab) {
            const index = selectedActivityResources.indexOf(id);
            if (index === -1) {
                selectedActivityResources.push(id);
            } else {
                selectedActivityResources.splice(index, 1);
            }
            renderActivityResourceList(tab);
            renderSelectedResources();
        }

        function renderSelectedResources() {
            const container = document.getElementById('selectedActivityResources');
            if (selectedActivityResources.length === 0) {
                container.innerHTML = '<p class="text-sm text-gray-400">暂无选择资源</p>';
                return;
            }

            container.innerHTML = selectedActivityResources.map(id => {
                let resource = null;
                for (const tab of ['image', 'file', 'video']) {
                    resource = mockResources[tab].find(r => r.id === id);
                    if (resource) break;
                }
                if (!resource) return '';

                return `
                    <div class="flex items-center gap-2 bg-white rounded-lg p-2 border border-[#E2E8F0]">
                        ${resource.url && resource.url !== '#' ? `<img src="${resource.url}" class="w-10 h-10 rounded object-cover">` :
                          `<div class="w-10 h-10 rounded bg-gray-100 flex items-center justify-center"><i class="fas ${resource.icon || 'fa-file'} text-gray-400"></i></div>`}
                        <div class="flex-1 min-w-0">
                            <p class="text-sm truncate">${resource.name}</p>
                        </div>
                        <button onclick="removeActivityResource(${id})" class="text-gray-400 hover:text-accent-red">
                            <i class="fas fa-times"></i>
                        </button>
                    </div>
                `;
            }).join('');
        }

        function removeActivityResource(id) {
            selectedActivityResources = selectedActivityResources.filter(r => r !== id);
            renderSelectedResources();
            const currentTab = document.querySelector('#activityResourceList').dataset.tab || 'image';
            renderActivityResourceList(currentTab);
        }

        function filterActivityResources() {
            const currentTab = document.querySelector('#resTab-image')?.classList.contains('border-[#0A61FF]') ? 'image' :
                              document.querySelector('#resTab-file')?.classList.contains('border-[#0A61FF]') ? 'file' : 'video';
            renderActivityResourceList(currentTab);
        }

        // 弹窗操作
        function openModal(modalId) {
            document.getElementById(modalId).classList.remove('hidden');
            document.getElementById(modalId).classList.add('flex');
        }

        function closeModal(modalId) {
            document.getElementById(modalId).classList.add('hidden');
            document.getElementById(modalId).classList.remove('flex');
        }

        // Toast提示
        function showToast(message, type = 'success') {
            const container = document.getElementById('toastContainer');
            const toast = document.createElement('div');
            const bgColors = {
                success: 'bg-accent-green',
                error: 'bg-accent-red',
                warning: 'bg-accent-amber'
            };
            const icons = {
                success: 'fa-check-circle',
                error: 'fa-exclamation-circle',
                warning: 'fa-exclamation-triangle'
            };

            toast.className = `toast ${bgColors[type]} text-white px-4 py-3 rounded-xl shadow-lg flex items-center gap-3`;
            toast.innerHTML = `
                <i class="fas ${icons[type]}"></i>
                <span class="text-sm">${message}</span>
            `;
            container.appendChild(toast);

            setTimeout(() => {
                toast.style.opacity = '0';
                toast.style.transform = 'translateX(100%)';
                toast.style.transition = 'all 0.3s ease';
                setTimeout(() => toast.remove(), 300);
            }, 3000);
        }
    </script>
</body>
</html>
