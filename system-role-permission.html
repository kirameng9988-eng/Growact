        // 当前编辑的角色
        let currentRole = null;
        let selectedPermissions = [];
        let originalPermissions = [];

        // 获取 URL 参数
        function getRoleIdFromUrl() {
            const params = new URLSearchParams(window.location.search);
            return parseInt(params.get('roleId')) || 2;
        }

        // 初始化页面
        function initPage() {
            const roleId = getRoleIdFromUrl();
            currentRole = roles.find(r => r.id === roleId) || roles[0];

            document.getElementById('roleName').textContent = currentRole.name;
            document.getElementById('roleCode').textContent = currentRole.code;
            document.getElementById('roleDesc').textContent = currentRole.desc;
            document.getElementById('userCount').textContent = currentRole.userCount;

            // 设置角色图标颜色
            const iconEl = document.getElementById('roleIcon');
            iconEl.className = `w-12 h-12 rounded-xl flex items-center justify-center ${currentRole.type === 'system' ? 'bg-accent-blue/20' : 'bg-accent-cyan/20'}`;
            iconEl.innerHTML = `<i class="fas fa-${currentRole.type === 'system' ? 'cog' : 'user-tag'} text-${currentRole.type === 'system' ? 'accent-blue' : 'accent-cyan'} text-xl"></i>`;

            // 复制权限
            originalPermissions = [...currentRole.permissions];
            selectedPermissions = currentRole.permissions.includes('*')
                ? getAllPermissionKeys()
                : [...currentRole.permissions];

            renderPermissionTable();
            updateSelectedCount();
        }

        // 获取所有权限key
        function getAllPermissionKeys() {
            const keys = [];
            Object.entries(permissionMatrix).forEach(([catKey, category]) => {
                category.menus.forEach(menu => {
                    menu.buttons.forEach(btn => {
                        keys.push(`${catKey}.${menu.key}.${btn.key}`);
                    });
                });
            });
            return keys;
        }

        // 渲染权限表格
        function renderPermissionTable() {
            const table = document.getElementById('permissionTable');
            let html = '';

            Object.entries(permissionMatrix).forEach(([catKey, category]) => {
                // 分类行（合并所有菜单）
                const categoryRowspan = category.menus.reduce((sum, m) => sum + m.buttons.length, 0) + category.menus.length - 1;

                html += `
                <div class="flex category-row border-b border-[#E2E8F0]">
                    <div class="w-[120px] py-3 px-4 flex items-center border-r border-[#E2E8F0]">
                        <div class="w-8 h-8 rounded-lg bg-${category.color}/20 flex items-center justify-center mr-3">
                            <i class="fas fa-${category.icon} text-${category.color}"></i>
                        </div>
                        <span class="font-medium text-sm">${category.category}</span>
                    </div>
                    <div class="flex-1 py-2">
                        ${category.menus.map((menu, menuIdx) => {
                            const permKey = `${catKey}.${menu.key}`;
                            const isMenuSelected = isMenuAllSelected(catKey, menu.key);

                            return `
                            <div class="flex items-start border-b border-[#E2E8F0]/50 ${menuIdx === category.menus.length - 1 ? 'border-b-0' : ''}">
                                <div class="w-[180px] py-2 px-4 flex items-center gap-2 border-r border-[#E2E8F0]/50">
                                    <label class="flex items-center gap-2 cursor-pointer flex-shrink-0">
                                        <input type="checkbox"
                                            class="w-4 h-4 rounded border-[#E2E8F0] bg-primary-bg accent-accent-blue menu-checkbox"
                                            data-category="${catKey}"
                                            data-menu="${menu.key}"
                                            ${isMenuSelected ? 'checked' : ''}
                                            onchange="toggleMenu('${catKey}', '${menu.key}')">
                                        <span class="text-sm">${menu.name}</span>
                                    </label>
                                </div>
                                <div class="flex-1 py-2 px-4 flex flex-wrap gap-2">
                                    ${menu.buttons.map(btn => {
                                        const btnKey = `${catKey}.${menu.key}.${btn.key}`;
                                        const isSelected = selectedPermissions.includes(btnKey);
                                        return `
                                        <span class="permission-tag px-3 py-1.5 rounded-lg border border-[#E2E8F0] text-sm ${isSelected ? 'selected' : 'text-gray-600'}"
                                            data-key="${btnKey}"
                                            onclick="togglePermission('${btnKey}', this)">
                                            <i class="fas fa-${isSelected ? '-check-square' : 'square'} mr-1"></i>
                                            ${btn.name}
                                        </span>
                                        `;
                                    }).join('')}
                                </div>
                                <div class="w-[80px] py-2 flex items-center justify-center border-l border-[#1a2744]/50">
                                    <label class="flex items-center gap-2 cursor-pointer">
                                        <input type="checkbox"
                                            class="w-4 h-4 rounded border-[#E2E8F0] bg-primary-bg accent-accent-blue select-all-checkbox"
                                            data-category="${catKey}"
                                            data-menu="${menu.key}"
                                            ${isMenuSelected ? 'checked' : ''}
                                            onchange="toggleSelectAll('${catKey}', '${menu.key}', this.checked)">
                                    </label>
                                </div>
                            </div>
                            `;
                        }).join('')}
                    </div>
                </div>
                `;
            });

            table.innerHTML = html;
        }

        // 检查菜单是否全选
        function isMenuAllSelected(catKey, menuKey) {
            const category = permissionMatrix[catKey];
            const menu = category.menus.find(m => m.key === menuKey);
            if (!menu) return false;

            return menu.buttons.every(btn => {
                const btnKey = `${catKey}.${menuKey}.${btn.key}`;
                return selectedPermissions.includes(btnKey);
            });
        }

        // 切换菜单权限
        function toggleMenu(catKey, menuKey) {
            const category = permissionMatrix[catKey];
            const menu = category.menus.find(m => m.key === menuKey);
            if (!menu) return;

            const permKey = `${catKey}.${menuKey}`;
            const viewKey = `${catKey}.${menuKey}.view`;
            const isMenuSelected = isMenuAllSelected(catKey, menuKey);

            if (isMenuSelected) {
                // 取消菜单时，移除所有按钮权限
                menu.buttons.forEach(btn => {
                    const btnKey = `${catKey}.${menuKey}.${btn.key}`;
                    const idx = selectedPermissions.indexOf(btnKey);
                    if (idx > -1) {
                        selectedPermissions.splice(idx, 1);
                    }
                });
            } else {
                // 勾选菜单时，自动勾选查看权限
                if (!selectedPermissions.includes(viewKey)) {
                    selectedPermissions.push(viewKey);
                }
                // 勾选所有按钮
                menu.buttons.forEach(btn => {
                    const btnKey = `${catKey}.${menuKey}.${btn.key}`;
                    if (!selectedPermissions.includes(btnKey)) {
                        selectedPermissions.push(btnKey);
                    }
                });
            }

            renderPermissionTable();
            updateSelectedCount();
        }

        // 切换单个权限
        function togglePermission(key, element) {
            const idx = selectedPermissions.indexOf(key);
            if (idx > -1) {
                selectedPermissions.splice(idx, 1);
            } else {
                selectedPermissions.push(key);
            }

            // 更新 Tag 样式
            const isSelected = selectedPermissions.includes(key);
            element.classList.toggle('selected', isSelected);
            element.querySelector('i').className = `fas fa-${isSelected ? 'check-square' : 'square'} mr-1`;

            // 更新菜单复选框状态
            const parts = key.split('.');
            if (parts.length === 3) {
                updateMenuCheckbox(parts[0], parts[1]);
            }

            updateSelectedCount();
        }

        // 更新菜单复选框状态
        function updateMenuCheckbox(catKey, menuKey) {
            const menuCheckbox = document.querySelector(`.menu-checkbox[data-category="${catKey}"][data-menu="${menuKey}"]`);
            if (menuCheckbox) {
                menuCheckbox.checked = isMenuAllSelected(catKey, menuKey);
            }

            const selectAllCheckbox = document.querySelector(`.select-all-checkbox[data-category="${catKey}"][data-menu="${menuKey}"]`);
            if (selectAllCheckbox) {
                selectAllCheckbox.checked = isMenuAllSelected(catKey, menuKey);
            }
        }

        // 全选/取消全选
        function toggleSelectAll(catKey, menuKey, checked) {
            const category = permissionMatrix[catKey];
            const menu = category.menus.find(m => m.key === menuKey);
            if (!menu) return;

            if (checked) {
                // 全选：添加所有按钮权限
                if (!selectedPermissions.includes(`${catKey}.${menuKey}.view`)) {
                    selectedPermissions.push(`${catKey}.${menuKey}.view`);
                }
                menu.buttons.forEach(btn => {
                    const btnKey = `${catKey}.${menuKey}.${btn.key}`;
                    if (!selectedPermissions.includes(btnKey)) {
                        selectedPermissions.push(btnKey);
                    }
                });
            } else {
                // 取消全选：移除所有按钮权限
                menu.buttons.forEach(btn => {
                    const btnKey = `${catKey}.${menuKey}.${btn.key}`;
                    const idx = selectedPermissions.indexOf(btnKey);
                    if (idx > -1) {
                        selectedPermissions.splice(idx, 1);
                    }
                });
            }

            renderPermissionTable();
            updateSelectedCount();
        }

        // 更新已选数量
        function updateSelectedCount() {
            document.getElementById('selectedCount').textContent = selectedPermissions.length;
        }

        // 重置权限
        function resetPermissions() {
            selectedPermissions = [...originalPermissions];
            if (currentRole.permissions.includes('*')) {
                selectedPermissions = getAllPermissionKeys();
            }
            renderPermissionTable();
            updateSelectedCount();
            showToast('已重置为初始状态');
        }

        // 保存权限
        function savePermissions() {
            if (currentRole) {
                currentRole.permissions = selectedPermissions;
                showSuccessModal();
            }
        }

        // 显示成功弹窗
        function showSuccessModal() {
            document.getElementById('successModal').classList.remove('hidden');
            document.getElementById('successModal').classList.add('flex');
        }

        // 关闭成功弹窗
        function closeSuccessModal() {
            document.getElementById('successModal').classList.add('hidden');
            document.getElementById('successModal').classList.remove('flex');
            // 返回角色列表
            window.location.href = 'system-role.html';
        }

        // Toast提示
        function showToast(message, type = 'success') {
            const container = document.getElementById('toastContainer');
            const toast = document.createElement('div');
            const bgColor = type === 'success' ? 'bg-accent-green' : 'bg-accent-red';
            toast.className = `toast ${bgColor} text-white px-6 py-3 rounded-xl shadow-lg flex items-center gap-2`;
            toast.innerHTML = `<i class="fas fa-check-circle"></i><span>${message}</span>`;
            container.appendChild(toast);
            setTimeout(() => toast.remove(), 3000);
        }

        // 初始化
        initPage();
    </script>
</body>
</html>
