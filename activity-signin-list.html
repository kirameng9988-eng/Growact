                const actionBtn = user.signed ?
                    '<span class="text-gray-400 text-xs">-</span>' :
                    `<button onclick="openSigninModal(${user.id})" class="px-3 py-1.5 text-xs font-medium text-accent-blue hover:bg-accent-blue/5 rounded-lg transition-colors"><i class="fas fa-check mr-1"></i>手动签到</button>`;

                return `
                    <tr class="table-row">
                        <td class="px-6 py-4">
                            <div class="font-medium text-gray-900">${user.name}</div>
                        </td>
                        <td class="px-6 py-4 text-sm text-gray-600">${user.company}</td>
                        <td class="px-6 py-4 text-sm text-gray-600">${user.phone}</td>
                        <td class="px-6 py-4 text-sm text-gray-600">${user.regTime}</td>
                        <td class="px-6 py-4 text-center">
                            <span class="px-3 py-1 ${statusClass} text-xs font-medium rounded-full">${statusText}</span>
                        </td>
                        <td class="px-6 py-4 text-sm text-gray-600">${user.signTime}</td>
                        <td class="px-6 py-4 text-center">${actionBtn}</td>
                    </tr>
                `;
            }).join('');
        }

        function filterList() {
            const search = document.getElementById('searchInput').value.toLowerCase();
            const status = document.getElementById('signinStatus').value;

            let filtered = signinList.filter(u => {
                const matchSearch = !search || u.name.toLowerCase().includes(search) || u.company.toLowerCase().includes(search);
                const matchStatus = !status || (status === 'signed' && u.signed) || (status === 'unsigned' && !u.signed);
                return matchSearch && matchStatus;
            });

            renderList(filtered);
        }

        function resetFilters() {
            document.getElementById('searchInput').value = '';
            document.getElementById('signinStatus').value = '';
            renderList(signinList);
        }

        function openSigninModal(userId) {
            currentUser = signinList.find(u => u.id === userId);
            if (!currentUser) return;

            document.getElementById('signinUserName').textContent = currentUser.name;
            document.getElementById('signinUserCompany').textContent = currentUser.company;
            document.getElementById('signinModal').classList.remove('hidden');
        }

        function closeSigninModal() {
            document.getElementById('signinModal').classList.add('hidden');
            currentUser = null;
        }

        function confirmSignin() {
            if (currentUser) {
                currentUser.signed = true;
                currentUser.signTime = new Date().toLocaleString('zh-CN', { year: 'numeric', month: '2-digit', day: '2-digit', hour: '2-digit', minute: '2-digit' }).replace(/\//g, '-');

                // 更新统计数据
                const signedEl = document.getElementById('signedCount');
                const unsignedEl = document.getElementById('unsignedCount');
                const rateEl = document.getElementById('signinRate');
                const signed = parseInt(signedEl.textContent) + 1;
                const unsigned = parseInt(unsignedEl.textContent) - 1;
                const total = signed + unsigned;

                signedEl.textContent = signed;
                unsignedEl.textContent = unsigned;
                rateEl.textContent = Math.round((signed / total) * 100) + '%';

                renderList(signinList);
                showToast('签到成功');
            }
            closeSigninModal();
        }

        function exportList() {
            showToast('名单导出中...');
        }

        function showToast(message) {
            const toast = document.getElementById('toast');
            document.getElementById('toastMessage').textContent = message;
            toast.classList.remove('hidden');
            setTimeout(() => {
                toast.classList.add('hidden');
            }, 2000);
        }

        init();
    </script>
</body>
</html>
