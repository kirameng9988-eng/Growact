<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>活动发布记录 - 内容中台系统</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        'primary-bg': '#FFFFFF',
                        'card-bg': '#FFFFFF',
                        'border-dark': '#CBD5E1',
                        'accent-blue': '#0A61FF',
                        'accent-cyan': '#0891B2',
                        'accent-green': '#059669',
                        'accent-amber': '#D97706',
                        'accent-red': '#DC2626',
                        'text-primary': '#0F172A',
                        'text-secondary': '#475569',
                        'text-muted': '#94A3B8'
                    }
                }
            }
        }
    </script>
    <style>
        * { font-family: 'PingFang SC', 'Microsoft YaHei', sans-serif; }
        ::-webkit-scrollbar { width: 6px; height: 6px; }
        ::-webkit-scrollbar-track { background: #F1F5F9; }
        ::-webkit-scrollbar-thumb { background: #F8FAFC; border-radius: 3px; }
        .toast { animation: slideIn 0.3s ease; }
        @keyframes slideIn { from { transform: translateX(100%); opacity: 0; } to { transform: translateX(0); opacity: 1; } }
        .table-row:hover { background: rgba(59, 130, 246, 0.05); }
        .breadcrumb-item + .breadcrumb-item::before { content: '/'; margin: 0 8px; color: #94A3B8; }
    </style>
</head>
<body class="bg-secondary-bg text-gray-900">

    <main class="p-6">
        <!-- 页面标题栏 -->
        <div class="flex items-center justify-between mb-6">
            <div class="flex items-center gap-4">
                <a href="activity-publish.html" class="flex items-center gap-2 text-gray-600 hover:text-accent-blue transition-colors">
                    <i class="fas fa-arrow-left"></i>
                    <span>返回活动发布</span>
                </a>
                <div class="w-px h-6 bg-border-dark"></div>
                <div>
                    <h1 class="text-2xl font-semibold">活动发布记录</h1>
                    <p class="text-gray-500 mt-1">查看所有活动发布历史记录，支持筛选和导出</p>
                </div>
            </div>
            <div class="flex items-center gap-3">
                <button onclick="exportRecords()" class="px-5 py-2.5 bg-card-bg border border-[#E2E8F0] text-gray-600 rounded-xl hover:text-gray-900 hover:border-accent-blue transition-colors flex items-center gap-2">
                    <i class="fas fa-download"></i>
                    导出
                </button>
                <a href="activity-publish.html" class="px-5 py-2.5 bg-accent-blue text-white rounded-xl hover:bg-blue-600 transition-colors flex items-center gap-2">
                    <i class="fas fa-paper-plane"></i>
                    创建发布计划
                </a>
            </div>
        </div>

        <!-- 筛选区 -->
        <div class="bg-white rounded-xl border border-[#E2E8F0] p-4 mb-6">
            <div class="flex items-center gap-4 flex-wrap">
                <div class="flex-1 relative min-w-[240px]">
                    <i class="fas fa-search absolute left-4 top-1/2 -translate-y-1/2 text-gray-500"></i>
                    <input type="text" id="searchInput" placeholder="搜索活动名称..." oninput="filterRecords()" class="w-full bg-primary-bg border border-[#E2E8F0] rounded-xl pl-12 pr-4 py-2.5 text-sm focus:border-accent-blue focus:outline-none">
                </div>
                <select id="categoryFilter" onchange="filterRecords()" class="bg-primary-bg border border-[#E2E8F0] rounded-xl px-4 py-2.5 text-sm focus:border-accent-blue focus:outline-none">
                    <option value="">全部分类</option>
                    <option value="tech">科技创新</option>
                    <option value="culture">文化活动</option>
                    <option value="sports">体育运动</option>
                    <option value="education">教育培训</option>
                    <option value="charity">公益慈善</option>
                    <option value="summit">行业峰会</option>
                    <option value="team">团队建设</option>
                </select>
                <select id="statusFilter" onchange="filterRecords()" class="bg-primary-bg border border-[#E2E8F0] rounded-xl px-4 py-2.5 text-sm focus:border-accent-blue focus:outline-none">
                    <option value="">全部状态</option>
                    <option value="pending">待发布</option>
                    <option value="publishing">发布中</option>
                    <option value="scheduled">已定时</option>
                    <option value="published">已发布</option>
                    <option value="withdrawn">已撤回</option>
                    <option value="offline">已下线</option>
                    <option value="ended">已结束</option>
                </select>
                <select id="channelFilter" onchange="filterRecords()" class="bg-primary-bg border border-[#E2E8F0] rounded-xl px-4 py-2.5 text-sm focus:border-accent-blue focus:outline-none">
                    <option value="">全部渠道</option>
                    <option value="publicAuth">公共数据授权运营活动专区</option>
                    <option value="trustedSpace">可信数据空间活动专区</option>
                    <option value="h5Mobile">H5移动端活动专区</option>
                </select>
                <div class="flex items-center gap-2">
                    <input type="date" id="startDate" onchange="filterRecords()" class="bg-primary-bg border border-[#E2E8F0] rounded-xl px-4 py-2.5 text-sm focus:border-accent-blue focus:outline-none">
                    <span class="text-gray-500">至</span>
                    <input type="date" id="endDate" onchange="filterRecords()" class="bg-primary-bg border border-[#E2E8F0] rounded-xl px-4 py-2.5 text-sm focus:border-accent-blue focus:outline-none">
                </div>
                <button onclick="resetFilters()" class="px-3 py-2.5 text-sm text-gray-500 hover:text-gray-900 transition-colors">
                    <i class="fas fa-undo mr-1"></i>重置
                </button>
            </div>
        </div>

        <!-- 记录表格 -->
        <div class="bg-white rounded-xl border border-[#E2E8F0] overflow-hidden">
            <table class="w-full">
                <thead class="bg-primary-bg/50">
                    <tr class="text-left text-sm text-gray-500">
                        <th class="px-6 py-4 font-medium w-12">
                            <label class="flex items-center gap-2 cursor-pointer">
                                <input type="checkbox" id="selectAll" onchange="toggleSelectAll()" class="accent-accent-blue">
                            </label>
                        </th>
                        <th class="px-6 py-4 font-medium">活动名称</th>
                        <th class="px-6 py-4 font-medium">活动分类</th>
                        <th class="px-6 py-4 font-medium">主办方</th>
                        <th class="px-6 py-4 font-medium">发布渠道</th>
                        <th class="px-6 py-4 font-medium">发布时间</th>
                        <th class="px-6 py-4 font-medium">创建人</th>
                        <th class="px-6 py-4 font-medium">状态</th>
                        <th class="px-6 py-4 font-medium text-right">操作</th>
                    </tr>
                </thead>
                <tbody id="recordTableBody">
                    <!-- 动态渲染 -->
                </tbody>
            </table>

            <!-- 批量操作栏 -->
            <div id="batchActionBar" class="hidden px-6 py-4 bg-accent-blue/10 border-t border-[#E2E8F0]">
                <div class="flex items-center justify-between">
                    <div class="flex items-center gap-2">
                        <span class="text-sm text-gray-600">已选中</span>
                        <span id="selectedCount" class="text-sm font-medium text-accent-blue">0</span>
                        <span class="text-sm text-gray-600">项</span>
                    </div>
                    <div class="flex items-center gap-2">
                        <button onclick="batchPublish()" class="px-4 py-2 bg-accent-green text-white text-sm rounded-lg hover:bg-green-600 transition-colors">
                            <i class="fas fa-rocket mr-1"></i>批量发布
                        </button>
                        <button onclick="batchOffline()" class="px-4 py-2 bg-text-muted text-white text-sm rounded-lg hover:bg-gray-600 transition-colors">
                            <i class="fas fa-arrow-circle-down mr-1"></i>批量下线
                        </button>
                        <button onclick="batchDelete()" class="px-4 py-2 border border-[#E2E8F0] text-gray-600 text-sm rounded-lg hover:text-accent-red hover:border-accent-red transition-colors">
                            <i class="fas fa-trash mr-1"></i>批量删除
                        </button>
                    </div>
                </div>
            </div>

            <!-- 分页 -->
            <div class="flex items-center justify-between px-6 py-4 border-t border-[#E2E8F0] bg-primary-bg/30">
                <div class="text-sm text-gray-500">
                    共 <span id="totalCount" class="text-gray-900 font-medium">0</span> 条记录
                </div>
                <div class="flex items-center gap-2">
                    <button id="prevPage" onclick="prevPage()" class="px-3 py-1.5 border border-[#E2E8F0] rounded-lg text-gray-500 hover:text-gray-900 hover:border-accent-blue transition-colors disabled:opacity-50 disabled:cursor-not-allowed">
                        <i class="fas fa-chevron-left"></i>
                    </button>
                    <div id="paginationNumbers" class="flex items-center gap-1">
                        <!-- 动态渲染页码 -->
                    </div>
                    <button id="nextPage" onclick="nextPage()" class="px-3 py-1.5 border border-[#E2E8F0] rounded-lg text-gray-500 hover:text-gray-900 hover:border-accent-blue transition-colors disabled:opacity-50 disabled:cursor-not-allowed">
                        <i class="fas fa-chevron-right"></i>
                    </button>
                </div>
            </div>
        </div>
    </main>

    <!-- Toast容器 -->
    <div id="toastContainer" class="fixed bottom-6 right-6 z-50 flex flex-col gap-2"></div>

    <!-- 确认批量操作弹窗 -->
    <div id="confirmModal" class="fixed inset-0 bg-black/70 z-50 hidden items-center justify-center">
        <div class="bg-card-bg rounded-2xl w-[440px] border border-[#E2E8F0] shadow-2xl">
            <div class="flex items-center gap-4 p-6 border-b border-[#E2E8F0]">
                <div id="confirmIcon" class="w-12 h-12 rounded-full bg-accent-blue/20 flex items-center justify-center">
                    <i class="fas fa-rocket text-accent-blue text-xl"></i>
                </div>
                <div>
                    <h3 id="confirmTitle" class="text-lg font-medium">确认操作</h3>
                    <p id="confirmDesc" class="text-sm text-gray-500 mt-1">确定要执行此操作吗？</p>
                </div>
            </div>
            <div class="flex items-center justify-end gap-3 px-6 py-4 border-t border-[#E2E8F0]">
                <button onclick="closeModal('confirmModal')" class="px-5 py-2.5 border border-[#E2E8F0] rounded-xl text-gray-600 hover:text-gray-900 transition-colors">取消</button>
                <button id="confirmBtn" onclick="executeConfirmAction()" class="px-5 py-2.5 bg-accent-blue text-white rounded-xl hover:bg-blue-600 transition-colors">确认</button>
            </div>
        </div>
    </div>

    <script>
        /* =========================================================================
         * 状态 / 渠道 / 分类配置（与 activity-publish.html 保持一致）
         * ========================================================================= */
        const statusConfig = {
            pending:    { name: '待发布',   color: 'accent-blue',    bgColor: 'bg-accent-blue/20',    textColor: 'text-accent-blue',    icon: 'clock' },
            publishing: { name: '发布中',   color: 'indigo-500',     bgColor: 'bg-indigo-500/20',     textColor: 'text-indigo-500',     icon: 'spinner' },
            scheduled:  { name: '已定时',   color: 'accent-cyan',    bgColor: 'bg-accent-cyan/20',    textColor: 'text-accent-cyan',    icon: 'calendar-clock' },
            published:  { name: '已发布',   color: 'accent-green',   bgColor: 'bg-accent-green/20',   textColor: 'text-accent-green',   icon: 'check-circle' },
            withdrawn:  { name: '已撤回',   color: 'accent-amber',   bgColor: 'bg-accent-amber/20',   textColor: 'text-accent-amber',   icon: 'undo' },
            offline:    { name: '已下线',   color: 'text-muted',     bgColor: 'bg-text-muted/20',     textColor: 'text-text-muted',     icon: 'arrow-circle-down' },
            ended:      { name: '已结束',   color: 'text-secondary', bgColor: 'bg-text-secondary/20', textColor: 'text-text-secondary', icon: 'flag-checkered' }
        };

        const channelConfig = {
            publicAuth:   { name: '公共数据授权运营活动专区', icon: 'database',          color: 'accent-blue' },
            trustedSpace: { name: '可信数据空间活动专区',     icon: 'shield-check',      color: 'accent-cyan' },
            h5Mobile:     { name: 'H5移动端活动专区',         icon: 'mobile-screen',     color: 'accent-green' }
        };

        const categoryConfig = {
            tech:      { name: '科技创新', color: 'accent-blue',  icon: 'microchip' },
            culture:   { name: '文化活动', color: 'accent-cyan',  icon: 'palette' },
            sports:    { name: '体育运动', color: 'accent-green', icon: 'futbol' },
            education: { name: '教育培训', color: 'accent-amber', icon: 'graduation-cap' },
            charity:   { name: '公益慈善', color: 'accent-red',   icon: 'heart' },
            summit:    { name: '行业峰会', color: 'indigo-500',   icon: 'landmark' },
            team:      { name: '团队建设', color: 'purple-500',   icon: 'users' }
        };

        /* =========================================================================
         * Mock 数据：与 activity-publish.html 保持一致
         * 当前日期 2026/06/25
         * ========================================================================= */
        let publishRecords = [
            { id: 1, name: '2026 春季产品发布会',          category: 'summit',    status: 'published', publishTime: '2026-06-05 10:00:00', creator: '张明远', organizer: '产品中心',     location: '北京国际会议中心', channels: ['publicAuth', 'trustedSpace'] },
            { id: 2, name: '6 月安全月启动仪式',            category: 'education', status: 'published', publishTime: '2026-06-01 09:00:00', creator: '李晓华', organizer: '安全部',       location: '集团大礼堂',     channels: ['publicAuth'] },
            { id: 3, name: '新媒体运营沙龙 Vol.12',          category: 'culture',   status: 'publishing', publishTime: '2026-06-25 16:00:00', creator: '周明杰', organizer: '市场部',       location: '上海 · 思南公馆', channels: ['trustedSpace', 'h5Mobile'] },
            { id: 4, name: 'AI Agent 实战工作坊',          category: 'tech',      status: 'scheduled',  publishTime: '2026-06-25 14:30:00', creator: '陈思远', organizer: 'AI 创新中心',  location: '线上 · 腾讯会议', channels: ['publicAuth', 'trustedSpace'] },
            { id: 5, name: '7 月员工生日会',                category: 'team',      status: 'pending',    publishTime: '2026-06-25 18:00:00', creator: '王建国', organizer: '人力资源部',   location: '员工活动中心',   channels: ['trustedSpace'] },
            { id: 6, name: '数字化转型案例分享（撤回重发）', category: 'tech',      status: 'withdrawn',  publishTime: '2026-06-25 11:00:00', creator: '张明远', organizer: '数字化部',     location: '集团多功能厅',   channels: ['publicAuth'], withdrawnReason: '主讲人临时有会议冲突' },
            { id: 7, name: '端午龙舟邀请赛',                category: 'sports',    status: 'ended',      publishTime: '2026-05-25 10:00:00', creator: '王建国', organizer: '工会',         location: '郊外湖面',       channels: ['publicAuth', 'trustedSpace'] },
            { id: 8, name: '新员工入职培训 06 期',          category: 'education', status: 'ended',      publishTime: '2026-06-08 08:00:00', creator: '陈思远', organizer: '人力资源部',   location: '培训中心',       channels: ['trustedSpace'] },
            { id: 9, name: '科技创新成果展（预热）',         category: 'tech',      status: 'pending',    publishTime: '2026-06-26 10:00:00', creator: '张明远', organizer: '科技创新部',   location: '展览中心',       channels: ['publicAuth', 'h5Mobile'] },
            { id: 10, name: '心理健康讲座 Vol.04',           category: 'education', status: 'pending',    publishTime: '2026-06-28 15:00:00', creator: '李晓华', organizer: '人力资源部',   location: '线上 + 线下',     channels: ['trustedSpace', 'h5Mobile'] },
            { id: 11, name: '行业峰会赞助商洽谈会',         category: 'summit',    status: 'scheduled',  publishTime: '2026-06-30 09:00:00', creator: '张明远', organizer: '战略发展部',   location: '上海外滩茂悦',   channels: ['h5Mobile'] },
            { id: 12, name: '7 月数据分析技能培训',         category: 'education', status: 'scheduled',  publishTime: '2026-07-02 10:00:00', creator: '陈思远', organizer: '数据学院',     location: '数据中心会议室', channels: ['trustedSpace'] },
            { id: 13, name: '7 月篮球友谊赛',               category: 'sports',    status: 'pending',    publishTime: '2026-07-05 09:00:00', creator: '王建国', organizer: '工会体育部',   location: '集团篮球场',     channels: ['trustedSpace'] },
            { id: 14, name: '中秋联欢晚会（提前预热）',      category: 'culture',   status: 'pending',    publishTime: '2026-08-01 10:00:00', creator: '李晓华', organizer: '工会',         location: '集团大礼堂',     channels: ['publicAuth', 'trustedSpace', 'h5Mobile'] },
            { id: 15, name: '客户答谢晚宴',                  category: 'summit',    status: 'pending',    publishTime: '2026-08-15 14:00:00', creator: '张明远', organizer: '客户成功部',   location: '北京 · 国贸大酒店', channels: ['h5Mobile'] },
            { id: 16, name: '2025 数字化转型高峰论坛',      category: 'tech',      status: 'offline',    publishTime: '2025-12-20 10:00:00', creator: '张明远', organizer: '数字化部',     location: '北京国际会议中心', channels: ['publicAuth', 'trustedSpace'] },
            { id: 17, name: '2026 春节系列活动',            category: 'culture',   status: 'offline',    publishTime: '2026-01-15 10:00:00', creator: '李晓华', organizer: '工会',         location: '全集团',         channels: ['publicAuth', 'trustedSpace'] },
            { id: 18, name: '2025 年终总结大会',            category: 'team',      status: 'offline',    publishTime: '2025-12-28 14:00:00', creator: '张明远', organizer: '总裁办',       location: '集团大礼堂',     channels: ['publicAuth'] }
        ];

        let filteredRecords = [...publishRecords];
        let selectedIds = [];
        let currentPage = 1;
        const pageSize = 10;
        let pendingConfirmAction = null;

        /* =========================================================================
         * 初始化
         * ========================================================================= */
        function init() {
            // 默认起始日期 = 一个月前
            const today = new Date(2026, 5, 25);
            const monthAgo = new Date(today);
            monthAgo.setMonth(monthAgo.getMonth() - 1);
            document.getElementById('startDate').value = formatDateInput(monthAgo);
            document.getElementById('endDate').value = formatDateInput(today);
            filterRecords();
        }

        /* =========================================================================
         * 筛选记录
         * ========================================================================= */
        function filterRecords() {
            const searchText = document.getElementById('searchInput').value.toLowerCase();
            const categoryFilter = document.getElementById('categoryFilter').value;
            const statusFilter = document.getElementById('statusFilter').value;
            const channelFilter = document.getElementById('channelFilter').value;
            const startDate = document.getElementById('startDate').value;
            const endDate = document.getElementById('endDate').value;

            filteredRecords = publishRecords.filter(record => {
                const matchSearch = !searchText || record.name.toLowerCase().includes(searchText);
                const matchCategory = !categoryFilter || record.category === categoryFilter;
                const matchStatus = !statusFilter || record.status === statusFilter;
                const matchChannel = !channelFilter || (record.channels && record.channels.includes(channelFilter));
                const matchStartDate = !startDate || record.publishTime >= startDate;
                const matchEndDate = !endDate || record.publishTime <= endDate + ' 23:59:59';

                return matchSearch && matchCategory && matchStatus && matchChannel && matchStartDate && matchEndDate;
            });

            currentPage = 1;
            selectedIds = [];
            renderTable();
            renderPagination();
            updateBatchActionBar();
        }

        function resetFilters() {
            document.getElementById('searchInput').value = '';
            document.getElementById('categoryFilter').value = '';
            document.getElementById('statusFilter').value = '';
            document.getElementById('channelFilter').value = '';
            const today = new Date(2026, 5, 25);
            const monthAgo = new Date(today);
            monthAgo.setMonth(monthAgo.getMonth() - 1);
            document.getElementById('startDate').value = formatDateInput(monthAgo);
            document.getElementById('endDate').value = formatDateInput(today);
            filterRecords();
        }

        /* =========================================================================
         * 渲染表格
         * ========================================================================= */
        function renderTable() {
            const startIndex = (currentPage - 1) * pageSize;
            const endIndex = startIndex + pageSize;
            const pageRecords = filteredRecords.slice(startIndex, endIndex);

            const tbody = document.getElementById('recordTableBody');

            if (pageRecords.length === 0) {
                tbody.innerHTML = `
                    <tr>
                        <td colspan="9" class="px-6 py-12 text-center text-gray-500">
                            <i class="fas fa-inbox text-4xl mb-3 opacity-50"></i>
                            <p>暂无发布记录</p>
                            <button onclick="resetFilters()" class="mt-3 text-sm text-accent-blue hover:underline">重置筛选条件</button>
                        </td>
                    </tr>
                `;
                return;
            }

            tbody.innerHTML = pageRecords.map(record => {
                const status = statusConfig[record.status];
                const cat = categoryConfig[record.category];
                const channelsHtml = (record.channels || []).map(ch => {
                    const chConfig = channelConfig[ch];
                    if (!chConfig) return '';
                    return `<span class="inline-flex items-center gap-1 px-2 py-0.5 bg-${chConfig.color}/10 text-${chConfig.color} text-xs rounded"><i class="fas ${chConfig.icon}"></i>${chConfig.name}</span>`;
                }).join('');

                return `
                    <tr class="table-row border-t border-[#E2E8F0] transition-colors">
                        <td class="px-6 py-4">
                            <input type="checkbox" ${selectedIds.includes(record.id) ? 'checked' : ''} onchange="toggleSelect(${record.id})" class="accent-accent-blue">
                        </td>
                        <td class="px-6 py-4">
                            <a href="activity-detail.html?id=${record.id}" class="font-medium hover:text-accent-blue transition-colors">${record.name}</a>
                            ${record.withdrawnReason ? `<div class="text-xs text-accent-amber mt-1"><i class="fas fa-exclamation-circle mr-1"></i>${record.withdrawnReason}</div>` : ''}
                        </td>
                        <td class="px-6 py-4">
                            <span class="inline-flex items-center gap-1 px-2 py-0.5 bg-${cat.color}/10 text-${cat.color} text-xs rounded">
                                <i class="fas ${cat.icon}"></i>${cat.name}
                            </span>
                        </td>
                        <td class="px-6 py-4">
                            <span class="text-sm text-gray-600">${record.organizer}</span>
                        </td>
                        <td class="px-6 py-4">
                            <div class="flex flex-wrap gap-1">${channelsHtml || '<span class="text-xs text-gray-400">-</span>'}</div>
                        </td>
                        <td class="px-6 py-4">
                            <span class="text-sm text-gray-500">${record.publishTime.substring(0, 16)}</span>
                        </td>
                        <td class="px-6 py-4">
                            <span class="text-sm text-gray-600">${record.creator}</span>
                        </td>
                        <td class="px-6 py-4">
                            <span class="px-2.5 py-1 ${status.bgColor} ${status.textColor} text-xs rounded flex items-center gap-1 w-fit">
                                <i class="fas fa-${status.icon}"></i>
                                ${status.name}
                            </span>
                        </td>
                        <td class="px-6 py-4 text-right">
                            <div class="flex items-center justify-end gap-1">
                                <a href="activity-detail.html?id=${record.id}" class="p-2 text-gray-500 hover:text-accent-blue hover:bg-accent-blue/10 rounded-lg transition-colors" title="查看详情">
                                    <i class="fas fa-eye"></i>
                                </a>
                                ${record.status === 'pending' ? `
                                    <button onclick="immediatePublish(${record.id})" class="p-2 text-accent-green hover:bg-accent-green/10 rounded-lg transition-colors" title="立即发布">
                                        <i class="fas fa-rocket"></i>
                                    </button>
                                ` : ''}
                                ${record.status === 'published' ? `
                                    <button onclick="offlineContent(${record.id})" class="p-2 text-gray-500 hover:text-accent-red hover:bg-accent-red/10 rounded-lg transition-colors" title="下线">
                                        <i class="fas fa-arrow-circle-down"></i>
                                    </button>
                                ` : ''}
                                ${record.status === 'withdrawn' || record.status === 'offline' ? `
                                    <button onclick="republishRecord(${record.id})" class="p-2 text-accent-blue hover:bg-accent-blue/10 rounded-lg transition-colors" title="重新发布">
                                        <i class="fas fa-redo"></i>
                                    </button>
                                ` : ''}
                                <button onclick="deleteRecord(${record.id})" class="p-2 text-gray-500 hover:text-accent-red hover:bg-accent-red/10 rounded-lg transition-colors" title="删除">
                                    <i class="fas fa-trash"></i>
                                </button>
                            </div>
                        </td>
                    </tr>
                `;
            }).join('');

            document.getElementById('totalCount').textContent = filteredRecords.length;
        }

        /* =========================================================================
         * 分页
         * ========================================================================= */
        function renderPagination() {
            const totalPages = Math.max(1, Math.ceil(filteredRecords.length / pageSize));
            const paginationNumbers = document.getElementById('paginationNumbers');

            let pagesHtml = '';
            for (let i = 1; i <= totalPages; i++) {
                pagesHtml += `<button onclick="goToPage(${i})" class="w-8 h-8 rounded-lg text-sm transition-colors ${i === currentPage ? 'bg-accent-blue text-white' : 'text-gray-500 hover:text-gray-900 hover:bg-primary-bg'}">${i}</button>`;
            }
            paginationNumbers.innerHTML = pagesHtml;

            document.getElementById('prevPage').disabled = currentPage <= 1;
            document.getElementById('nextPage').disabled = currentPage >= totalPages;
        }

        function goToPage(page) {
            currentPage = page;
            renderTable();
            renderPagination();
        }

        function prevPage() {
            if (currentPage > 1) {
                currentPage--;
                renderTable();
                renderPagination();
            }
        }

        function nextPage() {
            const totalPages = Math.ceil(filteredRecords.length / pageSize);
            if (currentPage < totalPages) {
                currentPage++;
                renderTable();
                renderPagination();
            }
        }

        /* =========================================================================
         * 选择操作
         * ========================================================================= */
        function toggleSelect(id) {
            const idx = selectedIds.indexOf(id);
            if (idx > -1) selectedIds.splice(idx, 1);
            else selectedIds.push(id);
            updateBatchActionBar();
            updateSelectAllCheckbox();
        }

        function toggleSelectAll() {
            const selectAll = document.getElementById('selectAll').checked;
            const startIndex = (currentPage - 1) * pageSize;
            const endIndex = startIndex + pageSize;
            const pageRecords = filteredRecords.slice(startIndex, endIndex);

            if (selectAll) {
                pageRecords.forEach(r => {
                    if (!selectedIds.includes(r.id)) selectedIds.push(r.id);
                });
            } else {
                pageRecords.forEach(r => {
                    const idx = selectedIds.indexOf(r.id);
                    if (idx > -1) selectedIds.splice(idx, 1);
                });
            }

            renderTable();
            updateBatchActionBar();
        }

        function updateSelectAllCheckbox() {
            const startIndex = (currentPage - 1) * pageSize;
            const endIndex = startIndex + pageSize;
            const pageRecords = filteredRecords.slice(startIndex, endIndex);
            const allSelected = pageRecords.length > 0 && pageRecords.every(r => selectedIds.includes(r.id));
            document.getElementById('selectAll').checked = allSelected;
        }

        function updateBatchActionBar() {
            const bar = document.getElementById('batchActionBar');
            const countEl = document.getElementById('selectedCount');
            if (selectedIds.length > 0) {
                bar.classList.remove('hidden');
                countEl.textContent = selectedIds.length;
            } else {
                bar.classList.add('hidden');
            }
        }

        /* =========================================================================
         * 操作
         * ========================================================================= */
        function immediatePublish(id) {
            const record = publishRecords.find(r => r.id === id);
            if (record) {
                record.status = 'published';
                record.publishTime = formatDateTime(new Date());
                record.withdrawnReason = '';
                filterRecords();
                showToast(`「${record.name}」已发布`, 'success');
            }
        }

        function offlineContent(id) {
            const record = publishRecords.find(r => r.id === id);
            if (record) {
                record.status = 'offline';
                filterRecords();
                showToast('活动已下线', 'success');
            }
        }

        function republishRecord(id) {
            const record = publishRecords.find(r => r.id === id);
            if (record) {
                record.status = 'published';
                record.publishTime = formatDateTime(new Date());
                record.withdrawnReason = '';
                filterRecords();
                showToast('已重新发布', 'success');
            }
        }

        function deleteRecord(id) {
            if (confirm('确定要删除这条发布记录吗？')) {
                publishRecords = publishRecords.filter(r => r.id !== id);
                filterRecords();
                showToast('记录已删除', 'success');
            }
        }

        /* =========================================================================
         * 批量操作
         * ========================================================================= */
        function batchPublish() {
            if (selectedIds.length === 0) return;
            showConfirmModal('publish', `${selectedIds.length} 条活动将立即发布`, 'bg-accent-green', 'fa-rocket', '批量发布');
        }

        function batchOffline() {
            if (selectedIds.length === 0) return;
            showConfirmModal('offline', `${selectedIds.length} 条活动将下线`, 'bg-text-muted', 'fa-arrow-circle-down', '批量下线');
        }

        function batchDelete() {
            if (selectedIds.length === 0) return;
            showConfirmModal('delete', `${selectedIds.length} 条发布记录将删除`, 'bg-accent-red', 'fa-trash', '批量删除');
        }

        function showConfirmModal(action, desc, iconBg, iconClass, title) {
            pendingConfirmAction = action;
            document.getElementById('confirmTitle').textContent = title;
            document.getElementById('confirmDesc').textContent = desc;
            document.getElementById('confirmIcon').className = `w-12 h-12 rounded-full ${iconBg} flex items-center justify-center`;
            document.getElementById('confirmIcon').innerHTML = `<i class="fas ${iconClass} text-white text-xl"></i>`;
            openModal('confirmModal');
        }

        function executeConfirmAction() {
            if (pendingConfirmAction === 'publish') {
                const now = formatDateTime(new Date());
                selectedIds.forEach(id => {
                    const record = publishRecords.find(r => r.id === id);
                    if (record) {
                        record.status = 'published';
                        record.publishTime = now;
                        record.withdrawnReason = '';
                    }
                });
                showToast(`成功发布 ${selectedIds.length} 条活动`, 'success');
            } else if (pendingConfirmAction === 'offline') {
                selectedIds.forEach(id => {
                    const record = publishRecords.find(r => r.id === id);
                    if (record) record.status = 'offline';
                });
                showToast(`成功下线 ${selectedIds.length} 条活动`, 'success');
            } else if (pendingConfirmAction === 'delete') {
                publishRecords = publishRecords.filter(r => !selectedIds.includes(r.id));
                showToast(`成功删除 ${selectedIds.length} 条记录`, 'success');
            }

            selectedIds = [];
            closeModal('confirmModal');
            filterRecords();
        }

        /* =========================================================================
         * 导出
         * ========================================================================= */
        function exportRecords() {
            if (filteredRecords.length === 0) {
                showToast('当前筛选条件下没有可导出的记录', 'error');
                return;
            }
            // 生成 CSV 内容
            const headers = ['活动名称', '分类', '主办方', '渠道', '发布时间', '创建人', '状态'];
            const rows = filteredRecords.map(r => [
                r.name,
                categoryConfig[r.category] ? categoryConfig[r.category].name : '',
                r.organizer,
                (r.channels || []).map(ch => channelConfig[ch] ? channelConfig[ch].name : '').join('/'),
                r.publishTime,
                r.creator,
                statusConfig[r.status] ? statusConfig[r.status].name : ''
            ]);
            const csv = '﻿' + [headers, ...rows].map(row => row.map(cell => `"${String(cell).replace(/"/g, '""')}"`).join(',')).join('\n');
            const blob = new Blob([csv], { type: 'text/csv;charset=utf-8' });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = `活动发布记录_${formatDate(new Date())}.csv`;
            a.click();
            URL.revokeObjectURL(url);
            showToast(`已导出 ${filteredRecords.length} 条记录`, 'success');
        }

        /* =========================================================================
         * 弹窗 / Toast
         * ========================================================================= */
        function openModal(id) {
            document.getElementById(id).classList.remove('hidden');
            document.getElementById(id).classList.add('flex');
        }

        function closeModal(id) {
            document.getElementById(id).classList.add('hidden');
            document.getElementById(id).classList.remove('flex');
        }

        function showToast(message, type = 'success') {
            const container = document.getElementById('toastContainer');
            const toast = document.createElement('div');
            const bgColor = type === 'success' ? 'bg-accent-green' : type === 'error' ? 'bg-accent-red' : type === 'warning' ? 'bg-accent-amber' : 'bg-accent-blue';
            const icon = type === 'success' ? 'check-circle' : type === 'error' ? 'times-circle' : type === 'warning' ? 'exclamation-triangle' : 'info-circle';
            toast.className = `toast ${bgColor} text-white px-5 py-3 rounded-xl shadow-lg flex items-center gap-2`;
            toast.innerHTML = `<i class="fas fa-${icon}"></i><span class="text-sm">${message}</span>`;
            container.appendChild(toast);
            setTimeout(() => {
                toast.style.opacity = '0';
                toast.style.transform = 'translateX(100%)';
                toast.style.transition = 'all 0.3s ease';
                setTimeout(() => toast.remove(), 300);
            }, 3000);
        }

        /* =========================================================================
         * 工具
         * ========================================================================= */
        function formatDate(d) {
            return `${d.getFullYear()}-${String(d.getMonth() + 1).padStart(2, '0')}-${String(d.getDate()).padStart(2, '0')}`;
        }
        function formatDateInput(d) {
            return formatDate(d);
        }
        function formatDateTime(d) {
            return `${formatDate(d)} ${String(d.getHours()).padStart(2, '0')}:${String(d.getMinutes()).padStart(2, '0')}:00`;
        }

        /* =========================================================================
         * 启动
         * ========================================================================= */
        init();
    </script>
